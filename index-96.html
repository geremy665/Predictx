<script src="/app.js"></script>

<script>
// ═══ EDGE ULTIMATE — ANIMATIONS & 3D ═══

// Particules flottantes
(function(){
  var canvas=document.getElementById('edge-particles');
  if(!canvas)return;
  var ctx=canvas.getContext('2d');
  function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
  resize();
  window.addEventListener('resize',resize);
  var pts=[];
  for(var i=0;i<60;i++){
    pts.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      r:Math.random()*1.4+.3,
      vx:(Math.random()-.5)*.25,
      vy:(Math.random()-.5)*.25,
      a:Math.random()*.35+.08,
      col:Math.random()>.55?'139,92,246':'255,255,255'
    });
  }
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pts.forEach(function(p){
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle='rgba('+p.col+','+p.a+')';
      ctx.fill();
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=canvas.width;
      if(p.x>canvas.width)p.x=0;
      if(p.y<0)p.y=canvas.height;
      if(p.y>canvas.height)p.y=0;
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// Tilt 3D sur les cards hero au touch
(function(){
  document.addEventListener('touchmove',function(e){
    var hero=document.querySelector('.card-or, .card-bleu');
    if(!hero)return;
    var touch=e.touches[0];
    var rect=hero.getBoundingClientRect();
    if(touch.clientY<rect.top-10||touch.clientY>rect.bottom+10)return;
    var x=(touch.clientX-rect.left)/rect.width-.5;
    var y=(touch.clientY-rect.top)/rect.height-.5;
    hero.style.transform='perspective(800px) rotateY('+(x*5)+'deg) rotateX('+(-y*3)+'deg) translateY(-2px)';
    hero.style.transition='transform .1s';
  },{passive:true});
  document.addEventListener('touchend',function(){
    var hero=document.querySelector('.card-or, .card-bleu');
    if(!hero)return;
    hero.style.transform='';
    hero.style.transition='transform .5s cubic-bezier(.34,1.2,.64,1)';
  });
})();

// Compteur animé pour les chiffres
function animateCounter(el,start,end,dur,suffix){
  if(!el)return;
  var startTime=null;
  function step(ts){
    if(!startTime)startTime=ts;
    var prog=Math.min((ts-startTime)/dur,1);
    var ease=1-Math.pow(1-prog,3);
    var val=Math.round(start+(end-start)*ease);
    el.textContent=val.toLocaleString('fr-FR')+(suffix||'');
    if(prog<1)requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// Observer pour animer les éléments au scroll
var observer=new IntersectionObserver(function(entries){
  entries.forEach(function(entry){
    if(entry.isIntersecting){
      entry.target.style.animation='cardReveal .5s ease-out both';
      observer.unobserve(entry.target);
    }
  });
},{threshold:.1});

document.querySelectorAll('.mc,.sig,.card,.tipcard,.sbox').forEach(function(el){
  observer.observe(el);
});

// Effet ripple sur les boutons
document.addEventListener('click',function(e){
  var btn=e.target.closest('.cbtn,.btn-or,.mc-analyse,.mc-analyse-btn');
  if(!btn)return;
  var ripple=document.createElement('span');
  var rect=btn.getBoundingClientRect();
  var size=Math.max(rect.width,rect.height)*2;
  ripple.style.cssText='position:absolute;width:'+size+'px;height:'+size+'px;'+
    'left:'+(e.clientX-rect.left-size/2)+'px;top:'+(e.clientY-rect.top-size/2)+'px;'+
    'background:rgba(255,255,255,.15);border-radius:50%;transform:scale(0);'+
    'animation:rippleAnim .5s ease-out;pointer-events:none;';
  btn.style.position='relative';btn.style.overflow='hidden';
  btn.appendChild(ripple);
  setTimeout(function(){ripple.remove();},500);
});

// Injecter keyframe ripple
var style=document.createElement('style');
style.textContent='@keyframes rippleAnim{to{transform:scale(1);opacity:0}}';
document.head.appendChild(style);

// Notification value bet
if(typeof notifyValue==='function'){
  var origNotify=notifyValue;
  window.notifyValue=function(m){
    origNotify(m);
    // Flash violet sur la page
    var flash=document.createElement('div');
    flash.style.cssText='position:fixed;inset:0;background:rgba(139,92,246,.06);z-index:9999;pointer-events:none;animation:fadeIn .3s ease-out forwards';
    document.body.appendChild(flash);
    setTimeout(function(){flash.remove();},400);
  };
}

console.log('EDGE Ultimate — Animations chargées ✓');
</script>
