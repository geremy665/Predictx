<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<meta name="theme-color" content="#0a0a0f"/>
<title>EDGE - Betting Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root{
  /* Palette principale */
  --noir:#0a0a0f;
  --gris1:#111118;
  --gris2:#1a1a24;
  --gris3:#222230;
  --gris4:#2e2e40;
  --gris5:#3a3a50;

  /* Bleu electrique */
  --bleu:#1e6fff;
  --bleu2:#3d82ff;
  --bleu3:#6ba3ff;
  --bleu-glow:rgba(30,111,255,.18);
  --bleu-soft:rgba(30,111,255,.08);

  /* Jaune or */
  --jaune:#f5c842;
  --jaune2:#ffd94a;
  --jaune3:rgba(245,200,66,.12);
  --jaune-glow:rgba(245,200,66,.15);

  /* Blanc */
  --blanc:#ffffff;
  --blanc2:rgba(255,255,255,.88);
  --blanc3:rgba(255,255,255,.55);
  --blanc4:rgba(255,255,255,.22);
  --blanc5:rgba(255,255,255,.07);

  /* Statuts */
  --vert:#00d084;
  --vert2:rgba(0,208,132,.1);
  --rouge:#ff4560;
  --rouge2:rgba(255,69,96,.1);

  /* Lignes */
  --ln:rgba(255,255,255,.07);
  --ln2:rgba(255,255,255,.04);
  --ln-bleu:rgba(30,111,255,.2);

  /* Rayons */
  --r:6px;--r2:10px;--r3:14px;--r4:20px;--r5:28px;

  /* Ombres */
  --sh-bleu:0 8px 40px rgba(30,111,255,.22);
  --sh-jaune:0 8px 30px rgba(245,200,66,.18);
  --sh-noir:0 4px 24px rgba(0,0,0,.6);

  /* Fonts */
  --f-titre:'Plus Jakarta Sans',sans-serif;
  --f-body:'Space Grotesk',sans-serif;
  --f-mono:'JetBrains Mono',monospace;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{
  background:var(--noir);
  color:var(--blanc);
  font-family:var(--f-body);
  font-size:14px;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
button{font-family:var(--f-body);cursor:pointer}
input,select,textarea{
  font-family:var(--f-body);
  font-size:13px;
  background:var(--gris2);
  border:1px solid var(--ln);
  border-radius:var(--r2);
  color:var(--blanc);
  padding:11px 13px;
  width:100%;
  outline:none;
  transition:all .18s;
}
input:focus,select:focus,textarea:focus{
  border-color:rgba(30,111,255,.5);
  background:var(--gris3);
  box-shadow:0 0 0 3px rgba(30,111,255,.08);
}
input::placeholder,textarea::placeholder{color:var(--gris5)}
select{appearance:none;-webkit-appearance:none}
::-webkit-scrollbar{width:2px;height:2px}
::-webkit-scrollbar-thumb{background:var(--bleu);border-radius:2px}

/* ===================== LAYOUT ===================== */
#app{display:flex;min-height:100vh}
#sidebar{
  width:248px;
  position:fixed;top:0;left:0;height:100vh;
  display:flex;flex-direction:column;
  z-index:100;
  background:var(--gris1);
  border-right:1px solid var(--ln);
  transition:transform .28s cubic-bezier(.16,1,.3,1);
}
#main{margin-left:248px;flex:1;display:flex;flex-direction:column;min-height:100vh}
#sidebar.open{transform:none}

/* ===================== SIDEBAR ===================== */
.sb-brand{
  padding:22px 18px 0;
  border-bottom:1px solid var(--ln);
  position:relative;overflow:hidden;
}
.sb-brand::after{
  content:'';
  position:absolute;top:-60px;right:-60px;
  width:160px;height:160px;
  background:radial-gradient(circle,rgba(30,111,255,.12) 0%,transparent 70%);
  pointer-events:none;
}
.sb-logo-wrap{display:flex;align-items:center;gap:11px;margin-bottom:6px}
.sb-logo-icon{
  width:40px;height:40px;
  background:linear-gradient(135deg,var(--bleu),#0a4fd4);
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--f-titre);font-size:18px;font-weight:900;color:#fff;
  box-shadow:var(--sh-bleu);
  flex-shrink:0;
  position:relative;z-index:1;
}
.sb-logo-txt{
  font-family:var(--f-titre);
  font-size:22px;font-weight:900;
  letter-spacing:-1px;line-height:1;
  position:relative;z-index:1;
}
.sb-logo-txt span{color:var(--jaune)}
.sb-tag{
  font-family:var(--f-mono);
  font-size:8px;color:var(--blanc4);
  letter-spacing:.16em;text-transform:uppercase;
  margin-bottom:16px;position:relative;z-index:1;
}

/* KPI strip dans sidebar */
.sb-kpi-strip{
  display:grid;grid-template-columns:1fr 1fr;
  gap:1px;background:var(--ln);
  margin:0 -1px;
}
.sb-kpi{
  background:var(--gris1);
  padding:10px 14px;
}
.sb-kpi-v{
  font-family:var(--f-titre);
  font-size:18px;font-weight:800;
  line-height:1;
  font-variant-numeric:tabular-nums;
}
.sb-kpi-l{
  font-family:var(--f-mono);
  font-size:7px;color:var(--blanc4);
  text-transform:uppercase;letter-spacing:.1em;
  margin-top:2px;
}

.sb-nav{flex:1;padding:10px;overflow-y:auto}
.sb-section{
  font-family:var(--f-mono);
  font-size:8px;color:var(--gris5);
  padding:0 8px;margin:14px 0 4px;
  letter-spacing:.14em;text-transform:uppercase;font-weight:700;
}
.nb{
  display:flex;align-items:center;gap:10px;
  width:100%;padding:9px 11px;
  border:none;background:transparent;
  color:var(--blanc3);
  border-radius:var(--r2);
  font-size:13px;font-weight:500;
  text-align:left;
  transition:all .14s;
  font-family:var(--f-body);
  position:relative;
}
.nb:hover{background:var(--blanc5);color:var(--blanc2)}
.nb.on{
  background:linear-gradient(135deg,rgba(30,111,255,.15),rgba(30,111,255,.06));
  color:var(--blanc);font-weight:700;
  border:1px solid var(--ln-bleu);
}
.nb.on::before{
  content:'';
  position:absolute;left:0;top:50%;
  transform:translateY(-50%);
  width:3px;height:60%;
  background:linear-gradient(180deg,var(--bleu),var(--bleu2));
  border-radius:0 2px 2px 0;
}
.nb-ic{
  width:24px;height:24px;
  border-radius:var(--r);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;flex-shrink:0;
  background:var(--blanc5);
  transition:all .14s;
}
.nb.on .nb-ic{background:var(--bleu-soft)}
.nbadge{
  margin-left:auto;font-size:9px;
  padding:2px 7px;border-radius:100px;
  background:rgba(30,111,255,.12);
  color:var(--bleu2);font-weight:700;
  font-family:var(--f-mono);
  border:1px solid rgba(30,111,255,.18);
}
.nbadge.live{
  background:rgba(245,200,66,.1);
  color:var(--jaune2);
  border-color:rgba(245,200,66,.2);
  animation:pulse 2s infinite;
}
.nbadge.ok{background:rgba(0,208,132,.1);color:var(--vert);border-color:rgba(0,208,132,.2)}

.sb-bk{padding:12px;border-top:1px solid var(--ln)}
.bkcard{
  background:linear-gradient(135deg,rgba(245,200,66,.08),rgba(245,200,66,.03));
  border:1px solid rgba(245,200,66,.18);
  border-radius:var(--r3);
  padding:13px 15px;cursor:pointer;
  transition:all .18s;position:relative;overflow:hidden;
}
.bkcard::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--jaune2),transparent);
}
.bkcard:hover{border-color:rgba(245,200,66,.3);transform:translateY(-1px);box-shadow:var(--sh-jaune)}
.bk-l{font-family:var(--f-mono);font-size:8px;color:rgba(245,200,66,.5);font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px}
.bk-v{font-family:var(--f-titre);font-size:20px;font-weight:800;color:var(--jaune2);line-height:1;font-variant-numeric:tabular-nums}
.bk-s{font-family:var(--f-mono);font-size:9px;color:var(--blanc4);margin-top:3px}

/* ===================== TOPBAR ===================== */
#topbar{
  background:rgba(10,10,15,.96);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--ln);
  padding:0 22px;height:56px;
  display:flex;align-items:center;gap:10px;
  position:sticky;top:0;z-index:90;
}
.ham{
  display:none;flex-direction:column;gap:4px;
  padding:8px;border-radius:var(--r2);
  border:1px solid var(--ln);background:var(--gris2);
}
.ham span{width:16px;height:2px;background:var(--blanc4);border-radius:1px;display:block}
.ptitle{
  font-family:var(--f-titre);
  font-size:15px;font-weight:700;letter-spacing:-.3px;
}
.tb-r{margin-left:auto;display:flex;align-items:center;gap:8px}
.tbtn{
  padding:7px 14px;background:transparent;
  border:1px solid var(--ln);border-radius:var(--r2);
  color:var(--blanc3);font-size:12px;font-weight:600;
  white-space:nowrap;transition:all .15s;
  font-family:var(--f-body);
}
.tbtn:hover{border-color:var(--bleu2);color:var(--bleu2);background:var(--bleu-soft)}
.tbtn.ok{border-color:rgba(0,208,132,.3);color:var(--vert);background:var(--vert2)}
.livepill{
  display:flex;align-items:center;gap:5px;
  padding:5px 11px;
  background:rgba(245,200,66,.08);
  border:1px solid rgba(245,200,66,.2);
  border-radius:100px;
  font-size:10px;color:var(--jaune2);
  font-family:var(--f-mono);font-weight:700;
}
.livedot{width:5px;height:5px;border-radius:50%;background:var(--jaune2);animation:pulse 1.5s infinite;flex-shrink:0;box-shadow:0 0 6px var(--jaune2)}

/* ===================== PAGE ===================== */
#page{padding:20px;max-width:940px;animation:fu .22s ease}

/* ===================== CARDS ===================== */
.card{background:var(--gris1);border:1px solid var(--ln);border-radius:var(--r3);padding:20px;margin-bottom:12px}
.card-bleu{background:var(--gris1);border:1px solid var(--ln-bleu);border-radius:var(--r3);padding:20px;margin-bottom:12px;box-shadow:var(--sh-bleu);position:relative;overflow:hidden}
.card-bleu::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--bleu),var(--bleu2),transparent)}
.card-jaune{background:linear-gradient(135deg,rgba(245,200,66,.07),rgba(245,200,66,.02));border:1px solid rgba(245,200,66,.15);border-radius:var(--r3);padding:20px;margin-bottom:12px}
.card-vert{background:rgba(0,208,132,.06);border:1px solid rgba(0,208,132,.15);border-radius:var(--r3);padding:20px;margin-bottom:12px}
.card-rouge{background:rgba(255,69,96,.06);border:1px solid rgba(255,69,96,.15);border-radius:var(--r3);padding:20px;margin-bottom:12px}

.clbl{
  font-family:var(--f-mono);font-size:9px;
  color:var(--blanc4);font-weight:700;
  text-transform:uppercase;letter-spacing:.12em;
  margin-bottom:13px;
  display:flex;align-items:center;gap:7px;
}
.clbl::before{content:'';width:14px;height:2px;background:var(--bleu);border-radius:1px;flex-shrink:0}

/* Tags */
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;font-family:var(--f-mono)}
.tg{background:var(--jaune3);color:var(--jaune2);border:1px solid rgba(245,200,66,.2)}
.te{background:var(--vert2);color:var(--vert);border:1px solid rgba(0,208,132,.2)}
.tv{background:var(--bleu-soft);color:var(--bleu2);border:1px solid rgba(30,111,255,.2)}
.tr{background:var(--rouge2);color:var(--rouge);border:1px solid rgba(255,69,96,.2)}

/* Grilles */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.rg{display:flex;gap:4px}
.rb{
  flex:1;padding:9px 6px;font-size:12px;font-weight:600;
  border-radius:var(--r2);border:1px solid var(--ln);
  background:var(--gris2);color:var(--blanc4);
  text-align:center;transition:all .14s;
  font-family:var(--f-body);
}
.rb:hover{border-color:var(--bleu2);color:var(--bleu2)}
.rb.on{background:var(--bleu-soft);border-color:var(--ln-bleu);color:var(--blanc);font-weight:700}

/* Form section */
.fsec{background:var(--gris1);border:1px solid var(--ln);border-radius:var(--r3);padding:18px;margin-bottom:10px}
.fsh{display:flex;align-items:center;gap:8px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--ln2)}
.fsn{font-size:9px;font-weight:700;color:var(--bleu2);background:var(--bleu-soft);border-radius:4px;padding:2px 8px;text-transform:uppercase;letter-spacing:.08em;font-family:var(--f-mono);border:1px solid var(--ln-bleu)}
.fst{font-family:var(--f-titre);font-size:14px;font-weight:700;color:var(--blanc)}
.fw{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.fl{font-size:10px;color:var(--blanc4);font-weight:700;text-transform:uppercase;letter-spacing:.08em}

/* Boutons */
.cbtn{
  width:100%;height:48px;
  background:linear-gradient(135deg,var(--bleu),#0a4fd4);
  border:none;border-radius:var(--r2);
  font-family:var(--f-titre);font-size:14px;font-weight:700;color:#fff;
  letter-spacing:-.2px;margin-bottom:10px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .18s;
  box-shadow:var(--sh-bleu);
}
.cbtn:hover:not(:disabled){background:linear-gradient(135deg,var(--bleu2),var(--bleu));transform:translateY(-2px);box-shadow:0 12px 32px rgba(30,111,255,.3)}
.cbtn:disabled{background:var(--gris4);color:var(--blanc4);transform:none;opacity:.5;box-shadow:none}
.cbtn.gold{background:linear-gradient(135deg,#c9960a,var(--jaune));box-shadow:var(--sh-jaune);color:var(--noir)}
.cbtn.gold:hover:not(:disabled){box-shadow:0 12px 32px rgba(245,200,66,.25)}
.cbtn.vert{background:linear-gradient(135deg,#00a368,var(--vert));color:var(--noir)}
.abtn{
  padding:6px 12px;border-radius:var(--r);
  font-size:11px;font-weight:600;
  border:1px solid var(--ln);color:var(--blanc3);
  background:transparent;white-space:nowrap;
  transition:all .14s;font-family:var(--f-body);
}
.abtn:hover{border-color:var(--bleu2);color:var(--bleu2);background:var(--bleu-soft)}

/* ===================== MATCH CARDS ===================== */
.mcard{
  background:var(--gris1);border:1px solid var(--ln);
  border-radius:var(--r3);overflow:hidden;
  margin-bottom:9px;cursor:pointer;
  transition:all .18s;
}
.mcard:hover{border-color:var(--ln-bleu);transform:translateY(-2px);box-shadow:var(--sh-bleu)}
.mcard.hot{border-color:rgba(30,111,255,.15)}
.mstripe{height:2px;background:linear-gradient(90deg,var(--bleu),transparent)}
.mcard.arb .mstripe{background:linear-gradient(90deg,var(--vert),transparent)}
.mhead{
  padding:9px 14px 8px;
  display:flex;align-items:center;gap:8px;
  border-bottom:1px solid var(--ln2);
  background:rgba(255,255,255,.02);
}
.mleague{font-family:var(--f-mono);font-size:9px;color:var(--blanc4);text-transform:uppercase;letter-spacing:.09em;font-weight:700}
.mtime-b{
  margin-left:auto;font-family:var(--f-mono);font-size:10px;font-weight:700;
  padding:3px 9px;border-radius:6px;
  background:var(--gris3);border:1px solid var(--ln2);color:var(--blanc3);
}
.mtime-b.live{background:rgba(245,200,66,.1);border-color:rgba(245,200,66,.25);color:var(--jaune2);animation:pulse 2s infinite}
.mbody{padding:14px}
.mteams{display:grid;grid-template-columns:1fr 44px 1fr;align-items:center;gap:8px;margin-bottom:13px}
.mteam{font-family:var(--f-titre);font-size:15px;font-weight:700;line-height:1.2}
.mteam.h{text-align:right}
.mxg-label{font-family:var(--f-mono);font-size:8px;color:var(--blanc4);margin-top:2px}
.mvs{font-family:var(--f-mono);font-size:11px;color:var(--blanc4);font-weight:700;text-align:center}
.modds{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:11px}
.odd{
  background:var(--gris2);border:1px solid var(--ln);
  border-radius:var(--r2);padding:9px 6px;
  text-align:center;transition:all .14s;cursor:pointer;
}
.odd:hover{background:var(--bleu-soft);border-color:var(--ln-bleu)}
.odd.val{background:var(--bleu-soft);border-color:var(--ln-bleu)}
.odd-l{font-family:var(--f-mono);font-size:8px;color:var(--blanc4);font-weight:700;text-transform:uppercase}
.odd-v{font-family:var(--f-titre);font-size:20px;font-weight:800;letter-spacing:-.3px;margin-top:2px;font-variant-numeric:tabular-nums}
.odd.val .odd-v{color:var(--bleu2)}
.odd-e{font-family:var(--f-mono);font-size:8px;font-weight:700;color:var(--vert);margin-top:1px}
.mfoot{display:flex;align-items:center;justify-content:space-between;padding-top:9px;border-top:1px solid var(--ln2)}
.cbar-w{display:flex;align-items:center;gap:7px}
.cbar-t{width:55px;height:3px;background:var(--gris4);border-radius:2px;overflow:hidden}
.cbar-f{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--bleu),var(--bleu2))}
.cbar-v{font-family:var(--f-titre);font-size:13px;font-weight:700;font-variant-numeric:tabular-nums}

/* ===================== SIGNAL CARDS ===================== */
.sig{background:var(--gris1);border:1px solid var(--ln);border-radius:var(--r3);overflow:hidden;margin-bottom:9px;cursor:pointer;transition:all .18s}
.sig:hover{border-color:var(--ln-bleu);transform:translateY(-2px);box-shadow:var(--sh-bleu)}
.sig.top{border-color:rgba(30,111,255,.2)}
.sig-glow{height:2px;background:linear-gradient(90deg,var(--bleu),var(--jaune2),transparent)}
.sig-bd{padding:15px}
.sig-meta{font-family:var(--f-mono);font-size:8px;color:var(--blanc4);margin-bottom:8px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;text-transform:uppercase;letter-spacing:.08em}
.sig-teams{font-family:var(--f-body);font-size:12px;color:var(--blanc3);margin-bottom:4px;font-weight:500}
.sig-bet{font-family:var(--f-titre);font-size:19px;font-weight:800;letter-spacing:-.3px;margin-bottom:12px;line-height:1.2}
.sig-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
.sig-stat{background:var(--gris2);border-radius:var(--r);padding:9px 5px;text-align:center;border:1px solid var(--ln2)}
.sig-stat-l{font-family:var(--f-mono);font-size:7px;color:var(--blanc4);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
.sig-stat-v{font-family:var(--f-titre);font-size:16px;font-weight:800;letter-spacing:-.3px;font-variant-numeric:tabular-nums}
.pbar{height:3px;background:var(--gris4);border-radius:2px;overflow:hidden}
.pfill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--bleu),var(--bleu2))}

/* ===================== RESULT PAGE ===================== */
.vrd{background:var(--gris1);border:1px solid var(--ln-bleu);border-radius:var(--r4);padding:20px;margin-bottom:12px;box-shadow:var(--sh-bleu);position:relative;overflow:hidden}
.vrd::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--bleu),var(--jaune2),transparent)}
.vbet{font-family:var(--f-titre);font-size:clamp(17px,4vw,24px);font-weight:800;letter-spacing:-.5px;line-height:1.2;margin-bottom:6px}
.vmeta{font-family:var(--f-mono);font-size:9px;color:var(--blanc4);margin-bottom:14px}
.prow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.pb{background:var(--gris2);border:1px solid var(--ln);border-radius:var(--r2);padding:12px 7px;text-align:center}
.pb.win{background:var(--bleu-soft);border-color:var(--ln-bleu)}
.pp{font-family:var(--f-titre);font-size:24px;font-weight:900;letter-spacing:-.5px;font-variant-numeric:tabular-nums;line-height:1}
.pb.win .pp{color:var(--bleu2)}
.pn{font-size:10px;color:var(--blanc4);font-weight:600;margin-top:3px}

<script>
"use strict";
function pmf(l,k){if(l<=0)return k===0?1:0;if(k<0)return 0;if(k>20){var lp=-l+k*Math.log(l);for(var i=1;i<=k;i++)lp-=Math.log(i);return Math.max(0,Math.exp(lp));}var v=Math.exp(-l);for(var j=1;j<=k;j++)v*=l/j;return Math.max(0,v);}
function cdf(l,m){if(m<0)return 0;var s=0,t=Math.exp(-l);for(var k=0;k<=m;k++){s+=t;if(t<1e-10)break;t*=l/(k+1);}return Math.min(1,s);}
function tau(h,a,lH,lA,rho){var r=Math.max(-0.25,Math.min(-0.05,rho||-0.135));if(h===0&&a===0)return Math.max(0.001,1-lH*lA*r);if(h===1&&a===0)return Math.max(0.001,1+lA*r);if(h===0&&a===1)return Math.max(0.001,1+lH*r);if(h===1&&a===1)return Math.max(0.01,1-r);return 1;}
var RHO={"Ligue 1":-0.142,"Premier League":-0.118,"La Liga":-0.135,"Bundesliga":-0.128,"Serie A":-0.151,"Champions League":-0.132};

function kellyF(p,o){
  if(!o||o<=1||!p||p<=0||p>=1)return 0;
  // Cote minimum 1.25
  if(o<1.25)return 0;
  var b=o-1,k=(b*p-(1-p))/b;
  if(k<=0)return 0;
  var e=p*o-1;
  if(e<0.03)return 0; // Edge minimum 3%
  var fr=e>0.10?0.25:e>0.05?0.20:0.15;
  return Math.min(k*fr,0.04);
}
function edgeF(p,o){
  if(!o||!p||o<1.25||p<=0||p>=1)return null;
  var e=p*o-1;
  return e<0.03?null:e; // Edge minimum 3%
}
function arbF(o1,oN,o2){if(!o1||!oN||!o2||o1<=1||oN<=1||o2<=1)return null;var imp=1/o1+1/oN+1/o2;return imp>=1?null:+((1/imp-1)*100).toFixed(2);}
function fmW(p5,p10){var r5=Math.min(15,p5||7)/15,r10=Math.min(30,p10||14)/30;return Math.max(0.72,Math.min(1.28,0.72+0.56*(r5*0.6+r10*0.4)));}

function calc(m){
  try{
    var lH=(m.hxg||1.35)*0.58+(m.hg||1.25)*0.28+((m.hsh||12)/24)*0.14;
    var lA=(m.axg||1.10)*0.58+(m.ag||1.00)*0.28+((m.ash||10)/24)*0.14;
    var hD=(m.hxga||1.1)*0.6+(1-(m.hcs||30)/100)*0.25+(m.hc||1.2)*0.15;
    var aD=(m.axga||1.3)*0.6+(1-(m.acs||22)/100)*0.25+(m.ac||1.4)*0.15;
    lH*=Math.pow(Math.max(0.4,aD)/1.2,0.38);lA*=Math.pow(Math.max(0.4,hD)/1.2,0.38);
    lH*=1.082;lH*=fmW(m.hf,m.hf10);lA*=fmW(m.af,m.af10);
    if(m.derby){lH*=0.91;lA*=0.91;}if(m.hfat)lH*=0.935;if(m.afat)lA*=0.935;
    lH=Math.max(0.22,Math.min(4.5,lH));lA=Math.max(0.15,Math.min(4.0,lA));
    var rho=RHO[m.c]||-0.135;
    var pH=0,pN=0,pA=0,sc=[],tot=0;
    for(var h=0;h<=9;h++)for(var a=0;a<=9;a++){var p=pmf(lH,h)*pmf(lA,a)*tau(h,a,lH,lA,rho);if(p<0)continue;tot+=p;sc.push({s:h+"-"+a,p:p});if(h>a)pH+=p;else if(h===a)pN+=p;else pA+=p;}
    if(tot>0){pH/=tot;pN/=tot;pA/=tot;}
    sc.sort(function(x,y){return y.p-x.p;});
    // Meilleur pari avec cote minimum 1.25
    var bets=[{k:"1",p:pH,o:+m.o1||0},{k:"N",p:pN,o:+m.on||0},{k:"2",p:pA,o:+m.o2||0}];
    bets=bets.filter(function(b){return b.o>=1.25;});
    var best=null,bestEdge=-99;
    bets.forEach(function(b){var e=edgeF(b.p,b.o)||0;if(e>bestEdge){bestEdge=e;best=b;}});
    var bR=best?best.k:"1",bP=best?best.p:pH,bO=best?best.o:0;
    var edg=edgeF(bP,bO),kel=kellyF(bP,bO);
    var mg=(m.o1&&m.on&&m.o2)?1/m.o1+1/m.on+1/m.o2:null;
    var safe=mg?(mg>1.3?"SUSPENDU":mg>1.15?"ATTENTION":"OK"):"OK";
    var conf=Math.min(94,Math.max(8,Math.round(bP*30+(edg>0?Math.min(edg*60,18):0)+(safe==="OK"?4:safe==="ATTENTION"?-3:-9)+(m.derby?-10:0))));
    // Label simplifie
    var teamH=m.h||"Domicile",teamA=m.a||"Exterieur";
    var label=bR==="1"?(teamH+" gagne ("+((pH*100).toFixed(0))+"%)"):bR==="2"?(teamA+" gagne ("+((pA*100).toFixed(0))+"%)"):("Match nul probable ("+((pN*100).toFixed(0))+"%)");
    var btts=(1-pmf(lH,0))*(1-pmf(lA,0));
    var o25=1-cdf(lH+lA,2),o35=1-cdf(lH+lA,3),p15=1-cdf(lH+lA,1);
    return{lH:lH,lA:lA,pH:pH,pN:pN,pA:pA,sc:sc,bR:bR,bP:bP,bO:bO,edg:edg,kel:kel,conf:conf,label:label,safe:safe,btts:btts,o25:o25,o35:o35,p15:p15};
  }catch(err){console.error(err);return null;}
}

function buildBets(r,d){
  var o1=+d.o1||0,oN=+d.oN||0,o2=+d.o2||0,oO25=+d.oO25||0,oO35=+d.oO35||0,oBtts=+d.oBtts||0;
  var bets=[
    {id:"1",cat:"1X2",name:"Victoire "+(d.home||"Dom"),p:r.pH,o:o1},
    {id:"N",cat:"1X2",name:"Match nul",p:r.pN,o:oN},
    {id:"2",cat:"1X2",name:"Victoire "+(d.away||"Ext"),p:r.pA,o:o2},
    {id:"1X",cat:"Double chance",name:"Domicile ou Nul",p:r.pH+r.pN,o:0},
    {id:"X2",cat:"Double chance",name:"Exterieur ou Nul",p:r.pN+r.pA,o:0},
    {id:"O15",cat:"Buts",name:"Plus de 1.5 buts",p:r.p15,o:0},
    {id:"O25",cat:"Buts",name:"Plus de 2.5 buts",p:r.o25,o:oO25},
    {id:"O35",cat:"Buts",name:"Plus de 3.5 buts",p:r.o35,o:oO35},
    {id:"U25",cat:"Buts",name:"Moins de 2.5 buts",p:1-r.o25,o:0},
    {id:"BTTS",cat:"Les deux marquent",name:"Les deux equipes marquent",p:r.btts,o:oBtts},
    {id:"NBTTS",cat:"Les deux marquent",name:"Les deux equipes ne marquent pas",p:1-r.btts,o:0},
    {id:"CSH",cat:"Clean sheet",name:"Sans encaisser "+(d.home||"Dom"),p:pmf(r.lA,0),o:0},
    {id:"CSA",cat:"Clean sheet",name:"Sans encaisser "+(d.away||"Ext"),p:pmf(r.lH,0),o:0},
  ];
  // Appliquer les filtres: cote min 1.25, edge min 3%
  bets.forEach(function(b){
    b.edg=b.o>=1.25?edgeF(b.p,b.o):null;
    b.kel=b.o>=1.25?kellyF(b.p,b.o):0;
  });
  var best=bets.filter(function(b){return b.o>=1.25&&(b.edg||0)>0;}).sort(function(a,b){return(b.edg||0)-(a.edg||0);})[0];
  if(!best)best=bets.filter(function(b){return b.o>=1.25;}).sort(function(a,b){return b.p-a.p;})[0];
  var safe2=bets.filter(function(b){return b.p>0.62&&b.o>=1.25;}).sort(function(a,b){return b.p-a.p;})[0];
  var value=bets.filter(function(b){return(b.edg||0)>0.04&&b.o>=1.25;}).sort(function(a,b){return(b.edg||0)-(a.edg||0);})[0];
  return{allBets:bets,bestBet:best,safeBet:safe2,valueBet:value};
}

  var newBk=toM(S.bk+profit);

function calcBkR(){
  var b=S.bkC,tot=+b.tot,prob=+b.prob,odd=+b.odd,frac=+b.frac||0.25;
  if(!tot||!prob||!odd){S.bkR=null;return;}
  var p=prob/100,bo=odd-1,q=1-p,kR=Math.max(0,(bo*p-q)/bo),kA=kR*frac;
  S.bkR={kR:kR,kA:kA,m:kA*tot,g:odd*kA*tot-kA*tot,ev:p*odd-1};
}

function togLN(i){var k=S.lgKeys[i];if(k!==undefined)S.openL[k]=!S.openL[k];renderPage();}
function addToSlip(mIdx,typeN,odd){
  var TYPES=["1","N","2"];
  var type=TYPES[typeN]||"1";
  var m=S.matches[mIdx]||{};
  var th=m.h||m.home||"Dom";var ta=m.a||m.away||"Ext";
  var LBLS=[th+" gagne","Match nul",ta+" gagne"];
  var label=LBLS[typeN]||"Pari";
  var slip=S.demoSlip;
  var existing=-1;
  for(var i=0;i<slip.length;i++){if(slip[i].mIdx===mIdx){existing=i;break;}}
  if(existing>=0){
    if(slip[existing].typeN===typeN){S.demoSlip.splice(existing,1);}
    else{S.demoSlip[existing]={mIdx:mIdx,type:type,typeN:typeN,odd:odd,label:label};}
  }else{S.demoSlip.push({mIdx:mIdx,type:type,typeN:typeN,odd:odd,label:label});}
  renderPage();
}
function removeFromSlip(i){S.demoSlip.splice(i,1);renderPage();}
function clearSlip(){S.demoSlip=[];renderPage();}
function resetDemo(){S.demoSlip=[];S.demoBets=[];S.demoBk=1000;S.demoBkH=[1000];renderPage();}
function placeBetDemo(isCombi){
  var el=document.getElementById("demo-stake");
  var stake=el?parseFloat(el.value)||10:10;
  if(stake<=0||stake>S.demoBk){alert("Mise invalide");return;}
  var slip=S.demoSlip;
  if(!slip.length){alert("Ajoute au moins un match");return;}
  var totalOdd,label,picks;
  if(isCombi){
    totalOdd=parseFloat(slip.reduce(function(a,b){return a*b.odd;},1).toFixed(2));
    label="Combine "+slip.length+" selections";
    picks=slip.map(function(s){return s.label;});
  }else{
    if(slip.length>1){alert("1 seule selection pour un simple");return;}
    totalOdd=slip[0].odd;label=slip[0].label;picks=[slip[0].label];
  }
  var bet={id:Date.now(),date:new Date().toLocaleDateString("fr-FR"),stake:stake,odd:totalOdd,label:label,picks:picks,type:isCombi?"combine":"simple",potGain:parseFloat((stake*totalOdd).toFixed(2)),status:"pending"};
  S.demoBk-=stake;S.demoBkH.push(S.demoBk);S.demoBets.unshift(bet);S.demoSlip=[];renderPage();
}
function settleBet(betId,won){
  var bet=S.demoBets.find(function(b){return b.id===betId;});
  if(!bet||bet.status!=="pending")return;
  bet.status=won?"won":"lost";
  bet.profit=won?parseFloat((bet.potGain-bet.stake).toFixed(2)):-bet.stake;
  if(won){S.demoBk+=bet.potGain;confetti();}
  S.demoBkH.push(S.demoBk);renderPage();
}

        +'<div style="flex:1"><div style="font-family:var(--f-mono);font-size:8px;color:var(--blanc4);margin-bottom:4px">'+bet.date+' - '+bet.type.toUpperCase()+'</div>'
        +'<div style="font-family:var(--f-titre);font-size:14px;font-weight:700">'+esc(bet.label)+'</div></div>'
        +'<div style="text-align:right;flex-shrink:0"><div style="font-family:var(--f-titre);font-size:18px;font-weight:900;color:var(--jaune2)">@ '+bet.odd.toFixed(2)+'</div>'
        +'<div style="font-family:var(--f-mono);font-size:9px;color:var(--blanc4)">Mise: '+bet.stake+' EUR</div>'
        +'<div style="font-family:var(--f-titre);font-size:13px;font-weight:700;color:var(--blanc3)">Gain pot: '+bet.potGain+' EUR</div></div></div>';
      if(isPend){
        h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'
          +'<button onclick="settleBet('+bet.id+',true)" style="padding:10px;background:var(--vert2);border:1px solid rgba(0,208,132,.25);border-radius:var(--r2);color:var(--vert);font-family:var(--f-titre);font-size:13px;font-weight:800;cursor:pointer">Gagne</button>'
          +'<button onclick="settleBet('+bet.id+',false)" style="padding:10px;background:var(--rouge2);border:1px solid rgba(255,69,96,.2);border-radius:var(--r2);color:var(--rouge);font-family:var(--f-titre);font-size:13px;font-weight:800;cursor:pointer">Perdu</button></div>';
      }else{
        h+='<div style="padding:9px 12px;background:'+(isWon?'var(--vert2)':'var(--rouge2)')+';border:1px solid '+(isWon?'rgba(0,208,132,.2)':'rgba(255,69,96,.15)')+';border-radius:var(--r2);font-family:var(--f-titre);font-size:15px;font-weight:800;color:'+(isWon?'var(--vert)':'var(--rouge)')+'>'+(isWon?'+':'')+bet.profit+' EUR '+(isWon?'Gagne':'Perdu')+'</div>';
      }
      h+='</div>';
    }
  }
  return h;
}

function pLive(){
  var ms=S.matches;
  var live=ms.filter(function(m){return isLive(m.time||m.t);});
  var upcoming=ms.filter(function(m){return isUp(m.time||m.t);});
  var finished=ms.filter(function(m){return isDone(m.time||m.t);});
  var tab=S.liveTab||"all";
  var h='<div style="font-family:var(--f-titre);font-size:24px;font-weight:900;letter-spacing:-1px;margin-bottom:3px">Scores Live</div>'
    +'<div style="font-family:var(--f-mono);font-size:9px;color:var(--blanc4);margin-bottom:14px">Matchs en temps reel</div>';
  h+='<div style="display:flex;gap:6px;margin-bottom:14px">';
  var LTABS=[["all","Tous ("+ms.length+")"],["live","Live ("+live.length+")"],["upcoming","A venir ("+upcoming.length+")"],["finished","Termines ("+finished.length+")"]];
  for(var li=0;li<4;li++){
    var isOn=tab===LTABS[li][0];
    h+='<button onclick="setLiveTabN('+li+')" style="padding:7px 13px;border-radius:100px;font-family:var(--f-body);font-size:12px;font-weight:600;cursor:pointer;border:1px solid '+(isOn?'var(--jaune2)':'var(--ln)')+';background:'+(isOn?'rgba(245,200,66,.1)':'transparent')+';color:'+(isOn?'var(--jaune2)':'var(--blanc4)')+';white-space:nowrap;transition:all .15s">'+LTABS[li][1]+'</button>';
  }
  h+='</div>';
  var displayed=tab==="live"?live:tab==="upcoming"?upcoming:tab==="finished"?finished:ms;
  if(!displayed.length){h+='<div class="empty"><div class="ei">L</div><div class="et">Aucun match</div></div>';return h;}
  for(var di=0;di<displayed.length;di++){
    var m=displayed[di];var mIdx=S.matches.indexOf(m);
    var tH=esc(m.h||m.home||'');var tA=esc(m.a||m.away||'');
    var isLv=isLive(m.time||m.t);var isDn=isDone(m.time||m.t);
    var elapsed=isLv?Math.min(90,Math.floor((Date.now()-new Date(m.time||m.t).getTime())/60000)):0;
    h+='<div style="background:var(--gris1);border:1px solid '+(isLv?'rgba(245,200,66,.3)':'var(--ln)')+';border-radius:var(--r3);padding:14px;margin-bottom:8px;cursor:pointer;opacity:'+(isDn?.7:1)+'" onclick="PM('+mIdx+')">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
      +'<div style="display:flex;align-items:center;gap:7px">'+flagBadge(m.f)+'<span style="font-family:var(--f-mono);font-size:9px;color:var(--blanc4)">'+esc(m.c)+'</span></div>'
      +'<div style="font-family:var(--f-mono);font-size:10px;font-weight:700;padding:4px 10px;border-radius:100px;background:'+(isLv?'rgba(245,200,66,.1)':'var(--gris2)')+';border:1px solid '+(isLv?'rgba(245,200,66,.25)':'var(--ln)')+';color:'+(isLv?'var(--jaune2)':'var(--blanc4)')+'>"'+(isLv?elapsed+"'":isDn?"FIN":fmtTime(m.time||m.t))+'</div></div>'
      +'<div style="display:grid;grid-template-columns:1fr 80px 1fr;align-items:center;gap:10px">'
      +'<div style="text-align:right;font-family:var(--f-titre);font-size:15px;font-weight:800">'+tH+'</div>'
      +'<div style="text-align:center;background:var(--gris2);border:1px solid var(--ln);border-radius:var(--r2);padding:9px 5px;font-family:var(--f-titre);font-size:'+(isLv?'20':'14')+'px;font-weight:900;color:'+(isLv?'var(--jaune2)':'var(--blanc3)')+'>"'+(isLv?"? - ?":fmtTime(m.time||m.t))+'</div>'
      +'<div style="font-family:var(--f-titre);font-size:15px;font-weight:800">'+tA+'</div></div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-top:10px">'
      +'<div style="background:var(--gris2);border:1px solid var(--ln);border-radius:5px;padding:6px;text-align:center;font-family:var(--f-titre);font-size:14px;font-weight:800;font-variant-numeric:tabular-nums">'+(m.o1?m.o1.toFixed(2):'--')+'</div>'
      +'<div style="background:var(--gris2);border:1px solid var(--ln);border-radius:5px;padding:6px;text-align:center;font-family:var(--f-titre);font-size:14px;font-weight:800;font-variant-numeric:tabular-nums">'+(m.on?m.on.toFixed(2):'--')+'</div>'
      +'<div style="background:var(--gris2);border:1px solid var(--ln);border-radius:5px;padding:6px;text-align:center;font-family:var(--f-titre);font-size:14px;font-weight:800;font-variant-numeric:tabular-nums">'+(m.o2?m.o2.toFixed(2):'--')+'</div>'
      +'</div></div>';
  }
  return h;
}

function pCotes(){
  var bkTab=S.cotesTab||"betclic";
  var ms=S.matches.filter(function(m){return !isDone(m.time||m.t);});
  var BKS=[
    {id:"betclic",name:"Betclic",color:"#ff6b35",url:"https://www.betclic.fr"},
    {id:"winamax",name:"Winamax",color:"#e2001a",url:"https://www.winamax.fr"},
    {id:"unibet",name:"Unibet",color:"#007b4f",url:"https://www.unibet.fr"},
    {id:"pinnacle",name:"Pinnacle",color:"#c8a900",url:"https://www.pinnacle.com"},
    {id:"bet365",name:"Bet365",color:"#ffb900",url:"https://www.bet365.com"},
    {id:"pmu",name:"PMU",color:"#0052a5",url:"https://www.pmu.fr"}
  ];
  var selectedBk=BKS.find(function(b){return b.id===bkTab;})||BKS[0];
  var h='<div style="font-family:var(--f-titre);font-size:24px;font-weight:900;letter-spacing:-1px;margin-bottom:3px">Cotes par bookmaker</div>'
    +'<div style="font-family:var(--f-mono);font-size:9px;color:var(--blanc4);margin-bottom:14px">Cotes officielles et comparaison</div>';
  h+='<div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;-webkit-overflow-scrolling:touch">';
  for(var ci=0;ci<BKS.length;ci++){
    var bk=BKS[ci];var isOn=bkTab===bk.id;
    h+='<button onclick="setCotesTabN('+ci+')" style="padding:8px 14px;border-radius:var(--r2);font-family:var(--f-titre);font-size:13px;font-weight:700;cursor:pointer;border:1px solid '+(isOn?bk.color:'var(--ln)')+';background:'+(isOn?'rgba(255,255,255,.05)':'transparent')+';color:'+(isOn?bk.color:'var(--blanc4)')+';white-space:nowrap;flex-shrink:0;transition:all .15s">'+bk.name+'</button>';
  }
  h+='</div>';
  h+='<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 15px;background:var(--gris1);border:1px solid var(--ln);border-radius:var(--r2);margin-bottom:12px">'
    +'<div style="font-family:var(--f-titre);font-size:16px;font-weight:800;color:'+selectedBk.color+'">'+selectedBk.name+'</div>'
    +'<a href="'+selectedBk.url+'" target="_blank" rel="noopener" style="padding:7px 14px;background:'+selectedBk.color+';border-radius:var(--r);font-family:var(--f-titre);font-size:11px;font-weight:700;color:#fff;text-decoration:none">Ouvrir</a>'
    +'</div>';
  if(!ms.length){h+='<div class="empty"><div class="et">Aucun match</div></div>';return h;}
  var leagues=[];
  ms.forEach(function(m){if(leagues.indexOf(m.c)<0)leagues.push(m.c);});
  for(var lgi=0;lgi<leagues.length;lgi++){
    var lg=leagues[lgi];
    var lgMs=ms.filter(function(m){return m.c===lg;});
    if(!lgMs.length)continue;
    h+='<div style="margin-bottom:10px">'
      +'<div style="display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--gris2);border:1px solid var(--ln);border-radius:var(--r2);margin-bottom:6px">'
      +flagBadge(lgMs[0].f)
      +'<span style="font-family:var(--f-titre);font-size:13px;font-weight:700;color:var(--blanc3)">'+esc(lg)+'</span>'
      +'<span style="font-family:var(--f-mono);font-size:9px;color:var(--blanc4);padding:2px 7px;background:var(--gris3);border-radius:4px">'+lgMs.length+'</span>'
      +'</div>';
    for(var mgi=0;mgi<lgMs.length;mgi++){
      var m=lgMs[mgi];var mIdx=S.matches.indexOf(m);
      var tH=esc(m.h||m.home||'');var tA=esc(m.a||m.away||'');
      var bkD=(m.bk||[]).find(function(b){return b.n&&b.n.toLowerCase().indexOf(bkTab)>=0;});
      var o1=bkD?bkD.o1:m.o1;var on=bkD?bkD.on:m.on;var o2=bkD?bkD.o2:m.o2;
      var allO1=(m.bk||[]).map(function(b){return b.o1||0;});
      var allO2=(m.bk||[]).map(function(b){return b.o2||0;});
      var bestO1=allO1.length?Math.max.apply(null,allO1):0;
      var bestO2=allO2.length?Math.max.apply(null,allO2):0;
      h+='<div style="background:var(--gris1);border:1px solid var(--ln);border-radius:var(--r2);padding:12px 13px;margin-bottom:6px">'
        +'<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px">'
        +'<div style="flex:1;min-width:0"><div style="font-family:var(--f-mono);font-size:8px;color:var(--blanc4);margin-bottom:4px">'+fmtDate(m.time||m.t)+' '+fmtTime(m.time||m.t)+'</div>'
        +'<div style="font-family:var(--f-titre);font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+tH+' vs '+tA+'</div></div>'
        +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:5px;flex-shrink:0">'
        +'<div style="background:'+(o1===bestO1&&bestO1>0?'var(--vert2)':'var(--gris2)')+';border:1px solid '+(o1===bestO1&&bestO1>0?'rgba(0,208,132,.25)':'var(--ln)')+';border-radius:var(--r);padding:7px 4px;text-align:center"><div style="font-family:var(--f-mono);font-size:7px;color:var(--blanc4)">1</div><div style="font-family:var(--f-titre);font-size:15px;font-weight:900;color:'+(o1===bestO1&&bestO1>0?'var(--vert)':'var(--blanc)')+';font-variant-numeric:tabular-nums">'+(o1?o1.toFixed(2):'--')+'</div></div>'
        +'<div style="background:var(--gris2);border:1px solid var(--ln);border-radius:var(--r);padding:7px 4px;text-align:center"><div style="font-family:var(--f-mono);font-size:7px;color:var(--blanc4)">N</div><div style="font-family:var(--f-titre);font-size:15px;font-weight:900;font-variant-numeric:tabular-nums">'+(on?on.toFixed(2):'--')+'</div></div>'
        +'<div style="background:'+(o2===bestO2&&bestO2>0?'var(--vert2)':'var(--gris2)')+';border:1px solid '+(o2===bestO2&&bestO2>0?'rgba(0,208,132,.25)':'var(--ln)')+';border-radius:var(--r);padding:7px 4px;text-align:center"><div style="font-family:var(--f-mono);font-size:7px;color:var(--blanc4)">2</div><div style="font-family:var(--f-titre);font-size:15px;font-weight:900;color:'+(o2===bestO2&&bestO2>0?'var(--vert)':'var(--blanc)')+';font-variant-numeric:tabular-nums">'+(o2?o2.toFixed(2):'--')+'</div></div>'
        +'</div></div>'
        +'<div style="display:flex;gap:5px">'
        +'<button onclick="addToSlip('+mIdx+',0,'+o1+')" style="flex:1;padding:5px;background:transparent;border:1px solid var(--ln);border-radius:5px;color:var(--blanc4);font-family:var(--f-mono);font-size:8px;cursor:pointer;font-weight:700">+ Demo</button>'
        +'<a href="'+selectedBk.url+'" target="_blank" rel="noopener" style="padding:5px 10px;background:'+selectedBk.color+';border-radius:5px;color:#fff;font-family:var(--f-mono);font-size:8px;font-weight:700;text-decoration:none;white-space:nowrap">Parier</a>'
        +'</div></div>';
    }
    h+='</div>';
  }
  return h;
}

function renderPage(){
  var pg=document.getElementById("page");
  var t=S.tab,h="";
  if(t==="home")h=pHome();
  else if(t==="scanner")h=pScanner();
  else if(t==="matchs")h=pMatchs();
  else if(t==="tips")h=pTips();
  else if(t==="chat")h=pChat();
  else if(t==="combi")h=pCombi();
  else if(t==="comp")h=pComp();
  else if(t==="analyse")h=pAnalyse();
  else if(t==="result")h=pResult();
  else if(t==="money")h=pMoney();
  else if(t==="risk")h=pRisk();
  else if(t==="bankroll")h=pBankroll();
  else if(t==="stats")h=pStats();
  else if(t==="methode")h=pMethode();
  else if(t==="chat")h=pChat();
  else if(t==="combi")h=pCombi();
  else if(t==="demo")h=pDemo();
  else if(t==="live")h=pLive();
  else if(t==="cotes")h=pCotes();
  pg.innerHTML=h;
  buildSide();updTop();updSide();
}
function render(){renderPage();}
fetchMatches();
</script>
</body>
