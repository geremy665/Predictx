<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">

  <title>EDGE PRO - Pronostics V16</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    :root{--bg:#0a0c15;--card:#111827;--card2:#1a1f2e;--border:#1f2937;--green:#10b981;--green-dark:#059669;--green-glow:rgba(16,185,129,0.15);--red:#ef4444;--yellow:#f59e0b;--text:#f3f4f6;--text-dim:#9ca3af;--text-dark:#6b7280;}
    [data-theme="light"]{--bg:#f3f4f6;--card:#ffffff;--card2:#f9fafb;--border:#e5e7eb;--text:#111827;--text-dim:#6b7280;}
    body{font-family:system-ui,Roboto,sans-serif;background:var(--bg);color:var(--text);transition:background 0.2s;}
    .app{display:flex;min-height:100vh;}
    .sidebar{width:280px;background:var(--card);border-right:1px solid var(--border);position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:200;transition:transform 0.25s;}
    .sidebar-header{padding:20px;border-bottom:1px solid var(--border);}
    .logo{font-size:28px;font-weight:800;background:linear-gradient(135deg,var(--green),#34d399);-webkit-background-clip:text;background-clip:text;color:transparent;}
    .tagline{font-size:10px;color:var(--text-dim);margin-top:4px;}

    .bankroll-value{font-size:24px;font-weight:700;color:var(--green);}
    .nav-item{display:flex;align-items:center;gap:14px;padding:12px 20px;margin:4px 8px;border-radius:14px;color:var(--text-dim);cursor:pointer;}

    .content{padding:20px;max-width:1200px;margin:0 auto;}

    .match-vs{background:var(--card2);padding:4px 10px;border-radius:30px;color:var(--green);}
    .match-odds{display:flex;gap:12px;margin-bottom:16px;}
    .odd-box{flex:1;background:var(--card2);border-radius:14px;padding:10px;text-align:center;}
    .odd-box.best{background:var(--green-glow);border-color:var(--green);}

    .match-footer{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
    .analyse-btn{padding:8px 16px;background:var(--card2);border-radius:30px;cursor:pointer;}
    .value-badge{font-size:11px;padding:5px 12px;background:var(--green-glow);border-radius:30px;color:var(--green);}
    .kelly-badge{font-size:10px;padding:4px 8px;background:var(--card2);border-radius:20px;color:var(--yellow);}
    .hero{background:linear-gradient(135deg,var(--card),var(--card2));border-radius:28px;padding:32px;margin-bottom:24px;text-align:center;}
    .hero-title{font-size:36px;font-weight:800;}

    .btn-primary{padding:12px 28px;background:var(--green);border:none;border-radius:40px;color:white;font-weight:700;cursor:pointer;}
    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:24px;}

    .modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:1000;}
    .modal-content{background:var(--card);border-radius:28px;padding:24px;width:90%;max-width:500px;}

    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:199;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
    @media(max-width:768px){
      .sidebar{transform:translateX(-100%);}
      .sidebar.open{transform:translateX(0);}
      .main{margin-left:0;}
      .stats-grid{grid-template-columns:repeat(2,1fr);}
      .match-teams{flex-direction:column;text-align:center;}
      .team-away{text-align:center;}
    }
    .loader{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.6s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}

<body>
<div class="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">EDGE<span>.</span></div>
      <div class="tagline">BETTING INTELLIGENCE V16</div>

    </div>
    <div id="navContainer"></div>
    <div class="sidebar-footer" style="padding:20px;border-top:1px solid var(--border);margin-top:20px;">
      <div class="risk-warning">⚠️ Jouez responsablement<br>Joueurs Info Service 09 74 75 13 13</div>

</div>
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div id="bankrollModal" class="modal" style="display:none;"><div class="modal-content"><div class="modal-title">💰 Bankroll</div><input type="number" id="bankrollInput" placeholder="Montant" value="1000"><div class="modal-buttons"><button class="btn-primary" onclick="saveBankroll()">Valider</button><button class="btn-secondary" onclick="closeModal('bankrollModal')">Annuler</button></div></div></div>
<div id="configModal" class="modal" style="display:none;"><div class="modal-content"><div class="modal-title">🤖 IA Anthropic</div><input type="password" id="apiKeyInput" placeholder="sk-ant-..."><div class="modal-buttons"><button class="btn-primary" onclick="saveApiKey()">Valider</button><button class="btn-secondary" onclick="closeModal('configModal')">Annuler</button></div></div></div>
<div id="loginModal" class="modal" style="display:none;"><div class="modal-content"><div class="modal-title">🔐 Connexion</div><input type="email" id="loginEmail" placeholder="Email"><input type="password" id="loginPassword" placeholder="Mot de passe"><div class="modal-buttons"><button class="btn-primary" onclick="login()">Connexion</button><button class="btn-secondary" onclick="register()">Inscription</button><button class="btn-secondary" onclick="closeModal('loginModal')">Annuler</button></div></div></div>

<script>
// ==================== CONFIGURATION ====================
const CONFIG = {
  EDGE_MIN: 0.03, ODDS_MIN: 1.25, KELLY_FRAC: 0.15, MAX_STAKE: 0.05,
  POISSON_MAX: 7, TIME_DECAY: 0.0025
};

const LEAGUE_RHO = {
  "Premier League": -0.118, "Ligue 1": -0.142, "Serie A": -0.151,
  "Bundesliga": -0.128, "La Liga": -0.135
};
const LEAGUE_HOME_ADV = {
  "Premier League": 1.08, "Ligue 1": 1.02, "Serie A": 1.05,
  "Bundesliga": 1.10, "La Liga": 1.03
};
function getRho(l) { return LEAGUE_RHO[l] || -0.130; }
function getHomeAdv(l) { return LEAGUE_HOME_ADV[l] || 1.04; }
function timeWeight(days) { return Math.exp(-CONFIG.TIME_DECAY * days); }

// ==================== ÉTAT ====================
let App = {
  tab: 'home', matches: [], selectedMatch: null, bankroll: 1000,
  apiKey: localStorage.getItem('edge_api_key') || '', user: null,
  aiAnalysis: null, aiLoading: false, backtestResults: null
};

// ==================== AUTH ====================
function updateUserUI() {
  const c = document.getElementById('userInfoContainer');
  const btn = document.getElementById('loginBtn');
  if (App.user) {
    if(c) c.style.display = 'block';
    if(document.getElementById('userName')) document.getElementById('userName').innerText = App.user.email.split('@')[0];
    if(btn) btn.innerText = '👤 Compte';
  } else {
    if(c) c.style.display = 'none';
    if(btn) btn.innerText = '🔐 Connexion';
  }
}
function login() {
  const email = document.getElementById('loginEmail')?.value;
  const pwd = document.getElementById('loginPassword')?.value;
  if (!email || !pwd) return alert('Email et mot de passe requis');
  const users = JSON.parse(localStorage.getItem('edge_users') || '{}');
  if (users[email] && users[email].password === pwd) {
    App.user = { email, id: users[email].id };
    localStorage.setItem('edge_current_user', JSON.stringify(App.user));
    updateUserUI(); closeModal('loginModal');
    alert('Connecté');
  } else alert('Identifiants incorrects');
}
function register() {
  const email = document.getElementById('loginEmail')?.value;
  const pwd = document.getElementById('loginPassword')?.value;
  if (!email || !pwd) return alert('Email et mot de passe requis');
  const users = JSON.parse(localStorage.getItem('edge_users') || '{}');
  if (users[email]) return alert('Compte déjà existant');
  users[email] = { password: pwd, id: Date.now(), history: [], bankroll: 1000 };
  localStorage.setItem('edge_users', JSON.stringify(users));
  App.user = { email, id: users[email].id };
  localStorage.setItem('edge_current_user', JSON.stringify(App.user));
  updateUserUI(); closeModal('loginModal');
  alert('Inscription réussie');
}
function logout() { App.user = null; localStorage.removeItem('edge_current_user'); updateUserUI(); renderPage(); }

// ==================== FONCTIONS MATHÉMATIQUES ====================
function poisson(l, k) {
  if (l <= 0) return k === 0 ? 1 : 0;
  let p = Math.exp(-l);
  for (let i = 1; i <= k; i++) p *= l / i;
  return p;
}
function dixonCorr(gh, ga, lH, lA, rho) {
  if (gh === 0 && ga === 0) return Math.max(0.001, 1 - lH * lA * rho);
  if (gh === 1 && ga === 0) return Math.max(0.001, 1 + lA * rho);
  if (gh === 0 && ga === 1) return Math.max(0.001, 1 + lH * rho);
  if (gh === 1 && ga === 1) return Math.max(0.01, 1 - rho);
  return 1;
}
function computeEdge(p, o) {
  if (!o || o < CONFIG.ODDS_MIN || !p || p <= 0 || p >= 1) return null;
  const e = p * o - 1;
  return e > CONFIG.EDGE_MIN ? e : null;
}
function safeKelly(p, o, b) {
  if (!o || o < CONFIG.ODDS_MIN || !p || p <= 0 || p >= 1) return 0;
  const kelly = Math.max(0, ((o - 1) * p - (1 - p)) / (o - 1));
  const e = p * o - 1;
  if (e < CONFIG.EDGE_MIN) return 0;
  let frac = CONFIG.KELLY_FRAC;
  if (e > 0.1) frac = 0.25;
  let stake = kelly * frac * b;
  stake = Math.min(stake, b * CONFIG.MAX_STAKE);
  if (e < 0.05) stake *= 0.5;
  return stake;
}

// ==================== COMPOSITIONS / BLESSURES ====================
async function fetchLineups(fixtureId) {
  try {
    const res = await fetch(`/api/lineups?fixture=${fixtureId}`);
    const data = await res.json();
    return data.response || [];
  } catch(e) { return []; }
}
async function fetchInjuries(teamId) {
  try {
    const res = await fetch(`/api/injuries?team=${teamId}`);
    const data = await res.json();
    return data.response || [];
  } catch(e) { return []; }
}
function analyzeLineups(lineups, homeTeam, awayTeam) {
  let homeStrength = 1.0, awayStrength = 1.0;
  let homeMissing = [], awayMissing = [];
  const starPlayers = ['Mbappé', 'Haaland', 'Messi', 'Salah', 'Kane', 'Vinicius', 'Bellingham', 'Lewandowski'];
  for (let lu of lineups) {
    const isHome = lu.team.name === homeTeam;
    const starters = lu.startXI || [];
    const hasStar = starters.some(p => starPlayers.some(star => p.player.name.includes(star)));
    if (!hasStar) {
      if (isHome) { homeStrength *= 0.85; homeMissing.push('star player'); }
      else { awayStrength *= 0.85; awayMissing.push('star player'); }
    }
  }
  return { homeStrength, awayStrength, homeMissing, awayMissing };
}

// ==================== MODÈLE DE PRÉDICTION ====================
function calculatePrediction(match) {
  const safe = (v, d) => isNaN(v = parseFloat(v)) || v <= 0 ? d : v;
  let o1 = safe(match.o1, 0), oN = safe(match.on, 0), o2 = safe(match.o2, 0);
  let rho = getRho(match.c);
  let homeAdv = getHomeAdv(match.c);
  let hf = safe(match.hf, 8), af = safe(match.af, 6);
  let hxg = safe(match.hxg, 1.4), axg = safe(match.axg, 1.1);
  let hxga = safe(match.hxga, 1.2), axga = safe(match.axga, 1.3);
  let hg = safe(match.hg, 1.4), ag = safe(match.ag, 1.1);
  // time decay sur forme récente (si fournie)
  if (match.recentMatches && match.recentMatches.length) {
    let now = new Date();
    let totalWeight = 0, wHf = 0, wAf = 0;
    for (let rm of match.recentMatches) {
      let days = (now - new Date(rm.date)) / (1000 * 3600 * 24);
      let w = timeWeight(days);
      totalWeight += w;
      wHf += (rm.homePoints || 8) * w;
      wAf += (rm.awayPoints || 6) * w;
    }
    if (totalWeight > 0) { hf = wHf / totalWeight; af = wAf / totalWeight; }
  }
  let lH = (hxg * 0.88 + hg * 0.35 + (hf / 15) * 0.2) * homeAdv;
  let lA = (axg * 0.88 + ag * 0.35 + (af / 15) * 0.2);
  let hDef = hxga * 0.7 + (1 - safe(match.hcs, 28) / 100) * 0.3;
  let aDef = axga * 0.7 + (1 - safe(match.acs, 22) / 100) * 0.3;
  lH *= Math.pow(Math.max(0.5, aDef) / 1.15, 0.25);
  lA *= Math.pow(Math.max(0.5, hDef) / 1.15, 0.25);
  // ajustement compositions
  if (match.homeStrength) lH *= match.homeStrength;
  if (match.awayStrength) lA *= match.awayStrength;
  lH = Math.max(0.45, Math.min(3.5, lH));
  lA = Math.max(0.35, Math.min(3.2, lA));
  let pH = 0, pN = 0, pA = 0, tot = 0;
  for (let gh = 0; gh <= CONFIG.POISSON_MAX; gh++) {
    for (let ga = 0; ga <= CONFIG.POISSON_MAX; ga++) {
      let p = poisson(lH, gh) * poisson(lA, ga) * dixonCorr(gh, ga, lH, lA, rho);
      if (p < 1e-8) continue;
      tot += p;
      if (gh > ga) pH += p;
      else if (gh === ga) pN += p;
      else pA += p;
    }
  }
  if (tot > 0) { pH /= tot; pN /= tot; pA /= tot; }
  // blend odds
  if (o1 > 1.01 && oN > 1.01 && o2 > 1.01) {
    let mg = 1 / o1 + 1 / oN + 1 / o2;
    let mp1 = (1 / o1) / mg, mpN = (1 / oN) / mg, mp2 = (1 / o2) / mg;
    let w = 0.68;
    pH = pH * w + mp1 * (1 - w);
    pN = pN * w + mpN * (1 - w);
    pA = pA * w + mp2 * (1 - w);
    let norm = pH + pN + pA;
    if (norm > 0) { pH /= norm; pN /= norm; pA /= norm; }
  }
  // marchés dérivés
  let btts = 0, o25 = 0;
  for (let gh = 0; gh <= 6; gh++) {
    for (let ga = 0; ga <= 6; ga++) {
      let p = poisson(lH, gh) * poisson(lA, ga);
      if (gh > 0 && ga > 0) btts += p;
      if (gh + ga >= 3) o25 += p;
    }
  }
  let bets = [
    { id: "1", name: `Victoire ${match.h}`, prob: pH, odds: o1 },
    { id: "N", name: "Nul", prob: pN, odds: oN },
    { id: "2", name: `Victoire ${match.a}`, prob: pA, odds: o2 },
    { id: "O25", name: "Over 2.5", prob: o25, odds: safe(match.oO25, 0) },
    { id: "BTTS", name: "BTTS", prob: btts, odds: safe(match.oBtts, 0) }
  ];
  bets.forEach(b => {
    if (b.odds >= CONFIG.ODDS_MIN) b.edge = computeEdge(b.prob, b.odds);
    else if (b.prob > 0.08) b.odds = +(1 / b.prob * 0.92).toFixed(2);
  });
  let best = bets.filter(b => b.edge > CONFIG.EDGE_MIN).sort((a, b) => b.edge - a.edge)[0];
  if (!best) best = bets.filter(b => b.prob > 0.35).sort((a, b) => b.prob - a.prob)[0];
  let hasValue = best && best.edge > CONFIG.EDGE_MIN;
  let conf = best ? Math.min(92, Math.round(45 + (best.edge ? Math.min(best.edge * 180, 25) : 0) + (best.prob > 0.55 ? 8 : 0))) : 40;
  let kellyStake = best ? safeKelly(best.prob, best.odds, App.bankroll) : 0;
  return { pH, pN, pA, bestBet: best, hasValue, confidence: conf, kellyStake, allBets: bets };
}

// ==================== APPELS API RÉELS ====================
async function loadMatches() {
  const content = document.getElementById('content');
  content.innerHTML = `<div class="empty"><div class="empty-icon">⚽</div><p>Chargement des matchs...</p></div>`;
  try {
    const response = await fetch('/api/matches');
    if (!response.ok) throw new Error('API error');
    const data = await response.json();
    let allFixtures = [...(data.fixtures || []), ...(data.live || [])];
    // Récupération des odds (endpoint /odds)
    let oddsData = {};
    try {
      const oddsRes = await fetch('/api/odds');
      if (oddsRes.ok) oddsData = await oddsRes.json();
    } catch(e) { console.warn('Odds non disponibles'); }
    App.matches = [];
    for (let f of allFixtures) {
      const fix = f.fixture || f;
      const home = f.teams?.home || {};
      const away = f.teams?.away || {};
      const league = f.league || {};
      const matchId = fix.id;
      const matchOdds = oddsData[matchId] || {};
      let match = {
        id: matchId, h: home.name || "?", a: away.name || "?", c: league.name || "Autre",
        f: league.flag || "🌍", time: fix.date, status: fix.status?.short || "NS",
        scoreH: f.goals?.home ?? null, scoreA: f.goals?.away ?? null,
        o1: matchOdds.home_win || 1.85, on: matchOdds.draw || 3.40, o2: matchOdds.away_win || 4.20,
        oO25: matchOdds.over_25 || 1.65, oBtts: matchOdds.btts_yes || 1.75,
        hxg: matchOdds.xg_home || 1.5, axg: matchOdds.xg_away || 1.2,
        hxga: matchOdds.xga_home || 1.2, axga: matchOdds.xga_away || 1.3,
        hg: matchOdds.goals_home || 1.4, ag: matchOdds.goals_away || 1.1,
        hf: matchOdds.form_home || 8, af: matchOdds.form_away || 6,
        derby: matchOdds.derby || false,
        homeStrength: 1.0, awayStrength: 1.0
      };
      App.matches.push(match);
    }
    // Chargement des compositions en arrière-plan
    for (let m of App.matches) {
      if (m.status === "NS" && m.id) {
        fetchLineups(m.id).then(lineups => {
          const analysis = analyzeLineups(lineups, m.h, m.a);
          m.homeStrength = analysis.homeStrength;
          m.awayStrength = analysis.awayStrength;
          m.prediction = calculatePrediction(m);
          renderPage();
        }).catch(() => {});
      } else {
        m.prediction = calculatePrediction(m);
      }
    }
    renderPage();
  } catch(e) {
    console.error(e);
    content.innerHTML = `<div class="empty"><p>Erreur chargement</p><button onclick="loadMatches()" class="btn-primary">Réessayer</button></div>`;
  }
}

// ==================== BACKTEST ====================
async function runBacktest(start, end) {
  const resultsDiv = document.getElementById('backtestResults');
  resultsDiv.innerHTML = '<div class="card">⏳ Chargement...</div>';
  try {
    const response = await fetch(`/api/matches?start=${start}&end=${end}&status=FT`);
    const data = await response.json();
    const matches = data.fixtures || [];
    if (!matches.length) { resultsDiv.innerHTML = '<div class="card">Aucun match sur cette période.</div>'; return; }
    let totalBets = 0, correct = 0, totalStake = 0, totalProfit = 0, details = [];
    for (const m of matches) {
      const fix = m.fixture, home = m.teams.home.name, away = m.teams.away.name, league = m.league.name;
      const realScoreHome = m.goals.home, realScoreAway = m.goals.away;
      const realResult = realScoreHome > realScoreAway ? '1' : (realScoreHome === realScoreAway ? 'N' : '2');
      const matchInput = {
        h: home, a: away, c: league, o1: 1.85, oN: 3.40, o2: 4.20,
        hxg: 1.5, axg: 1.2, hg: 1.4, ag: 1.1, hf: 8, af: 7, derby: false
      };
      const pred = calculatePrediction(matchInput);
      const best = pred.bestBet;
      if (best && best.edge > 0.03) {
        const stake = pred.kellyStake || 20;
        const won = (best.id === realResult);
        totalBets++; totalStake += stake;
        if (won) { correct++; totalProfit += stake * (best.odds - 1); }
        else { totalProfit -= stake; }
        details.push({
          match: `${home} vs ${away}`, league, date: fix.date,
          prediction: best.name, odds: best.odds, edge: best.edge,
          realScore: `${realScoreHome}-${realScoreAway}`, won
        });
      }
    }
    const winRate = totalBets ? (correct / totalBets * 100).toFixed(1) : 0;
    const roi = totalStake ? (totalProfit / totalStake * 100).toFixed(1) : 0;
    resultsDiv.innerHTML = `
      <div class="stats-grid" style="margin-bottom:20px;">
        <div class="stat-item"><div class="stat-value">${totalBets}</div><div>Paris</div></div>
        <div class="stat-item"><div class="stat-value ${winRate >= 55 ? 'won' : 'lost'}">${winRate}%</div><div>Réussite</div></div>
        <div class="stat-item"><div class="stat-value ${roi >= 0 ? 'won' : 'lost'}">${roi >= 0 ? '+' : ''}${roi}%</div><div>ROI</div></div>
        <div class="stat-item"><div class="stat-value">${totalProfit.toFixed(0)}€</div><div>Profit (base 20€)</div></div>
      </div>
      <div class="card"><h3>Détail des value bets</h3>${details.map(d => `<div class="match-row"><div><strong>${d.match}</strong><br><small>${d.league} - ${new Date(d.date).toLocaleDateString()}</small></div><div>Prono: ${d.prediction} @${d.odds.toFixed(2)} (edge ${(d.edge * 100).toFixed(1)}%)</div><div>Score: ${d.realScore}</div><div class="${d.won ? 'won' : 'lost'}">${d.won ? '✅ Gagné' : '❌ Perdu'}</div></div>`).join('')}</div>
    `;
  } catch(e) { resultsDiv.innerHTML = '<div class="card">❌ Erreur backtest.</div>'; }
}

// ==================== IA ANTHROPIC ====================
async function getAIAnalysis(match, pred) {
  if (!App.apiKey) return alert('Ajoute ta clé API Anthropic');
  App.aiLoading = true; renderPage();
  const prompt = `Analyse match: ${match.h} vs ${match.a} (${match.c}). Pronostic EDGE: ${pred.bestBet.name} (${(pred.bestBet.prob * 100).toFixed(0)}%), edge +${(pred.bestBet.edge * 100).toFixed(1)}%. Données: xG dom ${match.hxg}, ext ${match.axg}, forme dom ${match.hf}/15, ext ${match.af}/15. Réponds en 4 phrases: 1) Confirmation, 2) Facteur clé, 3) Risque, 4) Conseil mise.`;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST', headers: { 'Content-Type': 'application/json', 'x-api-key': App.apiKey, 'anthropic-version': '2023-06-01' },
      body: JSON.stringify({ model: 'claude-3-haiku-20240307', max_tokens: 350, messages: [{ role: 'user', content: prompt }] })
    });
    const data = await res.json();
    App.aiAnalysis = data.content?.[0]?.text || "Analyse non disponible.";
  } catch(e) { App.aiAnalysis = "Erreur API IA."; }
  App.aiLoading = false; renderPage();
}

// ==================== RENDU DES PAGES ====================
function renderHome() {
  let upcoming = App.matches.filter(m => m.status === "NS" || m.status === "TBD");
  let valueBets = App.matches.filter(m => m.prediction?.hasValue);
  return `<div class="hero"><div class="hero-title">Analyse.<span>Parie juste.</span></div><div class="hero-sub">Edge ≥3% | Kelly fractionné | Backtest intégré</div><button class="btn-primary" onclick="loadMatches()">🔄 Rafraîchir</button><div class="stats-grid"><div class="stat-item" onclick="setTab('matches')"><div class="stat-value">${upcoming.length}</div><div class="stat-label">Matchs</div></div><div class="stat-item" onclick="setTab('scanner')"><div class="stat-value" style="color:var(--green)">${valueBets.length}</div><div class="stat-label">Value</div></div><div class="stat-item"><div class="stat-value">${Math.round(App.bankroll)}€</div><div class="stat-label">Bankroll</div></div></div></div>${valueBets.slice(0, 3).map((m, i) => renderMatchCard(m, App.matches.indexOf(m))).join('')}<div class="empty"><button class="btn-primary" onclick="setTab('backtest')">📊 Voir le backtest</button></div>`;
}
function renderMatches() {
  return `<div style="margin-bottom:16px;"><button class="btn-primary" onclick="loadMatches()">🔄 Rafraîchir</button></div>${App.matches.map((m, i) => renderMatchCard(m, i)).join('')}`;
}
function renderBacktest() {
  const today = new Date().toISOString().split('T')[0];
  const monthAgo = new Date(Date.now() - 30 * 86400000).toISOString().split('T')[0];
  return `<div class="card"><h2>📊 Backtest interactif</h2><p>Testez le modèle sur des matchs passés.</p><div style="display:flex;gap:10px;flex-wrap:wrap;"><input type="date" id="btStart" value="${monthAgo}"><input type="date" id="btEnd" value="${today}"><button class="btn-primary" onclick="runBacktest(document.getElementById('btStart').value, document.getElementById('btEnd').value)">Lancer</button></div><div id="backtestResults"></div></div>`;
}
function renderAnalysis() {
  if (!App.selectedMatch) return `<div class="empty"><p>Sélectionne un match</p></div>`;
  let m = App.selectedMatch, p = m.prediction, best = p.bestBet;
  if (!best) return `<div class="empty"><p>Analyse non disponible</p></div>`;
  let html = `<div class="hero"><div class="hero-title">${escapeHtml(m.h)} <span>vs</span> ${escapeHtml(m.a)}</div><div class="hero-sub">${m.c} - ${new Date(m.time).toLocaleString()}</div></div><div class="stats-grid"><div class="stat-item"><div class="stat-value">${(best.prob * 100).toFixed(0)}%</div><div>Probabilité</div></div><div class="stat-item"><div class="stat-value" style="color:var(--yellow)">${best.odds.toFixed(2)}</div><div>Cote</div></div><div class="stat-item"><div class="stat-value" style="color:${best.edge > 0 ? 'var(--green)' : 'var(--red)'}">${best.edge > 0 ? '+' : ''}${(best.edge * 100).toFixed(1)}%</div><div>Edge</div></div><div class="stat-item"><div class="stat-value">${p.confidence}%</div><div>Confiance</div></div></div><div style="display:flex;justify-content:center;gap:16px;margin:16px 0;"><span class="value-badge">🎯 ${best.name}</span><span class="kelly-badge">💰 Mise : ${p.kellyStake.toFixed(0)}€</span></div>`;
  if (App.apiKey && !App.aiAnalysis && !App.aiLoading) html += `<button class="btn-primary" onclick="getAIAnalysis(App.selectedMatch, App.selectedMatch.prediction)">🤖 Analyser avec Claude</button>`;
  if (App.aiLoading) html += `<div class="loader" style="margin:16px auto;"></div>`;
  if (App.aiAnalysis) html += `<div class="analysis" style="background:var(--card2);border-radius:14px;padding:16px;margin-top:16px;">${App.aiAnalysis}</div>`;
  return html;
}
function renderMatchCard(match, idx) {
  let p = match.prediction, best = p?.bestBet, isVal = p?.hasValue, kelly = p?.kellyStake || 0;
  let statusClass = (match.status === "LIVE" || match.status === "1H" || match.status === "2H") ? "status-live" : (match.status === "NS" ? "status-ns" : "");
  let statusText = match.status === "LIVE" ? `🔴 LIVE ${match.scoreH ?? '?'}-${match.scoreA ?? '?'}` : (match.status === "FT" ? `✅ Terminé ${match.scoreH ?? '?'}-${match.scoreA ?? '?'}` : "⏳ À venir");
  return `<div class="match-card ${isVal ? 'value' : ''}" onclick="selectMatch(${idx})"><div class="match-body"><div class="match-header"><span>${match.c}</span><span class="${statusClass}">${statusText}</span></div><div class="match-teams"><div class="team-home">${escapeHtml(match.h)}</div><div class="match-vs">VS</div><div class="team-away">${escapeHtml(match.a)}</div></div><div class="match-odds"><div class="odd-box ${best?.id === '1' ? 'best' : ''}"><div class="odd-label">1</div><div class="odd-value">${match.o1?.toFixed(2) || '--'}</div></div><div class="odd-box ${best?.id === 'N' ? 'best' : ''}"><div class="odd-label">N</div><div class="odd-value">${match.on?.toFixed(2) || '--'}</div></div><div class="odd-box ${best?.id === '2' ? 'best' : ''}"><div class="odd-label">2</div><div class="odd-value">${match.o2?.toFixed(2) || '--'}</div></div></div><div class="match-footer"><button class="analyse-btn" onclick="event.stopPropagation();selectMatch(${idx})">📊 Analyser</button><div style="display:flex;gap:8px;">${isVal && best ? `<span class="value-badge">+${(best.edge * 100).toFixed(1)}%</span>` : ''}${kelly > 0 ? `<span class="kelly-badge">💰 ${kelly.toFixed(0)}€</span>` : ''}</div></div></div></div>`;
}
function renderPage() {
  const container = document.getElementById('content');
  if (!container) return;
  if (App.tab === 'home') container.innerHTML = renderHome();
  else if (App.tab === 'matches') container.innerHTML = renderMatches();
  else if (App.tab === 'backtest') container.innerHTML = renderBacktest();
  else if (App.tab === 'analyse') container.innerHTML = renderAnalysis();
  else container.innerHTML = renderHome();
  renderNavigation();
}
function setTab(tab) { App.tab = tab; if (tab === 'analyse' && !App.selectedMatch) App.tab = 'home'; renderPage(); closeSidebar(); }
function selectMatch(idx) { App.selectedMatch = App.matches[idx]; App.aiAnalysis = null; setTab('analyse'); }
function renderNavigation() {
  let nav = document.getElementById('navContainer');
  if (!nav) return;
  let items = [{ id: 'home', name: 'Accueil', icon: '🏠' }, { id: 'matches', name: 'Matchs', icon: '⚽' }, { id: 'backtest', name: 'Backtest', icon: '📊' }, { id: 'analyse', name: 'Analyser', icon: '📊' }];
  nav.innerHTML = items.map(i => `<button class="nav-item ${App.tab === i.id ? 'active' : ''}" onclick="setTab('${i.id}')"><span class="nav-icon">${i.icon}</span><span>${i.name}</span></button>`).join('');
}
function escapeHtml(s) { return String(s || '').replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m]); }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }
function openBankrollModal() { document.getElementById('bankrollInput').value = App.bankroll; document.getElementById('bankrollModal').style.display = 'flex'; }
function openConfigModal() { document.getElementById('apiKeyInput').value = App.apiKey; document.getElementById('configModal').style.display = 'flex'; }
function openLoginModal() { document.getElementById('loginModal').style.display = 'flex'; }
function saveBankroll() { let v = parseFloat(document.getElementById('bankrollInput').value); if (v > 0) App.bankroll = v; updateBankrollDisplay(); closeModal('bankrollModal'); }
function saveApiKey() { App.apiKey = document.getElementById('apiKeyInput').value.trim(); localStorage.setItem('edge_api_key', App.apiKey); closeModal('configModal'); }
function updateBankrollDisplay() { document.getElementById('bankrollDisplay').innerHTML = Math.round(App.bankroll) + ' €'; }
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('show'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }

// ==================== INIT ====================
window.addEventListener('load', () => {
  updateBankrollDisplay();
  updateUserUI();
  loadMatches();
  renderNavigation();
  setInterval(() => { if (App.tab === 'matches') loadMatches(); }, 60000);
});
</script>
</body>
</html>
