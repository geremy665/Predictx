<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<meta name="theme-color" content="#0E0E0E"/>
<link rel="manifest" href="/manifest.json"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="EDGE"/>
<title>EDGE — Betting Intelligence</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap');

/* ============================================================
   EDGE — Intelligence Premium
   Direction : Sombre / Structuré / Précis
   Fond #0E0E0E  Vert #5DBF8A  Beige #F0E6D3
============================================================ */

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;}

:root{
  /* Noir profond */
  --bg:#0E0E0E;
  --s1:#141414;
  --s2:#1C1C1C;
  --s3:#242424;
  --s4:#2E2E2E;
  --s5:#3A3A3A;

  /* Beige chaud — texte principal */
  --beige:#F0E6D3;
  --beige2:#D4C5AE;
  --beige3:#A89880;
  --beige4:#7A6E61;
  --beige5:rgba(240,230,211,.06);

  /* Vert sauge — seul accent */
  --g:#5DBF8A;
  --g2:#7DCFA0;
  --g3:#A8E0C0;
  --gl:rgba(93,191,138,.10);
  --gg:rgba(93,191,138,.18);

  /* Utilitaires */
  --red:#E05555;
  --redl:rgba(224,85,85,.10);
  --amber:#D4954A;
  --ln:rgba(240,230,211,.08);
  --ln2:rgba(240,230,211,.04);

  /* Compat total */
  --noir:var(--bg);--gris1:var(--s1);--gris2:var(--s2);--gris3:var(--s3);--gris4:var(--beige4);--gris5:var(--beige5);
  --blanc:var(--beige);--blanc2:var(--beige2);--blanc3:var(--beige3);--blanc4:var(--beige4);--blanc5:var(--beige5);
  --rouge:var(--red);--rouge2:var(--redl);
  --vert:var(--g);--vert2:var(--g2);--vert3:var(--gl);
  --jaune:var(--g);--jaune2:var(--g2);--jaune3:var(--gl);--jaune-glow:var(--gg);
  --or:var(--g);--or2:var(--g2);--or3:var(--g3);--od:var(--gl);--og:var(--gg);
  --bleu:var(--g);--bleu2:var(--g2);--bleu3:var(--g3);--bleu-soft:var(--gl);--bleu-glow:var(--gg);--ln-bleu:rgba(93,191,138,.2);
  --turq:var(--g);--turq2:var(--g2);
  --cyan:var(--g);--cyan2:var(--g2);--cyan3:var(--g3);
  --violet:var(--g);--violet2:var(--g2);--violet3:var(--g3);--violet4:var(--g3);
  --rose:var(--red);--rose2:#E88888;
  --sang:var(--red);--sang2:var(--red);--sang3:#E88888;--sang-dim:var(--redl);
  --bord:var(--red);--bord2:var(--red);--bord3:var(--red);--bord-d:var(--redl);
  --ind:var(--g);--ind2:var(--g2);--ind3:var(--g3);--ind-dim:var(--gl);--ind-glow:var(--gg);--ln-ind:rgba(93,191,138,.2);
  --foret:var(--s2);--foret2:var(--s3);--foret3:var(--s4);--foret4:var(--g);--foret-l:rgba(14,14,14,.9);
  --vd:var(--gl);--vg:var(--gg);--vl:var(--gg);
  --sh:0 4px 32px rgba(0,0,0,.5);
  --sh-bleu:0 0 24px rgba(93,191,138,.15);--sh-cyan:0 0 24px rgba(93,191,138,.15);
  --sh-violet:0 0 24px rgba(93,191,138,.15);--sh-or:0 0 24px rgba(93,191,138,.15);
  --sh-jaune:0 0 24px rgba(93,191,138,.15);--sh-noir:0 4px 32px rgba(0,0,0,.5);
  --c1:var(--s1);--c2:var(--s2);--c3:var(--s3);--c4:var(--s4);--c5:var(--s5);
  --r:6px;--r2:10px;--r3:16px;--r4:22px;--r5:28px;
  --f-titre:'Bebas Neue',sans-serif;
  --f-body:'Instrument Sans',sans-serif;
  --f-mono:'JetBrains Mono',monospace;
}

html,body{
  background:var(--bg);color:var(--beige);
  font-family:var(--f-body);font-size:14px;overflow-x:hidden;
}
button{font-family:var(--f-body);cursor:pointer;}
input,select,textarea{
  font-family:var(--f-body);font-size:13px;
  background:var(--s2);border:1px solid var(--ln);
  border-radius:var(--r2);color:var(--beige);
  padding:11px 13px;width:100%;outline:none;transition:all .2s;
}
input:focus,select:focus{border-color:var(--g);box-shadow:0 0 0 3px var(--gl);}
input::placeholder{color:var(--beige4);}
::-webkit-scrollbar{width:2px;height:2px;}
::-webkit-scrollbar-thumb{background:var(--g);border-radius:2px;}

#particles{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.25;}

/* ===== LAYOUT ===== */
#app{display:flex;min-height:100vh;position:relative;z-index:1;}

#sidebar{
  width:240px;position:fixed;top:0;left:0;height:100vh;z-index:100;
  display:flex;flex-direction:column;
  background:var(--s1);
  border-right:1px solid var(--ln);
  transition:transform .3s cubic-bezier(.16,1,.3,1);
}
#sidebar.open{transform:none!important;}
.ovl{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:99;backdrop-filter:blur(6px);display:none;}
.ovl.show{display:block;}
.ham{display:none;flex-direction:column;gap:5px;padding:9px;border-radius:var(--r);border:1px solid var(--ln);background:var(--s2);cursor:pointer;}
.ham span{width:18px;height:1.5px;background:var(--beige3);border-radius:1px;display:block;}
#main{margin-left:240px;flex:1;min-height:100vh;}
@media(max-width:768px){
  #sidebar{transform:translateX(-240px);}
  #main{margin-left:0;}
  .ham{display:flex!important;}
}

/* ===== SIDEBAR ===== */
.sb-brand{padding:20px 16px 14px;border-bottom:1px solid var(--ln);}
.sb-logo-wrap{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
.sb-logo-icon{
  width:34px;height:34px;border-radius:var(--r);flex-shrink:0;
  background:var(--g);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--f-titre);font-size:20px;color:var(--bg);letter-spacing:.05em;
}
.sb-logo-txt{font-family:var(--f-titre);font-size:28px;color:var(--beige);letter-spacing:.08em;line-height:1;}
.sb-logo-txt span{color:var(--g);}
.sb-tag{font-family:var(--f-mono);font-size:7px;color:var(--beige4);letter-spacing:.2em;text-transform:uppercase;margin-bottom:12px;}
.sb-kpi-strip{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--ln);}
.sb-kpi{background:var(--s1);padding:10px 14px;}
.sb-kpi-v{font-family:var(--f-titre);font-size:22px;color:var(--g);font-variant-numeric:tabular-nums;line-height:1;letter-spacing:.05em;}
.sb-kpi-l{font-family:var(--f-mono);font-size:7px;color:var(--beige4);text-transform:uppercase;letter-spacing:.12em;margin-top:2px;}

.sb-nav{flex:1;padding:8px;overflow-y:auto;}
.sb-sec{font-family:var(--f-mono);font-size:7px;color:var(--beige4);padding:0 8px;margin:14px 0 4px;letter-spacing:.2em;text-transform:uppercase;}
.nb{
  display:flex;align-items:center;gap:9px;width:100%;padding:9px 10px;
  border:none;background:transparent;color:var(--beige4);
  border-radius:var(--r);font-size:13px;font-weight:400;text-align:left;
  transition:all .15s;cursor:pointer;font-family:var(--f-body);position:relative;
}
.nb:hover{background:var(--beige5);color:var(--beige2);}
.nb.on{background:var(--gl);color:var(--beige);font-weight:600;}
.nb.on::before{
  content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:2px;height:55%;background:var(--g);border-radius:0 2px 2px 0;
}
.nb-ic{width:26px;height:26px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;background:rgba(240,230,211,.05);}
.nb.on .nb-ic{background:var(--gl);color:var(--g);}
.nbadge{margin-left:auto;font-size:8px;padding:2px 7px;border-radius:100px;font-weight:700;font-family:var(--f-mono);background:var(--gl);color:var(--g);border:1px solid rgba(93,191,138,.25);}
.nbadge.live{background:var(--redl);color:var(--red);border-color:rgba(224,85,85,.25);animation:pulse 2s infinite;}
.nbadge.ok{background:var(--gl);color:var(--g);}

.sb-bk{padding:12px;border-top:1px solid var(--ln);}
.bkcard{
  padding:13px 14px;background:var(--s2);
  border:1px solid var(--ln);border-radius:var(--r2);
  cursor:pointer;transition:all .2s;position:relative;overflow:hidden;
}
.bkcard::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--g),transparent);}
.bkcard:hover{border-color:rgba(93,191,138,.25);}
.bk-l{font-family:var(--f-mono);font-size:7px;color:var(--beige4);text-transform:uppercase;letter-spacing:.14em;margin-bottom:4px;}
.bk-v{font-family:var(--f-titre);font-size:24px;color:var(--g);font-variant-numeric:tabular-nums;letter-spacing:.05em;}
.bk-s{font-family:var(--f-mono);font-size:9px;color:var(--beige4);margin-top:4px;}

/* ===== TOPBAR ===== */
#topbar{
  height:52px;background:var(--bg);border-bottom:1px solid var(--ln);
  padding:0 18px;display:flex;align-items:center;gap:10px;
  position:sticky;top:0;z-index:90;
}
.ptitle{font-family:var(--f-titre);font-size:18px;color:var(--beige);letter-spacing:.1em;}
.tb-r{margin-left:auto;display:flex;align-items:center;gap:8px;}
.tbtn{
  padding:6px 14px;background:transparent;
  border:1px solid var(--ln);border-radius:var(--r2);
  color:var(--beige4);font-size:12px;font-weight:500;cursor:pointer;
  transition:all .15s;white-space:nowrap;font-family:var(--f-body);
}
.tbtn:hover{border-color:var(--g);color:var(--g);}
.tbtn.ok{border-color:rgba(93,191,138,.3);color:var(--g);background:var(--gl);}
.livepill{
  display:flex;align-items:center;gap:5px;padding:5px 11px;
  background:var(--redl);border:1px solid rgba(224,85,85,.2);
  border-radius:100px;font-size:10px;color:var(--red);font-family:var(--f-mono);font-weight:700;
}
.livedot{width:5px;height:5px;border-radius:50%;background:var(--red);animation:pulse 1.4s infinite;flex-shrink:0;}

/* ===== PAGE ===== */
#page{padding:16px;animation:fadeUp .2s ease;position:relative;z-index:1;}

/* ===== HERO — la pièce maîtresse ===== */
.hero{
  border-radius:var(--r4);overflow:hidden;margin-bottom:16px;
  position:relative;background:var(--s1);
  border:1px solid var(--ln);
}
.hero-top{
  padding:32px 22px 26px;position:relative;overflow:hidden;
}
/* Grand numéro décoratif en fond */
.hero-top::before{
  content:'EDGE';
  position:absolute;right:-10px;top:50%;transform:translateY(-50%);
  font-family:var(--f-titre);font-size:160px;color:rgba(240,230,211,.025);
  letter-spacing:.1em;pointer-events:none;line-height:1;white-space:nowrap;
}
/* Ligne verte décorative gauche */
.hero-top::after{
  content:'';position:absolute;left:0;top:0;bottom:0;
  width:3px;background:linear-gradient(180deg,var(--g),transparent);
}
.hero-grid{
  position:absolute;inset:0;opacity:.025;
  background-image:linear-gradient(rgba(240,230,211,.5) 1px,transparent 1px),
    linear-gradient(90deg,rgba(240,230,211,.5) 1px,transparent 1px);
  background-size:40px 40px;
}
.hero-content{position:relative;z-index:2;}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:7px;
  background:var(--gl);border:1px solid rgba(93,191,138,.2);
  border-radius:4px;padding:4px 11px;margin-bottom:16px;
}
.hero-dot{width:5px;height:5px;border-radius:50%;background:var(--g);animation:pulse 2s infinite;flex-shrink:0;}
.hero-eyebrow-txt{font-family:var(--f-mono);font-size:8px;color:var(--g);font-weight:700;letter-spacing:.14em;text-transform:uppercase;}
.hero-title{
  font-family:var(--f-titre);
  font-size:clamp(52px,12vw,76px);
  color:var(--beige);line-height:.88;
  letter-spacing:.04em;margin-bottom:14px;
}
.hero-title span{
  color:var(--g);
  display:block;
}
.hero-sub{
  font-size:12px;color:var(--beige3);
  line-height:1.8;max-width:280px;margin-bottom:22px;
  font-style:italic;
}
.hero-btns{display:flex;gap:8px;}
.hbtn-p{
  flex:1;height:46px;background:var(--g);border:none;border-radius:var(--r2);
  font-family:var(--f-titre);font-size:17px;color:var(--bg);
  cursor:pointer;transition:all .2s;letter-spacing:.08em;
}
.hbtn-p:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(93,191,138,.35);}
.hbtn-s{
  height:46px;padding:0 20px;background:transparent;
  border:1px solid var(--ln);border-radius:var(--r2);
  font-family:var(--f-titre);font-size:16px;color:var(--beige3);
  cursor:pointer;transition:all .15s;white-space:nowrap;letter-spacing:.06em;
}
.hbtn-s:hover{border-color:var(--beige3);color:var(--beige);}
.hero-stats{
  display:grid;grid-template-columns:repeat(4,1fr);
  border-top:1px solid var(--ln);
}
.hstat{
  padding:16px 10px;text-align:center;
  border-right:1px solid var(--ln);
  cursor:pointer;transition:background .15s;
}
.hstat:last-child{border-right:none;}
.hstat:hover{background:var(--beige5);}
.hstat-v{
  font-family:var(--f-titre);font-size:28px;
  color:var(--beige);line-height:1;
  font-variant-numeric:tabular-nums;letter-spacing:.04em;
}
.hstat-l{font-family:var(--f-mono);font-size:7px;color:var(--beige4);text-transform:uppercase;letter-spacing:.12em;margin-top:4px;}

/* ===== SECTION HEADERS ===== */
.sec-hd,.row-hd{display:flex;align-items:center;justify-content:space-between;margin:20px 0 10px;}
.sec-title,.row-title{
  font-family:var(--f-titre);font-size:16px;
  color:var(--beige);letter-spacing:.12em;
  display:flex;align-items:center;gap:10px;
}
.sec-title::before,.row-title::before{
  content:'';width:3px;height:20px;background:var(--g);border-radius:1px;flex-shrink:0;
}
.sec-more,.row-more{
  font-family:var(--f-mono);font-size:9px;color:var(--g);
  background:none;border:none;cursor:pointer;font-weight:700;letter-spacing:.08em;
}

/* ===== STATUS ===== */
.status-live{display:flex;align-items:center;gap:8px;padding:9px 13px;background:var(--gl);border:1px solid rgba(93,191,138,.2);border-radius:var(--r2);margin-bottom:12px;font-family:var(--f-mono);font-size:10px;color:var(--g);}
.status-demo{display:flex;align-items:center;gap:8px;padding:9px 13px;background:rgba(212,149,74,.08);border:1px solid rgba(212,149,74,.15);border-radius:var(--r2);margin-bottom:12px;font-family:var(--f-mono);font-size:10px;color:var(--amber);}

/* ===== MATCH CARDS ===== */
.mc{
  background:var(--s1);border:1px solid var(--ln);
  border-radius:var(--r3);overflow:hidden;cursor:pointer;
  transition:all .22s cubic-bezier(.16,1,.3,1);margin-bottom:8px;
}
.mc:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.4);border-color:rgba(93,191,138,.3);}
.mc.val{border-color:rgba(93,191,138,.35);}
.mc.live-m{border-color:rgba(224,85,85,.3);}
.mc-stripe,.mc-top{height:2px;}
.mc-stripe.val,.mc-top.val{background:linear-gradient(90deg,var(--g),transparent);}
.mc-stripe.live-m,.mc-top.live-m{background:linear-gradient(90deg,var(--red),transparent);}
.mc-stripe.norm,.mc-top.norm{background:var(--s3);}
.mc-body{padding:13px 15px;}
.mc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.mc-league{font-family:var(--f-mono);font-size:8px;color:var(--beige4);display:flex;align-items:center;gap:5px;}
.mc-time{font-family:var(--f-mono);font-size:10px;font-weight:700;color:var(--beige3);}
.mc-teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;margin-bottom:12px;}
.mc-team-h{font-family:var(--f-titre);font-size:15px;color:var(--beige);text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.04em;}
.mc-team-a{font-family:var(--f-titre);font-size:15px;color:var(--beige2);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.04em;}
.mc-vs{font-family:var(--f-mono);font-size:9px;color:var(--beige4);text-align:center;flex-shrink:0;}
.mc-odds{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;}
.mc-odd{background:var(--s2);border:1px solid var(--ln2);border-radius:var(--r);padding:8px 4px;text-align:center;transition:all .13s;cursor:pointer;}
.mc-odd:hover{border-color:var(--g);}
.mc-odd.best{background:var(--gl);border-color:rgba(93,191,138,.3);}
.mc-odd-l{font-family:var(--f-mono);font-size:7px;color:var(--beige4);margin-bottom:2px;}
.mc-odd-v{font-family:var(--f-titre);font-size:17px;color:var(--beige);font-variant-numeric:tabular-nums;letter-spacing:.04em;}
.mc-odd.best .mc-odd-v{color:var(--g);}
.mc-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:8px;border-top:1px solid var(--ln2);}
.mc-conf{font-family:var(--f-mono);font-size:9px;font-weight:700;color:var(--beige3);display:flex;align-items:center;gap:5px;}
.mc-conf-bar{height:2px;width:40px;background:var(--s3);border-radius:1px;overflow:hidden;}
.mc-conf-fill{height:100%;border-radius:1px;background:linear-gradient(90deg,var(--red),var(--g));}
.mc-time-badge{font-family:var(--f-mono);font-size:9px;color:var(--beige4);padding:3px 8px;background:var(--s2);border-radius:4px;border:1px solid var(--ln2);}
.mc-time-badge.live{background:var(--redl);color:var(--red);border-color:rgba(224,85,85,.2);animation:pulse 2s infinite;}
.mc-val-badge{font-family:var(--f-mono);font-size:8px;font-weight:700;padding:3px 8px;border-radius:4px;background:var(--gl);color:var(--g);border:1px solid rgba(93,191,138,.25);}
.mc-analyse-btn{padding:6px 12px;background:var(--s3);border:1px solid var(--ln);border-radius:var(--r);font-family:var(--f-body);font-size:11px;font-weight:600;color:var(--beige2);cursor:pointer;transition:all .15s;}
.mc-analyse-btn:hover{background:var(--g);color:var(--bg);border-color:var(--g);}
.mc-val-tag{margin-top:6px;display:flex;align-items:center;gap:5px;font-family:var(--f-mono);font-size:8px;color:var(--g);}

/* ===== SIGNAL CARDS ===== */
.sig-card,.sig{
  background:var(--s1);border:1px solid var(--ln);
  border-radius:var(--r3);overflow:hidden;cursor:pointer;margin-bottom:9px;
  transition:all .22s cubic-bezier(.16,1,.3,1);
}
.sig-card:hover,.sig:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.45);border-color:rgba(93,191,138,.3);}
.sig-card.top,.sig.top{border-color:rgba(93,191,138,.3);}
.sc-stripe,.sig-glow{height:2px;}
.sc-stripe.val,.sig-glow{background:linear-gradient(90deg,var(--g),transparent);}
.sc-stripe.live{background:linear-gradient(90deg,var(--red),transparent);}
.sc-stripe.norm{background:var(--s3);}
.sc-body,.sig-bd{padding:14px 16px;}
.sc-meta,.sig-meta{display:flex;align-items:center;gap:7px;margin-bottom:9px;flex-wrap:wrap;}
.sc-league{font-family:var(--f-mono);font-size:8px;color:var(--beige4);}
.sc-time{font-family:var(--f-mono);font-size:8px;color:var(--beige4);}
.sc-teams,.sig-teams{font-family:var(--f-titre);font-size:20px;color:var(--beige);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.04em;}
.sc-prono,.sig-bet{font-size:12px;color:var(--beige3);margin-bottom:12px;font-style:italic;}
.sc-nums,.sig-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.sc-num,.sig-stat{background:var(--s2);border:1px solid var(--ln2);border-radius:var(--r2);padding:10px 5px;text-align:center;}
.sc-num.hl{background:var(--gl);border-color:rgba(93,191,138,.25);}
.sc-num-l,.sig-stat-l{font-family:var(--f-mono);font-size:7px;color:var(--beige4);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px;}
.sc-num-v,.sig-stat-v{font-family:var(--f-titre);font-size:20px;color:var(--beige);font-variant-numeric:tabular-nums;letter-spacing:.04em;}
.sc-num.hl .sc-num-v{color:var(--g);}
.sc-bar{height:2px;background:var(--s3);border-radius:1px;overflow:hidden;}
.sc-bar-f{height:100%;border-radius:1px;background:linear-gradient(90deg,var(--red),var(--g));}

/* ===== LEAGUE ROWS ===== */
.lg-row{margin-bottom:10px;}
.lg-head,.lghd{display:flex;align-items:center;gap:8px;padding:11px 13px;background:var(--s1);border:1px solid var(--ln);border-radius:var(--r2);cursor:pointer;transition:all .15s;margin-bottom:6px;}
.lg-head:hover,.lghd:hover{background:var(--s2);border-color:rgba(93,191,138,.25);}
.lg-nm,.lgn{font-family:var(--f-titre);font-size:14px;color:var(--beige);letter-spacing:.06em;}
.lg-cnt,.lgc{font-family:var(--f-mono);font-size:8px;color:var(--beige4);padding:3px 8px;background:var(--s2);border-radius:4px;border:1px solid var(--ln2);}
.lg-arr,.lga{margin-left:auto;font-size:10px;color:var(--beige4);transition:transform .2s;display:inline-block;}
.lg-arr.open,.lga.open{transform:rotate(180deg);}
.match-grid{display:flex;flex-direction:column;}

/* ===== SHORTCUTS ===== */
.sc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.sc-item{
  background:var(--s1);border:1px solid var(--ln);border-radius:var(--r3);
  padding:14px;cursor:pointer;transition:all .2s cubic-bezier(.16,1,.3,1);
  display:flex;align-items:center;gap:12px;
}
.sc-item:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.35);border-color:rgba(93,191,138,.25);}
.sc-ic{width:40px;height:40px;border-radius:var(--r2);display:flex;align-items:center;justify-content:center;font-family:var(--f-titre);font-size:17px;flex-shrink:0;color:var(--bg);letter-spacing:.05em;}
.sc-nm{font-family:var(--f-titre);font-size:15px;color:var(--beige);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.05em;}
.sc-sb{font-family:var(--f-mono);font-size:8px;color:var(--beige4);margin-top:2px;}

/* ===== BUTTONS ===== */
.cbtn{
  width:100%;height:48px;background:var(--g);border:none;border-radius:var(--r2);
  font-family:var(--f-titre);font-size:17px;color:var(--bg);
  letter-spacing:.08em;margin-bottom:10px;display:flex;align-items:center;
  justify-content:center;gap:8px;cursor:pointer;transition:all .2s;
}
.cbtn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px rgba(93,191,138,.3);}
.cbtn:disabled{background:var(--s3);color:var(--beige4);cursor:not-allowed;}
.cbtn.turq,.cbtn.rose,.cbtn.gold{background:var(--g);}
.cbtn.vert{background:var(--g);}
.abtn{padding:7px 14px;border-radius:var(--r);font-size:11px;font-weight:500;border:1px solid var(--ln);color:var(--beige3);background:transparent;cursor:pointer;transition:all .13s;font-family:var(--f-body);}
.abtn:hover{border-color:var(--g);color:var(--g);}
.btn-primary{flex:1;height:46px;border:none;border-radius:var(--r2);cursor:pointer;background:var(--g);font-family:var(--f-titre);font-size:17px;color:var(--bg);letter-spacing:.08em;box-shadow:0 4px 16px rgba(93,191,138,.25);transition:all .2s;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(93,191,138,.35);}
.btn-sec{height:46px;padding:0 18px;border-radius:var(--r2);cursor:pointer;background:var(--s2);border:1px solid var(--ln);font-family:var(--f-titre);font-size:16px;color:var(--beige2);white-space:nowrap;transition:all .15s;letter-spacing:.06em;}
.btn-sec:hover{border-color:var(--beige3);color:var(--beige);}

/* ===== FILTERS ===== */
.fils{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;-webkit-overflow-scrolling:touch;}
.fib{padding:7px 15px;border-radius:100px;font-size:12px;font-weight:500;border:1px solid var(--ln);background:transparent;color:var(--beige4);white-space:nowrap;flex-shrink:0;cursor:pointer;transition:all .15s;font-family:var(--f-body);}
.fib:hover{border-color:var(--beige3);color:var(--beige2);}
.fib.on{background:var(--g);border-color:var(--g);color:var(--bg);font-weight:700;}

/* ===== TAGS ===== */
.badge,.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:8px;font-weight:700;font-family:var(--f-mono);}
.tg,.tv,.b-val,.bdg-val{background:var(--gl);color:var(--g);border:1px solid rgba(93,191,138,.25);}
.te,.b-arb,.bdg-arb{background:var(--gl);color:var(--g);border:1px solid rgba(93,191,138,.25);}
.tr,.b-live,.bdg-live{background:var(--redl);color:var(--red);border:1px solid rgba(224,85,85,.25);animation:pulse 2s infinite;}
.tt{background:var(--gl);color:var(--g);border:1px solid rgba(93,191,138,.2);}

/* ===== FLAGS ===== */
.flag{display:inline-flex;align-items:center;justify-content:center;width:22px;height:14px;border-radius:3px;font-family:var(--f-mono);font-size:7px;font-weight:700;flex-shrink:0;}
.f-FR{background:#002395;color:#fff}.f-ES{background:#aa151b;color:#f1bf00}
.f-ENG{background:#CF142B;color:#fff}.f-IT{background:#009246;color:#fff}
.f-DE{background:#1a1a1a;color:#FFCD00;border:1px solid #333}.f-PT{background:#006600;color:#ff0}
.f-UCL{background:#071d5e;color:#c8a900}.f-UEL{background:#d45500;color:#fff}
.f-NL{background:#ae1c28;color:#fff}.f-BE{background:#1a1a1a;color:#fdda24}
.f-TR{background:#e30a17;color:#fff}.f-SCO{background:#003087;color:#fff}
.f-GR{background:#0d5eaf;color:#fff}.f-USA{background:#3c3b6e;color:#fff}
.f-BRA{background:#009c3b;color:#ffdf00}.f-ARG{background:#74acdf;color:#fff}
.f-MEX{background:#006847;color:#fff}.f-INT{background:var(--s3);color:var(--beige4);}

/* ===== GENERIC CARDS ===== */
.card,.card-bleu,.card-rouge,.card-vert{
  background:var(--s1);border:1px solid var(--ln);
  border-radius:var(--r3);padding:18px;margin-bottom:12px;
}
.card-bleu{border-color:rgba(93,191,138,.2);}
.card-rouge{border-color:rgba(224,85,85,.2);}

.clbl{font-family:var(--f-mono);font-size:8px;color:var(--beige4);font-weight:700;text-transform:uppercase;letter-spacing:.14em;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.clbl::before{content:'';width:14px;height:1px;background:linear-gradient(90deg,var(--g),transparent);flex-shrink:0;}
.sbox,.kb,.risk-box{background:var(--s1);border:1px solid var(--ln);border-radius:var(--r3);padding:16px;text-align:center;margin-bottom:10px;}
.fsec{background:var(--s1);border:1px solid var(--ln);border-radius:var(--r3);padding:18px;margin-bottom:10px;}
.chat-wrap{background:var(--s1);border:1px solid var(--ln);border-radius:var(--r3);padding:14px;margin-bottom:10px;min-height:300px;max-height:420px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;}
.fsh{display:flex;align-items:center;gap:8px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--ln);}
.fsn{font-size:9px;font-weight:700;color:var(--g);background:var(--gl);border-radius:4px;padding:3px 8px;text-transform:uppercase;letter-spacing:.09em;font-family:var(--f-mono);border:1px solid rgba(93,191,138,.2);}
.fst{font-family:var(--f-titre);font-size:15px;color:var(--beige);letter-spacing:.06em;}

.et{font-family:var(--f-titre);font-size:18px;color:var(--beige2);margin-bottom:6px;letter-spacing:.06em;}
.es{font-size:12px;color:var(--beige4);line-height:1.8;}
.sv{font-family:var(--f-titre);font-size:28px;color:var(--beige);font-variant-numeric:tabular-nums;margin-bottom:4px;letter-spacing:.04em;}
.sl{font-size:10px;color:var(--beige4);}
.kbv{font-family:var(--f-titre);font-size:22px;color:var(--g);font-variant-numeric:tabular-nums;letter-spacing:.05em;}
.kbl{font-family:var(--f-mono);font-size:8px;color:var(--beige4);margin-top:4px;text-transform:uppercase;letter-spacing:.1em;}
.pbar{height:2px;background:var(--s3);border-radius:1px;overflow:hidden;}
.pfill{height:100%;border-radius:1px;background:linear-gradient(90deg,var(--red),var(--g));}
.btrack{height:4px;background:var(--s3);border-radius:2px;overflow:hidden;}
.bfill{height:100%;border-radius:2px;}
.spin{width:14px;height:14px;border:2px solid var(--gl);border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;flex-shrink:0;}
.ldr{display:inline-flex;gap:4px;align-items:center;vertical-align:middle;}
.ldr i{width:5px;height:5px;border-radius:50%;background:var(--g);animation:ldot 1.3s ease-in-out infinite;display:inline-block;font-style:normal;}
.ldr i:nth-child(2){animation-delay:.15s;}.ldr i:nth-child(3){animation-delay:.3s;}
.disc{padding:11px 13px;background:var(--redl);border:1px solid rgba(224,85,85,.12);border-radius:var(--r2);font-size:10px;color:var(--beige2);line-height:1.7;}
.ai-ok{background:var(--gl);border:1px solid rgba(93,191,138,.2);color:var(--g);padding:10px 13px;border-radius:var(--r2);font-size:12px;margin-top:7px;line-height:1.7;}
.ai-er{background:var(--redl);border:1px solid rgba(224,85,85,.15);color:var(--red);padding:10px 13px;border-radius:var(--r2);font-size:11px;margin-top:7px;}
.ai-st{padding:9px 12px;background:var(--gl);border:1px solid rgba(93,191,138,.2);border-radius:var(--r2);font-family:var(--f-mono);font-size:10px;color:var(--g);margin-bottom:9px;display:flex;align-items:center;gap:8px;}
.selm{background:var(--gl);border:1px solid rgba(93,191,138,.2);border-radius:var(--r2);padding:11px 14px;margin-bottom:11px;display:flex;align-items:center;gap:10px;}
.tbl{width:100%;border-collapse:collapse;font-size:12px;}
.tbl th{padding:9px 11px;text-align:left;font-size:8px;color:var(--beige4);font-weight:700;text-transform:uppercase;letter-spacing:.1em;border-bottom:1px solid var(--ln);font-family:var(--f-mono);}
.tbl td{padding:9px 11px;border-bottom:1px solid var(--ln2);font-family:var(--f-mono);font-size:12px;color:var(--beige2);}
.tbl tr:last-child td{border-bottom:none;}
.oc{color:var(--beige3);}.oc.best{color:var(--g);font-weight:700;}
.prow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;}
.pb{background:var(--s1);border:1px solid var(--ln);border-radius:var(--r2);padding:12px 7px;text-align:center;}
.pb.win{background:var(--gl);border-color:rgba(93,191,138,.25);}
.pp{font-family:var(--f-titre);font-size:28px;font-variant-numeric:tabular-nums;line-height:1;color:var(--beige);letter-spacing:.04em;}
.pb.win .pp{color:var(--g);}
.pn{font-size:10px;color:var(--beige4);margin-top:3px;}
.edgb{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-radius:var(--r2);margin-bottom:12px;}
.edgb.pos{background:var(--gl);border:1px solid rgba(93,191,138,.2);}
.edgb.neg{background:var(--redl);border:1px solid rgba(224,85,85,.15);}
.edgv{font-family:var(--f-titre);font-size:32px;font-variant-numeric:tabular-nums;letter-spacing:.04em;}
.edgb.pos .edgv{color:var(--g);}
.edgb.neg .edgv{color:var(--red);}
.scgr{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px;}
.scb{background:var(--s2);border:1px solid var(--ln);border-radius:var(--r2);padding:11px 5px;text-align:center;}
.scb.top{background:var(--gl);border-color:rgba(93,191,138,.25);}
.scv{font-family:var(--f-titre);font-size:20px;font-variant-numeric:tabular-nums;color:var(--beige);letter-spacing:.04em;}
.scp{font-family:var(--f-mono);font-size:9px;color:var(--beige4);margin-top:2px;}
.b3{height:3px;background:var(--s3);border-radius:1px;display:flex;overflow:hidden;margin-top:9px;}
.b3h{background:var(--g);}.b3n{background:var(--s4);}.b3a{background:var(--beige3);}
.mkrow{display:flex;justify-content:space-between;align-items:center;padding:10px 13px;border-radius:var(--r2);margin-bottom:5px;}
.mkrow.pos{background:var(--gl);border:1px solid rgba(93,191,138,.15);}
.mkrow.safe{background:var(--gl);border:1px solid rgba(93,191,138,.15);}
.mkrow.neu{background:var(--s2);border:1px solid var(--ln2);}
.vp{padding:10px 14px;border-radius:var(--r2);font-size:13px;font-weight:600;}
.vp.y{background:var(--gl);border:1px solid rgba(93,191,138,.2);color:var(--g);}
.vp.n{background:var(--redl);border:1px solid rgba(224,85,85,.15);color:var(--red);}
.vrd{background:var(--s1);border:1px solid var(--ln);border-radius:var(--r4);padding:22px;margin-bottom:12px;position:relative;overflow:hidden;}
.vrd::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--g),transparent);}
.vbet{font-family:var(--f-titre);font-size:clamp(18px,4vw,24px);color:var(--beige);letter-spacing:.02em;line-height:1.2;margin-bottom:7px;}
.tipcard{background:var(--s1);border:1px solid var(--ln);border-radius:var(--r3);overflow:hidden;margin-bottom:10px;cursor:pointer;transition:all .2s;}
.tipcard:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.4);border-color:rgba(93,191,138,.25);}
.tipcard.top{border-color:rgba(93,191,138,.3);}

.tipb{padding:14px 15px;}

.tipm{background:var(--s2);border-radius:var(--r);padding:9px 5px;text-align:center;border:1px solid var(--ln2);}
.tipml{font-family:var(--f-mono);font-size:7px;color:var(--beige4);text-transform:uppercase;letter-spacing:.09em;margin-bottom:3px;}
.tipmv{font-family:var(--f-titre);font-size:16px;color:var(--beige);font-variant-numeric:tabular-nums;letter-spacing:.04em;}
.chat-msg-bot,.chat-msg-user{display:flex;gap:9px;align-items:flex-end;}
.chat-msg-user{flex-direction:row-reverse;}
.chat-av{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:var(--f-titre);letter-spacing:.05em;}
.chat-av.bot{background:var(--g);color:var(--bg);}
.chat-av.user{background:var(--s3);color:var(--beige2);}
.chat-bubble{max-width:82%;padding:10px 13px;font-size:13px;line-height:1.75;}
.chat-bubble.bot{background:var(--s2);border:1px solid var(--ln);border-radius:4px var(--r2) var(--r2) var(--r2);color:var(--beige2);}
.chat-bubble.user{background:var(--s3);border-radius:var(--r2) 4px var(--r2) var(--r2);color:var(--beige);font-weight:500;}
.modal{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(10px);}
.mbox{background:var(--s1);border:1px solid var(--ln);border-radius:var(--r5);padding:24px;width:100%;max-width:400px;box-shadow:0 24px 64px rgba(0,0,0,.6);position:relative;overflow:hidden;}
.mbox::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--g),transparent);}
.mbtit{font-family:var(--f-titre);font-size:22px;color:var(--beige);margin-bottom:16px;letter-spacing:.06em;}
.mbtns{display:flex;gap:9px;margin-top:14px;}
.mbtn{flex:1;padding:12px;border-radius:var(--r2);font-size:13px;font-weight:600;border:1px solid;cursor:pointer;transition:all .14s;font-family:var(--f-body);}
.mbtn.blue,.mbtn.rose{background:var(--gl);border-color:rgba(93,191,138,.25);color:var(--g);}
.mbtn.gold{background:var(--g);border-color:var(--g);color:var(--bg);}
.mbtn.grey{background:var(--s2);border-color:var(--ln);color:var(--beige3);}
.barrow{margin-bottom:10px;}
.bartop{display:flex;justify-content:space-between;font-size:11px;margin-bottom:5px;font-weight:500;color:var(--beige2);}
.pinb{font-size:8px;color:var(--g);background:var(--gl);border-radius:3px;padding:1px 6px;margin-left:4px;font-weight:700;border:1px solid rgba(93,191,138,.2);}
.ctr{height:4px;background:var(--s3);border-radius:2px;overflow:hidden;margin-bottom:14px;}
.cf{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--red),var(--g));}
.crow{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.cl{font-size:10px;color:var(--beige4);font-weight:600;text-transform:uppercase;letter-spacing:.09em;}
.cv{font-family:var(--f-titre);font-size:16px;color:var(--beige);letter-spacing:.04em;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.aimsg{padding:10px 13px;border-radius:var(--r2);font-size:11px;margin-top:7px;line-height:1.6;}
.fw{display:flex;flex-direction:column;gap:5px;margin-bottom:10px;}
.fl{font-size:10px;color:var(--beige4);font-weight:600;text-transform:uppercase;letter-spacing:.09em;}
@media(max-width:768px){
  .g4{grid-template-columns:1fr 1fr;}
  .sig-stats,.tipmg,.sc-nums{grid-template-columns:1fr 1fr;}
  .hero-stats{grid-template-columns:1fr 1fr!important;}
  .match-grid{grid-template-columns:1fr;}
  #page{padding:12px;}
  .hero-title{font-size:clamp(48px,11vw,56px);}
}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes ldot{0%,80%,100%{transform:scale(0);opacity:.3}40%{transform:scale(1);opacity:1}}
@keyframes scan{0%{left:-60%}100%{left:110%}}
@keyframes cffall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
</style>

<script>



"use strict";
function pmf(l,k){if(l<=0)return k===0?1:0;if(k<0)return 0;if(k>20){var lp=-l+k*Math.log(l);for(var i=1;i<=k;i++)lp-=Math.log(i);return Math.max(0,Math.exp(lp));}var v=Math.exp(-l);for(var j=1;j<=k;j++)v*=l/j;return Math.max(0,v);}
function cdf(l,m){if(m<0)return 0;var s=0,t=Math.exp(-l);for(var k=0;k<=m;k++){s+=t;if(t<1e-10)break;t*=l/(k+1);}return Math.min(1,s);}
function tau(h,a,lH,lA,rho){var r=Math.max(-0.25,Math.min(-0.05,rho||-0.135));if(h===0&&a===0)return Math.max(0.001,1-lH*lA*r);if(h===1&&a===0)return Math.max(0.001,1+lA*r);if(h===0&&a===1)return Math.max(0.001,1+lH*r);if(h===1&&a===1)return Math.max(0.01,1-r);return 1;}
var RHO={"Ligue 1":-0.142,"Premier League":-0.118,"La Liga":-0.135,"Bundesliga":-0.128,"Serie A":-0.151,"Champions League":-0.132};

function kellyF(p,o){
  if(!o||o<=1||!p||p<=0||p>=1)return 0;
  // Cote minimum 1.25
  if(o<1.25)return 0;
  var b=o-1,k=(b*p-(1-p))/b;
  if(k<=0)return 0;
  var e=p*o-1;
  if(e<0.03)return 0; // Edge minimum 3%
  var fr=e>0.10?0.25:e>0.05?0.20:0.15;
  return Math.min(k*fr,0.04);
}
function edgeF(p,o){
  if(!o||!p||o<1.25||p<=0||p>=1)return null;
  var e=p*o-1;
  return e<0.03?null:e; // Edge minimum 3%
}
function arbF(o1,oN,o2){if(!o1||!oN||!o2||o1<=1||oN<=1||o2<=1)return null;var imp=1/o1+1/oN+1/o2;return imp>=1?null:+((1/imp-1)*100).toFixed(2);}
function fmW(p5,p10){var r5=Math.min(15,p5||7)/15,r10=Math.min(30,p10||14)/30;return Math.max(0.72,Math.min(1.28,0.72+0.56*(r5*0.6+r10*0.4)));}

function calc(m){
  try{
    var lH=(m.hxg||1.35)*0.58+(m.hg||1.25)*0.28+((m.hsh||12)/24)*0.14;
    var lA=(m.axg||1.10)*0.58+(m.ag||1.00)*0.28+((m.ash||10)/24)*0.14;
    var hD=(m.hxga||1.1)*0.6+(1-(m.hcs||30)/100)*0.25+(m.hc||1.2)*0.15;
    var aD=(m.axga||1.3)*0.6+(1-(m.acs||22)/100)*0.25+(m.ac||1.4)*0.15;
    lH*=Math.pow(Math.max(0.4,aD)/1.2,0.38);lA*=Math.pow(Math.max(0.4,hD)/1.2,0.38);
    lH*=1.082;lH*=fmW(m.hf,m.hf10);lA*=fmW(m.af,m.af10);
    if(m.derby){lH*=0.91;lA*=0.91;}if(m.hfat)lH*=0.935;if(m.afat)lA*=0.935;
    lH=Math.max(0.22,Math.min(4.5,lH));lA=Math.max(0.15,Math.min(4.0,lA));
    var rho=RHO[m.c]||-0.135;
    var pH=0,pN=0,pA=0,sc=[],tot=0;
    for(var h=0;h<=9;h++)for(var a=0;a<=9;a++){var p=pmf(lH,h)*pmf(lA,a)*tau(h,a,lH,lA,rho);if(p<0)continue;tot+=p;sc.push({s:h+"-"+a,p:p});if(h>a)pH+=p;else if(h===a)pN+=p;else pA+=p;}
    if(tot>0){pH/=tot;pN/=tot;pA/=tot;}
    sc.sort(function(x,y){return y.p-x.p;});
    // Meilleur pari avec cote minimum 1.25
    var bets=[{k:"1",p:pH,o:+m.o1||0},{k:"N",p:pN,o:+m.on||0},{k:"2",p:pA,o:+m.o2||0}];
    bets=bets.filter(function(b){return b.o>=1.25;});
    var best=null,bestEdge=-99;
    bets.forEach(function(b){var e=edgeF(b.p,b.o)||0;if(e>bestEdge){bestEdge=e;best=b;}});
    var bR=best?best.k:"1",bP=best?best.p:pH,bO=best?best.o:0;
    var edg=edgeF(bP,bO),kel=kellyF(bP,bO);
    var mg=(m.o1&&m.on&&m.o2)?1/m.o1+1/m.on+1/m.o2:null;
    var safe=mg?(mg>1.3?"SUSPENDU":mg>1.15?"ATTENTION":"OK"):"OK";
    var conf=Math.min(94,Math.max(8,Math.round(bP*30+(edg>0?Math.min(edg*60,18):0)+(safe==="OK"?4:safe==="ATTENTION"?-3:-9)+(m.derby?-10:0))));
    // Label simplifie
    var teamH=m.h||"Domicile",teamA=m.a||"Exterieur";
    var label=bR==="1"?(teamH+" gagne ("+((pH*100).toFixed(0))+"%)"):bR==="2"?(teamA+" gagne ("+((pA*100).toFixed(0))+"%)"):("Match nul probable ("+((pN*100).toFixed(0))+"%)");
    var btts=(1-pmf(lH,0))*(1-pmf(lA,0));
    var o25=1-cdf(lH+lA,2),o35=1-cdf(lH+lA,3),p15=1-cdf(lH+lA,1);
    return{lH:lH,lA:lA,pH:pH,pN:pN,pA:pA,sc:sc,bR:bR,bP:bP,bO:bO,edg:edg,kel:kel,conf:conf,label:label,safe:safe,btts:btts,o25:o25,o35:o35,p15:p15};
  }catch(err){console.error(err);return null;}
}

function buildBets(r,d){
  var o1=+d.o1||0,oN=+d.oN||0,o2=+d.o2||0,oO25=+d.oO25||0,oO35=+d.oO35||0,oBtts=+d.oBtts||0;
  var bets=[
    {id:"1",cat:"1X2",name:"Victoire "+(d.home||"Dom"),p:r.pH,o:o1},
    {id:"N",cat:"1X2",name:"Match nul",p:r.pN,o:oN},
    {id:"2",cat:"1X2",name:"Victoire "+(d.away||"Ext"),p:r.pA,o:o2},
    {id:"1X",cat:"Double chance",name:"Domicile ou Nul",p:r.pH+r.pN,o:0},
    {id:"X2",cat:"Double chance",name:"Exterieur ou Nul",p:r.pN+r.pA,o:0},
    {id:"O15",cat:"Buts",name:"Plus de 1.5 buts",p:r.p15,o:0},
    {id:"O25",cat:"Buts",name:"Plus de 2.5 buts",p:r.o25,o:oO25},
    {id:"O35",cat:"Buts",name:"Plus de 3.5 buts",p:r.o35,o:oO35},
    {id:"U25",cat:"Buts",name:"Moins de 2.5 buts",p:1-r.o25,o:0},
    {id:"BTTS",cat:"Les deux marquent",name:"Les deux equipes marquent",p:r.btts,o:oBtts},
    {id:"NBTTS",cat:"Les deux marquent",name:"Les deux equipes ne marquent pas",p:1-r.btts,o:0},
    {id:"CSH",cat:"Clean sheet",name:"Sans encaisser "+(d.home||"Dom"),p:pmf(r.lA,0),o:0},
    {id:"CSA",cat:"Clean sheet",name:"Sans encaisser "+(d.away||"Ext"),p:pmf(r.lH,0),o:0},
  ];
  // Appliquer les filtres: cote min 1.25, edge min 3%
  bets.forEach(function(b){
    b.edg=b.o>=1.25?edgeF(b.p,b.o):null;
    b.kel=b.o>=1.25?kellyF(b.p,b.o):0;
  });
  var best=bets.filter(function(b){return b.o>=1.25&&(b.edg||0)>0;}).sort(function(a,b){return(b.edg||0)-(a.edg||0);})[0];
  if(!best)best=bets.filter(function(b){return b.o>=1.25;}).sort(function(a,b){return b.p-a.p;})[0];
  var safe2=bets.filter(function(b){return b.p>0.62&&b.o>=1.25;}).sort(function(a,b){return b.p-a.p;})[0];
  var value=bets.filter(function(b){return(b.edg||0)>0.04&&b.o>=1.25;}).sort(function(a,b){return(b.edg||0)-(a.edg||0);})[0];
  return{allBets:bets,bestBet:best,safeBet:safe2,valueBet:value};
}

  if(!S.res)return;
  var stake=toM(Math.max(S.bk*(S.res.kel||0.02),1));

  var newBk=toM(S.bk+profit);
  if(win)confetti();
  var co=+S.closingOdd||0,clv=co>0?toM((S.res.bO||2)/co-1):0;
  var entry={id:Date.now(),date:new Date().toLocaleDateString("fr-FR"),match:(S.res.d.home||"?")+" vs "+(S.res.d.away||"?"),stake:stake,oddsT:S.res.bO||2,clv:clv,result:win?"WIN":"LOSS",profit:profit,bk:newBk};

function calcBkR(){

  var p=prob/100,bo=odd-1,q=1-p,kR=Math.max(0,(bo*p-q)/bo),kA=kR*frac;

     +'</div>';
  }
  h+='</div></div>';

  // Tabs
  h+='<div style="display:flex;gap:6px;margin-bottom:10px">';
  var TM=[["upcoming","A venir ("+up.length+")"],["live","Live ("+lv.length+")"],["finished","Termines ("+fn.length+")"]];
  for(var ti=0;ti<3;ti++){
    var isOn=mTab===TM[ti][0];
    h+='<button onclick="setMTabN('+ti+')" style="flex:1;padding:9px 5px;border-radius:var(--r2);font-family:var(--f-titre);font-size:13px;cursor:pointer;border:1px solid '+(isOn?"rgba(93,191,138,.3)":"var(--ln)")+';background:'+(isOn?"var(--gl)":"transparent")+';color:'+(isOn?"var(--g)":"var(--beige4)")+';letter-spacing:.04em;text-align:center">'+TM[ti][1]+'</button>';
  }
  h+='</div>';

  // Filtres
  h+='<div class="fils">';
  var FILS=[["all","Tous"],["fr","France"],["eu","Europe"],["eng","Angleterre"],["esp","Espagne"],["cup","Coupes EUR"],["val","Value"],["arb","Arb"]];
  for(var fi=0;fi<FILS.length;fi++){
    h+='<button class="fib'+(fil===FILS[fi][0]?" on":"")+'" onclick="setFilN('+fi+')">'+FILS[fi][1]+'</button>';
  }
  h+='</div>';

  if(S.mLoad){h+='<div style="text-align:center;padding:60px">'+ldr()+'</div>';return h;}

  // Filter
  var filtered=disp.filter(function(m){
    if(fil==="all")return true;
    var f=m.f||"INT";
    if(fil==="fr")return f==="FR";
    if(fil==="eu")return["ENG","ES","IT","DE","PT","NL","BE","SCO","GR","TR"].indexOf(f)>=0;
    if(fil==="eng")return f==="ENG";
    if(fil==="esp")return f==="ES";
    if(fil==="cup")return f==="UCL"||f==="UEL";
    if(fil==="val")return m.e&&(m.e.edg||0)>0.03;
    if(fil==="arb")return m.arb!==null&&m.arb!==undefined;
    return true;
  });

  if(!filtered.length){
    h+='<div class="empty"><div class="ei">0</div><div class="et">Aucun match</div><div class="es">Recharge pour voir les matchs</div></div>';
    return h;
  }

  // === TRI CHRONOLOGIQUE STRICT ===
  // 1. Trier par date+heure
  filtered.sort(function(a,b){
    var ta=a.time||a.t||"";var tb=b.time||b.t||"";
    return ta<tb?-1:ta>tb?1:0;
  });

  var groups={};var groupOrder=[];
  filtered.forEach(function(m){
    var t=m.time||m.t||"";

    var dt=t.substring(0,10)||"?";
    var hr=t.substring(11,16)||"?";
    var key=dt+"|"+hr;
    if(!groups[key]){groups[key]=[];groupOrder.push(key);}
    groups[key].push(m);
  });

  // 3. Afficher par tranche
  for(var gi=0;gi<groupOrder.length;gi++){
    var gk=groupOrder[gi];
    var gms=groups[gk];
    var parts=gk.split("|");
    var gDate=parts[0];var gHour=parts[1];

    // Header tranche horaire
    h+='<div style="display:flex;align-items:center;gap:10px;margin:14px 0 8px">';

// === BAYESIAN UPDATE ===
function bayesianUpdate(pH,pN,pA,o1,oN,o2){
  if(!o1||!oN||!o2||o1<=1)return{pH:pH,pN:pN,pA:pA};
  var mH=1/o1,mN=1/oN,mA=1/o2,tot=mH+mN+mA;
  mH/=tot;mN/=tot;mA/=tot;
  var w=0.60;
  var uH=mH*w+pH*(1-w),uN=mN*w+pN*(1-w),uA=mA*w+pA*(1-w);
  var s=uH+uN+uA;
  return{pH:uH/s,pN:uN/s,pA:uA/s};
}

// === ADAPTIVE KELLY ===
function adaptiveKelly(prob,odd){
  if(!odd||odd<1.25||!prob)return 0;
  var b=odd-1,q=1-prob,k=(b*prob-q)/b;
  if(k<=0)return 0;
  var edge=prob*odd-1;if(edge<0.03)return 0;
  var fr=edge>0.12?0.25:edge>0.07?0.20:edge>0.04?0.15:0.10;
  return Math.min(k*fr,0.04);
}

// === EXPLAIN PRONO ===
function explainProno(edg,bO,m,bR){
  var reasons=[],risks=[];
  if(edg>0.08)reasons.push("Edge exceptionnel +"+((edg)*100).toFixed(1)+"% - rare opportunite");
  else if(edg>0.05)reasons.push("Edge solide +"+((edg)*100).toFixed(1)+"% - value confirmee");
  else if(edg>0.03)reasons.push("Edge positif +"+((edg)*100).toFixed(1)+"% - legere value");
  else risks.push("Edge faible - pari a eviter");
  if(m.derby)risks.push("Derby - resultat impredictible");
  if(m.hf&&bR==="1"){if(m.hf>=12)reasons.push("Bonne forme domicile ("+m.hf+"/15 pts)");else if(m.hf<=5)risks.push("Mauvaise forme domicile");}
  if(m.af&&bR==="2"){if(m.af>=12)reasons.push("Bonne forme exterieur");else if(m.af<=5)risks.push("Mauvaise forme exterieur");}
  if(m.o1&&m.on&&m.o2){var mg=(1/m.o1+1/m.on+1/m.o2-1)*100;if(mg<3)reasons.push("Marche liquide - cotes fiables");else if(mg>8)risks.push("Marge elevee ("+mg.toFixed(1)+"%) - cotes moins fiables");}
  if(bO>=1.50)reasons.push("Cote correcte @ "+bO.toFixed(2)+" - bon rapport risque/gain");
  else if(bO<1.30)risks.push("Cote tres basse @ "+bO.toFixed(2)+" - mise reduite");
  return{reasons:reasons,risks:risks};
}

// === ENRICHISSEMENT ODDS ===
function enrichFromOdds(m){
  var pin=(m.bk||[]).find(function(b){return b.n==="Pinnacle";});
  var sh=pin||{o1:m.o1,on:m.on,o2:m.o2};
  if(sh.o1&&sh.o2){
    var pH=1/sh.o1,pA=1/sh.o2,pN=sh.on?1/sh.on:0,tot=pH+pA+pN;
    if(tot>0){pH/=tot;pA/=tot;}
    m.mkStrH=Math.max(0.5,Math.min(3.5,-Math.log(1-Math.min(0.99,pH))*1.4));
    m.mkStrA=Math.max(0.4,Math.min(3.0,-Math.log(1-Math.min(0.99,pA))*1.4));
  }
  return m;
}

function placeBetDemo(isCombi){
  var el=document.getElementById("demo-stake");
  var stake=el?parseFloat(el.value)||10:10;
  if(stake<=0||stake>S.demoBk){alert("Mise invalide");return;}
  var slip=S.demoSlip;
  if(!slip.length){alert("Selectionne au moins un match");return;}
  var totalOdd,label,picks;
  if(isCombi){
    totalOdd=parseFloat(slip.reduce(function(a,b){return a*b.odd;},1).toFixed(2));
    label="Combine "+slip.length+" selections";
    picks=slip.map(function(s){return s.label;});
  }else{
    totalOdd=slip[0].odd;
    label=slip[0].label;
    picks=[slip[0].label];
  }
  var bet={id:Date.now(),date:new Date().toLocaleDateString("fr-FR"),stake:stake,odd:totalOdd,label:label,picks:picks,type:isCombi?"combine":"simple",potGain:parseFloat((stake*totalOdd).toFixed(2)),status:"pending",typeN:isCombi?-1:slip[0].typeN};
  S.demoBk-=stake;S.demoBkH.push(S.demoBk);S.demoBets.unshift(bet);S.demoSlip=[];renderPage();
}

  var bet=S.demoBets.find(function(b){return b.id===betId;});
  if(!bet||bet.status!=="pending")return;
  bet.status=won?"won":"lost";
  bet.profit=won?parseFloat((bet.potGain-bet.stake).toFixed(2)):-bet.stake;
  if(won){S.demoBk+=bet.potGain;confetti();}
  S.demoBkH.push(S.demoBk);renderPage();
}

  var h=parseInt(sh.value),a=parseInt(sa.value);
  if(isNaN(h)||isNaN(a)||h<0||a<0){alert("Score invalide");return;}
  var bet=S.demoBets.find(function(b){return b.id===betId;});
  if(!bet||bet.status!=="pending")return;
  bet.scoreStr=h+"-"+a;
  var won=false;
  if(bet.type==="combine"){won=confirm("Ton combine est-il gagnant avec le score "+h+"-"+a+" ?");}
  else{
    if(bet.typeN===0)won=h>a;
    else if(bet.typeN===2)won=a>h;
    else if(bet.typeN===1)won=h===a;
    else won=h>a;
  }
  settleBet(betId,won);
}

        h+='<div style="font-family:var(--f-titre);font-size:18px;font-weight:700;color:var(--blanc4);line-height:1">VS</div>';
        h+='</div>';
      }
      // Away
      h+='<div>';
      h+='<div style="font-family:var(--f-titre);font-size:15px;font-weight:800;line-height:1.2">'+tA+'</div>';
      if(m.o2)h+='<div style="font-family:var(--f-mono);font-size:10px;color:var(--blanc4);margin-top:3px">'+m.o2.toFixed(2)+'</div>';
      h+='</div>';
      h+='</div>';

      // Cotes si pas live
      if(!isLv&&!isDn&&m.o1){
        h+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-top:10px">';
        var ODS=[{l:tH.split(" ")[0]||"1",v:m.o1},{l:"Nul",v:m.on},{l:tA.split(" ")[0]||"2",v:m.o2}];
        for(var oi=0;oi<3;oi++){
          h+='<div style="background:var(--c3);border:1px solid var(--ln);border-radius:7px;padding:7px;text-align:center">';
          h+='<div style="font-family:var(--f-mono);font-size:7px;color:var(--blanc4);margin-bottom:2px">'+ODS[oi].l+'</div>';
          h+='<div style="font-family:var(--f-titre);font-size:15px;font-weight:800;font-variant-numeric:tabular-nums">'+(ODS[oi].v?ODS[oi].v.toFixed(2):"--")+'</div>';
          h+='</div>';
        }
        h+='</div>';
      }

      h+='</div>';
    }
    h+='<div style="margin-bottom:10px"></div>';
  }

  return h;
}

function pCotes(){
  var bkTab=S.cotesTab||"betclic";
  var ms=S.matches.filter(function(m){return !isDone(m.time||m.t);});
  var BKS=[
    {id:"betclic",name:"Betclic",color:"#ff6b35"},
    {id:"winamax",name:"Winamax",color:"#e2001a"},
    {id:"unibet",name:"Unibet",color:"#007b4f"},
    {id:"pinnacle",name:"Pinnacle",color:"#c8a900"},
    {id:"bet365",name:"Bet365",color:"#ffb900"},
    {id:"pmu",name:"PMU",color:"#0052a5"}
  ];
  var selectedBk=BKS.find(function(b){return b.id===bkTab;})||BKS[0];
  var h='<div style="font-family:var(--f-titre);font-size:24px;font-weight:900;letter-spacing:-1px;margin-bottom:14px">Cotes par bookmaker</div>';
  h+='<div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;-webkit-overflow-scrolling:touch">';
  for(var ci=0;ci<BKS.length;ci++){
    var bk=BKS[ci];var isOn=bkTab===bk.id;
    h+='<button onclick="setCotesTabN('+ci+')" style="padding:8px 14px;border-radius:var(--r2);font-family:var(--f-titre);font-size:13px;font-weight:700;cursor:pointer;border:1px solid '+(isOn?bk.color:"var(--ln)")+';background:'+(isOn?"rgba(255,255,255,.05)":"transparent")+';color:'+(isOn?bk.color:"var(--blanc4)")+';white-space:nowrap;flex-shrink:0;transition:all .15s">'+bk.name+'</button>';
  }
  h+='</div>';
  if(!ms.length){h+='<div class="empty"><div class="et">Aucun match</div></div>';return h;}
  var leagues=[];
  ms.forEach(function(m){if(leagues.indexOf(m.c)<0)leagues.push(m.c);});
  for(var lgi=0;lgi<leagues.length;lgi++){
    var lg=leagues[lgi];
    var lgMs=ms.filter(function(m){return m.c===lg;});
    if(!lgMs.length)continue;
    h+='<div style="margin-bottom:10px">';
    h+='<div style="display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--gris2);border:1px solid var(--ln);border-radius:var(--r2);margin-bottom:6px">'+flagBadge(lgMs[0].f)+'<span style="font-family:var(--f-titre);font-size:13px;font-weight:700;color:var(--blanc3)">'+esc(lg)+'</span><span style="font-family:var(--f-mono);font-size:9px;color:var(--blanc4);padding:2px 7px;background:var(--gris3);border-radius:4px">'+lgMs.length+'</span></div>';
    for(var mgi=0;mgi<lgMs.length;mgi++){
      var m=lgMs[mgi];var mIdx=S.matches.indexOf(m);
      var tH=esc(m.h||m.home||"");var tA=esc(m.a||m.away||"");
      var bkD=(m.bk||[]).find(function(b){return b.n&&b.n.toLowerCase().indexOf(bkTab)>=0;});
      var o1=bkD?bkD.o1:m.o1;var on=bkD?bkD.on:m.on;var o2=bkD?bkD.o2:m.o2;
      var allO1=(m.bk||[]).map(function(b){return b.o1||0;});
      var allO2=(m.bk||[]).map(function(b){return b.o2||0;});
      var bestO1=allO1.length?Math.max.apply(null,allO1):0;
      var bestO2=allO2.length?Math.max.apply(null,allO2):0;
      h+='<div style="background:var(--gris1);border:1px solid var(--ln);border-radius:var(--r2);padding:12px 13px;margin-bottom:6px">';
      h+='<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px">';
      h+='<div style="flex:1;min-width:0"><div style="font-family:var(--f-mono);font-size:8px;color:var(--blanc4);margin-bottom:4px">'+fmtDate(m.time||m.t)+' '+fmtTime(m.time||m.t)+'</div>';
      h+='<div style="font-family:var(--f-titre);font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+tH+' vs '+tA+'</div></div>';
      h+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:5px;flex-shrink:0">';
      h+='<div style="background:'+(o1===bestO1&&bestO1>0?"var(--vert2)":"var(--gris2)")+';border:1px solid '+(o1===bestO1&&bestO1>0?"rgba(0,208,132,.25)":"var(--ln)")+';border-radius:var(--r);padding:7px 4px;text-align:center"><div style="font-family:var(--f-mono);font-size:7px;color:var(--blanc4)">1</div><div style="font-family:var(--f-titre);font-size:15px;font-weight:900;color:'+(o1===bestO1&&bestO1>0?"var(--vert)":"var(--blanc)")+';font-variant-numeric:tabular-nums">'+(o1?o1.toFixed(2):"--")+'</div></div>';
      h+='<div style="background:var(--gris2);border:1px solid var(--ln);border-radius:var(--r);padding:7px 4px;text-align:center"><div style="font-family:var(--f-mono);font-size:7px;color:var(--blanc4)">N</div><div style="font-family:var(--f-titre);font-size:15px;font-weight:900;font-variant-numeric:tabular-nums">'+(on?on.toFixed(2):"--")+'</div></div>';
      h+='<div style="background:'+(o2===bestO2&&bestO2>0?"var(--vert2)":"var(--gris2)")+';border:1px solid '+(o2===bestO2&&bestO2>0?"rgba(0,208,132,.25)":"var(--ln)")+';border-radius:var(--r);padding:7px 4px;text-align:center"><div style="font-family:var(--f-mono);font-size:7px;color:var(--blanc4)">2</div><div style="font-family:var(--f-titre);font-size:15px;font-weight:900;color:'+(o2===bestO2&&bestO2>0?"var(--vert)":"var(--blanc)")+';font-variant-numeric:tabular-nums">'+(o2?o2.toFixed(2):"--")+'</div></div>';
      h+='</div></div>';
      h+='<div style="display:flex;gap:5px">';
      h+='<button onclick="addToSlip('+mIdx+',0,'+o1+')" style="flex:1;padding:5px;background:transparent;border:1px solid var(--ln);border-radius:5px;color:var(--blanc4);font-family:var(--f-mono);font-size:8px;cursor:pointer;font-weight:700">+ Demo</button>';
      h+='</div></div>';
    }
    h+='</div>';
  }
  return h;
}

function setLiveTabN(i){var k=["all","live","upcoming","finished"];S.liveTab=k[i]||"all";renderPage();}
function setCotesTabN(i){var k=["betclic","winamax","unibet","pinnacle","bet365","pmu"];S.cotesTab=k[i]||"betclic";renderPage();}

function loadMatchDetail(){
  var m=S.selM;
  if(!m||!m.fixtureId)return;
  S.mdLoading=true;S.matchDetail=null;renderPage();
  var url="/api/match?fixtureId="+m.fixtureId;
  if(m.homeId)url+="&homeId="+m.homeId;
  if(m.awayId)url+="&awayId="+m.awayId;
  if(m.leagueId)url+="&leagueId="+m.leagueId;
  fetch(url).then(function(r){return r.json();}).then(function(data){
    S.matchDetail=data;S.mdLoading=false;renderPage();
  }).catch(function(){S.mdLoading=false;renderPage();});
}
function getAIAnalysis(){
  var d=S.d;var m=S.selM;
  if(!S.aiKey){alert("Configure ta cle Anthropic.");return;}
  S.aiLoad=true;S.aiMsg=null;renderPage();
  var h=esc(d.home||d.aiH||"Dom"),a=esc(d.away||d.aiA||"Ext");
  var league=esc(d.league||d.aiC||"Football");
  var r=S.res;
  var cotes="1:"+(d.o1||"?")+" N:"+(d.oN||"?")+" 2:"+(d.o2||"?");
  var stats="xG dom:"+(d.hXG||"?")+" xGA dom:"+(d.hXGA||"?")+" Buts/m dom:"+(d.hG||"?")+" xG ext:"+(d.aXG||"?")+" xGA ext:"+(d.aXGA||"?")+" Buts/m ext:"+(d.aG||"?");
  var forme="Forme dom:"+(d.hF||"?")+"pts | Forme ext:"+(d.aF||"?")+"pts";
  var verdict=r?("Verdict EDGE: "+r.label+" @ "+(r.bO||"?")+"x | Conf: "+r.conf+"% | Edge: "+((r.edg||0)*100).toFixed(1)+"%"):"Moteur pas encore lance";
  var md=S.matchDetail;
  var h2h_str="";
  if(md&&md.h2h&&md.h2h.length){
    var hw=md.h2h.filter(function(g){return g.winner==="home";}).length;
    var dr=md.h2h.filter(function(g){return g.winner==="draw";}).length;
    var aw=md.h2h.filter(function(g){return g.winner==="away";}).length;
    h2h_str=" | H2H "+md.h2h.length+" matchs: "+hw+"V "+dr+"N "+aw+"D";
  }
  var inj_str="";
  if(md&&md.injuries&&md.injuries.length){
    inj_str=" | Blesses: "+md.injuries.slice(0,3).map(function(i){return i.player;}).join(", ");
  }
  var prompt="Tu es EDGE, expert en paris sportifs quantitatifs. Analyse ce match.\n\n"
    +"MATCH: "+h+" vs "+a+" ("+league+")\n"
    +"COTES BOOKMAKER: "+cotes+"\n"
    +"STATS: "+stats+"\n"
    +"FORME: "+forme+h2h_str+inj_str+"\n"
    +"MOTEUR EDGE: "+verdict+"\n\n"
    +"Donne une analyse complete en 4-5 phrases. Sois precis et factuel: tactique, forme recente, avantage terrain, signal value, recommandation concrete avec mise suggeree.";
  callAI(prompt,900)
  .then(function(raw){
    S.aiMsg={t:"ok",m:raw.replace(/```[a-z]*/g,"").replace(/```/g,"").trim()};
  })
  .catch(function(e){S.aiMsg={t:"err",m:"Erreur: "+e.message};})
  .then(function(){S.aiLoad=false;renderPage();});
}

  else if(t==="scanner"){if(!S.scanDone&&!S.scanLoad&&S.matches.length>0){S.scanDone=true;runScan();}h=pScanner();}
  else if(t==="matchs")h=pMatchs();

  else if(t==="result")h=pResult();
  else if(t==="money")h=pMoney();
  else if(t==="risk")h=pRisk();
  else if(t==="bankroll")h=pBankroll();
  else if(t==="stats")h=pStats();
  else if(t==="methode")h=pMethode();

  buildSide();updTop();updSide();
}

(function(){
  var c=document.getElementById("particles");
  if(!c)return;
  var x=c.getContext("2d");
  var W=c.width=window.innerWidth,H=c.height=window.innerHeight;
  window.addEventListener("resize",function(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;});
  var CL=["rgba(93,191,138,","rgba(240,230,211,","rgba(93,191,138,","rgba(109,208,154,"];
  var pts=[];
  for(var i=0;i<55;i++){pts.push({px:Math.random()*W,py:Math.random()*H,vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.35,r:Math.random()*1.4+.4,c:CL[i%4],o:Math.random()*.4+.08});}
  function draw(){
    x.clearRect(0,0,W,H);
    for(var i=0;i<pts.length;i++){
      var p=pts[i];p.px+=p.vx;p.py+=p.vy;
      if(p.px<0)p.px=W;if(p.px>W)p.px=0;if(p.py<0)p.py=H;if(p.py>H)p.py=0;
      x.beginPath();x.arc(p.px,p.py,p.r,0,Math.PI*2);x.fillStyle=p.c+p.o+")";x.fill();
      for(var j=i+1;j<pts.length;j++){
        var q=pts[j],dx=p.px-q.px,dy=p.py-q.py,d=Math.sqrt(dx*dx+dy*dy);
        if(d<90){x.beginPath();x.moveTo(p.px,p.py);x.lineTo(q.px,q.py);x.strokeStyle=p.c+(0.05*(1-d/90))+")";x.lineWidth=.4;x.stroke();}
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();
