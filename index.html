<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<meta name="theme-color" content="#080808"/>
<title>EDGE - Betting Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800;900&family=Barlow:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#080808;--bg2:#0d0d0d;--c1:#111;--c2:#181818;--c3:#202020;--c4:#282828;
  --red:#dc2626;--red2:#ef4444;--red3:rgba(220,38,38,.15);--red4:rgba(220,38,38,.08);
  --gold:#f59e0b;--gold2:#fbbf24;--gold3:rgba(245,158,11,.1);
  --green:#16a34a;--green2:#22c55e;--green3:rgba(22,197,94,.1);
  --blue:#1d4ed8;--blue2:#3b82f6;--blue3:rgba(59,130,246,.1);
  --w:#fff;--w2:rgba(255,255,255,.82);--w3:rgba(255,255,255,.5);--w4:rgba(255,255,255,.18);
  --g1:#aaa;--g2:#666;--g3:#444;--g4:#2a2a2a;
  --ln:rgba(255,255,255,.08);--ln2:rgba(255,255,255,.04);--lr:rgba(220,38,38,.25);
  --fb:'Barlow Condensed',sans-serif;--fm:'JetBrains Mono',monospace;--f:'Barlow',sans-serif;
  --r:6px;--r2:10px;--r3:14px;--r4:18px;
  --shr:0 8px 32px rgba(220,38,38,.18);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--w);font-family:'Barlow',sans-serif;font-size:14px;overflow-x:hidden;-webkit-font-smoothing:antialiased}
button{font-family:'Barlow',sans-serif;cursor:pointer}
input,select{font-family:'Barlow',sans-serif;font-size:13px;background:var(--c2);border:1px solid var(--ln);border-radius:var(--r2);color:var(--w);padding:11px 13px;width:100%;outline:none;transition:all .15s}
input:focus,select:focus{border-color:rgba(220,38,38,.45);box-shadow:0 0 0 3px rgba(220,38,38,.07)}
input::placeholder{color:var(--g3)}
select{appearance:none;-webkit-appearance:none}
::-webkit-scrollbar{width:2px;height:2px}
::-webkit-scrollbar-thumb{background:var(--red);border-radius:2px}

/* LAYOUT */
#app{display:flex;min-height:100vh}
#sidebar{width:236px;position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;z-index:100;transition:transform .26s cubic-bezier(.16,1,.3,1);background:var(--bg2);border-right:1px solid var(--lr)}
#main{margin-left:236px;flex:1;display:flex;flex-direction:column;min-height:100vh}
#sidebar.open{transform:none}

/* SIDEBAR */
.sb-top{background:linear-gradient(160deg,#1c0505 0%,#0d0000 60%,var(--bg2) 100%);padding:20px 16px 0;position:relative;overflow:hidden;border-bottom:1px solid var(--lr)}
.sb-top::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--red),var(--red2),var(--gold),transparent)}
.sb-top::after{content:'';position:absolute;top:-30px;right:-30px;width:130px;height:130px;background:radial-gradient(circle,rgba(220,38,38,.18) 0%,transparent 70%);pointer-events:none}
.sb-logo{display:flex;align-items:center;gap:10px;margin-bottom:5px;position:relative;z-index:1}
.sb-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--red),#991b1b);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;color:#fff;flex-shrink:0;box-shadow:0 4px 14px rgba(220,38,38,.45),inset 0 1px 0 rgba(255,255,255,.12)}
.sb-name{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;letter-spacing:-.5px;line-height:1;background:linear-gradient(135deg,#fff 40%,rgba(255,255,255,.7));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sb-name em{color:var(--red2);-webkit-text-fill-color:var(--red2);font-style:normal}
.sb-tag{font-family:'JetBrains Mono',monospace;font-size:8px;color:rgba(255,255,255,.3);letter-spacing:.15em;text-transform:uppercase;margin-bottom:14px;position:relative;z-index:1}

.sb-kpis{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--lr);position:relative;z-index:1}
.kpi{background:rgba(13,13,13,.95);padding:10px 12px}
.kpi-v{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.kpi-l{font-family:'JetBrains Mono',monospace;font-size:7px;color:var(--g3);text-transform:uppercase;letter-spacing:.09em;margin-top:2px}

.sb-nav{flex:1;padding:8px;overflow-y:auto}
.nsec{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--g3);padding:0 8px;margin:12px 0 3px;letter-spacing:.12em;text-transform:uppercase;font-weight:700}
.nb{display:flex;align-items:center;gap:9px;width:100%;padding:9px 11px;border:none;background:transparent;color:var(--g2);border-radius:var(--r2);font-size:13px;font-weight:500;text-align:left;position:relative;transition:all .12s;font-family:'Barlow',sans-serif}
.nb:hover{background:rgba(255,255,255,.05);color:var(--w2)}
.nb.on{background:var(--red3);color:var(--w);font-weight:700;border-left:3px solid var(--red);padding-left:8px}
.nb-ic{font-size:15px;width:22px;text-align:center;flex-shrink:0}
.nbadge{margin-left:auto;font-size:9px;padding:2px 7px;border-radius:100px;background:rgba(220,38,38,.15);color:var(--red2);font-weight:700;font-family:'JetBrains Mono',monospace;border:1px solid rgba(220,38,38,.2)}
.nbadge.live{background:rgba(245,158,11,.12);color:var(--gold2);border-color:rgba(245,158,11,.2);animation:pulse 2s infinite}
.nbadge.ok{background:var(--green3);color:var(--green2);border-color:rgba(34,197,94,.2)}

.sb-bk{padding:10px;border-top:1px solid var(--lr)}
.bkcard{background:linear-gradient(135deg,rgba(245,158,11,.08),rgba(245,158,11,.03));border:1px solid rgba(245,158,11,.18);border-radius:var(--r3);padding:12px 14px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.bkcard::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(245,158,11,.4),transparent)}
.bkcard:hover{border-color:rgba(245,158,11,.3);transform:translateY(-1px)}
.bk-l{font-family:'JetBrains Mono',monospace;font-size:8px;color:rgba(245,158,11,.5);font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px}
.bk-v{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--gold2);line-height:1;font-variant-numeric:tabular-nums}
.bk-s{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--g3);margin-top:3px}

/* TOPBAR */
#topbar{background:rgba(8,8,8,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--ln);padding:0 20px;height:54px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:90}
.ham{display:none;flex-direction:column;gap:4px;padding:8px;border-radius:var(--r2);border:1px solid var(--ln);background:var(--c2)}
.ham span{width:16px;height:2px;background:var(--g3);border-radius:1px;display:block}
.ptitle{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;letter-spacing:.2px;text-transform:uppercase}
.tb-r{margin-left:auto;display:flex;align-items:center;gap:8px}
.tbtn{padding:6px 13px;background:transparent;border:1px solid var(--ln);border-radius:var(--r2);color:var(--g2);font-size:12px;font-weight:600;white-space:nowrap;transition:all .12s;font-family:'Barlow',sans-serif}
.tbtn:hover{border-color:var(--red2);color:var(--red2)}
.tbtn.ok{border-color:rgba(34,197,94,.3);color:var(--green2);background:var(--green3)}
.livepill{display:flex;align-items:center;gap:5px;padding:4px 10px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);border-radius:100px;font-size:10px;color:var(--gold2);font-family:'JetBrains Mono',monospace;font-weight:700}
.livedot{width:5px;height:5px;border-radius:50%;background:var(--gold2);animation:pulse 1.5s infinite;flex-shrink:0}

/* PAGE */
#page{padding:20px;max-width:920px;animation:fu .2s ease}

/* CARDS */
.card{background:var(--c1);border:1px solid var(--ln);border-radius:var(--r3);padding:18px;margin-bottom:10px;transition:border-color .15s}
.cardv{background:var(--c1);border:1px solid var(--lr);border-radius:var(--r3);padding:18px;margin-bottom:10px;box-shadow:var(--shr);position:relative;overflow:hidden}
.cardv::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--red),var(--red2),transparent)}
.cardg{background:linear-gradient(135deg,rgba(245,158,11,.06),rgba(245,158,11,.02));border:1px solid rgba(245,158,11,.15);border-radius:var(--r3);padding:18px;margin-bottom:10px}
.carde{background:var(--green3);border:1px solid rgba(34,197,94,.18);border-radius:var(--r3);padding:18px;margin-bottom:10px}
.carderr{background:rgba(220,38,38,.06);border:1px solid rgba(220,38,38,.18);border-radius:var(--r3);padding:18px;margin-bottom:10px}
.clbl{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--g3);font-weight:700;text-transform:uppercase;letter-spacing:.12em;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.clbl::before{content:'';width:12px;height:2px;background:var(--red);border-radius:1px;flex-shrink:0}

/* TAGS */
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace}
.tg{background:var(--gold3);color:var(--gold2);border:1px solid rgba(245,158,11,.2)}
.te{background:var(--green3);color:var(--green2);border:1px solid rgba(34,197,94,.2)}
.tv{background:var(--red3);color:var(--red2);border:1px solid rgba(220,38,38,.2)}
.tr{background:rgba(220,38,38,.08);color:var(--red2)}
.tp{background:rgba(245,158,11,.1);color:var(--gold2)}

/* FORMS */
.fw{display:flex;flex-direction:column;gap:4px;margin-bottom:9px}
.fl{font-size:10px;color:var(--g3);font-weight:700;text-transform:uppercase;letter-spacing:.07em}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.g3c{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.rg{display:flex;gap:3px}
.rb{flex:1;padding:9px 5px;font-size:12px;font-weight:600;border-radius:var(--r2);border:1px solid var(--ln);background:var(--c2);color:var(--g3);text-align:center;transition:all .12s;font-family:'Barlow',sans-serif}
.rb:hover{border-color:var(--red2);color:var(--red2)}
.rb.on{background:var(--red3);border-color:rgba(220,38,38,.35);color:var(--w);font-weight:700}
.fsec{background:var(--c1);border:1px solid var(--ln);border-radius:var(--r3);padding:16px;margin-bottom:9px}
.fsh{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--ln2)}
.fsn{font-size:9px;font-weight:700;color:var(--red2);background:var(--red4);border-radius:4px;padding:2px 7px;text-transform:uppercase;letter-spacing:.07em;font-family:'JetBrains Mono',monospace;border:1px solid rgba(220,38,38,.18)}
.fst{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--w);text-transform:uppercase;letter-spacing:.3px}

/* BUTTONS */
.cbtn{width:100%;height:46px;background:linear-gradient(135deg,var(--red),#b91c1c);border:none;border-radius:var(--r2);font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:#fff;letter-spacing:.5px;text-transform:uppercase;margin-bottom:9px;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;box-shadow:0 4px 16px rgba(220,38,38,.25)}
.cbtn:hover:not(:disabled){background:linear-gradient(135deg,var(--red2),var(--red));transform:translateY(-2px);box-shadow:0 8px 24px rgba(220,38,38,.35)}
.cbtn:disabled{background:var(--g4);color:var(--g3);transform:none;opacity:.5;box-shadow:none}
.cbtn.gold{background:linear-gradient(135deg,#92400e,var(--gold));box-shadow:0 4px 16px rgba(245,158,11,.2)}
.cbtn.gold:hover:not(:disabled){box-shadow:0 8px 24px rgba(245,158,11,.3)}
.cbtn.green{background:linear-gradient(135deg,var(--green),#15803d)}
.abtn{padding:5px 11px;border-radius:var(--r);font-size:11px;font-weight:600;border:1px solid var(--ln);color:var(--g2);background:transparent;white-space:nowrap;transition:all .12s;font-family:'Barlow',sans-serif}
.abtn:hover{border-color:var(--red2);color:var(--red2);background:var(--red4)}

/* MATCH CARDS */
.mcard{background:var(--c1);border:1px solid var(--ln);border-radius:var(--r3);overflow:hidden;margin-bottom:9px;cursor:pointer;transition:all .15s}
.mcard:hover{border-color:rgba(220,38,38,.25);transform:translateY(-1px);box-shadow:0 6px 24px rgba(0,0,0,.5)}
.mcard.hot{border-color:rgba(220,38,38,.2)}
.mstripe{height:2px}
.mcard.hot .mstripe{background:linear-gradient(90deg,var(--red),transparent)}
.mcard.arb .mstripe{background:linear-gradient(90deg,var(--green2),transparent)}
.mhead{padding:9px 13px 8px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--ln2);background:rgba(255,255,255,.02)}
.mleague{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--g3);text-transform:uppercase;letter-spacing:.09em;font-weight:700}
.mtime-b{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;background:var(--c3);border:1px solid var(--ln2);color:var(--w3)}
.mtime-b.live{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.25);color:var(--gold2);animation:pulse 2s infinite}
.mbody{padding:13px}
.mteams{display:grid;grid-template-columns:1fr 40px 1fr;align-items:center;gap:8px;margin-bottom:12px}
.mteam{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:.2px;text-transform:uppercase;line-height:1.2}
.mteam.h{text-align:right}
.mxg{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--g3);margin-top:2px}
.mvs{font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--g3);font-weight:700;text-align:center}
.modds{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}
.odd{background:var(--c2);border:1px solid var(--ln);border-radius:var(--r2);padding:8px 5px;text-align:center;transition:all .12s;cursor:pointer}
.odd:hover{background:var(--red3);border-color:rgba(220,38,38,.3)}
.odd.val{background:var(--red3);border-color:rgba(220,38,38,.3)}
.odd-l{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--g3);font-weight:700;text-transform:uppercase}
.odd-v{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;letter-spacing:.2px;margin-top:2px;font-variant-numeric:tabular-nums}
.odd.val .odd-v{color:var(--red2)}
.odd-e{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;color:var(--green2);margin-top:1px}
.mfoot{display:flex;align-items:center;justify-content:space-between;padding-top:9px;border-top:1px solid var(--ln2)}
.cbar-w{display:flex;align-items:center;gap:7px}
.cbar-t{width:55px;height:3px;background:var(--g4);border-radius:2px;overflow:hidden}
.cbar-f{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--red),var(--red2))}
.cbar-v{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;font-variant-numeric:tabular-nums}

/* SIGNAL CARDS */
.sig{background:var(--c1);border:1px solid var(--ln);border-radius:var(--r3);overflow:hidden;margin-bottom:9px;cursor:pointer;transition:all .15s}
.sig:hover{border-color:rgba(220,38,38,.3);transform:translateY(-1px);box-shadow:0 6px 24px rgba(0,0,0,.5)}
.sig.top{border-color:rgba(220,38,38,.2)}
.sig-bar{height:3px}
.sig-bd{padding:14px}
.sig-meta{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--g3);margin-bottom:7px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;text-transform:uppercase;letter-spacing:.08em}
.flag{display:inline-flex;align-items:center;justify-content:center;width:22px;height:14px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:7px;font-weight:700;flex-shrink:0}
.f-FR{background:#003189;color:#fff}
.f-ES{background:#c60b1e;color:#ffd700}
.f-ENG{background:#c8102e;color:#fff}
.f-IT{background:#009246;color:#fff}
.f-DE{background:#111;color:#ffcc00;border:1px solid #333}
.f-PT{background:#006600;color:#ff0}
.f-UCL{background:#001f6b;color:#c8a900}
.f-UEL{background:#e05300;color:#fff}
.sig-teams{font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--g2);margin-bottom:3px;text-transform:uppercase;letter-spacing:.2px}
.sig-bet{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;letter-spacing:.3px;margin-bottom:11px;line-height:1.2;text-transform:uppercase}
.sig-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:9px}
.sig-box{background:var(--c2);border-radius:var(--r);padding:8px 5px;text-align:center;border:1px solid var(--ln2)}
.sig-lbl{font-family:'JetBrains Mono',monospace;font-size:7px;color:var(--g3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
.sig-val{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;letter-spacing:.2px;font-variant-numeric:tabular-nums}
.pbar{height:3px;background:var(--g4);border-radius:2px;overflow:hidden}
.pfill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--red),var(--red2))}

/* RESULT */
.vrd{background:var(--c1);border:1px solid var(--lr);border-radius:var(--r3);padding:18px;margin-bottom:10px;box-shadow:var(--shr);position:relative;overflow:hidden}
.vrd::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--red),var(--gold),transparent)}
.vbet{font-family:'Barlow Condensed',sans-serif;font-size:clamp(18px,4vw,26px);font-weight:800;letter-spacing:.5px;text-transform:uppercase;line-height:1.2;margin-bottom:5px}
.vmeta{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--g3);margin-bottom:13px}
.prow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:9px}
.pb{background:var(--c2);border:1px solid var(--ln);border-radius:var(--r2);padding:11px 7px;text-align:center;transition:all .15s}
.pb.win{background:var(--red3);border-color:rgba(220,38,38,.3)}
.pp{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;letter-spacing:.3px;font-variant-numeric:tabular-nums;line-height:1}
.pb.win .pp{color:var(--red2)}
.pn{font-size:10px;color:var(--g3);font-weight:600;margin-top:3px}
.b3{height:4px;background:var(--g4);border-radius:2px;display:flex;overflow:hidden;margin-top:8px}
.b3h{background:var(--red)}.b3n{background:var(--g4)}.b3a{background:var(--gold)}
.crow{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.cl{font-size:10px;color:var(--g3);font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.cv{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:.3px}
.ctr{height:4px;background:var(--g4);border-radius:2px;overflow:hidden;margin-bottom:13px}
.cf{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--red),var(--red2))}
.edgb{display:flex;justify-content:space-between;align-items:center;padding:13px 15px;border-radius:var(--r2);margin-bottom:10px}
.edgb.pos{background:var(--green3);border:1px solid rgba(34,197,94,.2)}
.edgb.neg{background:rgba(220,38,38,.06);border:1px solid rgba(220,38,38,.18)}
.edgv{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:900;letter-spacing:.5px;font-variant-numeric:tabular-nums}
.edgb.pos .edgv{color:var(--green2)}.edgb.neg .edgv{color:var(--red2)}
.mkrow{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;border-radius:var(--r2);margin-bottom:4px}
.mkrow.pos{background:var(--red4);border:1px solid rgba(220,38,38,.15)}
.mkrow.safe{background:var(--green3);border:1px solid rgba(34,197,94,.15)}
.mkrow.neu{background:var(--c2);border:1px solid var(--ln2)}
.scgr{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.scb{background:var(--c2);border:1px solid var(--ln);border-radius:var(--r2);padding:10px 5px;text-align:center;transition:border-color .12s}

<script>
"use strict";
function pmf(l,k){if(l<=0)return k===0?1:0;if(k<0)return 0;if(k>20){var lp=-l+k*Math.log(l);for(var i=1;i<=k;i++)lp-=Math.log(i);return Math.max(0,Math.exp(lp));}var v=Math.exp(-l);for(var j=1;j<=k;j++)v*=l/j;return Math.max(0,v);}
function cdf(l,m){if(m<0)return 0;var s=0,t=Math.exp(-l);for(var k=0;k<=m;k++){s+=t;if(t<1e-10)break;t*=l/(k+1);}return Math.min(1,s);}
function tau(h,a,lH,lA,rho){var r=Math.max(-0.25,Math.min(-0.05,rho||-0.135));if(h===0&&a===0)return Math.max(0.001,1-lH*lA*r);if(h===1&&a===0)return Math.max(0.001,1+lA*r);if(h===0&&a===1)return Math.max(0.001,1+lH*r);if(h===1&&a===1)return Math.max(0.01,1-r);return 1;}
var RHO={"Ligue 1":-0.142,"Premier League":-0.118,"La Liga":-0.135,"Bundesliga":-0.128,"Serie A":-0.151,"Champions League":-0.132};
function kellyF(p,o){if(!o||o<=1||!p||p<=0||p>=1)return 0;var b=o-1,k=(b*p-(1-p))/b;if(k<=0)return 0;var e=p*o-1,fr=e>0.10?0.25:e>0.05?0.20:0.125;return Math.min(k*fr,0.05);}
function edgeF(p,o){return(!o||!p||o<=1||p<=0||p>=1)?null:p*o-1;}
function arbF(o1,oN,o2){if(!o1||!oN||!o2||o1<=1||oN<=1||o2<=1)return null;var imp=1/o1+1/oN+1/o2;return imp>=1?null:+((1/imp-1)*100).toFixed(2);}
function fmW(p5,p10){var r5=Math.min(15,p5||7)/15,r10=Math.min(30,p10||14)/30;return Math.max(0.72,Math.min(1.28,0.72+0.56*(r5*0.6+r10*0.4)));}
function calc(m){
  try{
    var lH=(m.hxg||1.35)*0.58+(m.hg||1.25)*0.28+((m.hsh||12)/24)*0.14;
    var lA=(m.axg||1.10)*0.58+(m.ag||1.00)*0.28+((m.ash||10)/24)*0.14;
    var hD=(m.hxga||1.1)*0.6+(1-(m.hcs||30)/100)*0.25+(m.hc||1.2)*0.15;
    var aD=(m.axga||1.3)*0.6+(1-(m.acs||22)/100)*0.25+(m.ac||1.4)*0.15;
    lH*=Math.pow(Math.max(0.4,aD)/1.2,0.38);lA*=Math.pow(Math.max(0.4,hD)/1.2,0.38);
    lH*=1.082;lH*=fmW(m.hf,m.hf10);lA*=fmW(m.af,m.af10);
    if(m.derby){lH*=0.91;lA*=0.91;}if(m.hfat)lH*=0.935;if(m.afat)lA*=0.935;
    lH=Math.max(0.22,Math.min(4.5,lH));lA=Math.max(0.15,Math.min(4.0,lA));
    var rho=RHO[m.c]||-0.135;
    var pH=0,pN=0,pA=0,sc=[],tot=0;
    for(var h=0;h<=9;h++)for(var a=0;a<=9;a++){var p=pmf(lH,h)*pmf(lA,a)*tau(h,a,lH,lA,rho);if(p<0)continue;tot+=p;sc.push({s:h+"-"+a,p:p});if(h>a)pH+=p;else if(h===a)pN+=p;else pA+=p;}
    if(tot>0){pH/=tot;pN/=tot;pA/=tot;}
    sc.sort(function(x,y){return y.p-x.p;});
    var bP=pH,bR="1";if(pN>bP){bP=pN;bR="N";}if(pA>bP){bP=pA;bR="2";}
    var bO=+(bR==="1"?m.o1:bR==="N"?m.on:m.o2)||0;
    var edg=edgeF(bP,bO),kel=kellyF(bP,bO);
    var mg=(m.o1&&m.on&&m.o2)?1/m.o1+1/m.on+1/m.o2:null;
    var safe=mg?(mg>1.3?"SUSPENDED":mg>1.15?"WARNING":"SAFE"):"OK";
    var conf=Math.min(97,Math.max(8,Math.round(bP*35+(edg>0?Math.min(edg*65,22):(edg?edg*15:0))+(safe==="SAFE"?4:safe==="WARNING"?-3:-8)+(m.derby?-12:0))));
    var label=bR==="1"?(m.h||"Dom")+" favori ("+((pH*100).toFixed(1))+"%)":bR==="2"?(m.a||"Ext")+" favori ("+((pA*100).toFixed(1))+"%)":"Equilibre - Nul probable ("+((pN*100).toFixed(1))+"%)";
    var btts=(1-pmf(lH,0))*(1-pmf(lA,0));
    var o25=1-cdf(lH+lA,2),o35=1-cdf(lH+lA,3),p15=1-cdf(lH+lA,1);
    return{lH:lH,lA:lA,pH:pH,pN:pN,pA:pA,sc:sc,bR:bR,bP:bP,bO:bO,edg:edg,kel:kel,conf:conf,label:label,safe:safe,btts:btts,o25:o25,o35:o35,p15:p15};
  }catch(err){console.error(err);return null;}
}
function buildBets(r,d){
  var o1=+d.o1||0,oN=+d.oN||0,o2=+d.o2||0,oO25=+d.oO25||0,oO35=+d.oO35||0,oBtts=+d.oBtts||0;
  var bets=[
    {id:"1",cat:"1X2",name:"Victoire "+(d.home||"Dom"),p:r.pH,o:o1},
    {id:"N",cat:"1X2",name:"Match nul",p:r.pN,o:oN},

    {id:"X2",cat:"DC",name:"Double Chance X2",p:r.pN+r.pA,o:0},
    {id:"O15",cat:"BUTS",name:"Over 1.5",p:r.p15,o:0},
    {id:"O25",cat:"BUTS",name:"Over 2.5",p:r.o25,o:oO25},
    {id:"O35",cat:"BUTS",name:"Over 3.5",p:r.o35,o:oO35},
    {id:"U25",cat:"BUTS",name:"Under 2.5",p:1-r.o25,o:0},
    {id:"BTTS",cat:"BTTS",name:"BTTS - Les deux marquent",p:r.btts,o:oBtts},
    {id:"NBTTS",cat:"BTTS",name:"BTTS Non",p:1-r.btts,o:0},
    {id:"CSH",cat:"CS",name:"Clean Sheet "+(d.home||"Dom"),p:pmf(r.lA,0),o:0},
    {id:"CSA",cat:"CS",name:"Clean Sheet "+(d.away||"Ext"),p:pmf(r.lH,0),o:0},
  ];
  bets.forEach(function(b){b.edg=b.o>1.01?edgeF(b.p,b.o):null;b.kel=b.o>1.01?kellyF(b.p,b.o):0;});
  var best=bets.filter(function(b){return b.o>1.01&&(b.edg||0)>0;}).sort(function(a,b){return(b.edg||0)-(a.edg||0);})[0]||bets.slice().sort(function(a,b){return b.p-a.p;})[0];
  var safe2=bets.filter(function(b){return b.p>0.65;}).sort(function(a,b){return b.p-a.p;})[0];
  var value=bets.filter(function(b){return(b.edg||0)>0.04;}).sort(function(a,b){return(b.edg||0)-(a.edg||0);})[0];
  return{allBets:bets,bestBet:best,safeBet:safe2,valueBet:value};
}

function pStats(){
  var hist=S.hist;
  var wons=hist.filter(function(h){return h.result==="WIN";});
  var losses=hist.filter(function(h){return h.result==="LOSS";});
  var tot=hist.length,wr=tot?Math.round(wons.length/tot*100):0;
  var totalM=hist.reduce(function(a,h){return a+(h.stake||0);},0);
  var totalP=hist.reduce(function(a,h){return a+(h.profit||0);},0);
  var roi=totalM>0?+((totalP/totalM)*100).toFixed(1):0;
  var avgClv=tot?+(hist.reduce(function(a,h){return a+(h.clv||0);},0)/tot*100).toFixed(1):0;
  var avgOdds=tot?+(hist.reduce(function(a,h){return a+(h.oddsT||2);},0)/tot).toFixed(2):0;
  var bestWin=wons.length?Math.max.apply(null,wons.map(function(h){return h.profit||0;})):0;

  var score=Math.min(100,Math.max(0,wr*0.4+(roi>0?Math.min(roi*2,30):0)+(avgClv>0?Math.min(avgClv*5,20):0)));
  var sLabel=score>=80?"ELITE":score>=60?"SHARP":score>=40?"CONFIRME":"DEBUTANT";

    +'<div style="font-size:12px;color:var(--g3);margin-bottom:16px;font-family:var(--fm)">'+tot+' paris enregistres</div>'

  else if(t==="result")h=pResult();

  else if(t==="risk")h=pRisk();
  else if(t==="bankroll")h=pBankroll();
  else if(t==="stats")h=pStats();
  else if(t==="methode")h=pMethode();
  pg.innerHTML=h;
  buildSide();updTop();updSide();
}
function render(){renderPage();}
fetchMatches();
</script>
