/* ============================================================
   EDGE — Intelligence Premium
   Direction : Sombre / Structuré / Précis
   Fond #0E0E0E  Vert #5DBF8A  Beige #F0E6D3
============================================================ */





@media(min-width:769px){}


body::after{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(0,229,160,.018) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,229,160,.018) 1px,transparent 1px);
  background-size:40px 40px;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;}

:root{
  --bg:#06080D;--s1:#0C0F18;--s2:#111520;--s3:#171C2A;--s4:#1D2333;--s5:#232A3D;
  --g:#00E5A0;--g2:#00C98C;--g3:#00A876;--gl:rgba(0,229,160,.10);--gg:rgba(0,229,160,.18);
  --red:#FF3B5C;--redl:rgba(255,59,92,.12);
  --amber:#C9A84C;
  --w1:#F0F4FF;--w2:#B8C0D8;--w3:#6B7494;--w4:#3A4060;
  --ln:rgba(0,229,160,.08);--ln2:rgba(0,229,160,.04);
  --r:6px;--r2:10px;--r3:16px;--r4:22px;--r5:28px;
  --f-titre:"Bebas Neue",sans-serif;
  --f-body:"Outfit",system-ui,sans-serif;
  --f-mono:"DM Mono","JetBrains Mono",monospace;
  --beige:#F0F4FF;--beige2:#B8C0D8;--beige3:#6B7494;--beige4:#3A4060;--beige5:rgba(240,244,255,.04);
  --blanc:#F0F4FF;--blanc2:#B8C0D8;--blanc3:#6B7494;--blanc4:#3A4060;--blanc5:rgba(240,244,255,.04);
  --noir:#06080D;--gris1:#0C0F18;--gris2:#111520;--gris3:#171C2A;--gris4:#3A4060;--gris5:rgba(240,244,255,.04);
  --vert:#00E5A0;--vert2:#00C98C;--vert3:rgba(0,229,160,.10);
  --jaune:#00E5A0;--jaune2:#00C98C;--jaune3:rgba(0,229,160,.10);--jaune-glow:rgba(0,229,160,.18);
  --bleu:#00E5A0;--bleu2:#00C98C;--bleu3:#00A876;--bleu-soft:rgba(0,229,160,.10);--bleu-glow:rgba(0,229,160,.18);--ln-bleu:rgba(0,229,160,.2);
  --turq:#00E5A0;--turq2:#00C98C;--cyan:#00E5A0;--cyan2:#00C98C;--cyan3:#00A876;
  --violet:#00E5A0;--violet2:#00C98C;--violet3:#00A876;--violet4:#00A876;
  --rose:#FF3B5C;--rose2:#FF6B82;
  --ind:#00E5A0;--ind2:#00C98C;--ind3:#00A876;--ind-dim:rgba(0,229,160,.10);--ind-glow:rgba(0,229,160,.18);--ln-ind:rgba(0,229,160,.2);
  --sang:#FF3B5C;--sang2:#FF3B5C;--sang3:#FF6B82;--sang-dim:rgba(255,59,92,.12);
  --bord:#FF3B5C;--bord2:#FF3B5C;--bord3:#FF3B5C;--bord-d:rgba(255,59,92,.12);
  --rouge:#FF3B5C;--rouge2:rgba(255,59,92,.12);
  --or:#C9A84C;--or2:#D4B86A;--or3:#E0CB8A;--od:rgba(201,168,76,.12);--og:rgba(201,168,76,.20);
  --foret:#0C0F18;--foret2:#111520;--foret3:#171C2A;--foret4:#00E5A0;--foret-l:rgba(6,8,13,.92);
  --vd:rgba(0,229,160,.10);--vg:rgba(0,229,160,.18);--vl:rgba(0,229,160,.18);
  --sh:0 4px 32px rgba(0,0,0,.6);--sh-bleu:0 0 24px rgba(0,229,160,.2);--sh-noir:0 4px 32px rgba(0,0,0,.7);
  --c1:#0C0F18;--c2:#111520;--c3:#171C2A;--c4:#1D2333;--c5:#232A3D;
}


/* === LAYOUT PROPRE === */
#sidebar{
  width:240px;
  position:fixed;
  top:0;left:0;
  height:100vh;
  z-index:300;
  display:flex;
  flex-direction:column;
  background:#0C0F18;
  border-right:1px solid rgba(0,229,160,.1);
  transform:translateX(-240px);
  transition:transform .25s cubic-bezier(.4,0,.2,1);
}
#sidebar.open{
  transform:translateX(0);
}
#main{
  flex:1;
  min-height:100vh;
  overflow-x:hidden;
}
@media(min-width:769px){
  
  #main{margin-left:240px;}
  .ham{display:none!important;}
}
@media(max-width:768px){
  
  .ham{display:flex!important;}
  #main{margin-left:0!important;}
}

html,body{background:#06080D;color:#F0F4FF;font-family:"Outfit",system-ui,sans-serif;font-size:14px;overflow-x:hidden;}
button{font-family:var(--f-body);cursor:pointer;color:inherit;}
input,select,textarea{font-family:var(--f-mono);font-size:13px;background:#0C0F18;border:1px solid rgba(0,229,160,.1);border-radius:8px;color:#F0F4FF;padding:11px 13px;width:100%;outline:none;transition:all .2s;}
input:focus,select:focus{border-color:var(--g);box-shadow:0 0 0 3px var(--gl);}
input::placeholder{color:#666666;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:rgba(93,191,138,.5);border-radius:3px;}

#particles{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.25;}

/* ===== LAYOUT ===== */
#app{display:flex;min-height:100vh;background:#06080D;position:relative;z-index:1;}



.ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:299;cursor:pointer;}
.ovl.show{display:block!important;}
.ham{display:none;flex-direction:column;gap:5px;padding:10px;border-radius:8px;border:1.5px solid rgba(0,229,160,.3);background:rgba(0,229,160,.08);cursor:pointer;}
.ham span{width:20px;height:2px;background:#00E5A0;border-radius:2px;display:block;transition:all .2s;}

@media(min-width:769px){}
@media(max-width:768px){
  
  .mc-body{padding:11px 12px;}
  .mc-odds{gap:4px;}
  .mc-odd-v{font-size:15px;}

  
  
  .ham{display:none;flex-direction:column;gap:5px;padding:10px;border-radius:8px;border:1.5px solid rgba(0,229,160,.3);background:rgba(0,229,160,.08);cursor:pointer;}
}

/* ===== SIDEBAR ===== */
.sb-brand{padding:20px 16px 14px;border-bottom:1px solid rgba(255,255,255,.15);}
.sb-logo-wrap{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
.sb-logo-icon{
  width:34px;height:34px;border-radius:var(--r);flex-shrink:0;
  background:var(--g);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--f-titre);font-size:20px;color:var(--bg);letter-spacing:.05em;
}
.sb-logo-txt{font-family:var(--f-titre);font-size:28px;color:#FFFFFF;letter-spacing:.08em;line-height:1;}
.sb-logo-txt span{color:var(--g);}
.sb-tag{font-family:var(--f-mono);font-size:7px;color:#666666;letter-spacing:.2em;text-transform:uppercase;margin-bottom:12px;}
.sb-kpi-strip{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--ln);}
.sb-kpi{background:#1C2130;padding:10px 14px;}
.sb-kpi-v{font-family:var(--f-titre);font-size:22px;color:var(--g);font-variant-numeric:tabular-nums;line-height:1;letter-spacing:.05em;}
.sb-kpi-l{font-family:var(--f-mono);font-size:7px;color:#666666;text-transform:uppercase;letter-spacing:.12em;margin-top:2px;}

.sb-nav{flex:1;padding:8px;overflow-y:auto;}
.sb-sec{font-family:var(--f-mono);font-size:7px;color:#666666;padding:0 8px;margin:14px 0 4px;letter-spacing:.2em;text-transform:uppercase;}
.nb{
  display:flex;align-items:center;gap:9px;width:100%;padding:9px 10px;
  border:none;background:transparent;color:#666666;
  border-radius:var(--r);font-size:13px;font-weight:400;text-align:left;
  transition:all .15s;cursor:pointer;font-family:var(--f-body);position:relative;
}
.nb:hover{background:var(--beige5);color:#E8E8E8;}
.nb.on{background:var(--gl);color:#FFFFFF;font-weight:600;}
.nb.on::before{
  content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:2px;height:55%;background:var(--g);border-radius:0 2px 2px 0;
}
.nb-ic{width:26px;height:26px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;background:rgba(240,230,211,.05);}
.nb.on .nb-ic{background:var(--gl);color:var(--g);}
.nbadge{margin-left:auto;font-size:8px;padding:2px 7px;border-radius:100px;font-weight:700;font-family:var(--f-mono);background:var(--gl);color:var(--g);border:1px solid rgba(93,191,138,.25);}
.nbadge.live{background:var(--redl);color:var(--red);border-color:rgba(224,85,85,.25);animation:pulse 2s infinite;}
.nbadge.ok{background:var(--gl);color:var(--g);}

.sb-bk{padding:12px;border-top:1px solid rgba(255,255,255,.15);}
.bkcard{
  padding:13px 14px;background:#222838;
  border:1px solid rgba(255,255,255,.18);border-radius:var(--r2);
  cursor:pointer;transition:all .2s;position:relative;overflow:hidden;
}
.bkcard::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--g),transparent);}
.bkcard:hover{border-color:rgba(93,191,138,.25);}
.bk-l{font-family:var(--f-mono);font-size:7px;color:#666666;text-transform:uppercase;letter-spacing:.14em;margin-bottom:4px;}
.bk-v{font-family:var(--f-titre);font-size:24px;color:var(--g);font-variant-numeric:tabular-nums;letter-spacing:.05em;}
.bk-s{font-family:var(--f-mono);font-size:9px;color:#666666;margin-top:4px;}

/* ===== TOPBAR ===== */
#topbar{height:52px;background:rgba(6,8,13,.96);border-bottom:1px solid rgba(0,229,160,.08);padding:0 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:90;backdrop-filter:blur(16px);}
.ptitle{font-family:var(--f-titre);font-size:18px;color:#FFFFFF;letter-spacing:.1em;}
.tb-r{margin-left:auto;display:flex;align-items:center;gap:8px;}
.tbtn{
  padding:6px 14px;background:transparent;
  border:1px solid rgba(255,255,255,.18);border-radius:var(--r2);
  color:#666666;font-size:12px;font-weight:500;cursor:pointer;
  transition:all .15s;white-space:nowrap;font-family:var(--f-body);
}
.tbtn:hover{border-color:var(--g);color:var(--g);}
.tbtn.ok{border-color:rgba(93,191,138,.3);color:var(--g);background:var(--gl);}
.livepill{
  display:flex;align-items:center;gap:5px;padding:5px 11px;
  background:var(--redl);border:1px solid rgba(224,85,85,.2);
  border-radius:100px;font-size:10px;color:var(--red);font-family:var(--f-mono);font-weight:700;
}
.livedot{width:5px;height:5px;border-radius:50%;background:var(--red);animation:pulse 1.4s infinite;flex-shrink:0;}

/* ===== PAGE ===== */
#page{padding:14px;min-height:calc(100vh - 52px);background:transparent;color:#F0F4FF;position:relative;z-index:1;}

/* ===== HERO — la pièce maîtresse ===== */
.hero{
  border-radius:var(--r4);overflow:hidden;margin-bottom:16px;
  position:relative;background:#1C2130;
  border:1px solid rgba(255,255,255,.18);
}
.hero-top{
  padding:32px 22px 26px;position:relative;overflow:hidden;background:#1C2130;
}
/* Grand numéro décoratif en fond */
.hero-top::before-DISABLED{
  content:'EDGE';
  position:absolute;right:-10px;top:50%;transform:translateY(-50%);
  font-family:var(--f-titre);font-size:160px;color:rgba(240,230,211,.025);
  letter-spacing:.1em;pointer-events:none;line-height:1;white-space:nowrap;
}
/* Ligne verte décorative gauche */
.hero-top::after{
  content:'';position:absolute;left:0;top:0;bottom:0;
  width:3px;background:linear-gradient(180deg,var(--g),transparent);
}
.hero-grid{
  position:absolute;inset:0;opacity:.025;
  background-image:linear-gradient(rgba(240,230,211,.5) 1px,transparent 1px),
    linear-gradient(90deg,rgba(240,230,211,.5) 1px,transparent 1px);
  background-size:40px 40px;
}
.hero-content{position:relative;z-index:2;}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:7px;
  background:var(--gl);border:1px solid rgba(93,191,138,.2);
  border-radius:4px;padding:4px 11px;margin-bottom:16px;
}
.hero-dot{width:5px;height:5px;border-radius:50%;background:var(--g);animation:pulse 2s infinite;flex-shrink:0;}
.hero-eyebrow-txt{font-family:var(--f-mono);font-size:8px;color:#00E5A0;letter-spacing:.2em;text-transform:uppercase;}
.hero-title{font-family:var(--f-titre);font-size:clamp(52px,12vw,74px);color:#F0F4FF;line-height:.84;letter-spacing:.06em;margin-bottom:16px;}
.hero-title span{
  color:var(--g);
  display:block;
}
.hero-sub{
  font-size:12px;color:#AAAAAA;
  line-height:1.8;max-width:280px;margin-bottom:22px;
  font-style:italic;
}
.hero-btns{display:flex;gap:8px;}
.hbtn-p{
  flex:1;height:46px;background:var(--g);border:none;border-radius:var(--r2);
  font-family:var(--f-titre);font-size:17px;color:var(--bg);
  cursor:pointer;transition:all .2s;letter-spacing:.08em;
}
.hbtn-p:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(93,191,138,.35);}
.hbtn-s{
  height:46px;padding:0 20px;background:transparent;
  border:1px solid rgba(255,255,255,.18);border-radius:var(--r2);
  font-family:var(--f-titre);font-size:16px;color:#AAAAAA;
  cursor:pointer;transition:all .15s;white-space:nowrap;letter-spacing:.06em;
}
.hbtn-s:hover{border-color:#AAAAAA;color:#FFFFFF;}
.hero-stats{
  display:grid;grid-template-columns:repeat(4,1fr);
  border-top:1px solid rgba(255,255,255,.15);
}
.hstat{
  padding:16px 10px;text-align:center;
  border-right:1px solid rgba(255,255,255,.15);
  cursor:pointer;transition:background .15s;
}
.hstat:last-child{border-right:none;}
.hstat:hover{background:var(--beige5);}
.hstat-v{
  font-family:var(--f-titre);font-size:28px;
  color:#FFFFFF;line-height:1;
  font-variant-numeric:tabular-nums;letter-spacing:.04em;
}
.hstat-l{font-family:var(--f-mono);font-size:7px;color:#666666;text-transform:uppercase;letter-spacing:.12em;margin-top:4px;}

/* ===== SECTION HEADERS ===== */
.sec-hd,.row-hd{display:flex;align-items:center;justify-content:space-between;margin:20px 0 10px;}
.sec-title,.row-title{
  font-family:var(--f-titre);font-size:14px;
  color:#FFFFFF;letter-spacing:.1em;text-transform:uppercase;
  display:flex;align-items:center;gap:10px;
}
.sec-title::before,.row-title::before{
  content:'';width:3px;height:20px;background:var(--g);border-radius:1px;flex-shrink:0;
}
.sec-more,.row-more{
  font-family:var(--f-mono);font-size:9px;color:var(--g);
  background:none;border:none;cursor:pointer;font-weight:700;letter-spacing:.08em;
}

/* ===== STATUS ===== */
.status-live{display:flex;align-items:center;gap:8px;padding:9px 13px;background:var(--gl);border:1px solid rgba(93,191,138,.2);border-radius:var(--r2);margin-bottom:12px;font-family:var(--f-mono);font-size:10px;color:var(--g);}
.status-demo{display:flex;align-items:center;gap:8px;padding:9px 13px;background:rgba(212,149,74,.08);border:1px solid rgba(212,149,74,.15);border-radius:var(--r2);margin-bottom:12px;font-family:var(--f-mono);font-size:10px;color:var(--amber);}

/* ===== MATCH CARDS ===== */
.mc{background:#0C0F18;border:1px solid rgba(0,229,160,.07);border-radius:14px;overflow:hidden;cursor:pointer;transition:transform .18s cubic-bezier(.16,1,.3,1),box-shadow .18s,border-color .15s;margin-bottom:8px;min-width:0;width:100%;box-sizing:border-box;will-change:transform;}
.mc:hover{transform:translateY(-3px);box-shadow:0 14px 44px rgba(0,0,0,.65),0 0 0 1px rgba(0,229,160,.28),0 0 22px rgba(0,229,160,.07);border-color:rgba(0,229,160,.32);}
.mc.val{border-color:rgba(93,191,138,.35);}
.mc.live-m{border-color:rgba(224,85,85,.3);}
.mc-stripe,.mc-top{height:2px;}
.mc-stripe.val,.mc-top.val{background:linear-gradient(90deg,var(--g),transparent);}
.mc-stripe.live-m,.mc-top.live-m{background:linear-gradient(90deg,var(--red),transparent);}
.mc-stripe.norm,.mc-top.norm{background:#2A3040;}
.mc-body{padding:12px 13px;}
.mc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.mc-league{font-family:var(--f-mono);font-size:8px;color:#AAAAAA;display:flex;align-items:center;gap:5px;}
.mc-time{font-family:var(--f-mono);font-size:10px;font-weight:700;color:#FFFFFF;}
.mc-teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;margin-bottom:11px;min-width:0;}
.mc-team-h{font-family:var(--f-titre);font-size:15px;color:#FFFFFF;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.04em;}
.mc-team-a{font-family:var(--f-titre);font-size:15px;color:#E8E8E8;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.04em;}
.mc-vs{font-family:var(--f-mono);font-size:9px;color:#666666;text-align:center;flex-shrink:0;}
.mc-odds{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;width:100%;min-width:0;}
.mc-odd{background:#222838;border:1px solid rgba(255,255,255,.08);border-radius:var(--r);padding:8px 4px;text-align:center;transition:all .13s;cursor:pointer;}
.mc-odd:hover{border-color:var(--g);}
.mc-odd.best{background:var(--gl);border-color:rgba(93,191,138,.3);}
.mc-odd-l{font-family:var(--f-mono);font-size:7px;color:#666666;margin-bottom:2px;}
.mc-odd-v{font-family:var(--f-titre);font-size:17px;color:#FFFFFF;font-variant-numeric:tabular-nums;letter-spacing:.04em;}
.mc-odd.best .mc-odd-v{color:var(--g);}
.mc-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:8px;border-top:1px solid var(--ln2);}
.mc-conf{font-family:var(--f-mono);font-size:9px;font-weight:700;color:#AAAAAA;display:flex;align-items:center;gap:5px;}
.mc-conf-bar{height:2px;width:40px;background:#2A3040;border-radius:1px;overflow:hidden;}
.mc-conf-fill{height:100%;border-radius:1px;background:linear-gradient(90deg,var(--red),var(--g));}
.mc-time-badge{font-family:var(--f-mono);font-size:9px;color:#666666;padding:3px 8px;background:#222838;border-radius:4px;border:1px solid rgba(255,255,255,.08);}
.mc-time-badge.live{background:var(--redl);color:var(--red);border-color:rgba(224,85,85,.2);animation:pulse 2s infinite;}
.mc-val-badge{font-family:var(--f-mono);font-size:8px;font-weight:700;padding:3px 8px;border-radius:4px;background:var(--gl);color:var(--g);border:1px solid rgba(93,191,138,.25);}
.mc-analyse-btn{padding:6px 12px;background:#2A3040;border:1px solid rgba(255,255,255,.18);border-radius:var(--r);font-family:var(--f-body);font-size:11px;font-weight:600;color:#E8E8E8;cursor:pointer;transition:all .15s;}
.mc-analyse-btn:hover{background:var(--g);color:var(--bg);border-color:var(--g);}
.mc-val-tag{margin-top:6px;display:flex;align-items:center;gap:5px;font-family:var(--f-mono);font-size:8px;color:var(--g);}

/* ===== SIGNAL CARDS ===== */
.sig-card,.sig{background:#0C0F18;border:1px solid rgba(0,229,160,.07);border-radius:14px;overflow:hidden;cursor:pointer;margin-bottom:9px;transition:transform .18s cubic-bezier(.16,1,.3,1),box-shadow .18s,border-color .15s;}
.sig-card:hover,.sig:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.45);border-color:rgba(93,191,138,.3);}
.sig-card.top,.sig.top{border-color:rgba(93,191,138,.3);}
.sc-stripe,.sig-glow{height:2px;}
.sc-stripe.val,.sig-glow{background:linear-gradient(90deg,var(--g),transparent);}
.sc-stripe.live{background:linear-gradient(90deg,var(--red),transparent);}
.sc-stripe.norm{background:#2A3040;}
.sc-body,.sig-bd{padding:14px 16px;}
.sc-meta,.sig-meta{display:flex;align-items:center;gap:7px;margin-bottom:9px;flex-wrap:wrap;}
.sc-league{font-family:var(--f-mono);font-size:8px;color:#666666;}
.sc-time{font-family:var(--f-mono);font-size:8px;color:#666666;}
.sc-teams,.sig-teams{font-family:var(--f-titre);font-size:20px;color:#FFFFFF;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.04em;}
.sc-prono,.sig-bet{font-size:12px;color:#AAAAAA;margin-bottom:12px;font-style:italic;}
.sc-nums,.sig-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.sc-num,.sig-stat{background:#222838;border:1px solid rgba(255,255,255,.08);border-radius:var(--r2);padding:10px 5px;text-align:center;}
.sc-num.hl{background:var(--gl);border-color:rgba(93,191,138,.25);}
.sc-num-l,.sig-stat-l{font-family:var(--f-mono);font-size:7px;color:#AAAAAA;text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px;}
.sc-num-v,.sig-stat-v{font-family:var(--f-titre);font-size:20px;color:#FFFFFF;font-variant-numeric:tabular-nums;letter-spacing:.04em;}
.sc-num.hl .sc-num-v{color:var(--g);}
.sc-bar{height:2px;background:#2A3040;border-radius:1px;overflow:hidden;}
.sc-bar-f{height:100%;border-radius:1px;background:linear-gradient(90deg,var(--red),var(--g));}

/* ===== LEAGUE ROWS ===== */
.lg-row{margin-bottom:10px;}
.lg-head,.lghd{display:flex;align-items:center;gap:8px;padding:11px 13px;background:#1C2130;border:1px solid rgba(255,255,255,.18);border-radius:var(--r2);cursor:pointer;transition:all .15s;margin-bottom:6px;}
.lg-head:hover,.lghd:hover{background:#222838;border-color:rgba(93,191,138,.25);}
.lg-nm,.lgn{font-family:var(--f-titre);font-size:14px;color:#FFFFFF;letter-spacing:.06em;}
.lg-cnt,.lgc{font-family:var(--f-mono);font-size:8px;color:#666666;padding:3px 8px;background:#222838;border-radius:4px;border:1px solid rgba(255,255,255,.08);}
.lg-arr,.lga{margin-left:auto;font-size:10px;color:#666666;transition:transform .2s;display:inline-block;}
.lg-arr.open,.lga.open{transform:rotate(180deg);}
.match-grid{display:flex;flex-direction:column;}

/* ===== SHORTCUTS ===== */
.sc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.sc-item{background:#0C0F18;border:1px solid rgba(0,229,160,.07);border-radius:12px;padding:14px;cursor:pointer;transition:all .18s cubic-bezier(.16,1,.3,1);display:flex;align-items:center;gap:12px;}
.sc-item:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.35);border-color:rgba(93,191,138,.25);}
.sc-ic{width:40px;height:40px;border-radius:var(--r2);display:flex;align-items:center;justify-content:center;font-family:var(--f-titre);font-size:17px;flex-shrink:0;color:var(--bg);letter-spacing:.05em;}
.sc-nm{font-family:var(--f-titre);font-size:15px;color:#FFFFFF;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.05em;}
.sc-sb{font-family:var(--f-mono);font-size:8px;color:#666666;margin-top:2px;}

/* ===== BUTTONS ===== */
.cbtn{width:100%;height:46px;background:#00E5A0;border:none;border-radius:8px;font-family:var(--f-titre);font-size:18px;color:#06080D;letter-spacing:.1em;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:all .18s cubic-bezier(.16,1,.3,1);}
.cbtn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px rgba(93,191,138,.3);}
.cbtn:disabled{background:#2A3040;color:#666666;cursor:not-allowed;}
.cbtn.turq,.cbtn.rose,.cbtn.gold{background:var(--g);}
.cbtn.vert{background:var(--g);}
.abtn{padding:7px 14px;border-radius:var(--r);font-size:11px;font-weight:500;border:1px solid rgba(255,255,255,.18);color:#AAAAAA;background:transparent;cursor:pointer;transition:all .13s;font-family:var(--f-body);}
.abtn:hover{border-color:var(--g);color:var(--g);}
.btn-primary{flex:1;height:46px;border:none;border-radius:var(--r2);cursor:pointer;background:var(--g);font-family:var(--f-titre);font-size:17px;color:var(--bg);letter-spacing:.08em;box-shadow:0 4px 16px rgba(93,191,138,.25);transition:all .2s;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(93,191,138,.35);}
.btn-sec{height:46px;padding:0 18px;border-radius:var(--r2);cursor:pointer;background:#222838;border:1px solid rgba(255,255,255,.18);font-family:var(--f-titre);font-size:16px;color:#E8E8E8;white-space:nowrap;transition:all .15s;letter-spacing:.06em;}

/* ===== FILTERS ===== */
.fils{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;-webkit-overflow-scrolling:touch;}
.fib{padding:7px 15px;border-radius:100px;font-size:12px;font-weight:500;border:1px solid rgba(255,255,255,.18);background:transparent;color:#666666;white-space:nowrap;flex-shrink:0;cursor:pointer;transition:all .15s;font-family:var(--f-body);}
.fib:hover{border-color:#AAAAAA;color:#E8E8E8;}
.fib.on{background:var(--g);border-color:var(--g);color:var(--bg);font-weight:700;}

/* ===== TAGS ===== */
.badge,.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:8px;font-weight:700;font-family:var(--f-mono);}

.tt{background:var(--gl);color:var(--g);border:1px solid rgba(93,191,138,.2);}

/* ===== FLAGS ===== */
.flag{display:inline-flex;align-items:center;justify-content:center;width:22px;height:14px;border-radius:3px;font-family:var(--f-mono);font-size:7px;font-weight:700;flex-shrink:0;}
.f-FR{background:#002395;color:#fff}.f-ES{background:#aa151b;color:#f1bf00}
.f-ENG{background:#CF142B;color:#fff}.f-IT{background:#009246;color:#fff}
.f-DE{background:#1a1a1a;color:#FFCD00;border:1px solid #333}.f-PT{background:#006600;color:#ff0}
.f-UCL{background:#071d5e;color:#c8a900}.f-UEL{background:#d45500;color:#fff}
.f-NL{background:#ae1c28;color:#fff}.f-BE{background:#1a1a1a;color:#fdda24}
.f-TR{background:#e30a17;color:#fff}.f-SCO{background:#003087;color:#fff}
.f-GR{background:#0d5eaf;color:#fff}.f-USA{background:#3c3b6e;color:#fff}
.f-BRA{background:#009c3b;color:#ffdf00}.f-ARG{background:#74acdf;color:#fff}
.f-MEX{background:#006847;color:#fff}.f-INT{background:#2A3040;color:#666666;}

.edgb{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-radius:var(--r2);margin-bottom:12px;}

.scv{font-family:var(--f-titre);font-size:20px;font-variant-numeric:tabular-nums;color:#FFFFFF;letter-spacing:.04em;}

.b3{height:3px;background:#2A3040;border-radius:1px;display:flex;overflow:hidden;margin-top:9px;}

.mkrow{display:flex;justify-content:space-between;align-items:center;padding:10px 13px;border-radius:var(--r2);margin-bottom:5px;}

.vrd{background:#1C2130;border:1px solid rgba(255,255,255,.18);border-radius:var(--r4);padding:22px;margin-bottom:12px;position:relative;overflow:hidden;}

.tipcard{background:#1C2130;border:1px solid rgba(255,255,255,.18);border-radius:var(--r3);overflow:hidden;margin-bottom:10px;cursor:pointer;transition:all .2s;}

.tipmv{font-family:var(--f-titre);font-size:16px;color:#FFFFFF;font-variant-numeric:tabular-nums;letter-spacing:.04em;}

.mbox::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--g),transparent);}

.mbtns{display:flex;gap:9px;margin-top:14px;}
.mbtn{flex:1;padding:12px;border-radius:var(--r2);font-size:13px;font-weight:600;border:1px solid;cursor:pointer;transition:all .14s;font-family:var(--f-body);}
.mbtn.blue,.mbtn.rose{background:var(--gl);border-color:rgba(93,191,138,.25);color:var(--g);}

.bartop{display:flex;justify-content:space-between;font-size:11px;margin-bottom:5px;font-weight:500;color:#E8E8E8;}
.pinb{font-size:8px;color:var(--g);background:var(--gl);border-radius:3px;padding:1px 6px;margin-left:4px;font-weight:700;border:1px solid rgba(93,191,138,.2);}
.ctr{height:4px;background:#2A3040;border-radius:2px;overflow:hidden;margin-bottom:14px;}
.cf{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--red),var(--g));}
.crow{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.cl{font-size:10px;color:#666666;font-weight:600;text-transform:uppercase;letter-spacing:.09em;}
.cv{font-family:var(--f-titre);font-size:16px;color:#FFFFFF;letter-spacing:.04em;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes fu{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes ldot{0%,80%,100%{transform:scale(0);opacity:.3}40%{transform:scale(1);opacity:1}}
@keyframes scan{0%{left:-60%}100%{left:110%}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:none}}
@keyframes scaleIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes borderPulse{0%,100%{box-shadow:0 0 0 0 rgba(93,191,138,.3)}50%{box-shadow:0 0 0 4px rgba(93,191,138,.0)}}
@keyframes cffall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* ===== HERO ENHANCEMENTS ===== */
.hero-glow1{
  position:absolute;width:400px;height:400px;border-radius:50%;
  background:radial-gradient(circle,rgba(93,191,138,.20) 0%,transparent 65%);
  top:-120px;right:-100px;pointer-events:none;

"use strict";
function pmf(l,k){if(l<=0)return k===0?1:0;if(k<0)return 0;if(k>20){var lp=-l+k*Math.log(l);for(var i=1;i<=k;i++)lp-=Math.log(i);return Math.max(0,Math.exp(lp));}var v=Math.exp(-l);for(var j=1;j<=k;j++)v*=l/j;return Math.max(0,v);}
function cdf(l,m){if(m<0)return 0;var s=0,t=Math.exp(-l);for(var k=0;k<=m;k++){s+=t;if(t<1e-10)break;t*=l/(k+1);}return Math.min(1,s);}
function tau(h,a,lH,lA,rho){var r=Math.max(-0.25,Math.min(-0.05,rho||-0.135));if(h===0&&a===0)return Math.max(0.001,1-lH*lA*r);if(h===1&&a===0)return Math.max(0.001,1+lA*r);if(h===0&&a===1)return Math.max(0.001,1+lH*r);if(h===1&&a===1)return Math.max(0.01,1-r);return 1;}
var RHO={"Ligue 1":-0.142,"Premier League":-0.118,"La Liga":-0.135,"Bundesliga":-0.128,"Serie A":-0.151,"Champions League":-0.132};

function kellyF(p,o){
  if(!o||o<=1||!p||p<=0||p>=1)return 0;
  // Cote minimum 1.25
  if(o<1.25)return 0;
  var b=o-1,k=(b*p-(1-p))/b;
  if(k<=0)return 0;
  var e=p*o-1;
  if(e<0.03)return 0; // Edge minimum 3%
  var fr=e>0.10?0.25:e>0.05?0.20:0.15;
  return Math.min(k*fr,0.04);
}
function edgeF(p,o){
  if(!o||!p||o<1.25||p<=0||p>=1)return null;
  var e=p*o-1;
  return e<0.03?null:e; // Edge minimum 3%
}
function arbF(o1,oN,o2){if(!o1||!oN||!o2||o1<=1||oN<=1||o2<=1)return null;var imp=1/o1+1/oN+1/o2;return imp>=1?null:+((1/imp-1)*100).toFixed(2);}
function fmW(p5,p10){var r5=Math.min(15,p5||7)/15,r10=Math.min(30,p10||14)/30;return Math.max(0.72,Math.min(1.28,0.72+0.56*(r5*0.6+r10*0.4)));}

function calc(m){
  try{
    var sf=function(v,fb){var n=parseFloat(v);return(isNaN(n)||n<=0)?fb:n;};
    var o1=sf(m.o1,0),oN=sf(m.on||m.oN,0),o2=sf(m.o2,0);
    var hasOdds=o1>1.01&&oN>1.01&&o2>1.01;
    var hasStats=sf(m.hxg,0)>0.1&&sf(m.axg,0)>0.1;
    var hasPinnacle=!!(m.bk&&(m.bk||[]).find(function(b){return b.n==="Pinnacle"&&b.o1>1;}));
    var dataQ=hasPinnacle?3:hasStats?2:hasOdds?1:0;
    if(!hasOdds&&!hasStats)return null;

    // === STEP 1: Lambda de base depuis stats ===
    var lH,lA;
    if(hasStats){
      var hxg=sf(m.hxg,1.3),axg=sf(m.axg,1.0);
      var hg=sf(m.hg,hxg),ag=sf(m.ag,axg);
      var hxga=sf(m.hxga,1.1),axga=sf(m.axga,1.3);
      var hf=sf(m.hf,8),af=sf(m.af,6);
      lH=hxg*0.62+hg*0.28+sf(m.hsh,12)/28*0.10;
      lA=axg*0.62+ag*0.28+sf(m.ash,10)/28*0.10;
      var hDef=hxga*0.65+(1-sf(m.hcs,28)/100)*0.35;
      var aDef=axga*0.65+(1-sf(m.acs,22)/100)*0.35;
      lH*=Math.pow(Math.max(0.35,aDef)/1.2,0.35);
      lA*=Math.pow(Math.max(0.30,hDef)/1.2,0.35);
      lH*=1.075;
      lH*=Math.max(0.82,Math.min(1.18,0.82+0.36*(Math.min(hf,15)/15)));
      lA*=Math.max(0.82,Math.min(1.18,0.82+0.36*(Math.min(af,15)/15)));
    }

    // === STEP 2: Probas marche ===
    var mp1,mpN,mp2;
    if(hasOdds){
      var mg=1/o1+1/oN+1/o2;
      mp1=(1/o1)/mg;mpN=(1/oN)/mg;mp2=(1/o2)/mg;
      if(!hasStats){
        lH=Math.max(0.3,Math.min(3.5,-Math.log(Math.max(0.005,1-mp1))*1.20));
        lA=Math.max(0.2,Math.min(3.0,-Math.log(Math.max(0.005,1-mp2))*1.20));
      }
    }

    // =========================================================
    // === STEP 3: FACTEURS CONTEXTUELS (la vraie intelligence) ===
    // =========================================================

    var ctxLog=[];  // Journal des ajustements pour l'affichage

    // --- 3A: ENJEU DU MATCH ---
    // stakeLevel: 0=match sans enjeu, 1=normal, 2=important, 3=decisif
    var stake=sf(m.stakeLevel,1);
    if(stake===0){
      // Match sans enjeu: equipes tournent, moins de buts "vrais"
      lH*=0.88;lA*=0.88;
      ctxLog.push("Match sans enjeu (-12% buts)");
    }else if(stake===3){
      // Match decisif: pression, jeu plus prudent, moins d'erreurs
      lH*=0.93;lA*=0.93;
      ctxLog.push("Match decisif (-7% buts, plus prudent)");
    }

    // --- 3B: ROTATION / ALIGNEMENT ---
    // rotationH/rotationA: 0=full force, 1=rotation legere, 2=rotation massive
    var rotH=sf(m.rotationH,0),rotA=sf(m.rotationA,0);
    if(rotH===2){lH*=0.78;ctxLog.push("Rotation massive DOM (-22%)");} 
    else if(rotH===1){lH*=0.90;ctxLog.push("Rotation legere DOM (-10%)");}
    if(rotA===2){lA*=0.78;ctxLog.push("Rotation massive EXT (-22%)");}
    else if(rotA===1){lA*=0.90;ctxLog.push("Rotation legere EXT (-10%)");}

    // --- 3C: BLESSURES CLES ---
    // keyPlayerOut: score 0-10 (0=personne, 10=Mbappe/Haaland absent)
    var injH=Math.min(10,sf(m.keyPlayerOut,0));
    var injA=Math.min(10,sf(m.keyPlayerOutA,0));
    if(injH>0){var injMult=1-injH*0.022;lH*=Math.max(0.65,injMult);ctxLog.push("Blessure cle DOM (impact "+injH+"/10)");}
    if(injA>0){var injMultA=1-injA*0.022;lA*=Math.max(0.65,injMultA);ctxLog.push("Blessure cle EXT (impact "+injA+"/10)");}

    // --- 3D: MOTIVATION / MORAL ---
    // motivH/motivA: -2 (demo) a +2 (tres motive) - 0=normal
    var motivH=Math.max(-2,Math.min(2,sf(m.motivH,0)));
    var motivA=Math.max(-2,Math.min(2,sf(m.motivA,0)));
    if(motivH!==0){
      lH*=(1+motivH*0.045);
      if(motivH>0)ctxLog.push("DOM motive (+"+Math.round(motivH*4.5)+"%)");
      else ctxLog.push("DOM demotive ("+Math.round(motivH*4.5)+"%)");
    }
    if(motivA!==0){
      lA*=(1+motivA*0.045);
      if(motivA>0)ctxLog.push("EXT motive (+"+Math.round(motivA*4.5)+"%)");
    }

    // --- 3E: FATIGUE / CALENDRIER CHARGE ---
    // matchsLast7H/A: nb matchs joues dans les 7 derniers jours
    var fatH=sf(m.matchsLast7H,0),fatA=sf(m.matchsLast7A,0);
    if(fatH>=2){var fatMult=1-(fatH-1)*0.04;lH*=Math.max(0.85,fatMult);ctxLog.push("Fatigue DOM ("+fatH+" matchs/7j)");}
    if(fatA>=2){var fatMultA=1-(fatA-1)*0.04;lA*=Math.max(0.85,fatMultA);ctxLog.push("Fatigue EXT ("+fatA+" matchs/7j)");}

    // --- 3F: AVANTAGE DOMICILE CONTEXTUEL ---
    // homeAdvBonus: -1 (stade vide/neutre) a +2 (forteresse/ambiance exceptionnelle)
    var homeBonus=Math.max(-1,Math.min(2,sf(m.homeAdvBonus,0)));
    if(homeBonus!==0){
      lH*=(1+homeBonus*0.035);
      if(homeBonus>0)ctxLog.push("Forteresse domicile (+"+Math.round(homeBonus*3.5)+"%)");
      else ctxLog.push("Stade neutre/vide ("+Math.round(homeBonus*3.5)+"%)");
    }

    // --- 3G: DERBY / HISTORIQUE PSYCHOLOGIQUE ---
    if(m.derby){
      // Derby: resultats serres, moins de buts, variance plus grande
      lH*=0.92;lA*=0.92;
      ctxLog.push("Derby (-8% buts, variance +)");
    }

    // --- 3H: FACTEUR COACH/TACTIQUE ---
    // tactH/tactA: "att"=offensif, "def"=defensif, "press"=pressing haut
    if(m.tactH==="att"){lH*=1.08;lA*=1.05;ctxLog.push("DOM tactique offensif");}
    else if(m.tactH==="def"){lH*=0.90;lA*=0.88;ctxLog.push("DOM bloc defensif");}
    if(m.tactA==="att"){lA*=1.08;lH*=1.05;ctxLog.push("EXT tactique offensif");}
    else if(m.tactA==="def"){lA*=0.90;lH*=0.88;ctxLog.push("EXT bloc defensif");}

    // --- 3I: CONDITIONS METEOROLOGIQUES ---
    // weather: "rain"=pluie, "wind"=vent fort, "heat"=chaleur extreme
    if(m.weather==="rain"||m.weather==="wind"){
      lH*=0.93;lA*=0.93;
      ctxLog.push("Conditions difficiles (-7%)");
    }else if(m.weather==="heat"){
      lH*=0.95;lA*=0.95;
      ctxLog.push("Chaleur extreme (-5%)");
    }

    // Clamper les lambdas
    lH=Math.max(0.22,Math.min(4.2,lH));
    lA=Math.max(0.15,Math.min(3.8,lA));

    // === STEP 4: Dixon-Coles ===
    var rho=RHO[m.c]||-0.130;
    var pH=0,pN=0,pA=0,tot=0;
    for(var gh=0;gh<=9;gh++){for(var ga=0;ga<=9;ga++){
      var p=pmf(lH,gh)*pmf(lA,ga)*tau(gh,ga,lH,lA,rho);
      if(p<0)continue;
      tot+=p;
      if(gh>ga)pH+=p;else if(gh===ga)pN+=p;else pA+=p;
    }}
    if(tot>0){pH/=tot;pN/=tot;pA/=tot;}

    // === STEP 5: Blend Bayesien ===
    if(hasOdds){
      var w=dataQ===3?0.55:dataQ===2?0.45:0.20;
      pH=pH*w+mp1*(1-w);
      pN=pN*w+mpN*(1-w);
      pA=pA*w+mp2*(1-w);
      var tot2=pH+pN+pA;
      if(tot2>0){pH/=tot2;pN/=tot2;pA/=tot2;}
    }

    // === STEP 6: Detection value bets ===
    // Seuil plus strict selon qualite + contexte
    var nCtxFactors=ctxLog.length;
    var seuilBase=dataQ>=2?0.04:0.08;
    // Si on a des facteurs contextuels = on est plus precis = seuil peut baisser legerement
    var seuil=nCtxFactors>=3?seuilBase*0.85:seuilBase;
    var confMax=dataQ>=3?90:dataQ>=2?80:dataQ>=1?58:40;

    var candidates=[];
    if(hasOdds){
      if(o1>=1.25){var e1=pH*o1-1;if(e1>seuil)candidates.push({k:"1",p:pH,o:o1,e:e1});}
      if(oN>=1.25){var eN=pN*oN-1;if(eN>seuil)candidates.push({k:"N",p:pN,o:oN,e:eN});}
      if(o2>=1.25){var e2=pA*o2-1;if(e2>seuil)candidates.push({k:"2",p:pA,o:o2,e:e2});}
    }
    candidates.sort(function(a,b){return b.e-a.e;});
    var best=candidates[0]||null;

    var bR=best?best.k:(pH>pA?(pH>pN?"1":"N"):(pA>pN?"2":"N"));
    var bP=best?best.p:(bR==="1"?pH:bR==="2"?pA:pN);
    var bO=best?best.o:(bR==="1"?o1:bR==="2"?o2:oN);
    var edg=best?best.e:null;

    var kel=0;
    if(edg&&edg>0&&bO>=1.25){
      var k0=(bP*(bO-1)-(1-bP))/(bO-1);
      if(k0>0)kel=Math.min(k0*(edg>0.10?0.20:edg>0.06?0.15:0.12),0.035);
    }

    // Confiance enrichie par le contexte
    var ctxBonus=Math.min(nCtxFactors*2,10);
    var conf=0;
    if(edg){
      conf=Math.min(confMax,Math.round(
        (dataQ>=2?55:35)
        +Math.min(edg*180,20)
        +(bP>0.60?10:bP>0.50?5:0)
        +(hasPinnacle?8:0)
        +ctxBonus
        -(m.derby?8:0)
        -(dataQ===1?5:0)
      ));
    }else{conf=Math.min(45,Math.round(bP*50));}

    // Marches derives
    var btts=(1-pmf(lH,0))*(1-pmf(lA,0));
    var p15=0,o25=0,o35=0;
    for(var t=0;t<=12;t++)for(var s=0;s<=12;s++){
      var pp=pmf(lH,t)*pmf(lA,s);
      if(t+s>=2)p15+=pp;
      if(t+s>=3)o25+=pp;
      if(t+s>=4)o35+=pp;
    }

    var tH=m.h||m.home||"Dom",tA=m.a||m.away||"Ext";
    var label=edg?(bR==="1"?esc(tH)+" gagne":bR==="2"?esc(tA)+" gagne":"Match nul"):
      (pH>pA&&pH>pN?esc(tH)+" favori":pA>pH&&pA>pN?esc(tA)+" favori":"Match ouvert");

    var topSc={};
    for(var gh2=0;gh2<=4;gh2++)for(var ga2=0;ga2<=4;ga2++){
      var sp=pmf(lH,gh2)*pmf(lA,ga2);
      if(sp>0.015)topSc[gh2+"-"+ga2]=parseFloat(sp.toFixed(3));
    }

    var safe="OK";
    if(hasOdds){var mgg=1/o1+1/oN+1/o2;safe=mgg>1.3?"SUSPENDU":mgg>1.15?"ATTENTION":"OK";}

    return{
      lH:parseFloat(lH.toFixed(3)),lA:parseFloat(lA.toFixed(3)),
      pH:pH,pN:pN,pA:pA,
      bR:bR,bP:bP,bO:bO,
      edg:edg,kel:kel,conf:conf,label:label,
      btts:parseFloat(btts.toFixed(3)),
      p15:parseFloat(p15.toFixed(3)),
      o25:parseFloat(o25.toFixed(3)),
      o35:parseFloat(o35.toFixed(3)),
      p1X:parseFloat((pH+pN).toFixed(3)),
      pX2:parseFloat((pN+pA).toFixed(3)),
      p12:parseFloat((pH+pA).toFixed(3)),
      sc:topSc,safe:safe,
      dataQ:dataQ,hasStats:hasStats,
      ctx:ctxLog  // Facteurs contextuels appliques
    };
  }catch(err){console.error("calc:",err);return null;}
}

function buildBets(r,d){
  var o1=+d.o1||0,oN=+d.oN||0,o2=+d.o2||0,oO25=+d.oO25||0,oO35=+d.oO35||0,oBtts=+d.oBtts||0;
  var bets=[
    {id:"1",cat:"1X2",name:"Victoire "+(d.home||"Dom"),p:r.pH,o:o1},
    {id:"N",cat:"1X2",name:"Match nul",p:r.pN,o:oN},
    {id:"2",cat:"1X2",name:"Victoire "+(d.away||"Ext"),p:r.pA,o:o2},
    {id:"1X",cat:"Double chance",name:"Domicile ou Nul",p:r.pH+r.pN,o:0},
    {id:"X2",cat:"Double chance",name:"Exterieur ou Nul",p:r.pN+r.pA,o:0},
    {id:"O15",cat:"Buts",name:"Plus de 1.5 buts",p:r.p15,o:0},
    {id:"O25",cat:"Buts",name:"Plus de 2.5 buts",p:r.o25,o:oO25},
    {id:"O35",cat:"Buts",name:"Plus de 3.5 buts",p:r.o35,o:oO35},
    {id:"U25",cat:"Buts",name:"Moins de 2.5 buts",p:1-r.o25,o:0},
    {id:"BTTS",cat:"Les deux marquent",name:"Les deux equipes marquent",p:r.btts,o:oBtts},
    {id:"NBTTS",cat:"Les deux marquent",name:"Les deux equipes ne marquent pas",p:1-r.btts,o:0},
    {id:"CSH",cat:"Clean sheet",name:"Sans encaisser "+(d.home||"Dom"),p:pmf(r.lA,0),o:0},
    {id:"CSA",cat:"Clean sheet",name:"Sans encaisser "+(d.away||"Ext"),p:pmf(r.lH,0),o:0},
  ];
  // Appliquer les filtres: cote min 1.25, edge min 3%
  bets.forEach(function(b){
    b.edg=b.o>=1.25?edgeF(b.p,b.o):null;
    b.kel=b.o>=1.25?kellyF(b.p,b.o):0;
  });
  var best=bets.filter(function(b){return b.o>=1.25&&(b.edg||0)>0;}).sort(function(a,b){return(b.edg||0)-(a.edg||0);})[0];
  if(!best)best=bets.filter(function(b){return b.o>=1.25;}).sort(function(a,b){return b.p-a.p;})[0];
  var safe2=bets.filter(function(b){return b.p>0.62&&b.o>=1.25;}).sort(function(a,b){return b.p-a.p;})[0];
  var value=bets.filter(function(b){return(b.edg||0)>0.04&&b.o>=1.25;}).sort(function(a,b){return(b.edg||0)-(a.edg||0);})[0];
  return{allBets:bets,bestBet:best,safeBet:safe2,valueBet:value};
}

function callAI(prompt,max){
  max=max||2000;
  if(!S.aiKey)return Promise.reject(new Error("Cle manquante"));
  return fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":S.aiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:max,messages:[{role:"user",content:prompt}]})
  }).then(function(r){return r.json();}).then(function(data){
    if(!data.content)throw new Error((data.error&&data.error.message)||"Erreur API");
    return data.content.map(function(b){return b.type==="text"?b.text:"";}).join("");
  });
}
function parseJ(raw,arr){
  var c=raw.replace(/```json|```/g,"").trim();
  var ch=arr?"[":"{",ct=arr?"]":"}";
  var si=c.indexOf(ch),ei=c.lastIndexOf(ct);
  if(si!==-1&&ei!==-1)c=c.substring(si,ei+1);
  return JSON.parse(c);
}

function logBet(win){
  if(!S.res)return;
  var stake=toM(Math.max(S.bk*(S.res.kel||0.02),1));
  var profit=win?toM(stake*((S.res.bO||2)-1)):toM(-stake);
  var newBk=toM(S.bk+profit);
  if(win)confetti();
  var co=+S.closingOdd||0,clv=co>0?toM((S.res.bO||2)/co-1):0;
  var entry={id:Date.now(),date:new Date().toLocaleDateString("fr-FR"),match:(S.res.d.home||"?")+" vs "+(S.res.d.away||"?"),stake:stake,oddsT:S.res.bO||2,clv:clv,result:win?"WIN":"LOSS",profit:profit,bk:newBk};
  saveHist([entry].concat(S.hist).slice(0,200));saveBk(newBk);S.closingOdd="";renderPage();
}

function confetti(){
  var colors=["#1e6fff","#f5c842","#00d084","#ffffff","#3d82ff"];
  var el=document.createElement("div");el.style.cssText="position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden";document.body.appendChild(el);
  for(var i=0;i<60;i++){var p=document.createElement("div");var sz=Math.random()*6+3,c=colors[Math.floor(Math.random()*colors.length)];p.style.cssText="position:absolute;top:-20px;left:"+(Math.random()*100)+"%;width:"+sz+"px;height:"+sz+"px;background:"+c+";border-radius:"+(Math.random()>.5?"50%":"2px")+";animation:cffall "+(Math.random()*2+1.5)+"s "+(Math.random()*0.8)+"s ease-in forwards";el.appendChild(p);}
  setTimeout(function(){el.remove();},3500);
}

function calcBkR(){
  var b=S.bkC,tot=+b.tot,prob=+b.prob,odd=+b.odd,frac=+b.frac||0.25;
  if(!tot||!prob||!odd){S.bkR=null;return;}
  var p=prob/100,bo=odd-1,q=1-p,kR=Math.max(0,(bo*p-q)/bo),kA=kR*frac;
  S.bkR={kR:kR,kA:kA,m:kA*tot,g:odd*kA*tot-kA*tot,ev:p*odd-1};
}

     +'</div>';
  }

  // Tabs
  h+='<div style="display:flex;gap:6px;margin-bottom:10px">';
  var TM=[["upcoming","A venir ("+up.length+")"],["live","Live ("+lv.length+")"],["finished","Termines ("+fn.length+")"]];
  for(var ti=0;ti<3;ti++){
    var isOn=mTab===TM[ti][0];

  }
  h+='</div>';

  // Filtres
  h+='<div class="fils">';
  var FILS=[["all","Tous"],["fr","France"],["eu","Europe"],["eng","Angleterre"],["esp","Espagne"],["cup","Coupes EUR"],["val","Value"],["arb","Arb"]];
  for(var fi=0;fi<FILS.length;fi++){
    h+='<button class="fib'+(fil===FILS[fi][0]?" on":"")+'" onclick="setFilN('+fi+')">'+FILS[fi][1]+'</button>';
  }
  h+='</div>';

  if(S.mLoad){h+='<div style="text-align:center;padding:60px">'+ldr()+'</div>';return h;}

  // Filter
  var filtered=disp.filter(function(m){
    if(fil==="all")return true;
    var f=m.f||"INT";
    if(fil==="fr")return f==="FR";
    if(fil==="eu")return["ENG","ES","IT","DE","PT","NL","BE","SCO","GR","TR"].indexOf(f)>=0;
    if(fil==="eng")return f==="ENG";
    if(fil==="esp")return f==="ES";
    if(fil==="cup")return f==="UCL"||f==="UEL";
    if(fil==="val")return m.e&&m.e.edg&&(m.e.edg||0)>0;
    if(fil==="arb")return m.arb!==null&&m.arb!==undefined;
    return true;
  });

  if(!filtered.length){
    h+='<div class="empty"><div class="ei">0</div><div class="et">Aucun match</div><div class="es">Recharge pour voir les matchs</div></div>';
    return h;
  }

  // === TRI CHRONOLOGIQUE STRICT ===
  // 1. Trier par date+heure
  filtered.sort(function(a,b){
    var ta=a.time||a.t||"";var tb=b.time||b.t||"";
    return ta<tb?-1:ta>tb?1:0;
  });

  // 2. Grouper par tranche horaire (YYYY-MM-DD HH:00)
  var groups={};var groupOrder=[];
  filtered.forEach(function(m){
    var t=m.time||m.t||"";

    var dt=t.substring(0,10)||"?";
    var hr=t.substring(11,16)||"?";
    var key=dt+"|"+hr;
    if(!groups[key]){groups[key]=[];groupOrder.push(key);}
    groups[key].push(m);
  });

  // 3. Afficher par tranche
  for(var gi=0;gi<groupOrder.length;gi++){
    var gk=groupOrder[gi];

// === BAYESIAN UPDATE ===
function bayesianUpdate(pH,pN,pA,o1,oN,o2){
  if(!o1||!oN||!o2||o1<=1)return{pH:pH,pN:pN,pA:pA};
  var mH=1/o1,mN=1/oN,mA=1/o2,tot=mH+mN+mA;
  mH/=tot;mN/=tot;mA/=tot;
  var w=0.60;
  var uH=mH*w+pH*(1-w),uN=mN*w+pN*(1-w),uA=mA*w+pA*(1-w);
  var s=uH+uN+uA;
  return{pH:uH/s,pN:uN/s,pA:uA/s};
}

// === ADAPTIVE KELLY ===
function adaptiveKelly(prob,odd){
  if(!odd||odd<1.25||!prob)return 0;
  var b=odd-1,q=1-prob,k=(b*prob-q)/b;
  if(k<=0)return 0;
  var edge=prob*odd-1;if(edge<0.03)return 0;
  var fr=edge>0.12?0.25:edge>0.07?0.20:edge>0.04?0.15:0.10;
  return Math.min(k*fr,0.04);
}

// === EXPLAIN PRONO ===
function explainProno(edg,bO,m,bR){
  var reasons=[],risks=[];
  if(edg>0.08)reasons.push("Edge exceptionnel +"+((edg)*100).toFixed(1)+"% - rare opportunite");
  else if(edg>0.05)reasons.push("Edge solide +"+((edg)*100).toFixed(1)+"% - value confirmee");
  else if(edg>0.03)reasons.push("Edge positif +"+((edg)*100).toFixed(1)+"% - legere value");
  else risks.push("Edge faible - pari a eviter");
  if(m.derby)risks.push("Derby - resultat impredictible");
  if(m.hf&&bR==="1"){if(m.hf>=12)reasons.push("Bonne forme domicile ("+m.hf+"/15 pts)");else if(m.hf<=5)risks.push("Mauvaise forme domicile");}
  if(m.af&&bR==="2"){if(m.af>=12)reasons.push("Bonne forme exterieur");else if(m.af<=5)risks.push("Mauvaise forme exterieur");}
  if(m.o1&&m.on&&m.o2){var mg=(1/m.o1+1/m.on+1/m.o2-1)*100;if(mg<3)reasons.push("Marche liquide - cotes fiables");else if(mg>8)risks.push("Marge elevee ("+mg.toFixed(1)+"%) - cotes moins fiables");}
  if(bO>=1.50)reasons.push("Cote correcte @ "+bO.toFixed(2)+" - bon rapport risque/gain");
  else if(bO<1.30)risks.push("Cote tres basse @ "+bO.toFixed(2)+" - mise reduite");
  return{reasons:reasons,risks:risks};
}

// === ENRICHISSEMENT ODDS ===
function enrichFromOdds(m){
  var pin=(m.bk||[]).find(function(b){return b.n==="Pinnacle";});
  var sh=pin||{o1:m.o1,on:m.on,o2:m.o2};
  if(sh.o1&&sh.o2){
    var pH=1/sh.o1,pA=1/sh.o2,pN=sh.on?1/sh.on:0,tot=pH+pA+pN;
    if(tot>0){pH/=tot;pA/=tot;}
    m.mkStrH=Math.max(0.5,Math.min(3.5,-Math.log(1-Math.min(0.99,pH))*1.4));
    m.mkStrA=Math.max(0.4,Math.min(3.0,-Math.log(1-Math.min(0.99,pA))*1.4));
  }
  return m;
}

  var bet=S.demoBets.find(function(b){return b.id===betId;});
  if(!bet||bet.status!=="pending")return;
  bet.status=won?"won":"lost";
  bet.profit=won?parseFloat((bet.potGain-bet.stake).toFixed(2)):-bet.stake;
  if(won){S.demoBk+=bet.potGain;confetti();}
  S.demoBkH.push(S.demoBk);renderPage();

  var bet=S.demoBets.find(function(b){return b.id===betId;});
  if(!bet||bet.status!=="pending")return;
  bet.scoreStr=h+"-"+a;
  var won=false;

    else if(bet.typeN===1)won=h===a;
    else won=h>a;
  }
  settleBet(betId,won);
}

function loadMatchDetail(){
  var m=S.selM;
  if(!m||!m.fixtureId)return;
  S.mdLoading=true;S.matchDetail=null;renderPage();
  var url="/api/match?fixtureId="+m.fixtureId;
  if(m.homeId)url+="&homeId="+m.homeId;
  if(m.awayId)url+="&awayId="+m.awayId;
  if(m.leagueId)url+="&leagueId="+m.leagueId;
  fetch(url).then(function(r){return r.json();}).then(function(data){
    S.matchDetail=data;S.mdLoading=false;renderPage();
  }).catch(function(){S.mdLoading=false;renderPage();});
}
function getAIAnalysis(){
  var d=S.d;
  if(!S.aiKey){alert("Configure ta cle Anthropic.");return;}
  S.aiLoad=true;S.aiMsg=null;renderPage();
  var h=esc(d.home||d.aiH||"Dom"),a=esc(d.away||d.aiA||"Ext");
  var league=esc(d.league||d.aiC||"Football");
  var r=S.res;var md=S.matchDetail;

  // Construire le contexte complet
  var statsStr="xG dom:"+(d.hXG||"?")+" xGA dom:"+(d.hXGA||"?")
    +" | xG ext:"+(d.aXG||"?")+" xGA ext:"+(d.aXGA||"?")
    +" | Forme dom:"+( d.hF||"?")+"pts ext:"+(d.aF||"?")+"pts";

  var ctxStr="";
  var stakeLbls=["sans enjeu","normal","important","decisif"];
  if(d.stakeLevel)ctxStr+="Enjeu: "+stakeLbls[Math.min(3,d.stakeLevel||1)]+". ";
  if(d.rotationH>0)ctxStr+="DOM rotation "+(d.rotationH===2?"massive":"legere")+". ";
  if(d.rotationA>0)ctxStr+="EXT rotation "+(d.rotationA===2?"massive":"legere")+". ";
  if(d.keyPlayerOut>0)ctxStr+="Blessures DOM impact "+d.keyPlayerOut+"/10. ";
  if(d.keyPlayerOutA>0)ctxStr+="Blessures EXT impact "+d.keyPlayerOutA+"/10. ";
  if(d.motivH&&d.motivH!==0)ctxStr+="Moral DOM: "+(d.motivH>0?"eleve":"bas")+". ";
  if(d.motivA&&d.motivA!==0)ctxStr+="Moral EXT: "+(d.motivA>0?"eleve":"bas")+". ";
  if(d.matchsLast7H>=2)ctxStr+="DOM fatigue ("+d.matchsLast7H+" matchs/7j). ";
  if(d.matchsLast7A>=2)ctxStr+="EXT fatigue ("+d.matchsLast7A+" matchs/7j). ";
  if(d.derby)ctxStr+="DERBY. ";
  if(d.tactH)ctxStr+="Tactique DOM: "+d.tactH+". ";
  if(d.tactA)ctxStr+="Tactique EXT: "+d.tactA+". ";
  if(d.absentsCles&&d.absentsCles.length)ctxStr+="Absents: "+d.absentsCles.join(", ")+". ";

  var h2hStr="";
  if(md&&md.h2h&&md.h2h.length){
    var hw=md.h2h.filter(function(g){return g.winner==="home";}).length;
    var dr=md.h2h.filter(function(g){return g.winner==="draw";}).length;

document.addEventListener("DOMContentLoaded",function(){
(function(){
  var c=document.getElementById("particles");
  if(!c)return;
  var x=c.getContext("2d");
  var W=c.width=window.innerWidth,H=c.height=window.innerHeight;
  window.addEventListener("resize",function(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;});
  var CL=["rgba(0,229,160,","rgba(0,229,160,","rgba(150,230,180,","rgba(50,160,100,"];
  var pts=[];
  for(var i=0;i<55;i++){pts.push({px:Math.random()*W,py:Math.random()*H,vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.35,r:Math.random()*1.4+.4,c:CL[i%4],o:Math.random()*.4+.08});}
  function draw(){
    x.clearRect(0,0,W,H);
    for(var i=0;i<pts.length;i++){
      var p=pts[i];p.px+=p.vx;p.py+=p.vy;
      if(p.px<0)p.px=W;if(p.px>W)p.px=0;if(p.py<0)p.py=H;if(p.py>H)p.py=0;
      x.beginPath();x.arc(p.px,p.py,p.r,0,Math.PI*2);x.fillStyle=p.c+p.o+")";x.fill();
      for(var j=i+1;j<pts.length;j++){
        var q=pts[j],dx=p.px-q.px,dy=p.py-q.py,d=Math.sqrt(dx*dx+dy*dy);
        if(d<90){x.beginPath();x.moveTo(p.px,p.py);x.lineTo(q.px,q.py);x.strokeStyle=p.c+(0.05*(1-d/90))+")";x.lineWidth=.4;x.stroke();}
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();
});

    h+='<div style="padding:12px 14px">';
    h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">';
    h+='<div style="flex:1"><div style="font-size:11px;color:"#909090";font-family:var(--f-mono);margin-bottom:3px">'+esc(b.match||"")+'</div>';
    h+='<div style="font-family:var(--f-titre);font-size:16px;color:'+bCol+';letter-spacing:.04em">'+esc(b.bet||"")+'</div></div>';
    h+='<div style="text-align:right;margin-left:10px">';
    h+='<div style="font-family:var(--f-titre);font-size:20px;color:'+bCol+';letter-spacing:.04em">'+b.odd.toFixed(2)+'x</div>';
    h+='<div style="font-family:var(--f-mono);font-size:9px;color:"#5A5A5A";margin-top:1px">'+b.stake+'EUR</div>';
    h+='</div></div>';
    h+='<div style="display:flex;align-items:center;justify-content:space-between">';
    h+='<div style="font-family:var(--f-mono);font-size:9px;color:"#5A5A5A"">'+esc(b.date||"")+'</div>';
    if(isPend){
      h+='<div style="display:flex;gap:5px">';
      var _bi=b.id;
      h+='<button onclick="resolveJBet('+JSON.stringify(_bi)+','+JSON.stringify("won")+')" style="padding:5px 12px;background:rgba(0,229,160,.15);border:1px solid rgba(0,229,160,.3);border-radius:6px;font-family:var(--f-mono);font-size:9px;color:"#00E5A0";cursor:pointer;font-weight:700">Gagne</button>';
      h+='<button onclick="resolveJBet('+JSON.stringify(_bi)+','+JSON.stringify("lost")+')" style="padding:5px 12px;background:rgba(224,85,85,.1);border:1px solid rgba(224,85,85,.25);border-radius:6px;font-family:var(--f-mono);font-size:9px;color:"#E05555";cursor:pointer;font-weight:700">Perdu</button>';
      h+='</div>';
    }else{
      h+='<div style="font-family:var(--f-titre);font-size:16px;color:'+bCol+'">'+(gain>=0?"+":"")+gain.toFixed(0)+'EUR</div>';
    }
    h+='</div>';
    h+='</div></div>';
  }
  return h;
}

function addJournalBet(){
  var match=document.getElementById("j-match"),bet=document.getElementById("j-bet");
  var odd=document.getElementById("j-odd"),stake=document.getElementById("j-stake");
  var date=document.getElementById("j-date");
  if(!match||!bet||!odd||!stake)return;
  var o=parseFloat(odd.value),s=parseFloat(stake.value);
  if(!match.value||!bet.value||isNaN(o)||o<1.01||isNaN(s)||s<0.1){
    alert("Remplis tous les champs correctement.");return;
  }
  if(!S.journal)S.journal=[];
  S.journal.push({
    id:Date.now(),match:match.value,bet:bet.value,
    odd:o,stake:s,date:date&&date.value?date.value:new Date().toLocaleDateString("fr-FR"),
    res:null,type:"manuel"
  });
  localStorage.setItem("edge_journal",JSON.stringify(S.journal));
  S.jTab="manuel";renderPage();
}

function resolveJBet(id,res){
  var arr=S.journal||[];
  for(var i=0;i<arr.length;i++){if(arr[i].id===id){arr[i].res=res;break;}}
  S.journal=arr;
  localStorage.setItem("edge_journal",JSON.stringify(arr));
  var simArr=S.simBets||[];
  for(var i=0;i<simArr.length;i++){if(simArr[i].id===id){simArr[i].res=res;break;}}
  S.simBets=simArr;
  localStorage.setItem("edge_simbets",JSON.stringify(simArr));
  renderPage();
}

function clearJournal(type){
  if(!confirm("Effacer tous les paris ?"))return;
  if(type==="manuel"){S.journal=[];localStorage.removeItem("edge_journal");}
  else{S.simBets=[];localStorage.removeItem("edge_simbets");}
  renderPage();
}

function genEdgeBets(){
  if(!S.simBets)S.simBets=[];
  var top=S.matches.filter(function(m){
    return m.e&&(m.e.edg||0)>0.04&&m.e.conf>=60&&!isDone(m.time||m.t);
  }).sort(function(a,b){return(b.e.edg||0)-(a.e.edg||0);}).slice(0,5);
  if(!top.length){alert("Pas assez de value bets ce moment.");return;}
  top.forEach(function(m){
    var e=m.e;var stake=Math.round(S.bk*(e.kel||0.02)*0.25*100)/100;
    S.simBets.push({
      id:Date.now()+Math.random(),
      match:esc(m.h||"")+" vs "+esc(m.a||""),
      bet:esc(e.label||""),odd:e.bO||0,
      stake:Math.max(1,Math.round(stake)),
      date:new Date().toLocaleDateString("fr-FR"),
      res:null,type:"edge",edge:((e.edg||0)*100).toFixed(1),conf:e.conf
    });
  });
  localStorage.setItem("edge_simbets",JSON.stringify(S.simBets));
  renderPage();
}

function loadJournal(){
  try{
    var j=localStorage.getItem("edge_journal");
    if(j)S.journal=JSON.parse(j);
    var s=localStorage.getItem("edge_simbets");
    if(s)S.simBets=JSON.parse(s);
  }catch(e){}
}</script>
