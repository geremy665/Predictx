<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<meta name="theme-color" content="#060610"/>
<title>EDGE · Betting Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#060610;--bg2:#0a0a1a;--c1:#0f0f20;--c2:#141428;--c3:#1a1a35;
  --v:#7c3aed;--v2:#8b5cf6;--v3:#a78bfa;--v4:rgba(124,58,237,.15);--v5:rgba(124,58,237,.07);
  --gold:#f59e0b;--gold2:rgba(245,158,11,.1);--gold3:rgba(245,158,11,.05);
  --green:#10b981;--green2:rgba(16,185,129,.1);
  --red:#ef4444;--red2:rgba(239,68,68,.1);
  --pink:#ec4899;--pink2:rgba(236,72,153,.1);
  --blue:#3b82f6;--blue2:rgba(59,130,246,.1);
  --w:#ffffff;--w2:rgba(255,255,255,.85);--w3:rgba(255,255,255,.55);--w4:rgba(255,255,255,.2);--w5:rgba(255,255,255,.07);
  --g2:#9090b8;--g3:#60607a;--g4:#28283c;--g5:#181828;
  --ln:rgba(255,255,255,.06);--ln2:rgba(255,255,255,.03);
  --r:8px;--r2:12px;--r3:16px;--r4:20px;
  --shv:0 4px 24px rgba(124,58,237,.15);
  --shg:0 4px 24px rgba(245,158,11,.12);
}
html,body{background:var(--bg);color:var(--w);font-family:'Inter',sans-serif;font-size:14px;overflow-x:hidden;-webkit-font-smoothing:antialiased;line-height:1.5}
button{font-family:'Inter',sans-serif;cursor:pointer}
input,select{font-family:'Inter',sans-serif;font-size:13px;background:var(--c2);border:1px solid var(--ln);border-radius:var(--r2);color:var(--w);padding:11px 13px;width:100%;outline:none;transition:border-color .15s,box-shadow .15s}
input:focus,select:focus{border-color:rgba(124,58,237,.5);box-shadow:0 0 0 3px rgba(124,58,237,.08)}
select{appearance:none;-webkit-appearance:none}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--v);border-radius:3px}

/* ── LAYOUT ── */
#app{display:flex;min-height:100vh}
#sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--ln);position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;z-index:100;transition:transform .25s cubic-bezier(.4,0,.2,1)}
#main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh}
@media(max-width:768px){#sidebar{transform:translateX(-220px)}#sidebar.open{transform:none}#main{margin-left:0}}

/* ── SIDEBAR ── */
.sb-head{padding:20px 16px 16px;border-bottom:1px solid var(--ln)}
.sb-logo{font-size:22px;font-weight:900;letter-spacing:-1.5px;line-height:1;display:flex;align-items:center;gap:8px}
.sb-logo-dot{width:8px;height:8px;border-radius:50%;background:var(--v2);box-shadow:0 0 8px var(--v2)}
.sb-logo span{color:var(--v3)}
.sb-tagline{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--g3);margin-top:4px;letter-spacing:.15em;text-transform:uppercase}
.sb-nav{flex:1;padding:8px;overflow-y:auto}
.nav-sec{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--g3);padding:0 8px;margin:14px 0 4px;letter-spacing:.12em;text-transform:uppercase;font-weight:700}
.nb{display:flex;align-items:center;gap:9px;width:100%;padding:9px 10px;border:none;background:transparent;color:var(--g2);border-radius:var(--r2);font-size:12.5px;font-weight:500;text-align:left;position:relative;transition:all .12s}
.nb:hover{background:var(--c2);color:var(--w2)}
.nb.on{background:var(--v4);color:var(--v3);font-weight:700}
.nb.on::after{content:'';position:absolute;right:0;top:50%;transform:translateY(-50%);width:3px;height:50%;background:var(--v2);border-radius:2px 0 0 2px}
.ni{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.nbadge{margin-left:auto;font-size:9px;padding:2px 6px;border-radius:100px;background:var(--v5);color:var(--v3);font-weight:700;font-family:'JetBrains Mono',monospace}
.nbadge.live{background:var(--pink2);color:var(--pink);animation:pulse 2s infinite}
.nbadge.ok{background:var(--green2);color:var(--green)}
.sb-foot{padding:10px;border-top:1px solid var(--ln)}
.bkcard{background:linear-gradient(135deg,var(--c2),var(--c3));border:1px solid rgba(245,158,11,.2);border-radius:var(--r3);padding:14px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.bkcard::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.bkcard:hover{border-color:rgba(245,158,11,.4);transform:translateY(-1px)}
.bk-lbl{font-size:9px;color:var(--g3);font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;font-family:'JetBrains Mono',monospace}
.bk-val{font-size:22px;font-weight:900;letter-spacing:-1px;color:var(--gold);line-height:1;font-variant-numeric:tabular-nums}
.bk-sub{font-size:10px;color:var(--g3);margin-top:4px;font-family:'JetBrains Mono',monospace}

/* ── TOPBAR ── */
#topbar{background:rgba(6,6,16,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--ln);padding:0 20px;height:54px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:90}
.ham{display:none;flex-direction:column;gap:4px;padding:8px;border-radius:var(--r2);border:1px solid var(--ln);background:var(--c2)}
.ham span{width:16px;height:2px;background:var(--g3);border-radius:1px;display:block;transition:all .2s}
@media(max-width:768px){.ham{display:flex}}
#page-title{font-size:15px;font-weight:700;letter-spacing:-.3px}
.tb-r{margin-left:auto;display:flex;align-items:center;gap:8px}
.tbtn{padding:6px 12px;background:transparent;border:1px solid var(--ln);border-radius:var(--r2);color:var(--g2);font-size:11px;font-weight:600;white-space:nowrap;transition:all .12s}
.tbtn:hover{border-color:var(--v3);color:var(--v3)}
.tbtn.ok{border-color:rgba(16,185,129,.3);color:var(--green);background:var(--green2)}
.livepill{display:flex;align-items:center;gap:5px;padding:4px 10px;background:var(--pink2);border:1px solid rgba(236,72,153,.2);border-radius:100px;font-size:10px;color:var(--pink);font-family:'JetBrains Mono',monospace;font-weight:700}
.livedot{width:5px;height:5px;border-radius:50%;background:var(--pink);animation:pulse 1.5s infinite;flex-shrink:0}

/* ── PAGE ── */
#page{padding:20px;max-width:900px;animation:fadeUp .2s ease}

/* ── CARDS ── */
.card{background:var(--c1);border:1px solid var(--ln);border-radius:var(--r3);padding:18px;margin-bottom:12px}
.card-v{background:var(--c1);border:1px solid rgba(124,58,237,.2);border-radius:var(--r3);padding:18px;margin-bottom:12px;box-shadow:var(--shv)}
.card-g{background:linear-gradient(135deg,rgba(245,158,11,.05),rgba(124,58,237,.05));border:1px solid rgba(245,158,11,.15);border-radius:var(--r3);padding:18px;margin-bottom:12px}
.card-ok{background:var(--green2);border:1px solid rgba(16,185,129,.2);border-radius:var(--r3);padding:18px;margin-bottom:12px}
.card-err{background:var(--red2);border:1px solid rgba(239,68,68,.2);border-radius:var(--r3);padding:18px;margin-bottom:12px}
.clbl{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--g3);font-weight:700;text-transform:uppercase;letter-spacing:.12em;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.clbl::before{content:'';width:3px;height:3px;border-radius:50%;background:var(--v3);display:inline-block;flex-shrink:0}

/* ── TAGS ── */
.tag{display:inline-flex;align-items:center;padding:3px 9px;border-radius:100px;font-size:10px;font-weight:700;letter-spacing:.02em;font-family:'JetBrains Mono',monospace}
.tg{background:var(--gold2);color:var(--gold);border:1px solid rgba(245,158,11,.2)}
.te{background:var(--green2);color:var(--green);border:1px solid rgba(16,185,129,.2)}
.tv{background:var(--v5);color:var(--v3);border:1px solid rgba(124,58,237,.2)}
.tr{background:var(--red2);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.tp{background:var(--pink2);color:var(--pink);border:1px solid rgba(236,72,153,.2)}
.tb{background:var(--blue2);color:var(--blue);border:1px solid rgba(59,130,246,.2)}

/* ── FORMS ── */
.fw{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.fl{font-size:10px;color:var(--g3);font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
@media(max-width:600px){.g4{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr}}
.rg{display:flex;gap:4px}
.rb{flex:1;padding:9px 6px;font-size:12px;font-weight:600;border-radius:var(--r2);border:1px solid var(--ln);background:var(--c2);color:var(--g3);text-align:center;transition:all .12s}
.rb:hover{border-color:var(--v3);color:var(--v3)}
.rb.on{background:var(--v4);border-color:rgba(124,58,237,.35);color:var(--v3);font-weight:700}
.fsec{background:var(--c1);border:1px solid var(--ln);border-radius:var(--r3);padding:16px;margin-bottom:10px}
.fsh{display:flex;align-items:center;gap:8px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--ln2)}
.fsn{font-size:9px;font-weight:700;color:var(--v3);background:var(--v5);border-radius:6px;padding:3px 8px;text-transform:uppercase;letter-spacing:.08em;font-family:'JetBrains Mono',monospace;border:1px solid rgba(124,58,237,.2)}
.fst{font-size:13px;font-weight:700;color:var(--w)}

/* ── BUTTONS ── */
.cbtn{width:100%;height:46px;background:var(--v);border:none;border-radius:var(--r2);font-size:13px;font-weight:700;color:#fff;letter-spacing:-.2px;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;font-family:'Inter',sans-serif}
.cbtn:hover:not(:disabled){background:var(--v2);transform:translateY(-1px);box-shadow:0 6px 20px rgba(124,58,237,.3)}
.cbtn:active:not(:disabled){transform:translateY(0)}
.cbtn:disabled{background:var(--g4);color:var(--g3);transform:none;opacity:.6}
.cbtn.gold{background:linear-gradient(135deg,#d97706,var(--gold));box-shadow:none}
.cbtn.gold:hover:not(:disabled){background:linear-gradient(135deg,var(--gold),#fbbf24);box-shadow:0 6px 20px rgba(245,158,11,.25)}
.cbtn.green{background:var(--green)}
.cbtn.green:hover:not(:disabled){background:#0ea572;box-shadow:0 6px 20px rgba(16,185,129,.25)}
.abtn{padding:5px 11px;border-radius:var(--r);font-size:11px;font-weight:600;border:1px solid var(--ln);color:var(--g3);background:transparent;white-space:nowrap;transition:all .12s;font-family:'Inter',sans-serif}
.abtn:hover{border-color:var(--v3);color:var(--v3);background:var(--v5)}

/* ── MATCH CARDS ── */
.match-card{background:var(--c1);border:1px solid var(--ln);border-radius:var(--r3);overflow:hidden;margin-bottom:8px;transition:all .15s;cursor:pointer}
.match-card:hover{border-color:rgba(124,58,237,.25);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.match-card.hot{border-color:rgba(124,58,237,.2)}
.match-card.hot .match-stripe{background:linear-gradient(90deg,var(--v2),var(--pink),transparent)}
.match-card.arb{border-color:rgba(16,185,129,.2)}
.match-card.arb .match-stripe{background:linear-gradient(90deg,var(--green),transparent)}
.match-stripe{height:2px;width:100%}
.match-head{padding:10px 14px 8px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--ln2)}
.match-league{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--g3);text-transform:uppercase;letter-spacing:.08em;font-weight:700}
.match-time-badge{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;background:var(--c2);border:1px solid var(--ln2)}
.match-time-badge.live{background:var(--red2);border-color:rgba(239,68,68,.3);color:var(--red);animation:pulse 2s infinite}
.match-time-badge.upcoming{color:var(--w3)}
.match-body{padding:12px 14px}
.match-teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;margin-bottom:12px}
.match-team{font-size:14px;font-weight:700;letter-spacing:-.3px;line-height:1.3}
.match-team.home{text-align:right}
.match-team.away{text-align:left}
.match-xg{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--g3);margin-top:2px;font-weight:500}
.match-vs{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--g3);font-weight:700;text-align:center;flex-shrink:0}
.match-odds{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}
.odd-btn{background:var(--c2);border:1px solid var(--ln);border-radius:var(--r2);padding:8px 4px;text-align:center;transition:all .12s;cursor:pointer}
.odd-btn:hover{background:var(--v4);border-color:rgba(124,58,237,.35)}
.odd-btn.val{background:var(--v5);border-color:rgba(124,58,237,.3)}
.odd-btn.best{background:var(--green2);border-color:rgba(16,185,129,.25)}
.odd-label{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--g3);font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.odd-val{font-size:16px;font-weight:800;letter-spacing:-.5px;line-height:1.2;margin-top:2px;font-variant-numeric:tabular-nums}
.odd-edge{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;margin-top:2px}
.match-footer{display:flex;align-items:center;justify-content:space-between;padding-top:8px;border-top:1px solid var(--ln2)}
.match-conf{display:flex;align-items:center;gap:6px}
.conf-bar{width:60px;height:3px;background:var(--g4);border-radius:2px;overflow:hidden}
.conf-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--v2),var(--v3))}
.conf-val{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700}
.match-date{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--g3)}

/* ── SIGNAL CARDS ── */
.sig-card{background:var(--c1);border:1px solid var(--ln);border-radius:var(--r3);overflow:hidden;margin-bottom:8px;cursor:pointer;transition:all .15s}
.sig-card:hover{border-color:rgba(124,58,237,.3);transform:translateY(-1px)}
.sig-card.top{border-color:rgba(124,58,237,.2)}
.sig-stripe{height:2px}
.sig-body{padding:14px}
.sig-meta{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--g3);margin-bottom:8px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;text-transform:uppercase;letter-spacing:.08em}
.sig-teams{font-size:12px;color:var(--g2);margin-bottom:4px;font-weight:500}
.sig-bet{font-size:18px;font-weight:800;letter-spacing:-.5px;margin-bottom:12px;line-height:1.2}
.sig-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
@media(max-width:500px){.sig-stats{grid-template-columns:repeat(2,1fr)}}
.sig-stat{background:var(--bg2);border-radius:var(--r);padding:8px 6px;text-align:center;border:1px solid var(--ln2)}
.sig-stat-lbl{font-family:'JetBrains Mono',monospace;font-size:7px;color:var(--g3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
.sig-stat-val{font-size:15px;font-weight:800;letter-spacing:-.3px;font-variant-numeric:tabular-nums}
.sig-progress{height:2px;background:var(--g4);border-radius:2px;overflow:hidden;margin-bottom:8px}
.sig-progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--v2),var(--v3))}
.sig-footer{display:flex;justify-content:space-between;align-items:center}

/* ── VERDICT / RESULT ── */
.vrd{background:var(--c1);border:1px solid rgba(124,58,237,.2);border-radius:var(--r3);padding:20px;margin-bottom:12px;box-shadow:var(--shv);position:relative;overflow:hidden}
.vrd::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--v2),var(--pink),transparent)}
.vrd-label{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--g3);text-transform:uppercase;letter-spacing:.12em;margin-bottom:6px}
.vrd-bet{font-size:clamp(16px,4vw,22px);font-weight:800;letter-spacing:-1px;line-height:1.2;margin-bottom:6px}
.vrd-meta{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--g3);margin-bottom:14px}
.prob-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.prob-box{background:var(--c2);border:1px solid var(--ln);border-radius:var(--r2);padding:12px 8px;text-align:center;transition:all .15s}
.prob-box.win{background:var(--v5);border-color:rgba(124,58,237,.25)}
.prob-pct{font-size:22px;font-weight:900;letter-spacing:-1px;font-variant-numeric:tabular-nums;line-height:1}
.prob-box.win .prob-pct{color:var(--v3)}
.prob-name{font-size:10px;color:var(--g3);font-weight:600;margin-top:3px}
.prob-bar{height:3px;background:var(--g4);border-radius:2px;display:flex;overflow:hidden;margin-top:8px}
.pb-h{background:var(--v2)}.pb-n{background:var(--g4)}.pb-a{background:var(--pink)}
.conf-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.conf-lbl{font-size:10px;color:var(--g3);font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.conf-val2{font-size:13px;font-weight:700}
.conf-track{height:4px;background:var(--g4);border-radius:2px;overflow:hidden;margin-bottom:14px}
.conf-bar2{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--v2),var(--v3))}

/* ── EDGE BLOCK ── */
.edge-block{display:flex;justify-content:space-between;align-items:center;padding:14px;border-radius:var(--r2);margin-bottom:12px}
.edge-block.pos{background:var(--green2);border:1px solid rgba(16,185,129,.2)}
.edge-block.neg{background:var(--red2);border:1px solid rgba(239,68,68,.18)}
.edge-lbl{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.1em;margin-bottom:3px;font-weight:700;text-transform:uppercase}
.edge-block.pos .edge-lbl{color:var(--green)}
.edge-block.neg .edge-lbl{color:var(--red)}
.edge-val{font-size:26px;font-weight:900;letter-spacing:-1px;font-variant-numeric:tabular-nums}
.edge-block.pos .edge-val{color:var(--green)}
.edge-block.neg .edge-val{color:var(--red)}
.edge-detail{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--g3);margin-top:3px}

/* ── MARKETS ── */
.mkt-row{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;border-radius:var(--r2);margin-bottom:4px}
.mkt-row.pos{background:var(--v5);border:1px solid rgba(124,58,237,.18)}
.mkt-row.safe{background:var(--green2);border:1px solid rgba(16,185,129,.15)}
.mkt-row.neu{background:var(--c2);border:1px solid var(--ln2)}
.mkt-name{font-size:12px;font-weight:600;flex:1}
.mkt-stats{display:flex;gap:10px;align-items:center;flex-shrink:0}
.mkt-stat{text-align:center}
.mkt-stat-val{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;font-variant-numeric:tabular-nums}
.mkt-stat-lbl{font-family:'JetBrains Mono',monospace;font-size:7px;color:var(--g3);text-transform:uppercase;letter-spacing:.06em}

/* ── SCORE BOXES ── */
.score-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.score-box{background:var(--c2);border:1px solid var(--ln);border-radius:var(--r2);padding:10px 6px;text-align:center}
.score-box.top{background:var(--v5);border-color:rgba(124,58,237,.25)}
.score-val{font-size:16px;font-weight:800;letter-spacing:-.3px;font-variant-numeric:tabular-nums}
.score-pct{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--g3);margin-top:2px}

/* ── KELLY ── */
.kelly-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.kelly-box{background:var(--c2);border:1px solid var(--ln);border-radius:var(--r2);padding:13px;text-align:center}
.kelly-val{font-size:18px;font-weight:800;color:var(--v3);letter-spacing:-.5px;font-variant-numeric:tabular-nums}

<script>
"use strict";

/* ══════════════════════════════════════
   MOTEUR DIXON-COLES
══════════════════════════════════════ */
function pmf(l,k){
  if(l<=0)return k===0?1:0;if(k<0)return 0;
  if(k>20){var lp=-l+k*Math.log(l);for(var i=1;i<=k;i++)lp-=Math.log(i);return Math.max(0,Math.exp(lp));}
  var v=Math.exp(-l);for(var j=1;j<=k;j++)v*=l/j;return Math.max(0,v);
}
function cdf(l,m){
  if(m<0)return 0;var s=0,t=Math.exp(-l);
  for(var k=0;k<=m;k++){s+=t;if(t<1e-10)break;t*=l/(k+1);}return Math.min(1,s);
}
function tau(h,a,lH,lA,rho){
  var r=Math.max(-0.25,Math.min(-0.05,rho||-0.135));
  if(h===0&&a===0)return Math.max(0.001,1-lH*lA*r);
  if(h===1&&a===0)return Math.max(0.001,1+lA*r);
  if(h===0&&a===1)return Math.max(0.001,1+lH*r);
  if(h===1&&a===1)return Math.max(0.01,1-r);
  return 1;
}
var RHO={"Ligue 1":-0.142,"Premier League":-0.118,"La Liga":-0.135,"Bundesliga":-0.128,"Serie A":-0.151,"Champions League":-0.132};
function kellyF(p,o){
  if(!o||o<=1||!p||p<=0||p>=1)return 0;
  var b=o-1,k=(b*p-(1-p))/b;if(k<=0)return 0;
  var e=p*o-1,fr=e>0.10?0.25:e>0.05?0.20:0.125;
  return Math.min(k*fr,0.05);
}
function edgeF(p,o){return(!o||!p||o<=1||p<=0||p>=1)?null:p*o-1;}
function arbF(o1,oN,o2){
  if(!o1||!oN||!o2||o1<=1||oN<=1||o2<=1)return null;
  var imp=1/o1+1/oN+1/o2;return imp>=1?null:+((1/imp-1)*100).toFixed(2);
}
function fmW(p5,p10){
  var r5=Math.min(15,p5||7)/15,r10=Math.min(30,p10||14)/30;
  return Math.max(0.72,Math.min(1.28,0.72+0.56*(r5*0.6+r10*0.4)));
}
function calc(m){
  try{
    var lH=(m.hxg||1.35)*0.58+(m.hg||1.25)*0.28+((m.hsh||12)/24)*0.14;
    var lA=(m.axg||1.10)*0.58+(m.ag||1.00)*0.28+((m.ash||10)/24)*0.14;
    var hD=(m.hxga||1.1)*0.6+(1-(m.hcs||30)/100)*0.25+(m.hc||1.2)*0.15;
    var aD=(m.axga||1.3)*0.6+(1-(m.acs||22)/100)*0.25+(m.ac||1.4)*0.15;
    lH*=Math.pow(Math.max(0.4,aD)/1.2,0.38);lA*=Math.pow(Math.max(0.4,hD)/1.2,0.38);
    lH*=1.082;lH*=fmW(m.hf,m.hf10);lA*=fmW(m.af,m.af10);
    if(m.derby){lH*=0.91;lA*=0.91;}if(m.hfat)lH*=0.935;if(m.afat)lA*=0.935;
    lH=Math.max(0.22,Math.min(4.5,lH));lA=Math.max(0.15,Math.min(4.0,lA));
    var rho=RHO[m.league||m.c]||-0.135;
    var pH=0,pN=0,pA=0,sc=[],tot=0;
    for(var h=0;h<=9;h++)for(var a=0;a<=9;a++){
      var p=pmf(lH,h)*pmf(lA,a)*tau(h,a,lH,lA,rho);
      if(p<0)continue;tot+=p;sc.push({s:h+"-"+a,p:p});
      if(h>a)pH+=p;else if(h===a)pN+=p;else pA+=p;
    }
    if(tot>0){pH/=tot;pN/=tot;pA/=tot;}
    sc.sort(function(x,y){return y.p-x.p;});
    var bP=pH,bR="1";if(pN>bP){bP=pN;bR="N";}if(pA>bP){bP=pA;bR="2";}
    var bO=+(bR==="1"?m.o1:bR==="N"?m.on:m.o2)||0;
    var edg=edgeF(bP,bO),kel=kellyF(bP,bO);
    var mg=(m.o1&&m.on&&m.o2)?1/m.o1+1/m.on+1/m.o2:null;
    var safe=mg?(mg>1.3?"SUSPENDED":mg>1.15?"WARNING":"SAFE"):"OK";
    var conf=Math.min(97,Math.max(8,Math.round(
      bP*35+(edg>0?Math.min(edg*65,22):(edg?edg*15:0))+
      (safe==="SAFE"?4:safe==="WARNING"?-3:-8)+(m.derby?-12:0)
    )));
    var label=bR==="1"?(m.h||"Dom")+" favori ("+((pH*100).toFixed(1))+"%)":
              bR==="2"?(m.a||"Ext")+" favori ("+((pA*100).toFixed(1))+"%)":
              "Equilibre — Nul probable ("+((pN*100).toFixed(1))+"%)";
    var btts=(1-pmf(lH,0))*(1-pmf(lA,0));
    var o25=1-cdf(lH+lA,2),o35=1-cdf(lH+lA,3),p15=1-cdf(lH+lA,1);
    return{lH:lH,lA:lA,pH:pH,pN:pN,pA:pA,sc:sc,bR:bR,bP:bP,bO:bO,
           edg:edg,kel:kel,conf:conf,label:label,safe:safe,
           btts:btts,o25:o25,o35:o35,p15:p15,avgGoals:lH+lA};
  }catch(err){console.error(err);return null;}
}
function buildBets(r,d){
  var o1=+d.o1||0,oN=+d.oN||0,o2=+d.o2||0;
  var oO25=+d.oO25||0,oO35=+d.oO35||0,oBtts=+d.oBtts||0;
  var bets=[
    {id:"1",cat:"1X2",name:"Victoire "+(d.home||"Dom"),p:r.pH,o:o1},
    {id:"N",cat:"1X2",name:"Match nul",p:r.pN,o:oN},
    {id:"2",cat:"1X2",name:"Victoire "+(d.away||"Ext"),p:r.pA,o:o2},
    {id:"1X",cat:"DC",name:"Double Chance 1X",p:r.pH+r.pN,o:0},
    {id:"X2",cat:"DC",name:"Double Chance X2",p:r.pN+r.pA,o:0},
    {id:"O15",cat:"BUTS",name:"Over 1.5",p:r.p15,o:0},
    {id:"O25",cat:"BUTS",name:"Over 2.5",p:r.o25,o:oO25},
    {id:"O35",cat:"BUTS",name:"Over 3.5",p:r.o35,o:oO35},
    {id:"U25",cat:"BUTS",name:"Under 2.5",p:1-r.o25,o:0},
    {id:"BTTS",cat:"BTTS",name:"BTTS — Les deux marquent",p:r.btts,o:oBtts},
    {id:"NBTTS",cat:"BTTS",name:"BTTS Non",p:1-r.btts,o:0},
    {id:"CSH",cat:"CS",name:"Clean Sheet "+(d.home||"Dom"),p:pmf(r.lA,0),o:0},
    {id:"CSA",cat:"CS",name:"Clean Sheet "+(d.away||"Ext"),p:pmf(r.lH,0),o:0},
  ];
  bets.forEach(function(b){
    b.edg=b.o>1.01?edgeF(b.p,b.o):null;
    b.kel=b.o>1.01?kellyF(b.p,b.o):0;
  });
  var best=bets.filter(function(b){return b.o>1.01&&(b.edg||0)>0;})
              .sort(function(a,b){return(b.edg||0)-(a.edg||0);})[0]
          ||bets.slice().sort(function(a,b){return b.p-a.p;})[0];
  var safe2=bets.filter(function(b){return b.p>0.65;})
               .sort(function(a,b){return b.p-a.p;})[0];
  var value=bets.filter(function(b){return(b.edg||0)>0.04;})
               .sort(function(a,b){return(b.edg||0)-(a.edg||0);})[0];
  return{allBets:bets,bestBet:best,safeBet:safe2,valueBet:value};
}

/* ══════════════════════════════════════
   LEAGUE MAPPING
══════════════════════════════════════ */
var LEAGUE_MAP={
  "soccer_france_ligue_one":{name:"Ligue 1",flag:"🇫🇷",rho:-0.142},

    body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:max,
                         messages:[{role:"user",content:prompt}]})

function parseJ(raw,arr){
  var c=raw.replace(/```json|```/g,"").trim();
  var ch=arr?"[":"{",ct=arr?"]":"}";
  var si=c.indexOf(ch),ei=c.lastIndexOf(ct);
  if(si!==-1&&ei!==-1)c=c.substring(si,ei+1);
  return JSON.parse(c);
}

function logBet(win){
  if(!S.res)return;
  var stake=toM(Math.max(S.bk*(S.res.kel||0.02),1));
  var profit=win?toM(stake*((S.res.bO||2)-1)):toM(-stake);
  var newBk=toM(S.bk+profit);
  if(win)launchConfetti();
  var co=+S.closingOdd||0;
  var clv=co>0?toM((S.res.bO||2)/co-1):0;
  var entry={
    id:Date.now(),date:new Date().toLocaleDateString("fr-FR"),
    match:(S.res.d.home||"?")+" vs "+(S.res.d.away||"?"),
    stake:stake,oddsT:S.res.bO||2,clv:clv,
    result:win?"WIN":"LOSS",profit:profit,bk:newBk,
    conf:S.res.conf,league:S.res.d.league||S.res.d.aiC||"",
    betType:S.res.bR
  };
  saveHist([entry].concat(S.hist).slice(0,200));
  saveBk(newBk);S.closingOdd="";renderPage();
}

function launchConfetti(){
  var colors=["#7c3aed","#a78bfa","#ec4899","#06d6a0","#ffd60a","#3b82f6"];
  var el=document.createElement("div");
  el.style.cssText="position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden";
  document.body.appendChild(el);
  for(var i=0;i<60;i++){
    var p=document.createElement("div");
    var sz=Math.random()*8+3,c=colors[Math.floor(Math.random()*colors.length)];
    p.style.cssText="position:absolute;top:-20px;left:"+(Math.random()*100)+"%;width:"+sz+
      "px;height:"+sz+"px;background:"+c+";border-radius:"+(Math.random()>.5?"50%":"3px")+
      ";animation:cffall "+(Math.random()*2+1.5)+"s "+(Math.random()*0.8)+"s ease-in forwards";
    el.appendChild(p);
  }
  setTimeout(function(){el.remove();},3500);
}

function calcBkR(){
  var b=S.bkC,tot=+b.tot,prob=+b.prob,odd=+b.odd,frac=+b.frac||0.25;
  if(!tot||!prob||!odd){S.bkR=null;return;}
  var p=prob/100,bo=odd-1,q=1-p;
  var kR=Math.max(0,(bo*p-q)/bo),kA=kR*frac;
  S.bkR={kR:kR,kA:kA,m:kA*tot,g:odd*kA*tot-kA*tot,ev:p*odd-1};
}

  ms.forEach(function(m){if(leaguesAll.indexOf(m.c)<0)leaguesAll.push(m.c);});

    if(fil==="val")return ms.filter(function(x){return x.c===c;}).some(function(x){return(x.e&&x.e.edg||0)>0.06;});
    if(fil==="arb")return ms.filter(function(x){return x.c===c;}).some(function(x){return x.arb!==null;});

    +'<div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">';

    }
    h+='</div>';

  return h;

      +'<td class="tbl-odd'+(b.on===mON?" best":"")+'">'+f2(b.on)+'</td>'
      +'<td class="tbl-odd'+(b.o2===mO2?" best":b.o2&&m.e&&m.e.bR==="2"&&(m.e.edg||0)>0?" val":"")+'">'+f2(b.o2)+'</td>'
      +'<td style="font-family:\'JetBrains Mono\',monospace;font-size:11px;font-variant-numeric:tabular-nums;color:'

/* ══════════════════════════════════════
   PAGE GESTION DU RISQUE
══════════════════════════════════════ */
function pageRisk(){
  var hist=S.hist;
  var wins=hist.filter(function(h){return h.result==="WIN";}).length;
  var losses=hist.filter(function(h){return h.result==="LOSS";}).length;
  var wr=hist.length?Math.round(wins/hist.length*100):0;
  var totalMise=hist.reduce(function(a,h){return a+(h.stake||0);},0);
  var totalProfit=hist.reduce(function(a,h){return a+(h.profit||0);},0);
  var roi=totalMise>0?+((totalProfit/totalMise)*100).toFixed(1):0;
  var avgOdds=hist.length?+(hist.reduce(function(a,h){return a+(h.oddsT||2);},0)/hist.length).toFixed(2):0;
  var avgClv=hist.length?+(hist.reduce(function(a,h){return a+(h.clv||0);},0)/hist.length*100).toFixed(1):0;

  // Calcul drawdown
  var maxBk=S.bk,minBk=S.bk;
  hist.slice().reverse().forEach(function(h){
    if(h.bk>maxBk)maxBk=h.bk;
    if(h.bk<minBk)minBk=h.bk;
  });
  var drawdown=maxBk>0?+((maxBk-S.bk)/maxBk*100).toFixed(1):0;
  var riskLevel=drawdown>20?"high":drawdown>10?"mid":"low";

  var h='<div style="font-size:22px;font-weight:900;letter-spacing:-1px;margin-bottom:3px">Gestion du Risque</div>'
    +'<div style="font-family:\'JetBrains Mono\',monospace;font-size:9px;color:var(--g3);margin-bottom:14px">DRAWDOWN · VARIANCE · KELLY DYNAMIQUE</div>';

  // NIVEAU DE RISQUE ACTUEL
  h+='<div class="card-v" style="margin-bottom:12px">'
    +'<div class="clbl">Niveau de risque actuel</div>'
    +'<div class="risk-level risk-'+riskLevel+'">'
    +(riskLevel==="high"?"🔴 RISQUE ÉLEVÉ":riskLevel==="mid"?"🟡 RISQUE MODÉRÉ":"🟢 RISQUE FAIBLE")
    +' — Drawdown: '+drawdown+'%</div>'
    +(riskLevel==="high"?'<div style="padding:10px 13px;background:var(--red2);border:1px solid rgba(239,68,68,.2);border-radius:var(--r2);font-size:12px;color:var(--red);font-weight:600;margin-top:8px">⚠️ Drawdown &gt;20% — Réduire les mises de 50%. Stop loss obligatoire.</div>':"")
    +(riskLevel==="mid"?'<div style="padding:10px 13px;background:var(--gold2);border:1px solid rgba(245,158,11,.2);border-radius:var(--r2);font-size:12px;color:var(--gold);font-weight:600;margin-top:8px">⚠️ Drawdown &gt;10% — Réduire les mises de 25%. Prudence recommandée.</div>':"")
    +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px">'
    +[{v:S.bk.toLocaleString("fr-FR")+"€",l:"Bankroll actuelle",c:"var(--gold)"},
      {v:drawdown+"%",l:"Drawdown actuel",c:drawdown>20?"var(--red)":drawdown>10?"var(--gold)":"var(--green)"},
      {v:(riskLevel==="high"?"×0.5":riskLevel==="mid"?"×0.75":"×1.0"),l:"Multiplicateur Kelly",c:riskLevel==="high"?"var(--red)":riskLevel==="mid"?"var(--gold)":"var(--green)"}
     ].map(function(s){
       return'<div class="risk-box"><div class="risk-val" style="color:'+s.c+'">'+s.v+'</div><div class="risk-lbl">'+s.l+'</div></div>';
     }).join("")+'</div></div>';

  // STATS RISQUE
  if(hist.length){
    h+='<div class="card"><div class="clbl">Indicateurs de performance</div>'
      +'<div class="stat-grid4" style="margin-bottom:12px">'
      +[{v:wr+"%",l:"Win Rate",c:wr>=55?"var(--green)":wr>=45?"var(--v3)":"var(--red)"},
        {v:(roi>0?"+":"")+roi+"%",l:"ROI",c:roi>0?"var(--green)":"var(--red)"},
        {v:(avgClv>0?"+":"")+avgClv+"%",l:"CLV Moyen",c:avgClv>2?"var(--green)":avgClv>0?"var(--v3)":"var(--red)"},
        {v:avgOdds+"x",l:"Cote moy.",c:"var(--v3)"}
       ].map(function(s){
         return'<div class="stat-box"><div class="stat-val" style="color:'+s.c+'">'+s.v+'</div><div class="stat-lbl">'+s.l+'</div></div>';
       }).join("")+'</div>'
      +'<div style="padding:12px 14px;background:var(--c2);border:1px solid var(--ln);border-radius:var(--r2);margin-bottom:10px">'
      +'<div style="font-size:11px;font-weight:700;color:var(--w2);margin-bottom:6px">📊 Interprétation CLV</div>'
      +'<div style="font-size:11px;color:var(--g3);line-height:1.8">'
      +(avgClv>3?'✅ Excellent CLV — Tu bats régulièrement la cote de fermeture. Profitabilité long terme confirmée.':
        avgClv>0?'📊 CLV positif — Tu es sur la bonne voie. Continue à chercher la value.':
        '⚠️ CLV négatif — Tu paristes principalement sur des marchés surévalués. Revoir la stratégie.')
      +'</div></div></div>';
  }

  // CONCEPTS RISQUE
  h+='<div class="card"><div class="clbl">Concepts clés de gestion du risque</div>'
    +'<div style="display:flex;flex-direction:column;gap:8px">';
  [
    {t:"Variance vs Edge",d:"Même avec un edge positif, tu peux perdre sur 50-100 paris de suite. C'est la variance. Ne juge jamais ton système sur moins de 500 paris.",c:"var(--v3)"},
    {t:"Expected Value (EV)",d:"EV = (Prob × Cote) - 1. Si EV > 0, le pari est mathématiquement profitable à long terme même si tu perds parfois.",c:"var(--gold)"},
    {t:"Closing Line Value (CLV)",d:"Meilleur indicateur de talent. Si la cote baisse après ta mise, tu avais raison. Un CLV moyen > 2% = parieur profitable.",c:"var(--green)"},
    {t:"Ruin du parieur",d:"Même avec 60% de win rate, des mises trop grosses peuvent te ruiner. Kelly est là pour éviter ça. Respecte-le absolument.",c:"var(--red)"},
  ].forEach(function(c){
    h+='<div style="padding:12px 14px;background:var(--c2);border-left:3px solid '+c.c+';border-radius:var(--r2)">'
      +'<div style="font-size:12px;font-weight:700;color:'+c.c+';margin-bottom:4px">'+c.t+'</div>'
      +'<div style="font-size:11px;color:var(--g3);line-height:1.7">'+c.d+'</div></div>';
  });
  h+='</div></div>';
  return h;
}

     }).join("")+'</div>';

  if(hist.length){
    var wons=hist.filter(function(h){return h.result==="WIN";});
    var totalMise=hist.reduce(function(a,h){return a+(h.stake||0);},0);
    var totalProfit=hist.reduce(function(a,h){return a+(h.profit||0);},0);
    var avgClv=+(hist.reduce(function(a,h){return a+(h.clv||0);},0)/hist.length*100).toFixed(1);
    h+='<div class="card-v"><div class="clbl">Performance CLV</div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px">'
      +[{v:(avgClv>0?"+":"")+avgClv+"%",l:"CLV Moyen",c:avgClv>2?"var(--green)":avgClv>0?"var(--v3)":"var(--red)"},
        {v:totalMise.toFixed(0)+"€",l:"Total Misé",c:"var(--w2)"},
        {v:(totalProfit>0?"+":"")+totalProfit.toFixed(2)+"€",l:"Profit Total",c:totalProfit>0?"var(--green)":"var(--red)"}
       ].map(function(s){
         return'<div class="kelly-box"><div class="kelly-val" style="color:'+s.c+'">'+s.v+'</div><div class="kelly-lbl">'+s.l+'</div></div>';
       }).join("")+'</div>'
      +'<div style="font-size:11px;color:var(--g3);line-height:1.7">'
      +(avgClv>2?'✅ CLV excellent (+'+avgClv+'%) — Tu bats la fermeture. Profitabilité long terme confirmée.':
        avgClv>0?'📊 CLV positif (+'+avgClv+'%) — Bonne direction, continue.':
        '⚠️ CLV négatif ('+avgClv+'%) — Revoir la sélection des marchés.')
      +'</div></div>';

    h+='<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:13px">'
      +'<div class="clbl" style="margin-bottom:0">Historique complet ('+hist.length+')</div>'
      +'<button onclick="if(confirm(\'Effacer tout ?\')){saveHist([]);renderPage();}" '
      +'style="font-size:10px;color:var(--red);background:none;border:none;cursor:pointer;font-weight:700">Tout effacer</button></div>';
    hist.slice(0,20).forEach(function(entry){
      h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--ln2)">'
        +'<div style="flex:1"><div style="font-size:12px;font-weight:700">'+esc(entry.match||"?")+'</div>'
        +'<div style="display:flex;gap:8px;margin-top:3px;flex-wrap:wrap">'
        +'<span style="font-family:\'JetBrains Mono\',monospace;font-size:9px;color:var(--g3)">'+esc(entry.date||"")+'</span>'
        +(entry.oddsT?'<span style="font-family:\'JetBrains Mono\',monospace;font-size:9px;color:var(--g3)">@ '+entry.oddsT+'</span>':"")
        +(entry.clv?'<span style="font-family:\'JetBrains Mono\',monospace;font-size:9px;font-weight:700;color:'+(entry.clv>0?"var(--green)":"var(--red)")+'">'
          +'CLV '+(entry.clv>0?"+":"")+((entry.clv||0)*100).toFixed(1)+'%</span>':"")
        +'</div></div>'
        +'<div style="text-align:right;flex-shrink:0;margin-left:12px">'
        +'<div style="font-size:15px;font-weight:800;color:'+(entry.result==="WIN"?"var(--green)":"var(--red)")+';font-variant-numeric:tabular-nums">'
        +(entry.profit>0?"+":"")+entry.profit+'€</div>'
        +'<div style="font-family:\'JetBrains Mono\',monospace;font-size:9px;color:var(--g3);margin-top:2px">'+entry.stake+'€ misés</div>'
        +'</div></div>';
    });
    h+='</div>';
  }else{
    h+='<div class="empty"><div class="empty-icon">💎</div>'
      +'<div class="empty-title">Aucun pari enregistré</div>'
      +'<div class="empty-sub">Analysez un match et enregistrez vos résultats<br>pour suivre votre bankroll et CLV</div></div>';
  }
  return h;
}

/* ══════════════════════════════════════
   PAGE STATS
══════════════════════════════════════ */
function pageStats(){
  var hist=S.hist;
  var wons=hist.filter(function(h){return h.result==="WIN";});
  var losses=hist.filter(function(h){return h.result==="LOSS";});
  var tot=hist.length,wr=tot?Math.round(wons.length/tot*100):0;
  var totalMise=hist.reduce(function(a,h){return a+(h.stake||0);},0);
  var totalProfit=hist.reduce(function(a,h){return a+(h.profit||0);},0);
  var roi=totalMise>0?+((totalProfit/totalMise)*100).toFixed(1):0;
  var avgClv=tot?+(hist.reduce(function(a,h){return a+(h.clv||0);},0)/tot*100).toFixed(1):0;
  var avgOdds=tot?+(hist.reduce(function(a,h){return a+(h.oddsT||2);},0)/tot).toFixed(2):0;
  var bestWin=wons.length?Math.max.apply(null,wons.map(function(h){return h.profit||0;})):0;
  var worstLoss=losses.length?Math.min.apply(null,losses.map(function(h){return h.profit||0;})):0;
  var streak=(function(){var s=0,max=0;hist.forEach(function(h){if(h.result==="WIN")s++;else s=0;if(s>max)max=s;});return max;})();

  if(!tot)return'<div class="empty"><div class="empty-icon">📊</div><div class="empty-title">Aucun pari enregistré</div><div class="empty-sub">Analysez des matchs et enregistrez vos résultats pour voir vos statistiques complètes</div></div>';

  var score=Math.min(100,Math.max(0,wr*0.4+(roi>0?Math.min(roi*2,30):0)+(avgClv>0?Math.min(avgClv*5,20):0)));
  var scoreLabel=score>=80?"Elite 🏆":score>=60?"Sharp 🎯":score>=40?"Confirmé ✓":"Débutant 📚";
  var scoreColor=score>=80?"var(--green)":score>=60?"var(--v3)":score>=40?"var(--gold)":"var(--red)";

  var h='<div style="font-size:22px;font-weight:900;letter-spacing:-1px;margin-bottom:3px">Mes Statistiques</div>'
    +'<div style="font-size:12px;color:var(--g3);margin-bottom:16px">'+tot+' paris enregistrés · Analyse complète</div>'
    +'<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:12px">'
    +[{i:"🎯",l:"Win Rate",v:wr+"%",sub:wons.length+"V / "+losses.length+"D",c:wr>=55?"var(--green)":wr>=45?"var(--v3)":"var(--red)"},
      {i:"💰",l:"ROI Total",v:(roi>0?"+":"")+roi+"%",sub:(totalProfit>0?"+":"")+totalProfit.toFixed(2)+"€",c:roi>0?"var(--green)":"var(--red)"},
      {i:"📈",l:"CLV Moyen",v:(avgClv>0?"+":"")+avgClv+"%",c:avgClv>2?"var(--green)":avgClv>0?"var(--v3)":"var(--red)"},
      {i:"🎰",l:"Cote Moy.",v:avgOdds+"x",c:"var(--v3)"}
     ].map(function(s){
       return'<div style="background:var(--c1);border:1px solid var(--ln);border-radius:var(--r3);padding:15px 13px;transition:border-color .15s" '
         +'onmouseover="this.style.borderColor=\'rgba(124,58,237,.25)\'" onmouseout="this.style.borderColor=\'var(--ln)\'">'
         +'<div style="font-size:18px;margin-bottom:7px">'+s.i+'</div>'
         +'<div style="font-size:21px;font-weight:900;color:'+s.c+';letter-spacing:-1px;line-height:1;margin-bottom:4px;font-variant-numeric:tabular-nums">'+s.v+'</div>'
         +'<div style="font-size:11px;font-weight:600;color:var(--w2);margin-bottom:'+(s.sub?3:0)+'px">'+s.l+'</div>'
         +(s.sub?'<div style="font-size:10px;color:var(--g3)">'+s.sub+'</div>':"")
         +'</div>';
     }).join("")+'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px">'
    +[{v:"+"+bestWin.toFixed(2)+"€",l:"Meilleur gain",c:"var(--green)"},
      {v:worstLoss.toFixed(2)+"€",l:"Pire perte",c:"var(--red)"},
      {v:streak+" V",l:"Série max",c:"var(--v3)"},
      {v:totalMise.toFixed(0)+"€",l:"Total misé",c:"var(--g2)"}
     ].map(function(s){
       return'<div class="stat-box"><div class="stat-val" style="color:'+s.c+';font-size:16px">'+s.v+'</div><div class="stat-lbl">'+s.l+'</div></div>';
     }).join("")+'</div>';

  h+='<div class="card-v"><div class="clbl">Score de performance</div>'
    +'<div style="height:7px;background:var(--g4);border-radius:3px;overflow:hidden;margin-bottom:12px">'
    +'<div style="height:100%;width:'+score+'%;background:linear-gradient(90deg,var(--v),var(--v3));border-radius:3px;transition:width 1.5s cubic-bezier(.4,0,.2,1)"></div></div>'
    +'<div style="font-size:28px;font-weight:900;letter-spacing:-1px;color:'+scoreColor+';margin-bottom:4px;font-variant-numeric:tabular-nums">'+score.toFixed(0)+'/100</div>'
    +'<div style="font-size:14px;font-weight:700;color:'+scoreColor+'">'+scoreLabel+'</div>'
    +'<div style="font-size:11px;color:var(--g3);margin-top:5px;line-height:1.7">Calculé sur win rate, ROI, CLV et régularité</div></div>';
  return h;
}

/* ══════════════════════════════════════
   RENDER
══════════════════════════════════════ */
function renderPage(){
  var pg=document.getElementById("page");
  var t=S.tab,h="";
  if(t==="home")h=pageHome();
  else if(t==="scanner")h=pageScanner();
  else if(t==="matchs")h=pageMatchs();
  else if(t==="tips")h=pageTips();
  else if(t==="comp")h=pageComp();
  else if(t==="analyse")h=pageAnalyse();
  else if(t==="result")h=pageResult();
  else if(t==="money")h=pageMoney();
  else if(t==="risk")h=pageRisk();
  else if(t==="bankroll")h=pageBankroll();
  else if(t==="stats")h=pageStats();
  pg.innerHTML=h;
  buildSide();updTop();updSide();
}
function render(){renderPage();}

/* ══════════════════════════════════════
   INIT
══════════════════════════════════════ */
fetchMatches();
</script>
