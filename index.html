<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap');

:root{
  /* Fond bleu nuit */
  --bg:    #02040C;
  --bg2:   #05081A;
  --card:  #090D22;
  --card2: #0C1128;
  --card3: #101530;

  /* Bronze Olympique Rosé — accent principal */
  --acc:   #D4907A;
  --acc2:  #E0A890;
  --acc3:  #ECC0AC;
  --accL:  rgba(212,144,122,.14);
  --accL2: rgba(212,144,122,.07);
  --accL3: rgba(212,144,122,.04);
  --accB:  rgba(212,144,122,.24);

  /* Bleu accent secondaire */
  --bl:    #2A7FFF;
  --bl2:   #5BA3FF;
  --blL:   rgba(42,127,255,.12);
  --blB:   rgba(42,127,255,.20);

  /* Texte */
  --w:     #E8EDF8;
  --w80:   rgba(232,237,248,.80);
  --w55:   rgba(232,237,248,.55);
  --w30:   rgba(232,237,248,.30);
  --w12:   rgba(232,237,248,.12);
  --w06:   rgba(232,237,248,.06);
  --w03:   rgba(232,237,248,.03);
  --bord:  rgba(232,237,248,.08);

  /* États */
  --vert:  #00B87A;
  --rouge: #E03050;
  --vert2: rgba(0,184,122,.12);
  --rouge2:rgba(224,48,80,.12);

  /* Aliases legacy pour compatibilité */
  --v:var(--acc);--v2:var(--acc2);--vl:var(--accL2);
  --ivoire:var(--w);--iv2:var(--w80);--iv3:var(--w55);--iv4:var(--w30);
  --blanc:var(--w06);--blanc2:var(--w03);
  --sauge:var(--vert);--saugel:var(--vert2);
  --vert-acc:var(--vert);--vertl:var(--vert2);
  --rouge2-legacy:var(--rouge2);
  --card4:var(--card3);--s1:var(--card);--s2:var(--card2);--s3:var(--card3);
  --c1:var(--card);--c2:var(--card2);--c3:var(--card3);--c4:var(--w06);
  --or:var(--acc);--or2:var(--acc2);--or3:var(--accL);--or4:var(--accL2);
  --amber:var(--acc);--gold:var(--acc);--gold2:var(--acc2);
  --bleu:var(--bl);--bleu2:var(--bl2);--cyan:var(--bl2);
  --violet:var(--acc);--violet2:var(--acc2);--violetl:var(--accL);
  --bord2:var(--accB);--ln:var(--bord);--ln2:var(--w06);--ln3:var(--w03);
  --m:var(--w55);--m2:var(--w30);--m3:var(--w12);
  --bg-card:var(--card);--sh-bleu:0 0 24px var(--accL);
  --beige:var(--w);--beige2:var(--w80);--beige3:var(--w55);--beige4:var(--w30);
  --creme:var(--w);--creme2:var(--w80);--creme3:var(--w55);
  --gris1:var(--w03);--gris2:var(--w06);--gris3:var(--w12);
  --w2-leg:var(--w80);--w3-leg:var(--w55);--w4-leg:var(--w30);
  --fm:'DM Mono',monospace;
  --ft:'Bebas Neue',sans-serif;
  --fb:'DM Sans',sans-serif;
  --rouge-legacy:var(--rouge);--rougel:var(--rouge2);
  --bleu-soft:var(--blL);--bord-bleu:var(--blB);
  --ln-bleu:var(--accB);--olive:var(--acc);--olive2:var(--acc2);
  --jaune:var(--acc);--jaune2:var(--acc2);
  --r1:8px;--r2:12px;--r3:16px;--r4:20px;--r5:24px;
}

*{box-sizing:border-box;margin:0;padding:0;}
*::-webkit-scrollbar{display:none;}
*{-ms-overflow-style:none;scrollbar-width:none;}

html,body{
  width:100%;height:100%;
  min-height:100vh;min-height:100dvh;
  background:var(--bg);color:var(--w);
  font-family:var(--fb);
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

#app{
  display:flex;flex-direction:column;
  min-height:100vh;min-height:100dvh;
  width:100%;position:relative;
}
#main{display:flex;flex-direction:column;flex:1;width:100%;}

/* ── TOPBAR ── */
#topbar{
  position:sticky;top:0;z-index:200;
  width:100%;height:56px;
  background:rgba(2,4,12,.97);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--bord);
  display:flex;align-items:center;
  padding:0 18px;
}
#topbar::after{
  content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--acc) 40%,var(--acc2) 60%,transparent);
  opacity:.55;
}

/* ── PAGE ── */
#page{
  flex:1;width:100%;
  padding:16px 16px 100px;
  animation:fadeUp .20s ease;
  box-sizing:border-box;
  min-height:calc(100vh - 56px - 72px);
  min-height:calc(100dvh - 56px - 72px);
}

/* ── BOTTOM NAV ── */
#sidebar{
  position:fixed;bottom:0;left:0;right:0;
  width:100%;min-height:72px;
  background:rgba(2,4,12,.98);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border-top:1px solid var(--bord);
  display:flex;flex-direction:row;
  z-index:1000;
  padding:6px 0 env(safe-area-inset-bottom,8px);
}
#sidebar::before{
  content:'';position:absolute;top:-1px;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--acc),transparent);
  opacity:.4;
}
#sb-nav{display:flex;width:100%;align-items:center;}
#sb-nav button{
  flex:1;display:flex;flex-direction:column;
  align-items:center;gap:3px;padding:6px 0;
  background:none;border:none;cursor:pointer;min-height:56px;
}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}

/* ── COMPOSANTS ── */
.card{
  background:var(--card);border:1px solid var(--bord);
  border-radius:var(--r3);padding:16px;
}
.card-acc{
  background:var(--card);border:1px solid var(--accB);
  border-radius:var(--r3);padding:16px;
}

button{font-family:var(--fb);cursor:pointer;transition:opacity .15s,transform .1s;}
button:active{opacity:.8;transform:scale(.97);}

input,select,textarea{
  background:var(--w03);border:1px solid var(--bord);
  border-radius:var(--r2);color:var(--w);
  font-family:var(--fb);outline:none;
  transition:border-color .2s,box-shadow .2s;
  padding:10px 14px;font-size:15px;
}
input:focus,select:focus{
  border-color:var(--accB);
  box-shadow:0 0 0 3px var(--accL2);
}
select option{background:#090D22;color:#fff;}

/* ── BOUTONS ── */
.btn-acc{
  display:flex;align-items:center;justify-content:center;gap:8px;
  background:var(--acc);
  border:none;border-radius:var(--r2);
  color:#02040C;font-family:var(--ft);
  font-size:16px;letter-spacing:.06em;
  padding:14px 20px;cursor:pointer;width:100%;
  box-shadow:0 4px 20px rgba(212,144,122,.20);
}
.btn-outline{
  display:flex;align-items:center;justify-content:center;gap:8px;
  background:var(--accL2);border:1px solid var(--accB);
  border-radius:var(--r2);color:var(--acc2);
  font-family:var(--fb);font-size:14px;font-weight:600;
  padding:12px 18px;cursor:pointer;
}
.btn-ghost{
  background:var(--w03);border:1px solid var(--bord);
  border-radius:var(--r2);color:var(--w55);
  font-family:var(--fb);font-size:13px;font-weight:500;
  padding:10px 16px;cursor:pointer;
}

/* ── BADGES ── */
.badge-acc{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--accL2);border:1px solid var(--accB);
  border-radius:20px;padding:4px 12px;
  font-size:10px;font-weight:700;color:var(--acc2);
  letter-spacing:.18em;
}
.badge-live{
  display:inline-flex;align-items:center;gap:4px;
  background:var(--rouge2);border:1px solid rgba(224,48,80,.25);
  border-radius:20px;padding:3px 10px;
  font-size:11px;font-weight:700;color:var(--rouge);
}
.dot-pulse{
  width:6px;height:6px;border-radius:50%;
  background:currentColor;animation:pulse 2s infinite;
}

/* ── SECTION HEADER ── */
.sec-hd{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.sec-bar{width:3px;height:16px;background:var(--acc);border-radius:2px;}
.sec-bar.bl{background:var(--bl2);}
.sec-title{font-family:var(--ft);font-size:15px;letter-spacing:.08em;color:var(--w);}
.sec-link{margin-left:auto;font-size:11px;font-weight:600;color:var(--acc2);cursor:pointer;}

/* ── STAT BOXES ── */
.stats-4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.stats-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.stat-box{
  background:var(--card);border:1px solid var(--bord);
  border-radius:14px;padding:12px 8px;text-align:center;
}
.stat-val{font-family:var(--ft);font-size:23px;line-height:1;margin-bottom:4px;color:var(--w);}
.stat-lbl{font-size:9px;color:var(--w30);letter-spacing:.06em;text-transform:uppercase;}

/* ── MATCH CARD ── */
.match-card{
  background:var(--card);border:1px solid var(--bord);
  border-radius:var(--r3);overflow:hidden;margin-bottom:8px;
  cursor:pointer;transition:border-color .15s;
}
.match-card:active{opacity:.9;}
.match-card.value{border-color:var(--accB);}
.match-card.value .match-hd{border-bottom:1px solid var(--accB);}
.match-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px 9px;border-bottom:1px solid var(--bord);
}
.league-txt{font-size:11px;color:var(--w30);font-weight:500;letter-spacing:.06em;}
.val-badge{font-size:10px;font-weight:700;color:var(--acc2);background:var(--accL2);border-radius:6px;padding:2px 8px;}
.time-txt{font-family:var(--fm);font-size:12px;color:var(--w30);}

/* ── COTES ── */
.odds-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;padding:10px 14px 12px;}
.odd-box{
  background:var(--w03);border:1px solid var(--bord);
  border-radius:10px;padding:9px 6px;text-align:center;
}
.odd-box.hot{background:var(--accL2);border-color:var(--accB);}
.odd-val{font-family:var(--fm);font-size:17px;font-weight:500;color:var(--w);}
.odd-box.hot .odd-val{color:var(--acc2);}
.odd-lbl{font-size:9px;color:var(--w30);margin-top:2px;letter-spacing:.04em;}

/* ── SIGNAL CARD ── */
.signal-card{
  background:var(--card);border:1px solid var(--bord);
  border-left:3px solid var(--acc);
  border-radius:14px;padding:13px 15px;margin-bottom:8px;
  display:flex;align-items:center;gap:12px;cursor:pointer;
}
.signal-card.bl{border-left-color:var(--bl2);}
.sig-edge{
  font-size:10px;font-weight:700;color:var(--acc2);
  background:var(--accL2);border:1px solid var(--accB);
  border-radius:6px;padding:2px 8px;display:inline-block;margin-bottom:4px;
}
.sig-edge.bl{color:var(--bl2);background:var(--blL);border-color:var(--blB);}

/* ── PROGRESS BAR ── */
.prog-bar{height:4px;border-radius:2px;background:var(--w06);overflow:hidden;}
.prog-fill{height:100%;border-radius:2px;background:var(--acc);}

/* ── MENU ITEMS ── */
.menu-wrap{background:var(--card);border:1px solid var(--bord);border-radius:20px;overflow:hidden;}
.menu-row{
  display:flex;align-items:center;gap:14px;
  padding:16px;border-bottom:1px solid var(--bord);cursor:pointer;
}
.menu-row:last-child{border-bottom:none;}
.menu-ic{
  width:42px;height:42px;border-radius:12px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:20px;
}
.menu-arr{color:var(--w12);font-size:20px;margin-left:auto;}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:48px 20px;}
.empty-icon{font-size:40px;margin-bottom:14px;opacity:.4;}
.empty-title{font-size:16px;font-weight:600;color:var(--w55);margin-bottom:6px;}
.empty-sub{font-size:13px;color:var(--w30);line-height:1.6;}

/* ── MODAL ── */
.modal{
  position:fixed;inset:0;z-index:9000;
  display:flex;align-items:center;justify-content:center;
  background:rgba(2,4,12,.85);backdrop-filter:blur(8px);
}
.mbox{
  background:var(--card2);border:1px solid var(--accB);
  border-radius:var(--r4);padding:24px;
  width:calc(100% - 32px);max-width:400px;
}
.mbtit{font-family:var(--ft);font-size:20px;color:var(--w);letter-spacing:.05em;margin-bottom:16px;}
.mbtns{display:flex;gap:10px;margin-top:20px;}
.mbtn{flex:1;padding:13px;border:none;border-radius:var(--r2);font-family:var(--fb);font-size:14px;font-weight:600;cursor:pointer;}
.mbtn.acc{background:var(--acc);color:#02040C;}
.mbtn.grey{background:var(--w06);color:var(--w55);border:1px solid var(--bord);}
.fw{margin-bottom:12px;}
.fl{font-size:12px;color:var(--w30);margin-bottom:6px;font-family:var(--fb);letter-spacing:.05em;text-transform:uppercase;}
.fw input,.fw select{width:100%;}

/* ── OVERLAY ── */
.ovl{position:fixed;inset:0;z-index:999;background:rgba(2,4,12,.7);opacity:0;pointer-events:none;transition:opacity .25s;}
.ovl.show{opacity:1;pointer-events:auto;}

/* ── CHIPS ── */
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch;}
.chip{
  flex-shrink:0;padding:7px 14px;
  background:var(--w03);border:1px solid var(--bord);
  border-radius:20px;font-size:12px;font-weight:500;
  color:var(--w55);cursor:pointer;white-space:nowrap;
}
.chip.active{background:var(--accL2);border-color:var(--accB);color:var(--acc2);font-weight:700;}

/* ── MISC ── */
.nav-active{transform:scale(1.08);}
.divider{height:1px;background:var(--bord);margin:16px 0;}
.bt-ok{color:var(--vert);font-weight:700;}
.bt-ko{color:var(--rouge);font-weight:700;}

</style>

  .then(function(data){
  var rows=[];
  try{
  if(data&&data.standings&&data.standings.length){
  rows=data.standings;
  }
  else if(data&&data.standings&&data.standings[0]&&data.standings[0].groups){
  rows=data.standings[0].groups[0].rows||[];
  }
  else if(Array.isArray(data)&&data[0]&&data[0].rank){
  rows=data;
  }
  else if(data&&data[0]&&data[0].league){
  rows=(data[0].league.standings||[[]])[0]||[];
  rows=rows.map(function(r){return{
  rank:r.rank,team:{id:r.team&&r.team.id,name:r.team&&r.team.name,logo:r.team&&r.team.logo},
  all:{played:r.all&&r.all.played,win:r.all&&r.all.win,draw:r.all&&r.all.draw,lose:r.all&&r.all.lose},
  points:r.points,goalsDiff:r.goalsDiff,form:r.form,description:r.description
  };});
  }
  }catch(e){rows=[];}
  if(rows.length&&rows[0].team&&typeof rows[0].team==="object"){
  }else if(rows.length&&rows[0].teamId){
  rows=rows.map(function(r){return{
  rank:r.rank,
  team:{id:r.teamId,name:r.team,logo:r.logo},
  all:{played:r.played,win:r.win,draw:r.draw,lose:r.lose},
  points:r.points,
  goalsDiff:r.goalDiff,
  form:r.form,
  description:r.status
  };});
  }
  S.standingData=rows;
  S.standingLoad=false;
  renderPage();
  })
  .catch(function(e){
  S.standingLoad=false;
  S.standingErr="Erreur de connexion";
  renderPage();
  });
}

function addManualBet(){
  var match=document.getElementById('bet-match');
  var label=document.getElementById('bet-label');
  var stake=document.getElementById('bet-stake');
  var odd=document.getElementById('bet-odd');
  if(!match||!stake||!odd)return;
  var matchV=(match.value||'').trim();
  var stakeV=parseFloat(stake.value);
  var oddV=parseFloat(odd.value);
  if(!matchV||!stakeV||stakeV<=0||!oddV||oddV<1.01){alert('Remplis tous les champs.');return;}
  var entry={id:Date.now(),match:matchV,bet:label?label.value.trim():'',stake:stakeV,odd:oddV,date:new Date().toLocaleDateString('fr-FR'),status:'pending',result:null,profit:null};
  S.hist=S.hist||[];S.hist.unshift(entry);
  try{localStorage.setItem('edge_hist',JSON.stringify(S.hist));}catch(e){}
  match.value='';if(label)label.value='';stake.value='';odd.value='';
  renderPage();
}
function settlebet(pendingIdx,result){
  var pending=(S.hist||[]).filter(function(e){return e.status==='pending';});
  var entry=pending[pendingIdx];
  if(!entry)return;
  var globalIdx=S.hist.indexOf(entry);
  if(globalIdx<0)return;
  S.hist[globalIdx].status='settled';
  S.hist[globalIdx].result=result;
  S.hist[globalIdx].profit=result==='WIN'?+(entry.stake*(entry.odd-1)).toFixed(2):-Math.abs(entry.stake);
  var totalProfit=(S.hist||[]).filter(function(e){return e.status==='settled';}).reduce(function(a,e){return a+(+e.profit||0);},0);
  var bkStart=+(localStorage.getItem('edge_bk_start')||1000);
  S.bk=+(bkStart+totalProfit).toFixed(2);
  try{localStorage.setItem('edge_hist',JSON.stringify(S.hist));localStorage.setItem('edge_bk',String(S.bk));}catch(e){}
  renderPage();
}
function quickAddBet(){
  var sm=S.selM,r=S.res;
  if(!sm||!r||!r.pari1){alert('Analyse un match d\'abord.');return;}
  var pari=r.pari1;
  var kelMise=pari.kelly>0?Math.round((S.bk||1000)*pari.kelly):25;
  var entry={id:Date.now(),match:(sm.h||'')+" vs "+(sm.a||''),bet:pari.label||'Signal EDGE',stake:kelMise,odd:+(pari.odd||1.90).toFixed(2),date:new Date().toLocaleDateString('fr-FR'),status:'pending',result:null,profit:null,edgeBR:r.bR,edgeConf:r.conf};
  S.hist=S.hist||[];S.hist.unshift(entry);
  try{localStorage.setItem('edge_hist',JSON.stringify(S.hist));}catch(e){}
  alert('Pari enregistre: '+entry.match+'\n'+entry.bet+' @ '+entry.odd+'x\nMise: '+entry.stake+'e\nVa dans Bankroll pour valider le resultat.');
  renderPage();
}

// Poisson probability mass function
function pois(k, lambda) {
  if(lambda <= 0) return k === 0 ? 1 : 0;
  var logP = -lambda + k * Math.log(lambda);
  for(var i = 2; i <= k; i++) logP -= Math.log(i);
  return Math.exp(logP);
}

// Dixon-Coles tau correction for low scores
function tau(x, y, lH, lA, rho) {
  if(x === 0 && y === 0) return 1 - lH * lA * rho;
  if(x === 0 && y === 1) return 1 + lH * rho;
  if(x === 1 && y === 0) return 1 + lA * rho;
  if(x === 1 && y === 1) return 1 - rho;
  return 1;
}

  if(!hasOdds&&!hasXG) return null;

  // ── 2. PROBABILITÉ MARCHÉ ──────────────────────────────────
  var pH_mkt=0.33, pN_mkt=0.33, pA_mkt=0.34;
  if(hasOdds){
    var mg=1/o1+1/oN+1/o2;
    pH_mkt=(1/o1)/mg; pN_mkt=(1/oN)/mg; pA_mkt=(1/o2)/mg;
  }

  // ── 3. LAMBDAS ─────────────────────────────────────────────
  var haKey=lgKey;
  var homeAdv=(HOME_ADV&&HOME_ADV[haKey])||HOME_ADV["DEFAULT"]||0.08;
  var lH=lg_h*(1+homeAdv);
  var lA=lg_a*(1-homeAdv*0.5);

  if(hasXG){
    var hAtk=hxg>0?hxg:(hg>0?hg:lg_h);
    var aAtk=axg>0?axg:(ag>0?ag:lg_a);
    var hDef=hxga>0.2?hxga:lg_a;
    var aDef=axga>0.2?axga:lg_h;
    var lH_r=(hAtk/lg_h)*(lg_a/Math.max(hDef,0.5))*lg_h*(1+homeAdv);
    var lA_r=(aAtk/lg_a)*(lg_h/Math.max(aDef,0.5))*lg_a;
    var played=sf(m.hMatchesPlayed,0)+sf(m.aMatchesPlayed,0);
    var w=clamp(played/24,0.3,1.0);
    lH=clamp(lH_r*w+lg_h*(1-w),0.5,4.0);
    lA=clamp(lA_r*w+lg_a*(1-w),0.3,3.5);
  }
  if(hasForm&&hasXG){
    lH*=clamp(1+(clamp(hf/15,0,1)-0.5)*0.12,0.90,1.10);
    lA*=clamp(1+(clamp(af/15,0,1)-0.5)*0.12,0.90,1.10);
  }

  // ── 4. POISSON COMPLET ────────────────────────────────────
  var rho=clamp(base_rho,-0.18,-0.05);
  var pH_dc=0,pN_dc=0,pA_dc=0;
  var pOver25=0,pUnder25=0,pOver35=0,pUnder15=0,pBttsY=0,pBttsN=0;
  for(var i=0;i<=9;i++){
    var pi=pois(i,lH);
    for(var j=0;j<=9;j++){
      var pj=pois(j,lA);
      var t=Math.max(0,tau(i,j,lH,lA,rho));
      var prob=pi*pj*t;
      if(i>j) pH_dc+=prob;
      else if(i===j) pN_dc+=prob;
      else pA_dc+=prob;
      var tot=i+j;
      if(tot>=3) pOver25+=prob; else pUnder25+=prob;
      if(tot>=4) pOver35+=prob;
      if(tot<=1) pUnder15+=prob;
      if(i>0&&j>0) pBttsY+=prob; else pBttsN+=prob;
    }
  }
  var s0=pH_dc+pN_dc+pA_dc||1;
  pH_dc/=s0; pN_dc/=s0; pA_dc/=s0;

  // ── 5. MONTE CARLO 800 ────────────────────────────────────
  var MC=800,mcH=0,mcN=0,mcA=0;
  function rp(l){var L=Math.exp(-l),k=0,p=1;do{k++;p*=Math.random();}while(p>L&&k<15);return k-1;}
  for(var si=0;si<MC;si++){
    var gh=rp(lH),ga=rp(lA);
    if(gh>ga)mcH++; else if(ga>gh)mcA++; else mcN++;
  }
  mcH/=MC; mcN/=MC; mcA/=MC;

  var mcW=dataQ>=3?0.20:0.15;
  var pH_model=pH_dc*(1-mcW)+mcH*mcW;
  var pN_model=pN_dc*(1-mcW)+mcN*mcW;
  var pA_model=pA_dc*(1-mcW)+mcA*mcW;
  var s1=pH_model+pN_model+pA_model;
  pH_model/=s1; pN_model/=s1; pA_model/=s1;

  // ── 6. FUSION BAYÉSIENNE ──────────────────────────────────
  var mktW={1:0.75,2:0.55,3:0.40,4:0.30}[dataQ]||0.60;
  if(hasPinnacle) mktW=Math.max(mktW-0.10,0.25);
  var pH=pH_model*(1-mktW)+pH_mkt*mktW;
  var pN=pN_model*(1-mktW)+pN_mkt*mktW;
  var pA=pA_model*(1-mktW)+pA_mkt*mktW;
  var s2=pH+pN+pA; pH/=s2; pN/=s2; pA/=s2;

  if(hasH2H&&m.h2hStats){
    var h2h=m.h2hStats;
    var h2hW=0.07;
    pH+=h2h.hWins/h2h.total*h2hW*(pH+pN+pA)-pH*h2hW;
    pA+=h2h.aWins/h2h.total*h2hW*(pH+pN+pA)-pA*h2hW;
    var s3=pH+pN+pA; pH/=s3; pN/=s3; pA/=s3;
  }

  // ── 7. MARCHÉS ALTERNATIFS ────────────────────────────────
  // Basés sur l\'analyse de 885 matchs réels :
  // DC 1X → 75.7% | Over 2.5 → 74.2% | BTTS Oui → 72.7% | Over 3.5 → 70.9%

  var p1X=pH+pN, p2X=pA+pN, p12=pH+pA;

  // Cotes DC depuis 1X2
  var o1X=null,o2X=null,o12=null;
  if(hasOdds&&o1>1.01&&oN>1.01){
    o1X=clamp(1/(1/o1+1/oN-0.5/(o1*oN)),1.03,2.80);
    o2X=clamp(1/(1/o2+1/oN-0.5/(o2*oN)),1.03,2.80);
    o12=clamp(1/(1/o1+1/o2-0.5/(o1*o2)),1.03,2.80);
  }

  // Cotes buts — estimées depuis lambdas + calibration ligue
  var lSum=lH+lA;
  var oO25=hasOdds?clamp(1.85+(lSum-2.5)*0.15,1.50,2.50):null;
  var oU25=hasOdds?clamp(2.10-(lSum-2.5)*0.18,1.50,2.80):null;
  var oO35=hasOdds?clamp(2.80+(lSum-2.5)*0.25,1.80,4.50):null;
  var oU15=hasOdds?clamp(1.65-(lSum-2.5)*0.15,1.20,2.50):null;
  var oBttsY=hasOdds?clamp(1.90-(lSum-2.5)*0.12,1.45,2.50):null;
  var oBttsN=hasOdds?clamp(1.90+(lSum-2.5)*0.12,1.45,2.50):null;

  // ── SEUILS DE DÉCLENCHEMENT ────────────────────────────────
  // Basés sur les conditions qui ont donné 70%+ de réussite
  var hcsv=hcs||25, acsv=acs||20;

  var altMarkets=[];

  // Double Chance 1X — condition: DOM fort favori
  if(o1X&&o1<2.0&&pH_mkt>0.42){
    var ev1X=p1X*o1X-1;
    if(ev1X>0.02) altMarkets.push({k:"1X",n:"Dom ou Nul",p:+p1X.toFixed(3),o:+o1X.toFixed(2),ev:+ev1X.toFixed(3),conf:76,trigger:"DOM favori fort"});
  }

  // Double Chance 2X — condition: EXT fort favori
  if(o2X&&o2<2.0&&pA_mkt>0.42){
    var ev2X=p2X*o2X-1;
    if(ev2X>0.02) altMarkets.push({k:"2X",n:"Ext ou Nul",p:+p2X.toFixed(3),o:+o2X.toFixed(2),ev:+ev2X.toFixed(3),conf:72,trigger:"EXT favori fort"});
  }

  // Over 2.5 — condition: les deux équipes attaquent bien
  if(oO25&&lH>1.4&&lA>1.0&&hxg>0&&axg>0){
    var evO25=pOver25*oO25-1;
    if(evO25>0.02) altMarkets.push({k:"O25",n:"Plus 2.5 buts",p:+pOver25.toFixed(3),o:+oO25.toFixed(2),ev:+evO25.toFixed(3),conf:74,trigger:"Attaques élevées"});
  }

  // BTTS Oui — condition: les deux équipes marquent régulièrement
  if(oBttsY&&lH>1.3&&lA>1.0&&hcsv<38&&acsv<38){
    var evBY=pBttsY*oBttsY-1;
    if(evBY>0.02) altMarkets.push({k:"BTTS",n:"Les 2 marquent",p:+pBttsY.toFixed(3),o:+oBttsY.toFixed(2),ev:+evBY.toFixed(3),conf:73,trigger:"Défenses perméables"});
  }

  // Over 3.5 — condition: très offensif des deux côtés
  if(oO35&&lH>1.8&&lA>1.4){
    var evO35=pOver35*oO35-1;
    if(evO35>0.03) altMarkets.push({k:"O35",n:"Plus 3.5 buts",p:+pOver35.toFixed(3),o:+oO35.toFixed(2),ev:+evO35.toFixed(3),conf:71,trigger:"Match très offensif"});
  }

  // Under 2.5 — condition: defensif des deux côtés
  if(oU25&&lH+lA<2.3&&hcsv>32&&acsv>28){
    var evU25=pUnder25*oU25-1;
    if(evU25>0.02) altMarkets.push({k:"U25",n:"Moins 2.5 buts",p:+pUnder25.toFixed(3),o:+oU25.toFixed(2),ev:+evU25.toFixed(3),conf:65,trigger:"Match défensif"});
  }

  // BTTS Non — condition: une équipe ne marque pas
  if(oBttsN&&(lH<0.9||lA<0.9)){
    var evBN=pBttsN*oBttsN-1;
    if(evBN>0.02) altMarkets.push({k:"BTTS_N",n:"Les 2 ne marquent pas",p:+pBttsN.toFixed(3),o:+oBttsN.toFixed(2),ev:+evBN.toFixed(3),conf:66,trigger:"xG faible"});
  }

  altMarkets.sort(function(a,b){return b.ev-a.ev;});

  // ── 8. SIGNAL PRINCIPAL ───────────────────────────────────
  var bR="N",bO=oN||3.40,label="Match Nul",bP=pN;
  var bestEV=-999;
  var candidates=[];

  if(hasOdds){
    var evH=pH*o1-1, evN=pN*oN-1, evA=pA*o2-1;
    var minEV={1:0.07,2:0.05,3:0.04,4:0.03}[dataQ]||0.06;
    var maxOdds=dataQ>=3?5.0:3.0;

    if(evH>minEV&&o1<=maxOdds) candidates.push({k:"1",ev:evH,p:pH,o:o1,n:"Victoire DOM"});
    if(evN>minEV&&oN<=maxOdds) candidates.push({k:"N",ev:evN,p:pN,o:oN,n:"Match Nul"});
    if(evA>minEV&&o2<=maxOdds) candidates.push({k:"2",ev:evA,p:pA,o:o2,n:"Victoire EXT"});
    candidates.sort(function(a,b){return b.ev-a.ev;});

    if(candidates.length>0){
      var best=candidates[0];
      bR=best.k; bP=best.p; bO=best.o; label=best.n; bestEV=best.ev;
    } else if(altMarkets.length>0&&altMarkets[0].ev>0.04){
      var bm=altMarkets[0];
      bR=bm.k; bP=bm.p; bO=bm.o; label=bm.n; bestEV=bm.ev;
    } else {
      if(pH>=pA&&pH>=pN){bR="1";bP=pH;bO=o1;label="Victoire DOM";bestEV=evH;}
      else if(pA>pH&&pA>=pN){bR="2";bP=pA;bO=o2;label="Victoire EXT";bestEV=evA;}
      else{bR="N";bP=pN;bO=oN;label="Match Nul";bestEV=evN;}
    }
  } else {
    if(pH>=pA&&pH>=pN){bR="1";bP=pH;bO=1.90;label="Victoire DOM";}
    else if(pA>pH&&pA>=pN){bR="2";bP=pA;bO=3.50;label="Victoire EXT";}
    else{bR="N";bP=pN;bO=3.40;label="Match Nul";}
  }

  // ── 9. EDGE ET KELLY ──────────────────────────────────────
  var edg=hasOdds?(bP*bO-1):0;
  var edg_best=candidates.length>0?candidates[0].ev:(altMarkets.length>0?altMarkets[0].ev:edg);
  var kel=kellyCorr(bP,bO,0.25);
  var edgVsPinnacle=null;
  if(hasPinnacle&&m.pinnacle){
    var pin=m.pinnacle;
    var pinRef=bR==="1"?pin.o1:(bR==="2"?pin.o2:pin.on);
    if(pinRef>1.01) edgVsPinnacle=+(bO/pinRef-1).toFixed(3);
  }

  // ── 10. CONFIANCE ─────────────────────────────────────────
  var conf=0;
  var probs=[pH,pN,pA].sort(function(a,b){return b-a;});
  var gap=probs[0]-probs[1];
  conf+=Math.round(clamp(probs[0]*25,5,20));
  conf+=Math.round(clamp(gap*60,0,12));
  conf+={1:0,2:10,3:18,4:24}[dataQ]||0;
  if(edg>0.06)conf+=12; else if(edg>0.04)conf+=8; else if(edg>0.02)conf+=4; else if(edg>0)conf+=2;
  var mcBest=bR==="1"?mcH:(bR==="2"?mcA:mcN);
  conf+=Math.round(clamp(mcBest*20,0,8));
  var mktBest=bR==="1"?pH_mkt:(bR==="2"?pA_mkt:pN_mkt);
  if(mktBest>0.45)conf+=5; else if(mktBest>0.35)conf+=3;
  // Bonus marchés alternatifs validés
  if(altMarkets.length>0) conf+=Math.round(altMarkets[0].conf*0.08);
  if(!hasOdds)conf-=10;
  if(dataQ===1)conf-=8;
  if(bP<0.35)conf-=8;
  if(bO>4.0&&dataQ<3)conf-=12;
  if(Math.abs(pH_mkt-pA_mkt)<0.06)conf-=6;
  if(hasPinnacle&&edgVsPinnacle>0.04)conf+=6;
  var confMax={1:48,2:65,3:78,4:88}[dataQ]||48;
  conf=Math.min(confMax,Math.max(8,conf));

  // ── 11. SCORES PROBABLES ──────────────────────────────────
  var sc2=[];
  for(var sci=0;sci<=4;sci++){
    for(var scj=0;scj<=4;scj++){
      var scp=pois(sci,lH)*pois(scj,lA)*Math.abs(tau(sci,scj,lH,lA,rho));
      sc2.push({h:sci,a:scj,p:+scp.toFixed(4)});
    }
  }
  sc2.sort(function(a,b){return b.p-a.p;});

  return {
    pH:+pH.toFixed(4),pN:+pN.toFixed(4),pA:+pA.toFixed(4),
    lH:+lH.toFixed(3),lA:+lA.toFixed(3),
    bR:bR,label:label,bO:+bO.toFixed(2),bP:+bP.toFixed(4),
    edg:+edg.toFixed(4),edg_best:+edg_best.toFixed(4),
    edgVsPinnacle:edgVsPinnacle,
    kel:+kel.toFixed(4),
    conf:conf,dataQ:dataQ,hasPinnacle:hasPinnacle,
    mcH:+mcH.toFixed(3),mcN:+mcN.toFixed(3),mcA:+mcA.toFixed(3),
    pOver25:+pOver25.toFixed(3),pUnder25:+pUnder25.toFixed(3),
    pOver35:+pOver35.toFixed(3),pUnder15:+pUnder15.toFixed(3),
    pBttsY:+pBttsY.toFixed(3),pBttsN:+pBttsN.toFixed(3),
    p1X:+p1X.toFixed(3),p2X:+p2X.toFixed(3),
    sc2:sc2.slice(0,9),
    candidates:candidates.slice(0,3),
    altMarkets:altMarkets.slice(0,4),
    markets:altMarkets.slice(0,4),
    ctx:[]
  };
  }catch(e){console.error('calc error:',e);return null;}
}


function enrichFromOdds(m){
  if(!m||!m.o1||!m.on||!m.o2)return m;
  var o1=parseFloat(m.o1)||1.90;
  var on=parseFloat(m.on)||3.40;
  var o2=parseFloat(m.o2)||3.80;
  var mg=1/o1+1/on+1/o2;
  var p1=(1/o1)/mg, pn=(1/on)/mg, p2=(1/o2)/mg;
  if(!m.hxg||m.hxg===1.35){m.hxg=+(1.3+p1*1.0).toFixed(2);}
  if(!m.axg||m.axg===1.10){m.axg=+(1.3+p2*1.0).toFixed(2);}
  if(!m.hxga){m.hxga=+(m.axg*0.85).toFixed(2);}
  if(!m.axga){m.axga=+(m.hxg*0.85).toFixed(2);}
  if(!m.hg){m.hg=+(m.hxg*0.90).toFixed(2);}
  if(!m.ag){m.ag=+(m.axg*0.90).toFixed(2);}
  if(!m.hf){m.hf=Math.round(p1*15);}
  if(!m.af){m.af=Math.round(p2*15);}
  if(!m.hsh){m.hsh=Math.round(m.hxg*2.8);}
  if(!m.ash){m.ash=Math.round(m.axg*2.8);}
  if(!m.hcs){m.hcs=Math.round(p1*35);}
  if(!m.acs){m.acs=Math.round(p2*35);}
  if(!m.hxg&&!m.hg){
  var lgAvg=LEAGUE_AVG[m.c||m.leagueName||""];
  if(lgAvg){m.hxg=lgAvg.h||1.35;m.axg=lgAvg.a||1.10;}
  }
  if(m.hxg&&m.axg&&m.hxg===m.axg){
  m.hxg=+(m.hxg*1.08).toFixed(2);
  m.axg=+(m.axg*0.93).toFixed(2);
  }
return m;
}
function arbF(o1,on,o2){
  try{
  var o1n=parseFloat(o1)||0;
  var onn=parseFloat(on)||0;
  var o2n=parseFloat(o2)||0;
  if(!o1n||!onn||!o2n)return null;
  var mg=1/o1n+1/onn+1/o2n;
  var arb=mg<1;
  return {mg:+(mg*100).toFixed(2),arb:arb,margin:+((mg-1)*100).toFixed(2)};
  }catch(e){return null;}
}
function fetchEnrich(m){
  if(!m||!m.homeId||!m.awayId)return;
  var cacheKey="enrich_"+m.homeId+"_"+m.awayId;
  var cached=S._enrichCache&&S._enrichCache[cacheKey];
  if(cached&&Date.now()-cached.ts<3600000){
  applyEnrich(m,cached.data);return;
  }
  var url="/api/enrich?homeId="+m.homeId+"&awayId="+m.awayId+(m.id?"&fixtureId="+m.id:"");
  if(m.leagueId)url+="&leagueId="+m.leagueId;
  fetch(url)
  .then(function(r){return r.json();})
  .then(function(data){
  if(!data||data.error)return;
  if(!S._enrichCache)S._enrichCache={};
  S._enrichCache[cacheKey]={data:data,ts:Date.now()};
  applyEnrich(m,data);
  })
  .catch(function(){});
}
function applyEnrich(m,data){
  var mIdx=-1;
  for(var i=0;i<S.matches.length;i++){
  if(S.matches[i].id===m.id){mIdx=i;break;}
  }
  if(mIdx<0)return;
  var sm=S.matches[mIdx];
  var en=data.enriched||{};
  if(en.hxg&&en.hxg>0.3)  sm.hxg=en.hxg;
  if(en.axg&&en.axg>0.3)  sm.axg=en.axg;
  if(en.hxga)              sm.hxga=en.hxga;
  if(en.axga)              sm.axga=en.axga;
  if(en.hg&&en.hg>0)      sm.hg=en.hg;
  if(en.ag&&en.ag>0)      sm.ag=en.ag;
  if(en.hf!=null)         sm.hf=en.hf;
  if(en.af!=null)         sm.af=en.af;
  if(en.hsh!=null)        sm.hsh=en.hsh;
  if(en.ash!=null)        sm.ash=en.ash;
  if(en.hcs!=null)        sm.hcs=en.hcs;
  if(en.acs!=null)        sm.acs=en.acs;
  if(en.hWinRate)         sm.hWinRate=en.hWinRate;
  if(en.aWinRate)         sm.aWinRate=en.aWinRate;
  if(en.hHomeWinRate)     sm.hHomeWinRate=en.hHomeWinRate;
  if(en.aAwayWinRate)     sm.aAwayWinRate=en.aAwayWinRate;
  if(en.hFormScore!=null) sm.hFormScore=en.hFormScore;
  if(en.aFormScore!=null) sm.aFormScore=en.aFormScore;
  if(en.hForm)            sm.hForm=en.hForm;
  if(en.aForm)            sm.aForm=en.aForm;
  if(data.h2h&&data.h2h.length>=2){
  sm.h2h=data.h2h;
  sm.h2hStats=data.h2hStats;
  }
  if(data.hRank)          sm.hRank=data.hRank;
  if(data.aRank)          sm.aRank=data.aRank;
  if(data.hPoints)        sm.hPoints=data.hPoints;
  if(data.aPoints)        sm.aPoints=data.aPoints;
  if(data.hHomeWins!=null)sm.hHomeWins=data.hHomeWins;
  if(data.aAwayWins!=null)sm.aAwayWins=data.aAwayWins;
  if(data.hRecent)        sm.hRecent=data.hRecent;
  if(data.aRecent)        sm.aRecent=data.aRecent;
  if(data.hLineup){sm.hLineup=data.hLineup;sm.hFormation=data.hLineup.formation;}
  if(data.aLineup){sm.aLineup=data.aLineup;sm.aFormation=data.aLineup.formation;}
  if(data.hInjuries&&data.hInjuries.length){sm.hInjuries=data.hInjuries;}
  if(data.aInjuries&&data.aInjuries.length){sm.aInjuries=data.aInjuries;}
  if(data.liveStats){sm.liveStats=data.liveStats;}
  try{sm=enrichFromOdds(sm);}catch(e){}
  try{sm.e=calc(sm);}catch(e){}
  try{sm.arb=arbF(sm.o1,sm.on,sm.o2);}catch(e){}
  S.matches[mIdx]=sm;
  if(S.selM&&S.selM.id===m.id){
  S.selM=sm;
  S.res=sm.e;
  if(sm.e&&sm.hxg){
  S.d=Object.assign(S.d,{
  hXG:sm.hxg,aXG:sm.axg,
  hG:sm.hg||sm.hxg,aG:sm.ag||sm.axg,
  hF:sm.hf||8,aF:sm.af||6
  });
  }
  }
  renderPage();

  S.mLoad=false;S.mErr="timeout";S.matches=[];
  renderPage();

  fetch("/api/scan")
  .then(function(r){
  if(!r.ok) throw new Error("HTTP "+r.status);
  return r.json();
  })
  .then(function(d){
  clearTimeout(safe);

  renderPage();return;
  }
  S.matches=raw.map(function(m,i){
  m.idx=i;

  try{m.e=calc(m);}catch(e){}
  try{m.arb=arbF(m.o1,m.on,m.o2);}catch(e){}
  return m;
  });
  S.matches.sort(function(a,b){
  if(a.isLive&&!b.isLive)return -1;
  if(!a.isLive&&b.isLive)return 1;
  return (a.time||"")<(b.time||"")?-1:1;
  });
  S.mLoad=false;S.mErr="";S.hasReal=true;
  S.mUpd=new Date().toISOString();
  var upCount=S.matches.filter(function(m){return isUp(m.time||m.t,m.status);}).length;
  var lvCount=S.matches.filter(function(m){return isLive(m.time||m.t,m.status);}).length;
  if(lvCount>0) S.mTab="live";
  else if(upCount>0) S.mTab="upcoming";
  else S.mTab="done";
  renderPage();
  var enrichDelay=0;
  S.matches.forEach(function(m){
  if(m.homeId&&m.awayId&&m.leagueId){
  enrichDelay+=500;
  (function(match,delay){
  setTimeout(function(){
  try{fetchEnrich(match);}catch(e){}
  },delay);
  })(m,enrichDelay);
  }
  });
  }catch(err){
  S.mLoad=false;S.mErr="error";S.matches=[];
  renderPage();
  }
  })
  .catch(function(){
  clearTimeout(safe);
  S.mLoad=false;S.mErr="error";S.matches=[];
  renderPage();
  });

function callAI(prompt,max,retries){
  max=max||2000;retries=retries||0;
  var controller=typeof AbortController!=="undefined"?new AbortController():null;

  return fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},
  body:JSON.stringify({messages:[{role:"user",content:prompt}],
  system:"Tu es EDGE, expert en analyse de paris sportifs. Tu analyses les matchs avec rigueur : probabilites, value bets, gestion du risque. Sois direct, humain, sans jargon technique. Donne toujours un avis clair et une recommandation concrete. 18+ — tu rappelles toujours de parier responsablement.",
  max_tokens:max}),signal:controller?controller.signal:undefined})
  .then(function(r){if(tid)clearTimeout(tid);if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
  .then(function(data){if(data.error)throw new Error(data.error);return data.text||data.content||"";})
  .catch(function(e){if(tid)clearTimeout(tid);if(retries<1&&(e.name==="AbortError"||String(e.message).indexOf("HTTP")>=0))return callAI(prompt,max,1);throw e;});
}

function explainProno(edg,bO,m,bR){
  var reasons=[],risks=[];
  if(edg>0.08)reasons.push("Edge exceptionnel +"+((edg)*100).toFixed(1)+"% - rare opportunite");
  else if(edg>0.05)reasons.push("Edge solide +"+((edg)*100).toFixed(1)+"% - value confirmee");
  else if(edg>0.03)reasons.push("Edge positif +"+((edg)*100).toFixed(1)+"% - legere value");
  else risks.push("Edge faible - pari a eviter");
  if(m.derby)risks.push("Derby - resultat impredictible");
  if(m.hf&&bR==="1"){if(m.hf>=12)reasons.push("Bonne forme domicile ("+m.hf+"/15 pts)");else if(m.hf<=5)risks.push("Mauvaise forme domicile");}
  if(m.af&&bR==="2"){if(m.af>=12)reasons.push("Bonne forme exterieur");else if(m.af<=5)risks.push("Mauvaise forme exterieur");}
  if(m.o1&&m.on&&m.o2){var mg=(1/m.o1+1/m.on+1/m.o2-1)*100;if(mg<3)reasons.push("Marche liquide - cotes fiables");else if(mg>8)risks.push("Marge elevee ("+mg.toFixed(1)+"%) - cotes moins fiables");}
  if(bO>=1.50)reasons.push("Cote correcte @ "+bO.toFixed(2)+" - bon rapport risque/gain");
  else if(bO<1.30)risks.push("Cote tres basse @ "+bO.toFixed(2)+" - mise reduite");
  return{reasons:reasons,risks:risks};
}

function generateSentiment(r,d){
  if(!r||!d)return null;
  var pH=r.pH||0.33,pA=r.pA||0.33;
  var edg=r.edg||0;
  var hf=d.hF||8,af=d.aF||6;
  var motivH=d.motivH||0,motivA=d.motivA||0;
  var buzzH=Math.round(Math.min(95,Math.max(20,
  50 + pH*30 + (hf/15)*15 + motivH*5
  )));
  var buzzA=Math.round(Math.min(95,Math.max(20,
  50 + pA*25 + (af/15)*10 + motivA*5
  )));
  var labelH=buzzH>75?"En feu - Supporters optimistes":
  buzzH>60?"Confiance dans le groupe":
  buzzH>45?"Atmosph re mitig e":
  "Pression et inqui tude";
  var labelA=buzzA>70?"D termin s et motiv s":
  buzzA>55?"Groupe soud ":
  buzzA>40?"Match difficile attendu":
  "Peu d\'espoir des supporters";
  var moralH=motivH>1?"Excellente dynamique":
  motivH>0?"Bonne dynamique":
  motivH<-1?"Moral en berne":
  "Stable";
  var moralA=motivA>1?"Surprenante r gularit ":
  motivA>0?"Mont e en puissance":
  motivA<-1?"Groupe sous pression":
  "Stable";
  var engouement=Math.round(
  (buzzH+buzzA)/2
  +(d.derby?15:0)
  +(d.stakeLevel>=2?10:0)
  +((d.hRank<=4||d.aRank<=4)?8:0)
  );
  engouement=Math.min(99,Math.max(20,engouement));
  return{buzzH,buzzA,labelH,labelA,moralH,moralA,engouement};
}
function runScan(){
  if(!S.matches.length)return;
  S.scanLoad=true;S.scanRes=[];S.scanDone=false;renderPage();
  var results=[];
  S.matches.forEach(function(m){
  if(!m.e||!isUp(m.time||m.t))return;
  var e=m.e,mIdx=S.matches.indexOf(m),dataQ=e.dataQ||0;
  if(dataQ===0)return;
  var pairs=[];
  if(m.o1>1.10)pairs.push({id:"1",cat:"1X2",name:"Victoire DOM",p:e.pH,o:m.o1,real:true});
  if(m.on>1.10)pairs.push({id:"N",cat:"1X2",name:"Match Nul",p:e.pN,o:m.on,real:true});
  if(m.o2>1.10)pairs.push({id:"2",cat:"1X2",name:"Victoire EXT",p:e.pA,o:m.o2,real:true});
  if(m.o1>1&&m.on>1){var o1x=+(1/(1/m.o1+1/m.on)*0.95).toFixed(2);if(o1x>1.05)pairs.push({id:"1X",cat:"DC",name:"DOM ou Nul",p:e.pH+e.pN,o:o1x,real:false});}
  if(m.o2>1&&m.on>1){var ox2=+(1/(1/m.o2+1/m.on)*0.95).toFixed(2);if(ox2>1.05)pairs.push({id:"X2",cat:"DC",name:"EXT ou Nul",p:e.pN+e.pA,o:ox2,real:false});}
  if(m.oO25>1.05)pairs.push({id:"O25",cat:"Buts",name:"Plus 2.5 buts",p:e.o25||0,o:m.oO25,real:true});
  else if(e.o25>0.1)pairs.push({id:"O25",cat:"Buts",name:"Plus 2.5 buts",p:e.o25,o:+(1/e.o25*1.07).toFixed(2),real:false});
  if(m.oU25>1.05)pairs.push({id:"U25",cat:"Buts",name:"Moins 2.5 buts",p:e.u25||0,o:m.oU25,real:true});
  else if(e.u25>0.1)pairs.push({id:"U25",cat:"Buts",name:"Moins 2.5 buts",p:e.u25,o:+(1/e.u25*1.07).toFixed(2),real:false});
  if(m.oBtts>1.05)pairs.push({id:"BTTS",cat:"BTTS",name:"Les 2 marquent",p:e.btts||0,o:m.oBtts,real:true});
  else if(e.btts>0.1)pairs.push({id:"BTTS",cat:"BTTS",name:"Les 2 marquent",p:e.btts,o:+(1/e.btts*1.07).toFixed(2),real:false});
  pairs.forEach(function(b){
  if(!b.p||!b.o||b.p<=0||b.o<1.05)return;
  var ev=b.p*b.o-1;
  var edgBrut=b.p-(1/b.o);
  var seuilEV=b.real?(dataQ>=3?0.025:dataQ>=2?0.035:0.055):(dataQ>=2?0.055:0.090);
  if(ev<seuilEV||b.p<0.08)return;
  var kf=(b.p*(b.o-1)-(1-b.p))/(b.o-1);
  var kel=kf>0?Math.min(kf*0.25,0.04):0;
  var qs=ev*35+(e.conf||50)/100*25+dataQ*8+(b.real?10:0)+(dataQ>=3?5:0)+Math.min(b.p*10,8)-(isLive(m.time||m.t)?3:0);
  results.push({m:m,mIdx:mIdx,betId:b.id,betName:b.name,betCat:b.cat,p:b.p,o:b.o,ev:ev,edg:edgBrut,kel:kel,conf:e.conf||50,dataQ:dataQ,hasRealOdds:b.real,qualScore:qs,isLive:isLive(m.time||m.t)});
  });
  });
  results.sort(function(a,b){return b.qualScore-a.qualScore;});
  var seen={};
  S.scanRes=results.filter(function(r){
  var k=r.mIdx+"_"+r.betCat;
  if(!seen[k]){seen[k]=1;return true;}
  if(seen[k]<2){seen[k]++;return true;}
  return false;
  });
  S.scanLoad=false;S.scanDone=true;renderPage();
}
