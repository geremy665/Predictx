<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<meta name="theme-color" content="#0a0a0f"/>
<link rel="manifest" href="/manifest.json"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="EDGE"/>
<title>EDGE  Betting Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

/* ============================================================
   EDGE V8 — ESPN/BET365 PREMIUM SPORTS
   Palette: Marine + Orange + Cyan + Blanc Bleuté
============================================================ */

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}

:root{
  /* Fonds */
  --bg:#08090f;
  --c1:#0d1018;
  --c2:#121620;
  --c3:#171c29;
  --c4:#1d2333;
  --c5:#232b3e;

  /* Orange ESPN - couleur principale */
  --or:#FF6B00;
  --or2:#FF8C35;
  --or3:#FFA960;
  --od:rgba(255,107,0,.12);
  --og:rgba(255,107,0,.20);
  --ol:rgba(255,107,0,.18);

  /* Cyan Live */
  --cy:#00D4FF;
  --cy2:#33DFFF;
  --cy3:#80EEFF;
  --cd:rgba(0,212,255,.10);
  --cl:rgba(0,212,255,.16);

  /* Vert gain */
  --vt:#00E676;
  --vt2:rgba(0,230,118,.12);

  /* Rouge alerte */
  --rd:#FF3D5A;
  --rd2:rgba(255,61,90,.12);

  /* Texte */
  --t1:#F0F4FF;
  --t2:rgba(240,244,255,.85);
  --t3:rgba(240,244,255,.55);
  --t4:rgba(240,244,255,.28);
  --t5:rgba(240,244,255,.07);

  /* Lignes */
  --ln:rgba(255,107,0,.10);
  --ln2:rgba(255,107,0,.05);
  --ln3:rgba(240,244,255,.07);

  /* Compat aliases */
  --noir:var(--bg);--gris1:var(--c1);--gris2:var(--c2);--gris3:var(--c3);--gris4:var(--c4);--gris5:var(--c5);
  --bleu:var(--cy);--bleu2:var(--cy2);--bleu3:var(--cy3);--bleu-soft:var(--cd);--bleu-glow:rgba(0,212,255,.2);--ln-bleu:var(--cl);
  --jaune:var(--or);--jaune2:var(--or2);--jaune3:var(--od);--jaune-glow:var(--og);
  --blanc:var(--t1);--blanc2:var(--t2);--blanc3:var(--t3);--blanc4:var(--t4);--blanc5:var(--t5);
  --rouge:var(--rd);--rouge2:var(--rd2);
  --rose:var(--rd);--rose2:#FF6B8A;
  --vert:var(--vt);--vert2:var(--vt2);--vert3:rgba(0,230,118,.06);
  --turq:var(--cy);--turq2:var(--cy2);
  --violet:var(--or);--violet2:var(--or2);--violet3:var(--or3);--violet4:var(--or3);
  --cyan:var(--cy);--cyan2:var(--cy2);--cyan3:var(--cy3);
  --sh-bleu:0 0 30px rgba(0,212,255,.18);
  --sh-cyan:0 0 30px rgba(0,212,255,.18);
  --sh-violet:0 0 30px rgba(255,107,0,.18);
  --sh-or:0 0 30px rgba(255,107,0,.18);
  --sh-jaune:0 0 30px rgba(255,107,0,.18);
  --sh-noir:0 8px 40px rgba(0,0,0,.8);
  --sh:0 8px 40px rgba(0,0,0,.8);
  --vd:var(--od);--vg:var(--og);--vl:var(--ol);
  --sang:var(--rd);--sang2:var(--rd);--sang3:#ff8a9c;--sang-dim:var(--rd2);
  --bord:var(--rd);--bord2:var(--rd);--bord3:var(--rd);--bord-d:var(--rd2);
  --ind:var(--cy);--ind2:var(--cy2);--ind3:var(--cy3);--ind-dim:var(--cd);--ind-glow:rgba(0,212,255,.2);--ln-ind:var(--cl);
  --foret:var(--c2);--foret2:var(--c3);--foret3:var(--c4);--foret4:var(--cy);--foret-l:rgba(18,22,32,.8);
  --r:8px;--r2:12px;--r3:18px;--r4:24px;--r5:32px;
  --f1:'Syne',sans-serif;--f2:'Inter',sans-serif;--f3:'JetBrains Mono',monospace;
  --f-titre:var(--f1);--f-body:var(--f2);--f-mono:var(--f3);
}

html,body{background:var(--bg);color:var(--t1);font-family:var(--f2);font-size:14px;overflow-x:hidden;}
button{font-family:var(--f2);cursor:pointer;}
input,select,textarea{font-family:var(--f2);font-size:13px;background:var(--c3);border:1px solid var(--ln3);border-radius:var(--r2);color:var(--t1);padding:11px 13px;width:100%;outline:none;transition:all .2s;}
input:focus,select:focus{border-color:var(--ol);box-shadow:0 0 0 3px var(--od);}
input::placeholder{color:var(--t4);}
::-webkit-scrollbar{width:2px;height:2px}
::-webkit-scrollbar-thumb{background:var(--or);border-radius:2px;opacity:.3}

/* ===== PARTICLES ===== */
#particles{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.6;}

/* ===== LAYOUT ===== */
#app{display:flex;min-height:100vh;position:relative;z-index:1;}
#sidebar{
  width:256px;position:fixed;top:0;left:0;height:100vh;z-index:100;
  display:flex;flex-direction:column;
  background:rgba(8,9,15,.98);
  border-right:1px solid rgba(255,107,0,.12);
  transition:transform .3s cubic-bezier(.16,1,.3,1);
  overflow:hidden;
}
#sidebar::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--or),var(--cy));z-index:1;}
#sidebar.open{transform:none!important;}
.ham{display:none;}
#main{margin-left:256px;flex:1;min-height:100vh;}
@media(max-width:768px){
  #sidebar{transform:translateX(-256px);}
  #main{margin-left:0;}
  .ham{display:flex!important;}
}

/* ===== SIDEBAR ===== */
.sb-brand{padding:20px 16px 14px;border-bottom:1px solid rgba(255,107,0,.1);position:relative;}
.sb-logo{display:flex;align-items:center;gap:11px;margin-bottom:8px;}
.sb-icon{
  width:40px;height:40px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,var(--or),#cc5200);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--f1);font-size:18px;font-weight:900;color:#fff;
  box-shadow:0 4px 16px rgba(255,107,0,.35);
}
.sb-name{font-family:var(--f1);font-size:22px;font-weight:800;letter-spacing:.06em;}
.sb-name b{color:var(--or);}
.sb-tag{font-family:var(--f3);font-size:7px;color:var(--t4);letter-spacing:.2em;text-transform:uppercase;margin-bottom:12px;}
.sb-kpis{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:rgba(255,107,0,.08);}
.sb-kpi{background:var(--bg);padding:10px 14px;}
.sb-kv{font-family:var(--f1);font-size:17px;font-weight:700;color:var(--or);font-variant-numeric:tabular-nums;line-height:1;}
.sb-kl{font-family:var(--f3);font-size:7px;color:var(--t4);text-transform:uppercase;letter-spacing:.12em;margin-top:3px;}

.sb-nav{flex:1;padding:8px;overflow-y:auto;}
.sb-sec{font-family:var(--f3);font-size:7px;color:var(--t4);padding:0 8px;margin:12px 0 4px;letter-spacing:.2em;text-transform:uppercase;}
.nb{
  display:flex;align-items:center;gap:9px;width:100%;padding:9px 10px;
  border:none;background:transparent;color:var(--t3);
  border-radius:var(--r);font-size:13px;font-weight:400;text-align:left;
  transition:all .15s;position:relative;cursor:pointer;font-family:var(--f2);
}
.nb:hover{background:rgba(255,107,0,.06);color:var(--t2);}
.nb.on{background:rgba(255,107,0,.10);color:var(--t1);font-weight:600;border:1px solid rgba(255,107,0,.15);}
.nb.on::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:60%;background:var(--or);border-radius:0 2px 2px 0;box-shadow:0 0 8px rgba(255,107,0,.5);}
.nb-ic{width:26px;height:26px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;background:var(--t5);}
.nb.on .nb-ic{background:rgba(255,107,0,.12);color:var(--or);}
.nbadge{margin-left:auto;font-size:8px;padding:2px 7px;border-radius:100px;background:rgba(255,107,0,.1);color:var(--or);font-weight:700;font-family:var(--f3);border:1px solid rgba(255,107,0,.2);}
.nbadge.live{background:var(--rd2);color:var(--rd);border-color:rgba(255,61,90,.2);animation:pulse 2s infinite;}
.nbadge.ok{background:var(--vt2);color:var(--vt);border-color:rgba(0,230,118,.2);}

.sb-bottom{padding:10px;border-top:1px solid rgba(255,107,0,.1);}
.sb-bk{
  padding:13px 14px;background:linear-gradient(135deg,rgba(255,107,0,.08),rgba(255,107,0,.04));
  border:1px solid rgba(255,107,0,.15);border-radius:var(--r3);
  cursor:pointer;transition:all .2s;position:relative;overflow:hidden;
}
.sb-bk::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--or),transparent);}
.sb-bk:hover{border-color:rgba(255,107,0,.3);}
.sb-bk-l{font-family:var(--f3);font-size:7px;color:rgba(255,107,0,.5);text-transform:uppercase;letter-spacing:.14em;margin-bottom:4px;}
.sb-bk-v{font-family:var(--f1);font-size:22px;font-weight:700;color:var(--or);font-variant-numeric:tabular-nums;}
.sb-bk-s{font-family:var(--f3);font-size:9px;color:var(--t4);margin-top:4px;}

/* ===== TOPBAR ===== */
#topbar{
  height:56px;background:rgba(8,9,15,.97);backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(255,107,0,.1);padding:0 18px;
  display:flex;align-items:center;gap:10px;
  position:sticky;top:0;z-index:90;
}
.ham{flex-direction:column;gap:4px;padding:8px;border-radius:var(--r);border:1px solid rgba(255,107,0,.15);background:var(--c2);cursor:pointer;}
.ham span{width:16px;height:1.5px;background:var(--t3);border-radius:1px;display:block;}
.ptitle{font-family:var(--f1);font-size:15px;font-weight:700;letter-spacing:.02em;}
.tb-r{margin-left:auto;display:flex;align-items:center;gap:8px;}
.tbtn{padding:6px 14px;background:transparent;border:1px solid var(--ln3);border-radius:var(--r2);color:var(--t3);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;}
.tbtn:hover{border-color:rgba(255,107,0,.3);color:var(--or);}
.tbtn.ok{border-color:rgba(0,230,118,.25);color:var(--vt);background:var(--vt2);}
.livepill{display:flex;align-items:center;gap:5px;padding:5px 12px;background:var(--rd2);border:1px solid rgba(255,61,90,.2);border-radius:100px;font-size:10px;color:var(--rd);font-family:var(--f3);font-weight:700;}
.livedot{width:5px;height:5px;border-radius:50%;background:var(--rd);animation:pulse 1.4s infinite;flex-shrink:0;box-shadow:0 0 6px var(--rd);}

/* ===== PAGE ===== */
#page{padding:16px;animation:fu .2s ease;position:relative;z-index:1;}

/* ===== HERO ESPN STYLE ===== */
.hero{
  position:relative;border-radius:16px;overflow:hidden;
  margin-bottom:14px;background:var(--c1);
  border:1px solid rgba(255,107,0,.12);
}
.hero-scan{
  position:absolute;top:0;left:-100%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,107,0,.04),transparent);
  animation:scan 5s ease-in-out infinite;pointer-events:none;
}
.hero-corners::before,.hero-corners::after{
  content:'';position:absolute;width:18px;height:18px;z-index:2;border-style:solid;
}
.hero-corners::before{top:10px;left:10px;border-color:var(--or);border-width:2px 0 0 2px;box-shadow:-1px -1px 6px rgba(255,107,0,.4);}
.hero-corners::after{bottom:10px;right:10px;border-color:var(--cy);border-width:0 2px 2px 0;box-shadow:1px 1px 6px rgba(0,212,255,.4);}
.hero-content{padding:28px 20px 24px;position:relative;z-index:3;}
.h-badge{
  display:inline-flex;align-items:center;gap:7px;padding:4px 12px;margin-bottom:14px;
  background:rgba(255,107,0,.08);border:1px solid rgba(255,107,0,.2);border-radius:100px;
}
.h-dot{width:5px;height:5px;border-radius:50%;background:var(--or);box-shadow:0 0 6px var(--or);animation:pulse 1.8s infinite;flex-shrink:0;}
.h-badge-txt{font-family:var(--f3);font-size:8px;color:var(--or);font-weight:700;letter-spacing:.16em;text-transform:uppercase;}
.h-title{font-family:var(--f1);letter-spacing:-.02em;line-height:.85;margin-bottom:12px;}
.h-t1{font-size:clamp(34px,8vw,50px);font-weight:900;color:var(--t1);display:block;}
.h-t2{
  font-size:clamp(34px,8vw,50px);font-weight:900;display:block;
  background:linear-gradient(135deg,var(--or),var(--or2),var(--cy));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.h-sub{font-size:12px;color:var(--t3);line-height:1.75;max-width:280px;margin-bottom:18px;}
.h-kpis{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:7px;margin-bottom:18px;}
.h-kpi{
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);
  border-radius:10px;padding:10px 5px;text-align:center;transition:all .2s;
}
.h-kpi:hover{border-color:rgba(255,107,0,.2);transform:translateY(-1px);}
.h-kpi-v{font-family:var(--f1);font-size:22px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;}
.h-kpi-l{font-family:var(--f3);font-size:7px;color:var(--t4);text-transform:uppercase;letter-spacing:.1em;margin-top:3px;}
.h-ctas{display:flex;gap:9px;}
.btn-primary{
  flex:1;height:48px;border:none;border-radius:12px;cursor:pointer;
  background:linear-gradient(135deg,var(--or),#cc5200);
  font-family:var(--f1);font-size:14px;font-weight:700;color:#fff;
  letter-spacing:.02em;box-shadow:0 4px 20px rgba(255,107,0,.3);
  transition:all .2s;position:relative;overflow:hidden;
}
.btn-primary::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.12),transparent);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(255,107,0,.4);}
.btn-sec{
  height:48px;padding:0 18px;border-radius:12px;cursor:pointer;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  font-family:var(--f1);font-size:13px;font-weight:600;color:var(--t2);
  white-space:nowrap;transition:all .15s;
}
.btn-sec:hover{background:rgba(255,255,255,.1);border-color:rgba(255,107,0,.2);}

/* ===== STATUS ===== */
.status-live{display:flex;align-items:center;gap:8px;padding:9px 13px;background:rgba(0,230,118,.06);border:1px solid rgba(0,230,118,.12);border-radius:10px;margin-bottom:12px;font-family:var(--f3);font-size:10px;color:var(--vt);}
.status-demo{display:flex;align-items:center;gap:8px;padding:9px 13px;background:rgba(255,107,0,.04);border:1px solid rgba(255,107,0,.1);border-radius:10px;margin-bottom:12px;font-family:var(--f3);font-size:10px;color:var(--or);}

/* ===== ROW HEADER ===== */
.row-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.row-title{font-family:var(--f1);font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;}
.row-title::before{content:'';width:3px;height:16px;background:linear-gradient(180deg,var(--or),var(--cy));border-radius:2px;box-shadow:0 0 6px rgba(255,107,0,.4);flex-shrink:0;}
.row-more{font-family:var(--f3);font-size:9px;color:var(--or);background:none;border:none;cursor:pointer;font-weight:700;}

/* ===== SIGNAL CARDS ===== */
.sig-card{
  background:var(--c2);border:1px solid rgba(255,255,255,.06);
  border-radius:14px;overflow:hidden;margin-bottom:9px;cursor:pointer;
  transition:all .22s cubic-bezier(.16,1,.3,1);position:relative;
}
.sig-card:hover{transform:translateY(-3px);box-shadow:0 10px 36px rgba(0,0,0,.5),0 0 0 1px rgba(255,107,0,.08);}
.sig-card.top::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--or),var(--cy),transparent);}
.sc-stripe{height:2px;}
.sc-stripe.val{background:linear-gradient(90deg,var(--or),var(--cy),transparent);}
.sc-stripe.live{background:linear-gradient(90deg,var(--rd),rgba(255,61,90,.2),transparent);}
.sc-stripe.norm{background:linear-gradient(90deg,var(--c5),transparent);}
.sc-body{padding:13px 15px;}
.sc-meta{display:flex;align-items:center;gap:7px;margin-bottom:8px;flex-wrap:wrap;}
.sc-league{font-family:var(--f3);font-size:9px;color:var(--t4);}
.sc-time{font-family:var(--f3);font-size:9px;color:var(--t4);}
.sc-teams{font-family:var(--f1);font-size:17px;font-weight:700;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sc-prono{font-size:12px;color:var(--t3);margin-bottom:11px;}
.sc-nums{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:9px;}
.sc-num{background:var(--c3);border:1px solid rgba(255,255,255,.05);border-radius:9px;padding:9px 5px;text-align:center;}
.sc-num.hl{background:rgba(255,107,0,.08);border-color:rgba(255,107,0,.18);}
.sc-num-l{font-family:var(--f3);font-size:7px;color:var(--t4);text-transform:uppercase;letter-spacing:.09em;margin-bottom:3px;}
.sc-num-v{font-family:var(--f1);font-size:17px;font-weight:700;font-variant-numeric:tabular-nums;}
.sc-num.hl .sc-num-v{color:var(--or);}
.sc-bar{height:2px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden;}
.sc-bar-f{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--rd),var(--or));}

/* ===== MATCH CARDS COMPACT ===== */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.mc{
  background:var(--c2);border:1px solid rgba(255,255,255,.06);
  border-radius:13px;overflow:hidden;cursor:pointer;
  transition:all .2s cubic-bezier(.16,1,.3,1);
}
.mc:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.4),0 0 0 1px rgba(255,107,0,.06);}
.mc.val{border-color:rgba(255,107,0,.15);}
.mc.live-m{border-color:rgba(255,61,90,.15);}
.mc-top{height:2px;}
.mc-top.val{background:linear-gradient(90deg,var(--or),var(--cy));}
.mc-top.live-m{background:linear-gradient(90deg,var(--rd),transparent);}
.mc-top.norm{background:linear-gradient(90deg,var(--c5),transparent);}
.mc-body{padding:10px 11px;}
.mc-league{font-family:var(--f3);font-size:8px;color:var(--t4);margin-bottom:5px;display:flex;align-items:center;gap:5px;}
.mc-teams{margin-bottom:8px;}
.mc-home{font-family:var(--f1);font-size:12px;font-weight:700;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.mc-away{font-family:var(--f1);font-size:12px;font-weight:600;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mc-odds-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-bottom:7px;}
.mc-odd{background:var(--c3);border:1px solid rgba(255,255,255,.05);border-radius:7px;padding:6px 3px;text-align:center;transition:all .13s;}
.mc-odd:hover{background:var(--c4);}
.mc-odd.best{background:rgba(255,107,0,.10);border-color:rgba(255,107,0,.2);}
.mc-odd-l{font-family:var(--f3);font-size:7px;color:var(--t4);margin-bottom:2px;}
.mc-odd-v{font-family:var(--f1);font-size:14px;font-weight:800;font-variant-numeric:tabular-nums;}
.mc-odd.best .mc-odd-v{color:var(--or);}
.mc-foot{display:flex;align-items:center;justify-content:space-between;}
.mc-conf{font-family:var(--f3);font-size:9px;font-weight:700;}
.mc-time-badge{font-family:var(--f3);font-size:9px;color:var(--t4);padding:3px 7px;background:var(--c4);border-radius:4px;}
.mc-time-badge.live{background:var(--rd2);color:var(--rd);animation:pulse 2s infinite;}
.mc-val-tag{display:flex;align-items:center;gap:4px;font-family:var(--f3);font-size:8px;color:var(--or);font-weight:700;margin-top:4px;}

/* ===== VALUE STRIP ===== */
.val-strip{
  margin-top:8px;padding:9px 11px;
  background:rgba(255,107,0,.06);
  border:1px solid rgba(255,107,0,.14);border-radius:10px;
  display:flex;justify-content:space-between;align-items:center;
  position:relative;overflow:hidden;
}
.val-strip::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--or),var(--cy),transparent);}
.vs-l{font-family:var(--f3);font-size:7px;color:rgba(255,107,0,.5);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px;}
.vs-bet{font-family:var(--f1);font-size:13px;font-weight:700;color:var(--t1);}
.vs-odd{font-family:var(--f1);font-size:22px;font-weight:900;color:var(--or);font-variant-numeric:tabular-nums;line-height:1;}
.vs-edge{font-family:var(--f3);font-size:9px;color:var(--vt);font-weight:700;margin-top:2px;}

/* ===== LEAGUE HEADER ===== */
.lg-row{margin-bottom:10px;}
.lg-head,.lghd{display:flex;align-items:center;gap:8px;padding:10px 13px;background:var(--c2);border:1px solid rgba(255,255,255,.06);border-radius:12px;cursor:pointer;transition:all .15s;margin-bottom:6px;}
.lg-head:hover,.lghd:hover{background:var(--c3);border-color:rgba(255,107,0,.15);}
.lg-nm,.lgn{font-family:var(--f1);font-size:13px;font-weight:600;color:var(--t2);}
.lg-cnt,.lgc{font-family:var(--f3);font-size:9px;color:var(--t4);padding:2px 8px;background:var(--c4);border-radius:5px;}
.lg-arr,.lga{margin-left:auto;font-size:10px;color:var(--t4);transition:transform .2s;display:inline-block;}
.lg-arr.open,.lga.open{transform:rotate(180deg);}

/* ===== BADGES ===== */
.badge,.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:5px;font-size:8.5px;font-weight:700;font-family:var(--f3);}
.tg,.tv,.b-val,.bdg-val{background:rgba(255,107,0,.1);color:var(--or);border:1px solid rgba(255,107,0,.2);}
.te,.b-arb,.bdg-arb{background:var(--vt2);color:var(--vt);border:1px solid rgba(0,230,118,.2);}
.tr,.b-live,.bdg-live{background:var(--rd2);color:var(--rd);border:1px solid rgba(255,61,90,.2);animation:pulse 2s infinite;}
.tt,.b-derby{background:rgba(0,212,255,.08);color:var(--cy);border:1px solid rgba(0,212,255,.15);}

/* ===== FLAGS ===== */
.flag{display:inline-flex;align-items:center;justify-content:center;width:22px;height:14px;border-radius:3px;font-family:var(--f3);font-size:7px;font-weight:700;flex-shrink:0;}
.f-FR{background:#002395;color:#fff}.f-ES{background:#aa151b;color:#f1bf00}
.f-ENG{background:#cf142b;color:#fff}.f-IT{background:#009246;color:#fff}
.f-DE{background:#000;color:#ffcc00;border:1px solid #222}.f-PT{background:#006600;color:#ff0}
.f-UCL{background:#071d5e;color:#c8a900}.f-UEL{background:#d45500;color:#fff}
.f-NL{background:#ae1c28;color:#fff}.f-BE{background:#111;color:#fdda24}
.f-TR{background:#e30a17;color:#fff}.f-SCO{background:#003087;color:#fff}
.f-GR{background:#0d5eaf;color:#fff}.f-USA{background:#3c3b6e;color:#fff}
.f-BRA{background:#009c3b;color:#ffdf00}.f-ARG{background:#74acdf;color:#fff}
.f-MEX{background:#006847;color:#fff}.f-INT{background:var(--c4);color:var(--t3);}

/* ===== SHORTCUTS ===== */
.sc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.sc-item{
  background:var(--c2);border:1px solid rgba(255,255,255,.06);
  border-radius:13px;padding:13px;cursor:pointer;
  transition:all .2s cubic-bezier(.16,1,.3,1);
  display:flex;align-items:center;gap:11px;position:relative;overflow:hidden;
}
.sc-item::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,107,0,.04),transparent);opacity:0;transition:opacity .2s;}
.sc-item:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.4);border-color:rgba(255,107,0,.12);}
.sc-item:hover::after{opacity:1;}
.sc-ic{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:var(--f1);font-size:15px;font-weight:900;flex-shrink:0;}
.sc-nm{font-family:var(--f1);font-size:13px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sc-sb{font-family:var(--f3);font-size:9px;color:var(--t4);margin-top:2px;}

/* ===== BUTTONS ===== */
.cbtn{
  width:100%;height:48px;background:linear-gradient(135deg,var(--or),#cc5200);
  border:none;border-radius:var(--r2);font-family:var(--f1);font-size:14px;
  font-weight:700;color:#fff;letter-spacing:.02em;margin-bottom:10px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  cursor:pointer;transition:all .2s;box-shadow:0 4px 16px rgba(255,107,0,.2);
  position:relative;overflow:hidden;
}
.cbtn::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.1),transparent);}
.cbtn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,107,0,.32);}
.cbtn:disabled{background:var(--c4);color:var(--t4);box-shadow:none;transform:none;}
.cbtn.turq{background:linear-gradient(135deg,var(--cy),#0099cc);box-shadow:0 4px 16px rgba(0,212,255,.2);}
.cbtn.rose{background:linear-gradient(135deg,var(--rd),#cc1a30);box-shadow:0 4px 16px rgba(255,61,90,.2);}
.cbtn.vert{background:linear-gradient(135deg,#00aa44,var(--vt));}
.cbtn.gold{background:linear-gradient(135deg,var(--or),var(--or2));}
.abtn{padding:7px 13px;border-radius:var(--r);font-size:11px;font-weight:500;border:1px solid var(--ln3);color:var(--t3);background:transparent;cursor:pointer;transition:all .13s;font-family:var(--f2);}
.abtn:hover{border-color:rgba(255,107,0,.25);color:var(--or);}

/* ===== FILTERS ===== */
.fils{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:13px;-webkit-overflow-scrolling:touch;}
.fib{padding:7px 14px;border-radius:100px;font-size:12px;font-weight:500;border:1px solid var(--ln3);background:transparent;color:var(--t4);white-space:nowrap;flex-shrink:0;cursor:pointer;transition:all .15s;font-family:var(--f2);}
.fib:hover{border-color:rgba(255,107,0,.2);color:var(--t2);}
.fib.on{background:rgba(255,107,0,.1);border-color:rgba(255,107,0,.25);color:var(--or);font-weight:700;}

/* ===== TAGS ===== */
.tg{background:rgba(255,107,0,.1);color:var(--or);border:1px solid rgba(255,107,0,.2);}
.te{background:var(--vt2);color:var(--vt);border:1px solid rgba(0,230,118,.2);}
.tr{background:var(--rd2);color:var(--rd);border:1px solid rgba(255,61,90,.2);}
.tt{background:rgba(0,212,255,.08);color:var(--cy);border:1px solid rgba(0,212,255,.15);}
.tv{background:rgba(255,107,0,.1);color:var(--or);border:1px solid rgba(255,107,0,.2);}

/* ===== GENERIC CARDS ===== */
.card{background:var(--c2);border:1px solid var(--ln3);border-radius:var(--r3);padding:18px;margin-bottom:12px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,107,0,.15),transparent);}
.card-bleu{background:linear-gradient(145deg,rgba(255,107,0,.05),var(--c2));border:1px solid rgba(255,107,0,.12);border-radius:var(--r3);padding:18px;margin-bottom:12px;position:relative;}
.card-bleu::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--or),transparent);}
.card-rouge{background:linear-gradient(145deg,rgba(255,61,90,.06),var(--c2));border:1px solid rgba(255,61,90,.12);border-radius:var(--r3);padding:18px;margin-bottom:12px;}
.card-vert{background:linear-gradient(145deg,rgba(0,230,118,.05),var(--c2));border:1px solid rgba(0,230,118,.12);border-radius:var(--r3);padding:18px;margin-bottom:12px;}
.clbl{font-family:var(--f3);font-size:8px;color:var(--t4);font-weight:700;text-transform:uppercase;letter-spacing:.15em;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.clbl::before{content:'';width:12px;height:2px;background:linear-gradient(90deg,var(--or),var(--cy));border-radius:1px;flex-shrink:0;}

/* ===== MISC ===== */
.empty{text-align:center;padding:52px 20px;}
.ei{font-family:var(--f1);font-size:44px;font-weight:900;opacity:.04;margin-bottom:14px;}
.et{font-family:var(--f1);font-size:17px;font-weight:700;color:var(--t3);margin-bottom:6px;}
.es{font-size:12px;color:var(--t4);line-height:1.8;}
.sbox{background:var(--c2);border:1px solid var(--ln3);border-radius:var(--r3);padding:16px;text-align:center;position:relative;overflow:hidden;}
.sbox::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,107,0,.15),transparent);}
.sv{font-family:var(--f1);font-size:26px;font-weight:700;letter-spacing:-.5px;font-variant-numeric:tabular-nums;margin-bottom:4px;}
.sl{font-size:10px;color:var(--t4);}
.pbar{height:3px;background:var(--c4);border-radius:2px;overflow:hidden;}
.pfill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--rd),var(--or));}
.btrack{height:4px;background:var(--c4);border-radius:2px;overflow:hidden;}
.bfill{height:100%;border-radius:2px;}
.spin{width:14px;height:14px;border:2px solid rgba(255,107,0,.15);border-top-color:var(--or);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;flex-shrink:0;}
.ldr{display:inline-flex;gap:4px;align-items:center;vertical-align:middle;}
.ldr i{width:5px;height:5px;border-radius:50%;background:var(--or);animation:ldot 1.3s ease-in-out infinite;display:inline-block;font-style:normal;}
.ldr i:nth-child(2){animation-delay:.15s;}.ldr i:nth-child(3){animation-delay:.3s;}
.disc{padding:11px 13px;background:var(--rd2);border:1px solid rgba(255,61,90,.12);border-radius:var(--r2);font-size:10px;color:var(--t3);line-height:1.7;}
.ai-ok{background:var(--vt2);border:1px solid rgba(0,230,118,.2);color:var(--vt);padding:9px 12px;border-radius:var(--r2);font-size:11px;margin-top:7px;}
.ai-er{background:var(--rd2);border:1px solid rgba(255,61,90,.2);color:var(--rd);padding:9px 12px;border-radius:var(--r2);font-size:11px;margin-top:7px;}
.ai-st{padding:9px 12px;background:rgba(255,107,0,.06);border:1px solid rgba(255,107,0,.15);border-radius:var(--r2);font-family:var(--f3);font-size:10px;color:var(--or);margin-bottom:9px;display:flex;align-items:center;gap:8px;}
.selm{background:rgba(255,107,0,.06);border:1px solid rgba(255,107,0,.15);border-radius:var(--r2);padding:11px 14px;margin-bottom:11px;display:flex;align-items:center;gap:10px;}
.kb{background:var(--c2);border:1px solid var(--ln3);border-radius:var(--r2);padding:14px;text-align:center;}
.kbv{font-family:var(--f1);font-size:20px;font-weight:700;color:var(--or);font-variant-numeric:tabular-nums;}
.kbl{font-family:var(--f3);font-size:8px;color:var(--t4);margin-top:4px;text-transform:uppercase;letter-spacing:.1em;}
.tbl{width:100%;border-collapse:collapse;font-size:12px;}
.tbl th{padding:9px 11px;text-align:left;font-size:8px;color:var(--t4);font-weight:700;text-transform:uppercase;letter-spacing:.1em;border-bottom:1px solid var(--ln3);background:rgba(255,255,255,.01);font-family:var(--f3);}
.tbl td{padding:9px 11px;border-bottom:1px solid rgba(255,255,255,.03);font-family:var(--f3);font-size:12px;}
.tbl tr:last-child td{border-bottom:none;}
.oc{color:var(--t3);}.oc.best{color:var(--or);font-weight:700;}
.fsec{background:var(--c2);border:1px solid var(--ln3);border-radius:var(--r3);padding:18px;margin-bottom:10px;position:relative;overflow:hidden;}
.fsec::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,107,0,.15),transparent);}
.fsh{display:flex;align-items:center;gap:8px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,.04);}
.fsn{font-size:9px;font-weight:700;color:var(--or);background:rgba(255,107,0,.08);border-radius:4px;padding:2px 8px;text-transform:uppercase;letter-spacing:.09em;font-family:var(--f3);border:1px solid rgba(255,107,0,.2);}
.fst{font-family:var(--f1);font-size:14px;font-weight:700;}
.fw{display:flex;flex-direction:column;gap:5px;margin-bottom:10px;}
.fl{font-size:10px;color:var(--t4);font-weight:600;text-transform:uppercase;letter-spacing:.09em;}
.prow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;}
.pb{background:var(--c2);border:1px solid var(--ln3);border-radius:var(--r2);padding:12px 7px;text-align:center;}
.pb.win{background:rgba(255,107,0,.08);border-color:rgba(255,107,0,.18);}
.pp{font-family:var(--f1);font-size:26px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1;}
.pb.win .pp{color:var(--or);}
.pn{font-size:10px;color:var(--t4);margin-top:3px;}
.edgb{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-radius:var(--r2);margin-bottom:12px;}
.edgb.pos{background:var(--vt2);border:1px solid rgba(0,230,118,.2);}
.edgb.neg{background:var(--rd2);border:1px solid rgba(255,61,90,.15);}
.edgv{font-family:var(--f1);font-size:30px;font-weight:700;font-variant-numeric:tabular-nums;}
.edgb.pos .edgv{color:var(--vt);}
.edgb.neg .edgv{color:var(--rd);}
.scgr{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px;}
.scb{background:var(--c3);border:1px solid var(--ln3);border-radius:var(--r2);padding:11px 5px;text-align:center;}
.scb.top{background:rgba(255,107,0,.08);border-color:rgba(255,107,0,.18);}
.scv{font-family:var(--f1);font-size:18px;font-weight:700;font-variant-numeric:tabular-nums;}
.scp{font-family:var(--f3);font-size:9px;color:var(--t4);margin-top:2px;}
.b3{height:4px;background:var(--c4);border-radius:2px;display:flex;overflow:hidden;margin-top:9px;}
.b3h{background:var(--or);}.b3n{background:var(--c5);}.b3a{background:var(--cy);}
.mkrow{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-radius:var(--r2);margin-bottom:5px;}
.mkrow.pos{background:rgba(255,107,0,.06);border:1px solid rgba(255,107,0,.12);}
.mkrow.safe{background:var(--vt2);border:1px solid rgba(0,230,118,.15);}
.mkrow.neu{background:var(--c3);border:1px solid rgba(255,255,255,.04);}
.vp{padding:10px 14px;border-radius:var(--r2);font-size:13px;font-weight:600;}
.vp.y{background:var(--vt2);border:1px solid rgba(0,230,118,.2);color:var(--vt);}
.vp.n{background:var(--rd2);border:1px solid rgba(255,61,90,.16);color:var(--rd);}
.vrd{background:var(--c2);border:1px solid rgba(255,107,0,.12);border-radius:var(--r4);padding:22px;margin-bottom:12px;position:relative;overflow:hidden;}
.vrd::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--or),var(--cy),transparent);}
.vbet{font-family:var(--f1);font-size:clamp(16px,4vw,22px);font-weight:900;letter-spacing:-.02em;line-height:1.2;margin-bottom:7px;}
.tipcard{background:var(--c2);border:1px solid var(--ln3);border-radius:var(--r3);overflow:hidden;margin-bottom:10px;cursor:pointer;transition:all .2s;}
.tipcard:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.4);}
.tipcard.top{border-color:rgba(255,107,0,.15);}
.tiph{padding:10px 15px;background:rgba(255,255,255,.015);display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.04);}
.tipb{padding:14px 15px;}
.tipbet{font-family:var(--f1);font-size:17px;font-weight:700;margin-bottom:9px;letter-spacing:-.02em;line-height:1.3;}
.tipmg{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;}
.tipm{background:var(--c3);border-radius:var(--r);padding:9px 5px;text-align:center;border:1px solid rgba(255,255,255,.04);}
.tipml{font-family:var(--f3);font-size:7px;color:var(--t4);text-transform:uppercase;letter-spacing:.09em;margin-bottom:3px;}
.tipmv{font-family:var(--f1);font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;}
.sig{background:var(--c2);border:1px solid var(--ln3);border-radius:var(--r3);overflow:hidden;margin-bottom:10px;cursor:pointer;transition:all .2s;}
.sig:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.5);}
.sig.top{border-color:rgba(255,107,0,.15);}
.sig-glow{height:2px;background:linear-gradient(90deg,var(--or),var(--cy),transparent);}
.sig-bd{padding:15px;}
.sig-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:8px;}
.sig-teams{font-family:var(--f1);font-size:17px;font-weight:700;margin-bottom:5px;}
.sig-bet{font-family:var(--f1);font-size:15px;font-weight:700;margin-bottom:9px;}
.sig-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.sig-stat{background:var(--c3);border-radius:var(--r);padding:9px 5px;text-align:center;border:1px solid rgba(255,255,255,.04);}
.sig-stat-l{font-family:var(--f3);font-size:7px;color:var(--t4);text-transform:uppercase;letter-spacing:.09em;margin-bottom:3px;}
.sig-stat-v{font-family:var(--f1);font-size:16px;font-weight:700;font-variant-numeric:tabular-nums;}
.chat-wrap{background:var(--c2);border:1px solid var(--ln3);border-radius:var(--r3);padding:14px;margin-bottom:10px;min-height:300px;max-height:420px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;}
.chat-msg-bot,.chat-msg-user{display:flex;gap:9px;align-items:flex-end;}
.chat-msg-user{flex-direction:row-reverse;}
.chat-av{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;font-family:var(--f1);}
.chat-av.bot{background:linear-gradient(135deg,var(--or),#cc5200);color:#fff;}
.chat-av.user{background:var(--c4);border:1px solid var(--ln3);color:var(--t3);}
.chat-bubble{max-width:82%;padding:10px 13px;font-size:13px;line-height:1.75;}
.chat-bubble.bot{background:var(--c3);border:1px solid var(--ln3);border-radius:4px var(--r2) var(--r2) var(--r2);color:var(--t2);}
.chat-bubble.user{background:linear-gradient(135deg,var(--or),#cc5200);border-radius:var(--r2) 4px var(--r2) var(--r2);color:#fff;font-weight:600;}
.ovl{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:99;backdrop-filter:blur(8px);display:none;}
.ovl.show{display:block;}
.modal{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.95);display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(20px);}
.mbox{background:var(--c1);border:1px solid rgba(255,107,0,.18);border-radius:var(--r5);padding:24px;width:100%;max-width:400px;box-shadow:0 0 60px rgba(255,107,0,.1),var(--sh);position:relative;overflow:hidden;}
.mbox::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--or),var(--cy),transparent);}
.mbtit{font-family:var(--f1);font-size:18px;font-weight:700;margin-bottom:16px;letter-spacing:.02em;}
.mbtns{display:flex;gap:9px;margin-top:14px;}
.mbtn{flex:1;padding:12px;border-radius:var(--r2);font-size:13px;font-weight:600;border:1px solid;cursor:pointer;transition:all .14s;font-family:var(--f2);}
.mbtn.blue{background:rgba(255,107,0,.08);border-color:rgba(255,107,0,.2);color:var(--or);}
.mbtn.gold{background:linear-gradient(135deg,var(--or),#cc5200);border-color:transparent;color:#fff;}
.mbtn.grey{background:var(--t5);border-color:var(--ln3);color:var(--t3);}
.risk-box{background:var(--c2);border:1px solid var(--ln3);border-radius:var(--r2);padding:14px;text-align:center;}

<script>
"use strict";
function pmf(l,k){if(l<=0)return k===0?1:0;if(k<0)return 0;if(k>20){var lp=-l+k*Math.log(l);for(var i=1;i<=k;i++)lp-=Math.log(i);return Math.max(0,Math.exp(lp));}var v=Math.exp(-l);for(var j=1;j<=k;j++)v*=l/j;return Math.max(0,v);}
function cdf(l,m){if(m<0)return 0;var s=0,t=Math.exp(-l);for(var k=0;k<=m;k++){s+=t;if(t<1e-10)break;t*=l/(k+1);}return Math.min(1,s);}
function tau(h,a,lH,lA,rho){var r=Math.max(-0.25,Math.min(-0.05,rho||-0.135));if(h===0&&a===0)return Math.max(0.001,1-lH*lA*r);if(h===1&&a===0)return Math.max(0.001,1+lA*r);if(h===0&&a===1)return Math.max(0.001,1+lH*r);if(h===1&&a===1)return Math.max(0.01,1-r);return 1;}
var RHO={"Ligue 1":-0.142,"Premier League":-0.118,"La Liga":-0.135,"Bundesliga":-0.128,"Serie A":-0.151,"Champions League":-0.132};

function kellyF(p,o){
  if(!o||o<=1||!p||p<=0||p>=1)return 0;
  // Cote minimum 1.25
  if(o<1.25)return 0;
  var b=o-1,k=(b*p-(1-p))/b;
  if(k<=0)return 0;
  var e=p*o-1;
  if(e<0.03)return 0; // Edge minimum 3%
  var fr=e>0.10?0.25:e>0.05?0.20:0.15;
  return Math.min(k*fr,0.04);
}
function edgeF(p,o){
  if(!o||!p||o<1.25||p<=0||p>=1)return null;
  var e=p*o-1;
  return e<0.03?null:e; // Edge minimum 3%
}
function arbF(o1,oN,o2){if(!o1||!oN||!o2||o1<=1||oN<=1||o2<=1)return null;var imp=1/o1+1/oN+1/o2;return imp>=1?null:+((1/imp-1)*100).toFixed(2);}
function fmW(p5,p10){var r5=Math.min(15,p5||7)/15,r10=Math.min(30,p10||14)/30;return Math.max(0.72,Math.min(1.28,0.72+0.56*(r5*0.6+r10*0.4)));}

function calc(m){
  try{
    var lH=(m.hxg||1.35)*0.58+(m.hg||1.25)*0.28+((m.hsh||12)/24)*0.14;
    var lA=(m.axg||1.10)*0.58+(m.ag||1.00)*0.28+((m.ash||10)/24)*0.14;
    var hD=(m.hxga||1.1)*0.6+(1-(m.hcs||30)/100)*0.25+(m.hc||1.2)*0.15;
    var aD=(m.axga||1.3)*0.6+(1-(m.acs||22)/100)*0.25+(m.ac||1.4)*0.15;
    lH*=Math.pow(Math.max(0.4,aD)/1.2,0.38);lA*=Math.pow(Math.max(0.4,hD)/1.2,0.38);
    lH*=1.082;lH*=fmW(m.hf,m.hf10);lA*=fmW(m.af,m.af10);
    if(m.derby){lH*=0.91;lA*=0.91;}if(m.hfat)lH*=0.935;if(m.afat)lA*=0.935;
    lH=Math.max(0.22,Math.min(4.5,lH));lA=Math.max(0.15,Math.min(4.0,lA));
    var rho=RHO[m.c]||-0.135;
    var pH=0,pN=0,pA=0,sc=[],tot=0;
    for(var h=0;h<=9;h++)for(var a=0;a<=9;a++){var p=pmf(lH,h)*pmf(lA,a)*tau(h,a,lH,lA,rho);if(p<0)continue;tot+=p;sc.push({s:h+"-"+a,p:p});if(h>a)pH+=p;else if(h===a)pN+=p;else pA+=p;}
    if(tot>0){pH/=tot;pN/=tot;pA/=tot;}
    sc.sort(function(x,y){return y.p-x.p;});
    // Meilleur pari avec cote minimum 1.25
    var bets=[{k:"1",p:pH,o:+m.o1||0},{k:"N",p:pN,o:+m.on||0},{k:"2",p:pA,o:+m.o2||0}];
    bets=bets.filter(function(b){return b.o>=1.25;});
    var best=null,bestEdge=-99;
    bets.forEach(function(b){var e=edgeF(b.p,b.o)||0;if(e>bestEdge){bestEdge=e;best=b;}});
    var bR=best?best.k:"1",bP=best?best.p:pH,bO=best?best.o:0;
    var edg=edgeF(bP,bO),kel=kellyF(bP,bO);
    var mg=(m.o1&&m.on&&m.o2)?1/m.o1+1/m.on+1/m.o2:null;
    var safe=mg?(mg>1.3?"SUSPENDU":mg>1.15?"ATTENTION":"OK"):"OK";
    var conf=Math.min(94,Math.max(8,Math.round(bP*30+(edg>0?Math.min(edg*60,18):0)+(safe==="OK"?4:safe==="ATTENTION"?-3:-9)+(m.derby?-10:0))));
    // Label simplifie
    var teamH=m.h||"Domicile",teamA=m.a||"Exterieur";
    var label=bR==="1"?(teamH+" gagne ("+((pH*100).toFixed(0))+"%)"):bR==="2"?(teamA+" gagne ("+((pA*100).toFixed(0))+"%)"):("Match nul probable ("+((pN*100).toFixed(0))+"%)");
    var btts=(1-pmf(lH,0))*(1-pmf(lA,0));
    var o25=1-cdf(lH+lA,2),o35=1-cdf(lH+lA,3),p15=1-cdf(lH+lA,1);
    return{lH:lH,lA:lA,pH:pH,pN:pN,pA:pA,sc:sc,bR:bR,bP:bP,bO:bO,edg:edg,kel:kel,conf:conf,label:label,safe:safe,btts:btts,o25:o25,o35:o35,p15:p15};
  }catch(err){console.error(err);return null;}
}

function buildBets(r,d){
  var o1=+d.o1||0,oN=+d.oN||0,o2=+d.o2||0,oO25=+d.oO25||0,oO35=+d.oO35||0,oBtts=+d.oBtts||0;
  var bets=[
    {id:"1",cat:"1X2",name:"Victoire "+(d.home||"Dom"),p:r.pH,o:o1},
    {id:"N",cat:"1X2",name:"Match nul",p:r.pN,o:oN},
    {id:"2",cat:"1X2",name:"Victoire "+(d.away||"Ext"),p:r.pA,o:o2},
    {id:"1X",cat:"Double chance",name:"Domicile ou Nul",p:r.pH+r.pN,o:0},
    {id:"X2",cat:"Double chance",name:"Exterieur ou Nul",p:r.pN+r.pA,o:0},
    {id:"O15",cat:"Buts",name:"Plus de 1.5 buts",p:r.p15,o:0},
    {id:"O25",cat:"Buts",name:"Plus de 2.5 buts",p:r.o25,o:oO25},
    {id:"O35",cat:"Buts",name:"Plus de 3.5 buts",p:r.o35,o:oO35},
    {id:"U25",cat:"Buts",name:"Moins de 2.5 buts",p:1-r.o25,o:0},
    {id:"BTTS",cat:"Les deux marquent",name:"Les deux equipes marquent",p:r.btts,o:oBtts},
    {id:"NBTTS",cat:"Les deux marquent",name:"Les deux equipes ne marquent pas",p:1-r.btts,o:0},
    {id:"CSH",cat:"Clean sheet",name:"Sans encaisser "+(d.home||"Dom"),p:pmf(r.lA,0),o:0},
    {id:"CSA",cat:"Clean sheet",name:"Sans encaisser "+(d.away||"Ext"),p:pmf(r.lH,0),o:0},
  ];
  // Appliquer les filtres: cote min 1.25, edge min 3%
  bets.forEach(function(b){
    b.edg=b.o>=1.25?edgeF(b.p,b.o):null;
    b.kel=b.o>=1.25?kellyF(b.p,b.o):0;
  });
  var best=bets.filter(function(b){return b.o>=1.25&&(b.edg||0)>0;}).sort(function(a,b){return(b.edg||0)-(a.edg||0);})[0];
  if(!best)best=bets.filter(function(b){return b.o>=1.25;}).sort(function(a,b){return b.p-a.p;})[0];
  var safe2=bets.filter(function(b){return b.p>0.62&&b.o>=1.25;}).sort(function(a,b){return b.p-a.p;})[0];
  var value=bets.filter(function(b){return(b.edg||0)>0.04&&b.o>=1.25;}).sort(function(a,b){return(b.edg||0)-(a.edg||0);})[0];
  return{allBets:bets,bestBet:best,safeBet:safe2,valueBet:value};
}

function fmtDate(iso){var d=new Date(iso);var days=["Dim","Lun","Mar","Mer","Jeu","Ven","Sam"];var months=["Jan","Fev","Mar","Avr","Mai","Jun","Jul","Aou","Sep","Oct","Nov","Dec"];return days[d.getDay()]+" "+d.getDate()+" "+months[d.getMonth()];}

function gWins(){return S.hist.filter(function(h){return h.result==="WIN";}).length;}
function gRoi(){if(!S.hist.length)return null;var p=S.hist.reduce(function(a,h){return a+(h.profit||0);},0),s=Math.max(1,S.hist.reduce(function(a,h){return a+(h.stake||20);},0));return+(p/s*100).toFixed(1);}

function loadCombi(){

      +" | "+fmtDate(m.time||m.t)+" "+fmtTime(m.time||m.t)

  var prompt="Tu es EDGE, expert paris sportifs. Cree le meilleur combine value du jour.\n\nREGLE ABSOLUE: Utilise UNIQUEMENT les matchs de la liste ci-dessous. Ne jamais inventer ou modifier un nom d equipe.\n\nMATCHS DISPONIBLES:\n"+ctx+"\n\nReponds UNIQUEMENT avec ce JSON valide, sans aucun texte avant ou apres:\n{\"titre\":\"Combine EDGE\",\"cote_totale\":3.50,\"confiance\":72,\"mise\":\"2% bankroll\",\"picks\":[{\"match\":\"[equipe1 vs equipe2 EXACTEMENT comme dans la liste]\",\"league\":\"[ligue exacte de la liste]\",\"time\":\"[heure exacte de la liste]\",\"sel\":\"[pari precis ex: Victoire Bayern ou Plus 2.5 buts]\",\"cote\":1.65,\"conf\":75,\"raison\":\"[1 phrase d explication]\"}],\"disclaimer\":\"Pari risque. Ne misez que ce que vous pouvez perdre.\"}";

  h+='<div style="display:flex;gap:6px;margin-bottom:10px">';
  var TM=[["upcoming","A venir ("+up.length+")"],["live","Live ("+lv.length+")"],["finished","Termines ("+fn.length+")"]];
  for(var ti=0;ti<3;ti++){
    var isOn=mTab===TM[ti][0];

  var FILS=[["all","Tous"],["fr","France"],["eu","Europe"],["cup","Coupes"],["val","Value"],["arb","Arb"]];
  for(var fi=0;fi<FILS.length;fi++){
    h+='<button class="fib'+(fil===FILS[fi][0]?" on":"")+'" onclick="setFilN('+fi+')">'+FILS[fi][1]+'</button>';
  }

  var leagues=[];
  disp.forEach(function(m){var k=m.leagueName||m.c||"";if(leagues.indexOf(k)<0)leagues.push(k);});

function pStats(){
  var hist=S.hist||[];
  var bk=S.bk||1000;
  var bkStart=+(localStorage.getItem("edge_bk_start")||1000);
  var total=hist.length;
  var wins=hist.filter(function(h){return h.res==="W";}).length;
  var losses=hist.filter(function(h){return h.res==="L";}).length;
  var pending=hist.filter(function(h){return !h.res;}).length;
  var wr=total>0?Math.round(wins/total*100):0;
  var roi=bkStart>0?((bk-bkStart)/bkStart*100).toFixed(1):0;
  var profit=(bk-bkStart).toFixed(0);
  var avgOdd=hist.length?+(hist.reduce(function(a,b){return a+(b.odd||1);},0)/hist.length).toFixed(2):0;
  var streak=0;var maxStreak=0;var curStreak=0;
  for(var i=hist.length-1;i>=0;i--){
    if(hist[i].res==="W"){curStreak++;if(curStreak>maxStreak)maxStreak=curStreak;}
    else{if(i===hist.length-1)streak=0;curStreak=0;}
  }
  var lastW=0;for(var j=hist.length-1;j>=0;j--){if(hist[j].res==="W")lastW++;else break;}

  var h='';
  h+='<div style="background:var(--c2);border:1px solid rgba(0,245,255,.1);border-radius:18px;padding:18px;margin-bottom:14px;position:relative;overflow:hidden">';
  h+='<div style="position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),var(--violet2),transparent)"></div>';
  h+='<div style="font-family:var(--f-titre);font-size:20px;font-weight:900;margin-bottom:14px">Mes statistiques</div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">';
  var KPIS=[
    {v:bk.toFixed(0)+" EUR",l:"Bankroll actuelle",c:"var(--cyan)"},
    {v:(profit>=0?"+":"")+profit+" EUR",l:"Profit/Perte",c:profit>=0?"var(--vert)":"var(--rouge)"},
    {v:roi+"%",l:"ROI",c:roi>=0?"var(--vert)":"var(--rouge)"},
    {v:wr+"%",l:"Taux de reussite",c:wr>=55?"var(--vert)":wr>=45?"var(--cyan)":"var(--rouge)"},
    {v:total,l:"Total paris",c:"var(--blanc)"},
    {v:wins+"V / "+losses+"D",l:"Victoires / Defaites",c:"var(--blanc3)"},
    {v:avgOdd+"x",l:"Cote moyenne",c:"var(--violet3)"},
    {v:maxStreak,l:"Meilleure serie",c:"var(--vert)"}
  ];
  for(var ki=0;ki<KPIS.length;ki++){
    h+='<div style="background:var(--c3);border:1px solid var(--ln);border-radius:12px;padding:13px;text-align:center">';
    h+='<div style="font-family:var(--f-titre);font-size:18px;font-weight:800;color:'+KPIS[ki].c+';font-variant-numeric:tabular-nums;line-height:1;margin-bottom:4px">'+KPIS[ki].v+'</div>';
    h+='<div style="font-family:var(--f-mono);font-size:8px;color:var(--blanc4);text-transform:uppercase;letter-spacing:.08em">'+KPIS[ki].l+'</div>';
    h+='</div>';
  }
  h+='</div>';

  // Evolution bankroll
  var bkH=S.bkH||[bkStart,bk];
  h+='<div style="font-family:var(--f-mono);font-size:8px;color:var(--blanc4);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px">Evolution bankroll</div>';
  h+='<div style="background:var(--c3);border:1px solid var(--ln);border-radius:10px;padding:12px;margin-bottom:0">';
  var bkMax=Math.max.apply(null,bkH),bkMin=Math.min.apply(null,bkH),bkRange=bkMax-bkMin||1;
  var svgW=280,svgH=60;
  h+='<svg viewBox="0 0 '+svgW+' '+svgH+'" style="width:100%;height:60px">';
  h+='<defs><linearGradient id="bkgrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#00f5ff" stop-opacity=".8"/><stop offset="100%" stop-color="#8b00ff" stop-opacity=".8"/></linearGradient></defs>';
  var pts=bkH.map(function(v,i){
    var x=bkH.length>1?(i/(bkH.length-1))*svgW:svgW/2;
    var y=svgH-((v-bkMin)/bkRange*(svgH-8)+4);
    return x.toFixed(1)+","+y.toFixed(1);
  }).join(" ");
  h+='<polyline points="'+pts+'" fill="none" stroke="url(#bkgrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
  // Dots
  var ptArr=bkH.map(function(v,i){
    var x=bkH.length>1?(i/(bkH.length-1))*svgW:svgW/2;
    var y=svgH-((v-bkMin)/bkRange*(svgH-8)+4);
    return {x:x,y:y,v:v};
  });
  if(ptArr.length>0){
    var last=ptArr[ptArr.length-1];
    h+='<circle cx="'+last.x.toFixed(1)+'" cy="'+last.y.toFixed(1)+'" r="3" fill="#00f5ff"/>';
  }
  h+='</svg></div></div>';

  // Historique

  if(!hist.length){
    h+='<div class="empty"><div class="et">Aucun pari enregistre</div><div class="es">Enregistre tes paris dans la page Resultat</div></div>';
  } else {
    for(var hi2=0;hi2<Math.min(hist.length,20);hi2++){
      var entry=hist[hi2];
      var isW=entry.res==="W";var isL=entry.res==="L";var isPend=!entry.res;
      h+='<div style="background:var(--c2);border:1px solid '+(isW?"rgba(0,255,136,.2)":isL?"rgba(255,51,102,.2)":"var(--ln)")+';border-radius:12px;padding:13px;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center;gap:10px">';

      h+='<div style="font-family:var(--f-mono);font-size:8px;color:var(--blanc4);margin-bottom:3px">'+(entry.date||"")+'</div>';
      h+='<div style="font-family:var(--f-titre);font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(entry.match||entry.h+" vs "+entry.a||"Paris")+'</div>';
      h+='<div style="font-size:11px;color:var(--blanc3);margin-top:2px">'+esc(entry.bet||"")+'</div>';
      h+='</div>';
      h+='<div style="text-align:right;flex-shrink:0">';
      h+='<div style="font-family:var(--f-titre);font-size:16px;font-weight:800;color:var(--cyan);font-variant-numeric:tabular-nums">'+((entry.odd||0).toFixed(2))+'x</div>';
      h+='<div style="font-family:var(--f-mono);font-size:9px;margin-top:3px;padding:3px 8px;border-radius:5px;background:'+(isW?"rgba(0,255,136,.12)":isL?"rgba(255,51,102,.1)":"rgba(0,245,255,.06)")+';color:'+(isW?"var(--vert)":isL?"var(--rouge)":"var(--cyan)")+'">'+  (isW?"GAGNE":isL?"PERDU":"EN COURS")+'</div>';
      h+='</div></div>';
    }
  }
  if(hist.length){
    h+='<button onclick="clearHistory()" style="padding:8px 16px;background:rgba(255,51,102,.08);border:1px solid rgba(255,51,102,.2);border-radius:8px;color:var(--rouge);font-family:var(--f-mono);font-size:10px;font-weight:700;cursor:pointer;margin-top:4px">Effacer l historique</button>';
  }
  return h;
}

// === BAYESIAN UPDATE ===
function bayesianUpdate(pH,pN,pA,o1,oN,o2){
  if(!o1||!oN||!o2||o1<=1)return{pH:pH,pN:pN,pA:pA};
  var mH=1/o1,mN=1/oN,mA=1/o2,tot=mH+mN+mA;
  mH/=tot;mN/=tot;mA/=tot;
  var w=0.60;
  var uH=mH*w+pH*(1-w),uN=mN*w+pN*(1-w),uA=mA*w+pA*(1-w);
  var s=uH+uN+uA;
  return{pH:uH/s,pN:uN/s,pA:uA/s};
}

// === ADAPTIVE KELLY ===
function adaptiveKelly(prob,odd){
  if(!odd||odd<1.25||!prob)return 0;
  var b=odd-1,q=1-prob,k=(b*prob-q)/b;
  if(k<=0)return 0;
  var edge=prob*odd-1;if(edge<0.03)return 0;
  var fr=edge>0.12?0.25:edge>0.07?0.20:edge>0.04?0.15:0.10;
  return Math.min(k*fr,0.04);
}

// === EXPLAIN PRONO ===
function explainProno(edg,bO,m,bR){
  var reasons=[],risks=[];
  if(edg>0.08)reasons.push("Edge exceptionnel +"+((edg)*100).toFixed(1)+"% - rare opportunite");
  else if(edg>0.05)reasons.push("Edge solide +"+((edg)*100).toFixed(1)+"% - value confirmee");
  else if(edg>0.03)reasons.push("Edge positif +"+((edg)*100).toFixed(1)+"% - legere value");
  else risks.push("Edge faible - pari a eviter");
  if(m.derby)risks.push("Derby - resultat impredictible");
  if(m.hf&&bR==="1"){if(m.hf>=12)reasons.push("Bonne forme domicile ("+m.hf+"/15 pts)");else if(m.hf<=5)risks.push("Mauvaise forme domicile");}
  if(m.af&&bR==="2"){if(m.af>=12)reasons.push("Bonne forme exterieur");else if(m.af<=5)risks.push("Mauvaise forme exterieur");}
  if(m.o1&&m.on&&m.o2){var mg=(1/m.o1+1/m.on+1/m.o2-1)*100;if(mg<3)reasons.push("Marche liquide - cotes fiables");else if(mg>8)risks.push("Marge elevee ("+mg.toFixed(1)+"%) - cotes moins fiables");}
  if(bO>=1.50)reasons.push("Cote correcte @ "+bO.toFixed(2)+" - bon rapport risque/gain");
  else if(bO<1.30)risks.push("Cote tres basse @ "+bO.toFixed(2)+" - mise reduite");
  return{reasons:reasons,risks:risks};
}

// === ENRICHISSEMENT ODDS ===
function enrichFromOdds(m){
  var pin=(m.bk||[]).find(function(b){return b.n==="Pinnacle";});
  var sh=pin||{o1:m.o1,on:m.on,o2:m.o2};
  if(sh.o1&&sh.o2){
    var pH=1/sh.o1,pA=1/sh.o2,pN=sh.on?1/sh.on:0,tot=pH+pA+pN;
    if(tot>0){pH/=tot;pA/=tot;}
    m.mkStrH=Math.max(0.5,Math.min(3.5,-Math.log(1-Math.min(0.99,pH))*1.4));
    m.mkStrA=Math.max(0.4,Math.min(3.0,-Math.log(1-Math.min(0.99,pA))*1.4));
  }
  return m;
}

  if(won){S.demoBk+=bet.potGain;confetti();}

  var bet=S.demoBets.find(function(b){return b.id===betId;});

  }
  settleBet(betId,won);
}

      h+='<div style="background:'+(o2===bestO2&&bestO2>0?"var(--vert2)":"var(--gris2)")+';border:1px solid '+(o2===bestO2&&bestO2>0?"rgba(0,208,132,.25)":"var(--ln)")+';border-radius:var(--r);padding:7px 4px;text-align:center"><div style="font-family:var(--f-mono);font-size:7px;color:var(--blanc4)">2</div><div style="font-family:var(--f-titre);font-size:15px;font-weight:900;color:'+(o2===bestO2&&bestO2>0?"var(--vert)":"var(--blanc)")+';font-variant-numeric:tabular-nums">'+(o2?o2.toFixed(2):"--")+'</div></div>';

      h+='<div style="display:flex;gap:5px">';
      h+='<button onclick="addToSlip('+mIdx+',0,'+o1+')" style="flex:1;padding:5px;background:transparent;border:1px solid var(--ln);border-radius:5px;color:var(--blanc4);font-family:var(--f-mono);font-size:8px;cursor:pointer;font-weight:700">+ Demo</button>';
      h+='</div></div>';
    }
    h+='</div>';
  }
  return h;

function setLiveTabN(i){var k=["all","live","upcoming","finished"];S.liveTab=k[i]||"all";renderPage();}

function loadMatchDetail(){
  var m=S.selM;
  if(!m||!m.fixtureId)return;
  S.mdLoading=true;S.matchDetail=null;renderPage();
  var url="/api/match?fixtureId="+m.fixtureId;
  if(m.homeId)url+="&homeId="+m.homeId;
  if(m.awayId)url+="&awayId="+m.awayId;
  if(m.leagueId)url+="&leagueId="+m.leagueId;
  fetch(url).then(function(r){return r.json();}).then(function(data){
    S.matchDetail=data;S.mdLoading=false;renderPage();
  }).catch(function(){S.mdLoading=false;renderPage();});
}
function getAIAnalysis(){
  var d=S.d;var m=S.selM;
  if(!S.aiKey){alert("Configure ta cle Anthropic.");return;}
  S.aiLoad=true;S.aiMsg=null;renderPage();
  var h=esc(d.home||d.aiH||"Dom"),a=esc(d.away||d.aiA||"Ext");
  var league=esc(d.league||d.aiC||"Football");
  var r=S.res;
  var cotes="1:"+((d.o1||d.oN&&d.o1)||"?")+" N:"+(d.oN||"?")+" 2:"+(d.o2||"?");
  var stats="xG dom:"+(d.hXG||"?")+" xGA dom:"+(d.hXGA||"?")+" xG ext:"+(d.aXG||"?")+" xGA ext:"+(d.aXGA||"?");
  var forme="Forme dom:"+(d.hF||"?")+" pts sur 5 | Forme ext:"+(d.aF||"?")+" pts sur 5";
  var verdict=r?("Verdict EDGE: "+r.label+" @ "+(r.bO||"?")+"x | Conf: "+r.conf+"% | Edge: "+((r.edg||0)*100).toFixed(1)+"%"):"Pas encore analyse par le moteur";
  var md=S.matchDetail;
  var h2h_str="";
  if(md&&md.h2h&&md.h2h.length){
    var hw=md.h2h.filter(function(g){return g.winner==="home";}).length;
    var dr=md.h2h.filter(function(g){return g.winner==="draw";}).length;
    var aw=md.h2h.filter(function(g){return g.winner==="away";}).length;
    h2h_str=" | H2H: "+hw+"V "+dr+"N "+aw+"D sur "+md.h2h.length+" matchs";
  }
  var prompt="Tu es EDGE, expert en paris sportifs quantitatifs. Analyse ce match en detail.\n\n"
    +"MATCH: "+h+" vs "+a+" ("+league+")\n"
    +"COTES: "+cotes+"\n"
    +"STATS: "+stats+"\n"
    +"FORME: "+forme+h2h_str+"\n"
    +"MOTEUR: "+verdict+"\n\n"
    +"Donne une analyse complete en 4-5 phrases: contexte tactique, forme recente, avantage domicile/exterieur, signal value et recommandation concrete. Sois precis et factuel.";
  callAI(prompt,800)
  .then(function(raw){
    var txt=raw.replace(/```[a-z]*/g,"").replace(/```/g,"").trim();
    S.aiMsg={t:"ok",m:txt};
  })
  .catch(function(e){S.aiMsg={t:"err",m:"Erreur: "+e.message};})
  .then(function(){S.aiLoad=false;renderPage();});
}

(function(){
  var c=document.getElementById("particles");
  if(!c)return;
  var x=c.getContext("2d");
  var W=c.width=window.innerWidth,H=c.height=window.innerHeight;
  window.addEventListener("resize",function(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;});
  var CL=["rgba(255,107,0,","rgba(0,212,255,","rgba(255,107,0,","rgba(0,230,118,"];
  var pts=[];
  for(var i=0;i<55;i++){pts.push({px:Math.random()*W,py:Math.random()*H,vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.35,r:Math.random()*1.4+.4,c:CL[i%4],o:Math.random()*.4+.08});}
  function draw(){
    x.clearRect(0,0,W,H);
    for(var i=0;i<pts.length;i++){
      var p=pts[i];p.px+=p.vx;p.py+=p.vy;
      if(p.px<0)p.px=W;if(p.px>W)p.px=0;if(p.py<0)p.py=H;if(p.py>H)p.py=0;
      x.beginPath();x.arc(p.px,p.py,p.r,0,Math.PI*2);x.fillStyle=p.c+p.o+")";x.fill();
      for(var j=i+1;j<pts.length;j++){
        var q=pts[j],dx=p.px-q.px,dy=p.py-q.py,d=Math.sqrt(dx*dx+dy*dy);
        if(d<90){x.beginPath();x.moveTo(p.px,p.py);x.lineTo(q.px,q.py);x.strokeStyle=p.c+(0.05*(1-d/90))+")";x.lineWidth=.4;x.stroke();}
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
