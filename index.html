<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>EDGE · Betting Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#07070f;--bg2:#0c0c18;--c1:#101020;--c2:#161626;--c3:#1c1c30;
  --v:#6d28d9;--v2:#7c3aed;--v3:#8b5cf6;--v4:rgba(109,40,217,.18);--v5:rgba(109,40,217,.08);
  --gold:#f59e0b;--gold2:rgba(245,158,11,.12);
  --green:#10b981;--green2:rgba(16,185,129,.12);
  --red:#ef4444;--red2:rgba(239,68,68,.12);
  --pink:#ec4899;--pink2:rgba(236,72,153,.12);
  --cyan:#06b6d4;
  --w:#fff;--w2:rgba(255,255,255,.8);--w3:rgba(255,255,255,.5);--w4:rgba(255,255,255,.15);
  --g2:#8888a8;--g3:#55556a;--g4:#252538;--g5:#18182a;
  --ln:rgba(255,255,255,.07);--ln2:rgba(255,255,255,.03);
  --r:9px;--r2:13px;--r3:17px;--r4:21px;
  --shv:0 8px 32px rgba(109,40,217,.2);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--w);font-family:'Syne',sans-serif;font-size:14px;overflow-x:hidden;-webkit-font-smoothing:antialiased}
button{font-family:'Syne',sans-serif;font-size:14px;cursor:pointer}
input,select{font-family:'Syne',sans-serif;font-size:13px;background:var(--c2);border:1px solid var(--ln);border-radius:9px;color:var(--w);padding:10px 12px;width:100%;outline:none;transition:border-color .13s;display:block}
input:focus,select:focus{border-color:rgba(109,40,217,.5);box-shadow:0 0 0 2px rgba(109,40,217,.1)}
select{appearance:none;-webkit-appearance:none}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--v2);border-radius:3px}

/* ── LAYOUT ── */
#app{display:flex;min-height:100vh}
#sidebar{width:224px;background:var(--bg2);border-right:1px solid var(--ln);position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;z-index:100;transition:transform .26s cubic-bezier(.16,1,.3,1)}
#main{margin-left:224px;flex:1;display:flex;flex-direction:column;min-height:100vh}
@media(max-width:768px){#sidebar{transform:translateX(-224px)}#sidebar.open{transform:none}#main{margin-left:0}}

/* ── SIDEBAR ── */
.sb-head{padding:20px 16px 14px;border-bottom:1px solid var(--ln)}
.sb-logo{font-size:24px;font-weight:800;letter-spacing:-2px}
.sb-logo span{color:var(--v3)}
.sb-sub{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--g3);letter-spacing:.12em;text-transform:uppercase;margin-top:3px}
.sb-nav{flex:1;padding:8px;overflow-y:auto}
.nav-sec{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--g3);padding:0 8px;margin:12px 0 3px;letter-spacing:.1em;text-transform:uppercase;font-weight:700}
.nb{display:flex;align-items:center;gap:8px;width:100%;padding:9px 10px;border:none;background:transparent;color:var(--g2);border-radius:8px;font-size:12.5px;font-weight:500;text-align:left;position:relative;transition:all .11s}
.nb:hover{background:var(--c2);color:var(--w2)}
.nb.on{background:var(--v4);color:var(--v3);font-weight:700}
.nb.on::after{content:'';position:absolute;right:0;top:50%;transform:translateY(-50%);width:3px;height:52%;background:var(--v3);border-radius:2px 0 0 2px}
.ni{font-size:14px;width:20px;text-align:center;flex-shrink:0}
.nbadge{margin-left:auto;font-size:9px;padding:1px 6px;border-radius:100px;background:var(--v5);color:var(--v3);font-weight:700}
.nbadge.live{background:var(--pink2);color:var(--pink);animation:pulse 2s infinite}
.nbadge.ok{background:var(--green2);color:var(--green)}
.sb-foot{padding:10px;border-top:1px solid var(--ln)}
.bkcard{background:var(--c2);border:1px solid var(--ln);border-radius:var(--r2);padding:12px 14px;cursor:pointer;transition:border-color .14s}
.bkcard:hover{border-color:var(--v2)}
.bklbl{font-size:10px;color:var(--g3);font-weight:600;margin-bottom:2px}
.bkval{font-size:21px;font-weight:800;letter-spacing:-1px;color:var(--gold)}
.bksub{font-size:10px;color:var(--g3);margin-top:2px}

/* ── TOPBAR ── */
#topbar{background:rgba(7,7,15,.93);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid var(--ln);padding:0 20px;height:54px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:90}
.ham{display:none;flex-direction:column;gap:4px;padding:7px;border-radius:7px;border:1px solid var(--ln);background:var(--c2)}
.ham span{width:16px;height:2px;background:var(--g3);border-radius:1px;display:block}
@media(max-width:768px){.ham{display:flex}}
#page-title{font-size:14px;font-weight:700;letter-spacing:-.3px}
.tb-r{margin-left:auto;display:flex;align-items:center;gap:7px}
.tbtn{padding:5px 11px;background:transparent;border:1px solid var(--ln);border-radius:7px;color:var(--g2);font-size:11px;font-weight:600;white-space:nowrap;transition:all .12s}
.tbtn:hover{border-color:var(--v3);color:var(--v3)}
.tbtn.ok{border-color:rgba(16,185,129,.35);color:var(--green);background:var(--green2)}
.livepill{display:flex;align-items:center;gap:4px;padding:3px 9px;background:var(--pink2);border:1px solid rgba(236,72,153,.22);border-radius:100px;font-size:10px;color:var(--pink);font-family:'JetBrains Mono',monospace;font-weight:700}
.livedot{width:5px;height:5px;border-radius:50%;background:var(--pink);animation:pulse 1.5s infinite;flex-shrink:0}

/* ── PAGE ── */
#page{padding:20px;max-width:880px;animation:fu .18s ease}

/* ── CARDS ── */
.card{background:var(--c1);border:1px solid var(--ln);border-radius:var(--r2);padding:18px;margin-bottom:10px}
.cardv{background:var(--c1);border:1px solid rgba(109,40,217,.22);border-radius:var(--r2);padding:18px;margin-bottom:10px;box-shadow:var(--shv)}
.carde{background:var(--green2);border:1px solid rgba(16,185,129,.18);border-radius:var(--r2);padding:18px;margin-bottom:10px}
.cardr{background:var(--red2);border:1px solid rgba(239,68,68,.16);border-radius:var(--r2);padding:18px;margin-bottom:10px}
.clbl{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--g3);font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px}

/* ── TAGS ── */
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:100px;font-size:10px;font-weight:700}
.tg{background:var(--gold2);color:var(--gold)}
.te{background:var(--green2);color:var(--green)}
.tv{background:var(--v5);color:var(--v3)}
.tr{background:var(--red2);color:var(--red)}

/* ── FORMS ── */
.fw{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.fl{font-size:10px;color:var(--g3);font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:7px}
@media(max-width:768px){.g4{grid-template-columns:1fr 1fr}}
.rg{display:flex;gap:3px}
.rb{flex:1;padding:8px 4px;font-size:11px;font-weight:700;border-radius:7px;border:1px solid var(--ln);background:var(--c2);color:var(--g3);text-align:center;transition:all .11s}
.rb:hover{border-color:var(--v3);color:var(--v3)}
.rb.on{background:var(--v4);border-color:rgba(109,40,217,.4);color:var(--v3)}
.fsec{background:var(--c1);border:1px solid var(--ln);border-radius:var(--r2);padding:15px;margin-bottom:8px}
.fsh{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:9px;border-bottom:1px solid var(--ln2)}
.fsn{font-size:9px;font-weight:700;color:var(--v3);background:var(--v5);border-radius:4px;padding:2px 7px;text-transform:uppercase;letter-spacing:.06em}
.fst{font-size:13px;font-weight:700;color:var(--w)}

/* ── BUTTONS ── */
.cbtn{width:100%;height:44px;background:var(--v2);border:none;border-radius:9px;font-size:13px;font-weight:700;color:#fff;letter-spacing:-.2px;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .14s}
.cbtn:hover:not(:disabled){background:var(--v3);transform:translateY(-1px);box-shadow:0 5px 18px rgba(109,40,217,.35)}
.cbtn:disabled{background:var(--g4);color:var(--g3);transform:none;opacity:.6}
.cbtn.gold{background:linear-gradient(135deg,#d97706,var(--gold))}
.cbtn.gold:hover:not(:disabled){background:linear-gradient(135deg,var(--gold),#fbbf24)}
.abtn{padding:4px 9px;border-radius:6px;font-size:10px;font-weight:700;border:1px solid var(--ln);color:var(--g3);background:transparent;white-space:nowrap;transition:all .11s}
.abtn:hover{border-color:var(--v3);color:var(--v3);background:var(--v5)}

/* ── MATCH ROWS ── */
.mwrap{background:var(--c1);border:1px solid var(--ln);border-radius:var(--r2);overflow:hidden;margin-bottom:5px}
.mrow{display:grid;grid-template-columns:46px 1fr 152px 1fr 50px;align-items:center;padding:10px 12px;cursor:pointer;transition:background .09s;border-bottom:1px solid var(--ln2);gap:5px}
.mrow:hover{background:var(--c2)}
.mrow:last-child{border-bottom:none}
@media(max-width:600px){.mrow{grid-template-columns:40px 1fr 134px 1fr 42px;padding:9px 10px}}
.mteam{font-size:12px;font-weight:700;letter-spacing:-.2px}
.mxg{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--g3);margin-top:1px}
.mtime{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--g3);text-align:center;display:block}
.odds{display:flex;gap:3px;justify-content:center}
.odd{display:flex;flex-direction:column;align-items:center;min-width:43px;padding:5px 2px;border-radius:6px;background:var(--c2);border:1px solid var(--ln);transition:all .11s}
.odd:hover,.odd.val{background:var(--v5);border-color:rgba(109,40,217,.32)}
.odd-l{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--g3)}
.odd-v{font-size:12px;font-weight:700;margin-top:1px}

/* ── SCANNER SIGNALS ── */
.sig{background:var(--c1);border:1px solid var(--ln);border-radius:var(--r2);overflow:hidden;margin-bottom:7px;cursor:pointer;transition:all .14s}
.sig:hover{border-color:rgba(109,40,217,.3);transform:translateY(-1px)}
.sig.top{border-color:rgba(109,40,217,.2)}
.sig-bar{height:2px}
.sig-body{padding:13px}
.sig-meta{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--g3);margin-bottom:6px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;text-transform:uppercase;letter-spacing:.07em}
.sig-teams{font-size:11px;color:var(--g2);margin-bottom:3px}
.sig-bet{font-size:16px;font-weight:800;letter-spacing:-.4px;margin-bottom:10px;line-height:1.2}
.sig-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:7px}
@media(max-width:600px){.sig-grid{grid-template-columns:repeat(2,1fr)}}
.sig-box{background:var(--bg2);border-radius:6px;padding:7px 4px;text-align:center;border:1px solid var(--ln2)}
.sig-lbl{font-family:'JetBrains Mono',monospace;font-size:7px;color:var(--g3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:2px}
.sig-val{font-size:14px;font-weight:800;letter-spacing:-.3px}
.progbar{height:2px;background:var(--g4);border-radius:2px;overflow:hidden}
.progfill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--v2),var(--v3))}

/* ── RESULT / VERDICT ── */
.vrd{background:var(--c1);border:1px solid rgba(109,40,217,.22);border-radius:var(--r3);padding:18px;margin-bottom:10px;box-shadow:var(--shv);position:relative;overflow:hidden}
.vrd::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--v2),var(--pink),transparent)}
.vbet{font-size:clamp(16px,3.5vw,22px);font-weight:800;letter-spacing:-1px;line-height:1.15;margin-bottom:4px}
.vmeta{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--g3);margin-bottom:12px}
.prow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:9px}
.pb{background:var(--c2);border:1px solid var(--ln);border-radius:var(--r);padding:11px 5px;text-align:center}
.pb.win{background:var(--v5);border-color:rgba(109,40,217,.28)}
.pp{font-size:21px;font-weight:800;letter-spacing:-.5px}
.pb.win .pp{color:var(--v3)}
.pn{font-size:10px;color:var(--g3);font-weight:600;margin-top:2px}
.b3{height:3px;background:var(--g4);border-radius:2px;display:flex;overflow:hidden;margin-top:7px}
.b3h{background:var(--v2)}.b3n{background:var(--g4)}.b3a{background:var(--pink)}
.crow{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.cl{font-size:9px;color:var(--g3);font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.cv{font-size:13px;font-weight:700}
.ctr{height:3px;background:var(--g4);border-radius:2px;overflow:hidden;margin-bottom:13px}
.ctrfill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--v2),var(--v3))}

/* ── EDGE BLOCK ── */
.edgb{display:flex;justify-content:space-between;align-items:center;padding:13px;border-radius:var(--r);margin-bottom:10px}
.edgb.pos{background:var(--green2);border:1px solid rgba(16,185,129,.2)}
.edgb.neg{background:var(--red2);border:1px solid rgba(239,68,68,.16)}
.edgv{font-size:24px;font-weight:800;letter-spacing:-1px}
.edgb.pos .edgv{color:var(--green)}.edgb.neg .edgv{color:var(--red)}

/* ── MARKET ROWS ── */
.mkrow{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-radius:7px;margin-bottom:4px}
.mkrow.pos{background:var(--v5);border:1px solid rgba(109,40,217,.2)}
.mkrow.safe{background:var(--green2);border:1px solid rgba(16,185,129,.16)}
.mkrow.neu{background:var(--c2);border:1px solid var(--ln2)}

/* ── SCORE BOXES ── */
.sgr{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.scbox{background:var(--c2);border:1px solid var(--ln);border-radius:9px;padding:9px 5px;text-align:center}
.scbox.top{background:var(--v5);border-color:rgba(109,40,217,.28)}
.scv{font-size:16px;font-weight:800;letter-spacing:-.3px}
.scp{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--g3);margin-top:2px}

/* ── KELLY ── */
.kg{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:9px}
.kb{background:var(--c2);border:1px solid var(--ln);border-radius:9px;padding:11px;text-align:center}
.kbv{font-size:17px;font-weight:800;color:var(--v3);letter-spacing:-.3px}
.kbl{font-size:9px;color:var(--g3);font-weight:700;margin-top:3px;text-transform:uppercase;letter-spacing:.06em}
.vp{padding:9px 12px;border-radius:7px;font-size:12px;font-weight:700}
.vp.y{background:var(--green2);border:1px solid rgba(16,185,129,.2);color:var(--green)}
.vp.n{background:var(--red2);border:1px solid rgba(239,68,68,.16);color:var(--red)}

/* ── BARS ── */
.barrow{margin-bottom:8px}
.bartop{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;font-weight:500}
.bartrack{height:3px;background:var(--g4);border-radius:2px;overflow:hidden}
.barfill{height:100%;border-radius:2px}

/* ── STAT BOXES ── */
.sg4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
@media(max-width:600px){.sg4{grid-template-columns:repeat(2,1fr)}}
.sbox{background:var(--c1);border:1px solid var(--ln);border-radius:var(--r2);padding:13px;text-align:center;transition:border-color .12s}
.sbox:hover{border-color:rgba(255,255,255,.1)}
.sv{font-size:21px;font-weight:800;letter-spacing:-1px;line-height:1;margin-bottom:3px}
.sl{font-size:10px;color:var(--g3);font-weight:500}

/* ── TABLE ── */
.ctbl{width:100%;border-collapse:collapse;font-size:12px}
.ctbl th{padding:8px 10px;text-align:left;font-size:9px;color:var(--g3);font-weight:700;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--ln);background:var(--bg2)}
.ctbl td{padding:9px 10px;border-bottom:1px solid var(--ln2)}
.ctbl tr:last-child td{border-bottom:none}
.ctbl tr:hover td{background:var(--c2)}
.bkn{font-size:12px;font-weight:700}
.oc{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--g2)}
.oc.best{color:var(--green);font-weight:700}
.pinb{font-size:9px;color:var(--cyan);background:rgba(6,182,212,.1);border-radius:4px;padding:1px 5px;margin-left:4px;font-weight:700}

/* ── TIPS ── */
.tipcard{background:var(--c1);border:1px solid var(--ln);border-radius:var(--r2);overflow:hidden;margin-bottom:7px;cursor:pointer;transition:all .14s}
.tipcard:hover{border-color:rgba(109,40,217,.28);transform:translateY(-1px)}
.tipcard.top{border-color:rgba(109,40,217,.18)}
.tiph{padding:8px 13px;background:var(--bg2);display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--ln2)}
.tipb{padding:12px 13px}
.tipbet{font-size:15px;font-weight:800;margin-bottom:7px;letter-spacing:-.3px}
.tipmg{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:7px}
@media(max-width:600px){.tipmg{grid-template-columns:repeat(2,1fr)}}
.tipm{background:var(--bg2);border-radius:7px;padding:7px 4px;text-align:center;border:1px solid var(--ln2)}
.tipml{font-family:'JetBrains Mono',monospace;font-size:7px;color:var(--g3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
.tipmv{font-size:14px;font-weight:800;letter-spacing:-.3px}

/* ── FILTERS ── */
.fils{display:flex;gap:5px;overflow-x:auto;padding-bottom:3px;margin-bottom:12px;-webkit-overflow-scrolling:touch}
.fib{padding:5px 12px;border-radius:100px;font-size:11px;font-weight:700;border:1px solid var(--ln);background:transparent;color:var(--g3);white-space:nowrap;flex-shrink:0;transition:all .11s}
.fib:hover{border-color:var(--v3);color:var(--v3)}
.fib.on{background:var(--v2);border-color:var(--v2);color:#fff}

/* ── MODAL ── */
.modal{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.82);display:flex;align-items:center;justify-content:center;padding:14px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.mbox{background:var(--c1);border:1px solid rgba(109,40,217,.22);border-radius:var(--r4);padding:22px;width:100%;max-width:370px;box-shadow:0 20px 60px rgba(0,0,0,.7)}
.mtit{font-size:16px;font-weight:800;margin-bottom:14px;letter-spacing:-.4px}
.mbtns{display:flex;gap:8px;margin-top:13px}
.mbtn{flex:1;padding:10px;border-radius:8px;font-size:13px;font-weight:700;border:1px solid}
.mbtn.gold{background:var(--gold2);border-color:rgba(245,158,11,.28);color:var(--gold)}
.mbtn.grey{background:var(--c2);border-color:var(--ln);color:var(--g2)}
.mbtn.v{background:var(--v4);border-color:rgba(109,40,217,.28);color:var(--v3)}

/* ── MISC ── */
.empty{text-align:center;padding:46px 20px}
.ei{font-size:38px;opacity:.1;margin-bottom:12px}
.et{font-size:15px;font-weight:700;color:var(--g2);margin-bottom:5px;letter-spacing:-.3px}
.es{font-size:12px;color:var(--g3);line-height:1.75}
.stb{padding:8px 12px;background:var(--v5);border:1px solid rgba(109,40,217,.14);border-radius:7px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--v3);margin-bottom:8px;display:flex;align-items:center;gap:7px}
.aimsg{padding:8px 11px;border-radius:7px;font-size:11px;margin-top:6px;line-height:1.6}
.aiok{background:var(--green2);border:1px solid rgba(16,185,129,.2);color:var(--green)}
.aier{background:var(--red2);border:1px solid rgba(239,68,68,.2);color:var(--red)}
.selm{background:var(--v5);border:1px solid rgba(109,40,217,.14);border-radius:9px;padding:9px 12px;margin-bottom:9px;display:flex;align-items:center;gap:9px}

/* ════════════════════════════════════════════

function pmf(l, k) {
  if (l <= 0) return k === 0 ? 1 : 0;
  if (k < 0) return 0;
  if (k > 20) {
    var lp = -l + k * Math.log(l);
    for (var i = 1; i <= k; i++) lp -= Math.log(i);
    return Math.max(0, Math.exp(lp));
  }
  var v = Math.exp(-l);
  for (var j = 1; j <= k; j++) v *= l / j;
  return Math.max(0, v);
}
function cdf(l, m) {
  if (m < 0) return 0;
  var s = 0, t = Math.exp(-l);
  for (var k = 0; k <= m; k++) { s += t; if (t < 1e-10) break; t *= l / (k + 1); }
  return Math.min(1, s);
}
function tau(h, a, lH, lA, rho) {
  var r = Math.max(-0.25, Math.min(-0.05, rho || -0.135));
  if (h === 0 && a === 0) return Math.max(0.001, 1 - lH * lA * r);
  if (h === 1 && a === 0) return Math.max(0.001, 1 + lA * r);

  if (h === 1 && a === 1) return Math.max(0.01, 1 - r);

}
var RHO = { "Ligue 1": -0.142, "Premier League": -0.118, "La Liga": -0.135, "Bundesliga": -0.128, "Serie A": -0.151, "Champions League": -0.132 };
function kellyF(p, o) {
  if (!o || o <= 1 || !p || p <= 0 || p >= 1) return 0;
  var b = o - 1, k = (b * p - (1 - p)) / b;

  var e = p * o - 1, fr = e > 0.10 ? 0.25 : e > 0.05 ? 0.20 : 0.125;
  return Math.min(k * fr, 0.05);
}

function arbF(o1, oN, o2) {

}
function fmW(p5, p10) {

    { id:"CSA",cat:"CS", name:"Clean Sheet " + (d.away || "Ext"), p: pmf(r.lH, 0), o: 0 },

  bets.forEach(function(b) {
    b.edg = b.o > 1.01 ? edgeF(b.p, b.o) : null;
    b.kel = b.o > 1.01 ? kellyF(b.p, b.o) : 0;

  var best = bets.filter(function(b) { return b.o > 1.01 && (b.edg || 0) > 0; })

async function callAI(prompt, max) {
  max = max || 2000;
  if (!S.aiKey) throw new Error("Cle manquante");
  var resp = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": S.aiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({ model: "claude-haiku-4-5-20251001", max_tokens: max, messages: [{ role: "user", content: prompt }] })
  });
  var data = await resp.json();
  if (!data.content) throw new Error((data.error && data.error.message) || "Erreur API");
  return data.content.map(function(b) { return b.type === "text" ? b.text : ""; }).join("");
}
function parseJSON(raw, arr) {
  var c = raw.replace(/```json|```/g, "").trim();
  var ch = arr ? "[" : "{", ct = arr ? "]" : "}";
  var si = c.indexOf(ch), ei = c.lastIndexOf(ct);
  if (si !== -1 && ei !== -1) c = c.substring(si, ei + 1);
  return JSON.parse(c);
}

function doAnalyse() {
  var d = S.d;
  var m = {
    hxg: +d.hXG, axg: +d.aXG, hg: +d.hG, ag: +d.aG,
    hxga: +d.hXGA, axga: +d.aXGA, hf: +d.hF, af: +d.aF,
    hf10: +d.hF10, af10: +d.aF10,
    o1: +d.o1, on: +d.oN, o2: +d.o2,
    derby: d.derby, hfat: d.hFat, afat: d.aFat,
    c: d.league || d.aiC || "Ligue 1", bk: +d.bk || S.bk
  };
  var r = calc(m);
  if (!r) { S.aiMsg = { t: "err", m: "Erreur de calcul — verifiez les donnees." }; renderPage(); return; }
  var extra = buildBets(r, d);
  S.res = Object.assign({}, r, extra, { d: d });
  goTab("result");
}

function logBet(win) {
  if (!S.res) return;
  var stake = toM(Math.max(S.bk * (S.res.kel || 0.02), 1));
  var profit = win ? toM(stake * ((S.res.bO || 2) - 1)) : toM(-stake);
  var newBk = toM(S.bk + profit);
  if (win) launchConfetti();
  var co = +S.closingOdd || 0;
  var clv = co > 0 ? toM((S.res.bO || 2) / co - 1) : 0;
  var entry = {
    id: Date.now(),
    date: new Date().toLocaleDateString("fr-FR"),
    match: (S.res.d.home || "?") + " vs " + (S.res.d.away || "?"),
    stake: stake, oddsT: S.res.bO || 2, clv: clv,
    result: win ? "WIN" : "LOSS", profit: profit, bk: newBk
  };
  saveHist([entry].concat(S.hist).slice(0, 100));
  saveBk(newBk);
  S.closingOdd = "";
  renderPage();
}

function launchConfetti() {
  var colors = ["#7c3aed", "#a78bfa", "#ec4899", "#06d6a0", "#ffd60a"];
  var el = document.createElement("div");
  el.style.cssText = "position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden";
  document.body.appendChild(el);
  for (var i = 0; i < 55; i++) {
    var p = document.createElement("div");
    var sz = Math.random() * 7 + 3;
    var c = colors[Math.floor(Math.random() * colors.length)];
    p.style.cssText = "position:absolute;top:-20px;left:" + (Math.random() * 100) + "%;width:" + sz +
      "px;height:" + sz + "px;background:" + c + ";border-radius:" + (Math.random() > .5 ? "50%" : "2px") +
      ";animation:cffall " + (Math.random() * 2 + 1.5) + "s " + (Math.random() * 0.8) + "s ease-in forwards";
    el.appendChild(p);
  }
  setTimeout(function() { el.remove(); }, 3500);
}

function calcBkR() {
  var b = S.bkC, tot = +b.tot, prob = +b.prob, odd = +b.odd, frac = +b.frac || 0.25;
  if (!tot || !prob || !odd) { S.bkR = null; return; }
  var p = prob / 100, bo = odd - 1, q = 1 - p;
  var kR = Math.max(0, (bo * p - q) / bo), kA = kR * frac;
  S.bkR = { kR: kR, kA: kA, m: kA * tot, g: odd * kA * tot - kA * tot, ev: p * odd - 1 };
}

  var totalProfit = hist.reduce(function(a, h) { return a + (h.profit || 0); }, 0);
  var roi2 = totalMise > 0 ? +((totalProfit / totalMise) * 100).toFixed(1) : 0;
  var avgClv = tot ? +(hist.reduce(function(a, h) { return a + (h.clv || 0); }, 0) / tot * 100).toFixed(1) : 0;
  var avgOdds = tot ? +(hist.reduce(function(a, h) { return a + (h.oddsT || 2); }, 0) / tot).toFixed(2) : 0;
  if (!tot) return '<div class="empty"><div class="ei">📊</div><div class="et">Aucun pari enregistre</div><div class="es">Analysez un match et enregistrez vos paris</div></div>';
  var score = Math.min(100, Math.max(0, wr * 0.4 + (roi2 > 0 ? Math.min(roi2 * 2, 30) : 0) + (avgClv > 0 ? Math.min(avgClv * 5, 20) : 0)));
  var scoreLabel = score >= 80 ? "Elite 🏆" : score >= 60 ? "Sharp 🎯" : score >= 40 ? "Confirme ✓" : "Debutant 📚";
  var scoreColor = score >= 80 ? "var(--green)" : score >= 60 ? "var(--v3)" : score >= 40 ? "var(--gold)" : "var(--red)";
  var h = '<div style="font-size:21px;font-weight:800;letter-spacing:-1px;margin-bottom:3px">Mes Statistiques</div>' +
    '<div style="font-size:12px;color:var(--g3);margin-bottom:13px">' + tot + ' paris enregistres</div>' +
    '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:10px">';
  [{ i: "🎯", l: "Win Rate", v: wr + "%", sub: wons.length + "V / " + losses.length + "D", c: wr >= 55 ? "var(--green)" : wr >= 45 ? "var(--v3)" : "var(--red)" },
   { i: "💰", l: "ROI Total", v: (roi2 > 0 ? "+" : "") + roi2 + "%", sub: (totalProfit > 0 ? "+" : "") + totalProfit.toFixed(2) + "€", c: roi2 > 0 ? "var(--green)" : "var(--red)" },
   { i: "📈", l: "CLV Moyen", v: (avgClv > 0 ? "+" : "") + avgClv + "%", c: avgClv > 2 ? "var(--green)" : avgClv > 0 ? "var(--v3)" : "var(--red)" },
   { i: "🎰", l: "Cote Moy.", v: avgOdds + "x", c: "var(--v3)" }
  ].forEach(function(s) {
    h += '<div style="background:var(--c1);border:1px solid var(--ln);border-radius:var(--r2);padding:14px 12px;transition:border-color .12s" ' +
      'onmouseover="this.style.borderColor=\'rgba(109,40,217,.3)\'" onmouseout="this.style.borderColor=\'var(--ln)\'">' +
      '<div style="font-size:18px;margin-bottom:6px">' + s.i + '</div>' +
      '<div style="font-size:20px;font-weight:800;color:' + s.c + ';letter-spacing:-1px;line-height:1;margin-bottom:3px">' + s.v + '</div>' +
      '<div style="font-size:11px;font-weight:600;color:var(--w2);' + (s.sub ? "margin-bottom:2px" : "") + '">' + s.l + '</div>' +
      (s.sub ? '<div style="font-size:10px;color:var(--g3)">' + s.sub + '</div>' : "") + '</div>';
  });
  h += '</div><div class="cardv"><div class="clbl">Score de performance</div>' +
    '<div style="height:6px;background:var(--g4);border-radius:3px;overflow:hidden;margin-bottom:10px">' +
    '<div style="height:100%;width:' + score + '%;background:linear-gradient(90deg,var(--v2),var(--v3));border-radius:3px"></div></div>' +
    '<div style="font-size:26px;font-weight:800;letter-spacing:-1px;color:' + scoreColor + ';margin-bottom:3px">' + score.toFixed(0) + '/100</div>' +
    '<div style="font-size:13px;font-weight:700;color:' + scoreColor + '">' + scoreLabel + '</div>' +
    '<div style="font-size:10px;color:var(--g3);margin-top:4px">Base sur win rate, ROI et CLV</div></div>';
  return h;
}

/* ════════════════════════════════════════════
   MAIN RENDER
════════════════════════════════════════════ */
function renderPage() {
  var pg = document.getElementById("page");
  var t = S.tab, h = "";
  if (t === "home")     h = pageHome();
  else if (t === "scanner")  h = pageScanner();
  else if (t === "matchs")   h = pageMatchs();
  else if (t === "tips")     h = pageTips();
  else if (t === "comp")     h = pageComp();
  else if (t === "analyse")  h = pageAnalyse();
  else if (t === "result")   h = pageResult();
  else if (t === "bankroll") h = pageBankroll();
  else if (t === "stats")    h = pageStats();
  pg.innerHTML = h;
  buildSide();
  updTop();
  updSide();
}

function render() { renderPage(); }

/* ════════════════════════════════════════════
   INIT
════════════════════════════════════════════ */
render();
</script>
